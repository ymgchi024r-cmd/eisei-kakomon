<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="衛生管理者">
<meta name="theme-color" content="#1e6fb5">
<title>第1種衛生管理者 ○×チェック</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:#eef4fb;
  color:#1a1a1a;
  min-height:100vh;
}
.app{max-width:430px;margin:0 auto;padding:0;}

/* ===== ホームヘッダー ===== */
.home-hero{
  background:linear-gradient(135deg,#1e6fb5 0%,#2e9cce 60%,#3eb8d8 100%);
  padding:28px 20px 22px;
  color:#fff;
  position:relative;
  overflow:hidden;
}
/* 装飾円 */
.home-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.10);
}
.home-hero::after{
  content:'';position:absolute;bottom:-30px;left:30px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.07);
}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;position:relative;}
.hero-label{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.1em;margin-bottom:5px;}
.hero-title{font-size:20px;font-weight:800;line-height:1.35;text-shadow:0 1px 4px rgba(0,0,0,.15);}
.countdown-box{text-align:right;}
.countdown-days{font-size:34px;font-weight:800;color:#fff;line-height:1;}
.countdown-label{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;}
.countdown-set{font-size:11px;color:rgba(255,255,255,.6);text-decoration:underline;cursor:pointer;margin-top:4px;display:block;}
.exam-date-input{
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.3);
  border-radius:6px;color:#fff;font-size:12px;padding:4px 8px;margin-top:4px;width:140px;
}
.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;
}
.hero-stat{
  background:rgba(255,255,255,.18);border-radius:12px;padding:10px 6px;text-align:center;
  backdrop-filter:blur(4px);
}
.hero-stat-val{font-size:20px;font-weight:700;color:#fff;}
.hero-stat-label{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;}

/* ===== 科目別グラフ ===== */
.graph-section{background:#fff;margin:10px 10px 0;border-radius:16px;padding:14px 16px;box-shadow:0 1px 6px rgba(30,111,181,.08);}
.graph-title{font-size:13px;font-weight:700;margin-bottom:12px;color:#1e6fb5;}
.graph-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.graph-row:last-child{margin-bottom:0;}
.graph-cat{font-size:10px;color:#666;width:58px;flex-shrink:0;line-height:1.3;}
.graph-bar-wrap{flex:1;background:#e8f0fb;border-radius:99px;height:9px;overflow:hidden;}
.graph-bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}
.graph-pct{font-size:11px;font-weight:700;width:34px;text-align:right;flex-shrink:0;}
.graph-count{font-size:10px;color:#bbb;width:36px;text-align:right;flex-shrink:0;}

/* ===== ホームモード選択 ===== */
.home-body{padding:10px 10px 80px;}
.mode-label{font-size:11px;font-weight:600;color:#5a7fa0;letter-spacing:.06em;margin-bottom:8px;margin-top:14px;}
.mode-cards{display:flex;flex-direction:column;gap:8px;}
.mode-card{
  background:#fff;border-radius:16px;padding:14px 15px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:transform .12s,box-shadow .12s;
  box-shadow:0 1px 6px rgba(30,111,181,.07);
  border:1.5px solid transparent;
}
.mode-card:active{transform:scale(.97);box-shadow:none;}
.mode-card.disabled{opacity:.35;cursor:default;}
.mode-card.disabled:active{transform:none;}
.mode-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.mode-info{flex:1;}
.mode-name{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:1px;}
.mode-desc{font-size:11px;color:#888;}
.mode-count{font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;flex-shrink:0;}
.mode-arrow{font-size:18px;color:#c5d8ee;flex-shrink:0;}
.cat-panel{display:none;flex-direction:column;gap:5px;margin-top:7px;padding:10px;background:#f0f6fc;border-radius:13px;}
.cat-panel.open{display:flex;}
.cat-item{background:#fff;border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:transform .1s;}
.cat-item:active{transform:scale(.97);}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cat-item-name{flex:1;font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.4;}
.cat-item-pct{font-size:11px;font-weight:700;flex-shrink:0;}
.cat-wrong-badge{font-size:10px;background:#fff0f0;color:#c0392b;padding:2px 6px;border-radius:99px;font-weight:600;flex-shrink:0;}
.cat-item-count{font-size:10px;color:#bbb;flex-shrink:0;}

/* ===== 問題画面全体 ===== */
#screen-quiz{display:none;min-height:100vh;background:#eef4fb;padding-bottom:0;}
.quiz-header{
  background:linear-gradient(90deg,#1e6fb5,#2e9cce);
  padding:13px 16px;display:flex;align-items:center;gap:10px;
}
.quiz-back{color:#fff;background:none;border:none;font-size:14px;cursor:pointer;padding:4px 0;}
.quiz-header-title{font-size:13px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quiz-header-num{font-size:12px;color:rgba(255,255,255,.65);flex-shrink:0;}

/* スコア帯 */
.q-stats-bar{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:10px 12px 6px;
}
.q-stat{background:#fff;border-radius:10px;padding:7px 4px;text-align:center;box-shadow:0 1px 4px rgba(30,111,181,.07);}
.q-stat-label{font-size:10px;color:#999;margin-bottom:1px;}
.q-stat-val{font-size:17px;font-weight:700;color:#1a1a1a;}

/* プログレスバー */
.prog{background:#d0e5f5;height:4px;margin:0 12px 8px;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#1e6fb5,#3eb8d8);border-radius:99px;transition:width .4s;}

/* 問題カード */
.q-scroll{padding:0 12px;padding-bottom:200px;/* 固定ボタン分の余白 */}
.q-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 6px rgba(30,111,181,.08);}
.q-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;align-items:center;}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:500;}
.badge-year{background:#e8f5ee;color:#0a6b47;}
.badge-cat{background:#ddeeff;color:#1e6fb5;}
.badge-review{background:#fff0f0;color:#c0392b;}
.bm-btn{margin-left:auto;background:none;border:none;cursor:pointer;font-size:20px;padding:0;line-height:1;}
.q-stem{font-size:12px;color:#888;line-height:1.75;padding-bottom:10px;border-bottom:1px solid #eef4fb;margin-bottom:12px;}
.q-stem strong{color:#555;font-weight:600;}
.q-branch{font-size:16px;line-height:1.85;color:#1a1a1a;min-height:60px;font-weight:500;}

/* 正誤フィードバック（カード内） */
.result-badge{display:none;margin-top:10px;text-align:center;font-size:14px;font-weight:700;padding:9px;border-radius:10px;}
.result-badge.ok{background:#e8f5ee;color:#0a6b47;}
.result-badge.ng{background:#fff0f0;color:#c0392b;}
.explanation{background:#f5f9ff;border-radius:10px;padding:11px;margin-top:8px;font-size:12px;line-height:1.85;color:#555;display:none;border-left:3px solid #2e9cce;}
.explanation strong{color:#1e6fb5;font-weight:700;}

/* ===== 固定ボタンエリア ===== */
.fixed-bottom{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(238,244,251,.96);
  backdrop-filter:blur(8px);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  border-top:1px solid #d0e5f5;
  z-index:100;
}
/* ○×ボタン */
.ox-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ox-btn{
  padding:18px 0;border-radius:16px;border:none;
  font-size:36px;cursor:pointer;line-height:1;
  font-weight:700;transition:transform .1s,box-shadow .1s;
  box-shadow:0 3px 10px rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.ox-btn:active{transform:scale(.95);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ox-btn:disabled{opacity:.4;cursor:default;box-shadow:none;}
#btn-o{background:linear-gradient(135deg,#1aad6c,#22c97e);color:#fff;}
#btn-x{background:linear-gradient(135deg,#e24b4a,#f06060);color:#fff;}
.ox-btn-label{font-size:13px;font-weight:700;letter-spacing:.04em;}
/* 正解・不正解時のリング */
#btn-o.correct{background:linear-gradient(135deg,#1aad6c,#22c97e);box-shadow:0 0 0 3px #1aad6c,0 3px 10px rgba(26,173,108,.3);}
#btn-o.wrong{background:#ccc;box-shadow:none;}
#btn-x.correct{background:linear-gradient(135deg,#e24b4a,#f06060);box-shadow:0 0 0 3px #e24b4a,0 3px 10px rgba(226,75,74,.3);}
#btn-x.wrong{background:#ccc;box-shadow:none;}

/* 次へボタン */
#btn-next{
  display:none;width:100%;padding:16px;
  border:none;border-radius:16px;
  background:linear-gradient(90deg,#1e6fb5,#2e9cce);
  color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.05em;
  box-shadow:0 4px 14px rgba(30,111,181,.35);
  transition:transform .1s,box-shadow .1s;
}
#btn-next:active{transform:scale(.97);box-shadow:0 2px 6px rgba(30,111,181,.2);}

/* ===== ブックマーク画面 ===== */
#screen-bookmark{display:none;}
.bm-screen{padding:12px 12px 80px;}
.bm-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#1e6fb5;}
.bm-item{background:#fff;border-radius:13px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 5px rgba(30,111,181,.07);}
.bm-item:active{opacity:.7;}
.bm-item-cat{font-size:10px;color:#5a9fd4;margin-bottom:3px;font-weight:600;}
.bm-item-text{font-size:13px;color:#1a1a1a;line-height:1.6;}
.bm-empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px;}

/* ===== 結果画面 ===== */
.result-screen{display:none;padding:28px 16px 80px;text-align:center;}
.result-circle{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,#1e6fb5,#3eb8d8);
  margin:0 auto 18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(30,111,181,.3);
}
.result-score{font-size:30px;font-weight:800;color:#fff;}
.result-score-sub{font-size:10px;color:rgba(255,255,255,.7);}
.result-msg{font-size:16px;font-weight:700;margin-bottom:4px;}
.result-sub{font-size:13px;color:#888;margin-bottom:24px;}
.result-actions{display:flex;flex-direction:column;gap:8px;}
.r-btn{
  padding:14px;border-radius:14px;font-size:14px;font-weight:700;
  cursor:pointer;border:none;
}
.r-btn.primary{background:linear-gradient(90deg,#1e6fb5,#2e9cce);color:#fff;box-shadow:0 4px 14px rgba(30,111,181,.3);}
.r-btn.danger{background:#fff5f5;color:#c0392b;border:1.5px solid #e24b4a;}
</style>
</head>
<body>
<div class="app">

<!-- ===== ホーム画面 ===== -->
<div id="screen-home">
  <div class="home-hero">
    <div class="hero-top">
      <div>
        <div class="hero-label">EISEI KANRISHA</div>
        <div class="hero-title">第1種衛生管理者<br>○×チェック</div>
      </div>
      <div class="countdown-box">
        <div class="countdown-days" id="countdown-days">―</div>
        <div class="countdown-label">日後に試験</div>
        <span class="countdown-set" onclick="showDatePicker()" id="set-date-btn">試験日を設定</span>
        <input type="date" class="exam-date-input" id="exam-date-input" style="display:none;" onchange="setExamDate(this.value)">
      </div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="hero-stat-val" id="h-total">1716</div><div class="hero-stat-label">総問題数</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="h-wrong">0</div><div class="hero-stat-label">要復習</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="h-acc">―</div><div class="hero-stat-label">累計正答率</div></div>
    </div>
  </div>

  <div class="graph-section">
    <div class="graph-title">📊 科目別正答率</div>
    <div id="graph-body"></div>
  </div>

  <div class="home-body">
    <div class="mode-label">モードを選択</div>
    <div class="mode-cards">
      <div class="mode-card" onclick="startRandom()">
        <div class="mode-icon" style="background:#e8f0fb;">🎲</div>
        <div class="mode-info"><div class="mode-name">ランダム</div><div class="mode-desc">全科目から20問シャッフル出題</div></div>
        <span class="mode-count" style="background:#e8f0fb;color:#1e6fb5;">20問</span>
        <div class="mode-arrow">›</div>
      </div>
      <div class="mode-card" onclick="toggleCat()">
        <div class="mode-icon" style="background:#e8f0fb;">📂</div>
        <div class="mode-info"><div class="mode-name">カテゴリ別</div><div class="mode-desc">科目を選んで集中学習</div></div>
        <span class="mode-count" style="background:#e8f0fb;color:#1e6fb5;">5科目</span>
        <div class="mode-arrow" id="cat-arrow">›</div>
      </div>
      <div class="cat-panel" id="cat-panel"></div>
      <div class="mode-card" id="review-card" onclick="startReview()">
        <div class="mode-icon" style="background:#fff0f0;">❌</div>
        <div class="mode-info"><div class="mode-name">復習モード</div><div class="mode-desc">間違えた問題だけを出題</div></div>
        <span class="mode-count" id="review-count" style="background:#fff0f0;color:#c0392b;">0問</span>
        <div class="mode-arrow">›</div>
      </div>
      <div class="mode-card" id="bm-card" onclick="showBookmarks()">
        <div class="mode-icon" style="background:#faeeda;">🔖</div>
        <div class="mode-info"><div class="mode-name">ブックマーク</div><div class="mode-desc">後で確認したい問題を管理</div></div>
        <span class="mode-count" id="bm-count" style="background:#faeeda;color:#854F0B;">0問</span>
        <div class="mode-arrow">›</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== ブックマーク画面 ===== -->
<div id="screen-bookmark">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← 戻る</button>
    <div class="quiz-header-title">ブックマーク</div>
  </div>
  <div class="bm-screen" id="bm-list"></div>
</div>

<!-- ===== 問題画面 ===== -->
<div id="screen-quiz">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← 戻る</button>
    <div class="quiz-header-title" id="quiz-title"></div>
    <div class="quiz-header-num" id="quiz-num"></div>
  </div>

  <div class="q-stats-bar">
    <div class="q-stat"><div class="q-stat-label">正解</div><div class="q-stat-val" id="sc">0</div></div>
    <div class="q-stat"><div class="q-stat-label">不正解</div><div class="q-stat-val" id="sw">0</div></div>
    <div class="q-stat"><div class="q-stat-label">正答率</div><div class="q-stat-val" id="sa">―</div></div>
  </div>
  <div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <!-- 問題コンテンツ（スクロール可） -->
  <div class="q-scroll" id="quiz-area">
    <div class="q-card">
      <div class="q-meta">
        <span class="badge badge-year" id="q-year"></span>
        <span class="badge badge-cat" id="q-cat"></span>
        <span class="badge badge-review" id="q-rev" style="display:none;">復習</span>
        <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖</button>
      </div>
      <div class="q-stem" id="q-stem"></div>
      <div class="q-branch" id="q-branch"></div>
      <div class="result-badge" id="result-badge"></div>
      <div class="explanation" id="explanation"></div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="q-scroll result-screen" id="result-screen">
    <div class="result-circle">
      <div class="result-score" id="rs-score"></div>
      <div class="result-score-sub">正解</div>
    </div>
    <div class="result-msg" id="rs-msg"></div>
    <div class="result-sub" id="rs-sub"></div>
    <div class="result-actions">
      <button class="r-btn primary" onclick="goHome()">ホームへ戻る</button>
      <button class="r-btn danger" id="rs-retry" onclick="retryWrong()" style="display:none;">間違えた問題を復習</button>
    </div>
  </div>

  <!-- 画面下部固定ボタン -->
  <div class="fixed-bottom" id="fixed-bottom">
    <div class="ox-btns" id="ox-btns">
      <button class="ox-btn" id="btn-o" onclick="answer(true)">
        ○<span class="ox-btn-label">正しい</span>
      </button>
      <button class="ox-btn" id="btn-x" onclick="answer(false)">
        ×<span class="ox-btn-label">誤り</span>
      </button>
    </div>
    <button id="btn-next" onclick="nextQ()">次へ →</button>
  </div>
</div>

</div><!-- /.app -->

<script>
const CATS={
  "労働衛生（有害業務）":{short:"衛生①有害",color:"#D4537E",bar:"#D4537E"},
  "労働衛生（有害業務以外）":{short:"衛生②以外",color:"#EF9F27",bar:"#EF9F27"},
  "関係法令（有害業務）":{short:"法令①有害",color:"#1e6fb5",bar:"#1e6fb5"},
  "関係法令（有害業務以外）":{short:"法令②以外",color:"#1D9E75",bar:"#1D9E75"},
  "労働生理":{short:"労働生理",color:"#7F77DD",bar:"#7F77DD"}
};


const Q=[
{c:"関係法令（有害業務）",y:"R5-4",s:"問1・枝1",b:"選任している産業医がこの事業場に専属でないことが違反である。",a:false,e:"違反なし：「深夜業を含む業務に常時500人以上の労働者を従事させる事業場」に該当しない。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問1・枝2",b:"選任している衛生管理者数が少ないことが違反である。",a:false,e:"違反なし：「常時 500 人を超え、1000 人以下の事業場」に該当するため、少なくとも3人の衛生管理者を選任しなければならない。安衛則第7条（衛生管理者の選任）第1項4。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問1・枝3",b:"衛生管理者として選任している労働衛生コンサルタントがこの事業場に専属でないことが違反である。",a:false,e:"違反なし：2 人以上の衛生管理者を選任する場合で、当該衛生管理者の中に労働衛生コンサルタントがいるときは、当該衛生管理者のうち1人については専属でなくてもよい。安衛則第7条（衛生管理者の選任）第1項2。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問1・枝4",b:"衛生工学衛生管理者免許を受けた者のうちから選任した衛生管理者が1人もいないことが違反である。",a:false,e:"違反なし：「強烈な騒音を発する場所における業務に30人が常時従事している事業場」は、衛生工学衛生管理者の選任要件には該当しない。安衛則第7条（衛生管理者の選任）第1項6。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問1・枝5",b:"専任の衛生管理者が1人もいないことが違反である。",a:true,e:"違反あり：「強烈な騒音を発する場所における業務に常時30人が常時従事している事業場」は、少なくとも1人を専任の衛生管理者に選任しなければならない。安衛則第7条（衛生管理者の選任）第1項5ロ。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問2・A",b:"水深10m以上の場所における潜水の作業",a:false,e:"義務付けられていない。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問2・B",b:"セメント製造工程においてセメントを袋詰めする作業",a:false,e:"義務付けられていない。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問2・C",b:"製造工程において硫酸を用いて行う洗浄の作業",a:true,e:"義務付けられている。硫酸は特定化学物質第3類物質で、特定化学物質作業主任者を選任する。安衛令第6 条（作業主任者を選任すべき作業）第1項18、安衛令別表第3第3号（第3類物質）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問2・D",b:"石炭を入れてあるホッパーの内部における作業",a:true,e:"義務付けられている。石炭を入れてあるホッパーの内部における作業は、酸素欠乏危険作業主任者を選任する。安衛令第6条（作業主任者を選任すべき作業）第1項21、安衛令別表第6第5号。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問3・枝1",b:"石綿等が使用されている建築物の解体等の作業に係る業務",a:true,e:"該当する：石綿等が使用されている建築物の解体等の作業は、特別教育を必要とする業務に該当する。安衛則第36条第37号。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問3・枝2",b:"高圧室内作業に係る業務",a:true,e:"該当する：高圧室内作業に係る業務は、特別教育を必要とする業務に該当する。安衛則第36条第24号の2。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問3・枝3",b:"有機溶剤等を用いて行う接着の業務",a:false,e:"該当しない"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問3・枝4",b:"廃棄物の焼却施設において焼却灰を取り扱う業務",a:true,e:"該当する：廃棄物の焼却施設において焼却灰を取り扱う業務は、特別教育を必要とする業務に該当する。安衛則第36条第34号。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問3・枝5",b:"エックス線装置を用いて行う透過写真の撮影の業務",a:true,e:"該当する：安衛則第36条（特別教育を必要とする業務）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問4・枝1",b:"塩化水素を重量の20％含有する塩酸を使用する屋内の作業場所に設けた局所排気装置",a:false,e:"規定されていない：塩酸を使用する屋内作業場の局所排気装置は、定期自主検査が義務付けられる対象に含まれない。安衛法第45条、安衛令第15条。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問4・枝2",b:"アーク溶接を行う屋内の作業場所に設けた全体換気装置",a:false,e:"規定されていない：塩酸は定期自主検査の対象となる局所排気装置の設置義務がある物質に該当しない。安衛法第45条（定期自主検査）、安衛令第15条。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問4・枝3",b:"エタノールを使用する作業場所に設けた局所排気装置",a:false,e:"規定されていない：塩酸は定期自主検査の対象となる局所排気装置の設置義務がある物質に該当しない。安衛法第45条（定期自主検査）、安衛令第15条。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問4・枝4",b:"アンモニアを使用する屋内の作業場所に設けたプッシュプル型換気装置",a:false,e:"規定されていない"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問4・枝5",b:"トルエンを重量の10％含有する塗料を用いて塗装する屋内の作業場所に設けた局所排気装置",a:true,e:"規定されている：トルエンは第2種有機溶剤であるため、屋内作業場に設けられた局所排気装置は定期自主検査の実施義務がある。有機則第5条（第1種有機溶剤等又は第2種有機溶剤等に係る設備）、第20条（局所排気装置の定期自主検査）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問5・枝1",b:"作業場所に設けた局所排気装置について、囲い式フードの場合は0.4m/sの制御風速を出し得る能力を有するものにする。",a:true,e:"正しい：有機則第16条（局所排気装置の性能）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問5・枝2",b:"有機溶剤等の区分の色分けによる表示を黄色で行う。",a:true,e:"正しい：有機則第25条（有機溶剤等の区分の表示）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問5・枝3",b:"作業中の労働者が見やすい場所に、有機溶剤の人体に及ぼす作用、有機溶剤等の取扱い上の注意事項及び有機溶剤による中毒が発生したときの応急処置を掲示する。",a:true,e:"正しい：有機則第24条（掲示）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問5・枝4",b:"作業に常時従事する労働者に対し、6か月以内ごとに1回、定期に、特別の項目について医師による健康診断を行い、その結果に基づき作成した有機溶剤等健康診断個人票を3年間保存する。",a:false,e:"誤り：「3年間保存する」⇒「5年間保存する」。有機則第30条（健康診断の結果）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問5・枝5",b:"労働者が有機溶剤を多量に吸入したときは、速やかに、当該労働者に医師による診察又は処置を受けさせる。",a:true,e:"正しい：有機則第30条の4（緊急診断）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問6・枝1",b:"酸素欠乏とは、空気中の酸素の濃度が18％未満である状態をいう。",a:true,e:"正しい： 酸欠則第2条（定義）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問6・枝2",b:"海水が滞留したことのあるピットの内部における作業については、酸素欠乏危険作業主任者技能講習を修了した者のうちから、酸素欠乏危険作業主任者を選任しなければならない。",a:false,e:"誤り： 「酸素欠乏危険作業主任者技能講習を修了した者」⇒「酸素欠乏・硫化水素危険作業主任者技能講習を修了した者」。海水が滞留したことのあるピットの内部における作業は、第2種酸素欠乏危険作業に該当するため、酸素欠乏・硫化水素危険作業主任者技能講習を修了した者のうちから酸素欠乏危険作業主任者を選任しなければならない。安衛令別表第 6 3の 3、酸欠則第 11条第1項（作業主任者）、"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問6・枝3",b:"第一種酸素欠乏危険作業を行う作業場については、その日の作業を開始する前に、当該作業場における空気中の酸素の濃度を測定しなければならない。",a:true,e:"正しい：酸欠則第3条（作業環境測定）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問6・枝4",b:"酸素又は硫化水素の濃度が法定の基準を満たすようにするために酸素欠乏危険作業を行う場所を換気するときは、純酸素を使用してはならない。",a:true,e:"正しい：酸欠則第5条（換気）第2項。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問6・枝5",b:"し尿を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、指揮者を選任し、作業を指揮させなければならない。",a:true,e:"正しい：酸欠則第25条の2（設備の改造等の作業）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問7・枝1",b:"じん肺管理区分の管理一は、じん肺健康診断の結果、じん肺の所見がないと認められるものをいう。",a:true,e:"（1）（2）正しい：じん肺法第4条（エックス線写真像及びじん肺管理区分）第2項（3）正しい：じん肺法第8条（定期健康診断）第1項2。（4）正しい：じん肺法第13条（じん肺管理区分の決定手続等）第2項。（5）誤り ：「管理三」⇒「管理四」。じん肺法第23条（療養）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問7・枝2",b:"じん肺管理区分の管理二は、じん肺健康診断の結果、エックス線写真の像が第一型でじん肺による著しい肺機能の障害がないと認められるものをいう。",a:true,e:"正しい：じん肺法第4条（エックス線写真像及びじん肺管理区分）第2項"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問7・枝3",b:"常時粉じん作業に従事する労働者でじん肺管理区分が管理二であるものに対しては、1年以内ごとに1回、定期的に、じん肺健康診断を行わなければならない。",a:true,e:"正しい：じん肺法第8条（定期健康診断）第1項2。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問7・枝4",b:"都道府県労働局長は、事業者から、法令に基づいて、じん肺の所見があると診断された労働者についてのエックス線写真等が提出されたときは、これらを基礎として、地方じん肺診査医の診断又は審査により、当該労働者についてじん肺管理区分の決定をするものとする。",a:true,e:"正しい：じん肺法第13条（じん肺管理区分の決定手続等）第2項。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問7・枝5",b:"じん肺管理区分が管理三と決定された者及び合併症にかかっていると認められる者は、療養を要するものとする。",a:false,e:"誤り ：「管理三」⇒「管理四」。じん肺法第23条（療養）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問8・枝1",b:"硫化水素濃度が5ppmを超える場所には、関係者以外の者が立ち入ることを禁止し、かつ、その旨を見やすい箇所に表示しなければならない。",a:false,e:"誤り：「5ppmを超える」⇒「10ppmを超える」。安衛則第585条（立入禁止等）第1項4。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問8・枝2",b:"強烈な騒音を発する屋内作業場においては、その伝ぱを防ぐため、隔壁を設ける等必要な措置を講じなければならない。",a:true,e:"正しい：安衛則第584条（騒音の伝ぱの防止）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問8・枝3",b:"屋内作業場に多量の熱を放散する溶融炉があるときは、加熱された空気を直接屋外に排出し、又はその放射するふく射熱から労働者を保護する措置を講じなければならない。",a:true,e:"正しい：安衛則第608条（ふく射熱からの保護）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問8・枝4",b:"病原体により汚染された排気、排液又は廃棄物については、消毒、殺菌等適切な処理をした後に、排出し、又は廃棄しなければならない。",a:true,e:"正しい：安衛則第581条（病原体の処理）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問8・枝5",b:"著しく暑熱又は多湿の作業場においては、坑内等特殊な作業場でやむを得ない事由がある場合を除き、休憩の設備を作業場外に設けなければならない。",a:true,e:"正しい：安衛則第614条（有害作業場の休憩設備）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問9・枝1",b:"鉛ライニングの業務を行う屋内作業場における空気中の鉛濃度の測定・・・・・・・・・・・・ 6か月以内ごとに1回",a:false,e:"誤り：「6か月以内ごとに1回」⇒「1年以内ごとに1回」。鉛則第52条（測定）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問9・枝2",b:"動力により駆動されるハンマーを用いる金属の成型の業務を行う屋内作業場における等価騒音レベルの測定・・・・・・・・・・・・ 6か月以内ごとに1回",a:true,e:"正しい：安衛則第588条（作業環境測定を行うべき作業場）、第590条（騒音の測定等）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問9・枝3",b:"第二種有機溶剤等を用いて塗装の業務を行う屋内作業場における空気中の有機溶剤の濃度の測定・・・・・・・・・・・・ 6か月以内ごとに1回",a:true,e:"正しい：有機則第28条（測定）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問9・枝4",b:"通気設備が設けられている坑内の作業場における通気量の測定・・・・・・・・・・・・・半月以内ごとに1回",a:true,e:"正しい：安衛則第603条（坑内の通気量の測定）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問9・枝5",b:"溶融ガラスからガラス製品を成型する業務を行う屋内作業場の気温、湿度及びふく射熱の測定・・・・・・・・・・・・・半月以内ごとに1回",a:true,e:"正しい：安衛則第587条（作業環境測定を行うべき作業場）、第607条（気温、湿度等の測定）。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問10・枝1",b:"満18歳未満の者は、多量の低温物体を取り扱う業務に就かせてはならない。",a:true,e:"正しい：年少則第8条（年少者の就業制限の業務の範囲）第1項37。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問10・枝2",b:"妊娠中の女性は、異常気圧下における業務に就かせてはならない。",a:true,e:"正しい：女性則第2条（危険有害業務の就業制限の範囲等）第1項23。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問10・枝3",b:"満18歳以上で産後8週間を経過したが1年を経過しない女性から、著しく暑熱な場所における業務に従事しない旨の申出があった場合には、当該業務に就かせてはならない。",a:true,e:"正しい：女性則第2条（危険有害業務の就業制限の範囲等）第1項20、第2項。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問10・枝4",b:"満18歳以上で産後8週間を経過したが1年を経過しない女性から、さく岩機、鋲打機等身体に著しい振動を与える機械器具を用いて行う業務に従事したい旨の申出があった場合には、当該業務に就かせることができる。",a:false,e:"誤り：女性則第2条（危険有害業務の就業制限の範囲等）第1項24、第2項。"},
{c:"関係法令（有害業務）",y:"R5-4",s:"問10・枝5",b:"満18歳以上で産後1年を経過した女性は、多量の低温物体を取り扱う業務に就かせることができる。",a:true,e:"正しい：女性則第2条（危険有害業務の就業制限の範囲等）第1項21、第2項。【労働衛生（有害業務に係るもの）】"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問11・枝1",b:"化学物質等に係る機械設備等の密閉化",a:false,e:"疾病のリスク低減措置の優先度が高い順は、次の通り。 1 化学反応のプロセス等の運転条件の変更…（5） 2 化学物質等に係る機械設備等の密閉化、局所排気装置等の労働衛生工学的対策…（1）（2） 3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策…（3） 4 化学物質等の有害性に応じた有効"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問11・枝2",b:"化学物質等に係る機械設備等への局所排気装置の設置",a:false,e:"3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策…"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問11・枝3",b:"作業手順の改善",a:false,e:"4 化学物質等の有害性に応じた有効な保護具の使用…"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問11・枝4",b:"化学物質等の有害性に応じた有効な保護具の使用",a:false,e:"疾病のリスク低減措置の優先度が高い順は、次の通り。 1 化学反応のプロセス等の運転条件の変更…（5） 2 化学物質等に係る機械設備等の密閉化、局所排気装置等の労働衛生工学的対策…（1）（2） 3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策…（3） 4 化学物質等の有害性に応じた有効"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問11・枝5",b:"化学反応のプロセス等の運転条件の変更",a:true,e:"2 化学物質等に係る機械設備等の密閉化、局所排気装置等の労働衛生工学的対策…"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問12・枝1",b:"塩化ビニル",a:false,e:"誤り：塩化ビニルは無色の気体で、ガスとして存在する。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問12・枝2",b:"ジクロロベンジジン",a:false,e:"誤り：ジクロロベンジジンは赤灰色または白色個体で、市販品は黄色粉末のものが多い。粒子状物質の粉じん（ダスト）に分類される。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問12・枝3",b:"アクリロニトリル",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問12・枝4",b:"エチレンオキシド",a:false,e:"誤り：エチレンオキシドは無色の気体で、ガスとして存在する。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問12・枝5",b:"二酸化マンガン",a:false,e:"誤り：二酸化マンガンは黒～茶色の粉末で、粒子状物質の粉じん（ダスト）に分類される。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問13・枝1",b:"酸素中毒",a:false,e:"（2）一酸化炭素中毒は、血液中のヘモグロビンと一酸化炭素が強く結合し、体内の各組織が酸素欠乏状態を起こすことにより発生する。石油やガソリンなど炭素を含む物質が燃える時、酸素（空気）の供給が十分な場合は、完全燃焼して「二酸化炭素（CO2）」が発生するが、酸素の供給が不十分な場合は、不完全燃焼を起"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問13・枝2",b:"一酸化炭素中毒",a:true,e:"一酸化炭素中毒は、血液中のヘモグロビンと一酸化炭素が強く結合し、体内の各組織が酸素欠乏状態を起こすことにより発生する。石油やガソリンなど炭素を含む物質が燃える時、酸素（空気）の供給が十分な場合は、完全燃焼して「二酸化炭素（CO2）」が発生するが、酸素の供給が不十分な場合は、不完全燃焼を起して一酸化炭素が発生する。従って、高圧の影響又は高圧環境下から常圧に戻る際の減圧の影響として、直接には発症しない。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問13・枝3",b:"炭酸ガス(二酸化炭素)中毒",a:false,e:"（2）一酸化炭素中毒は、血液中のヘモグロビンと一酸化炭素が強く結合し、体内の各組織が酸素欠乏状態を起こすことにより発生する。石油やガソリンなど炭素を含む物質が燃える時、酸素（空気）の供給が十分な場合は、完全燃焼して「二酸化炭素（CO2）」が発生するが、酸素の供給が不十分な場合は、不完全燃焼を起"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問13・枝4",b:"窒素酔い",a:false,e:"（2）一酸化炭素中毒は、血液中のヘモグロビンと一酸化炭素が強く結合し、体内の各組織が酸素欠乏状態を起こすことにより発生する。石油やガソリンなど炭素を含む物質が燃える時、酸素（空気）の供給が十分な場合は、完全燃焼して「二酸化炭素（CO2）」が発生するが、酸素の供給が不十分な場合は、不完全燃焼を起"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問13・枝5",b:"減圧症",a:false,e:"（2）一酸化炭素中毒は、血液中のヘモグロビンと一酸化炭素が強く結合し、体内の各組織が酸素欠乏状態を起こすことにより発生する。石油やガソリンなど炭素を含む物質が燃える時、酸素（空気）の供給が十分な場合は、完全燃焼して「二酸化炭素（CO2）」が発生するが、酸素の供給が不十分な場合は、不完全燃焼を起"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問14・枝1",b:"有機溶剤の多くは、揮発性が高く、その蒸気は空気より軽い。",a:false,e:"誤り：「蒸気は空気より軽い」⇒「蒸気は空気より重い」。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問14・枝2",b:"有機溶剤は、脂溶性が低いため、脂肪の多い脳などには入りにくい。",a:false,e:"誤り：有機溶剤はすべてに脂溶性があり、体内に入ると、脂溶性が大きいものほど脂肪組織や脳など神経系に取り込まれやすい。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問14・枝3",b:"ノルマルヘキサンによる障害として顕著なものには、白血病や皮膚がんがある。",a:false,e:"誤り：ノルマルヘキサンは、末梢神経障害（多発性神経炎）を生じさせる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問14・枝4",b:"二硫化炭素は、動脈硬化を進行させたり、精神障害を生じさせることがある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問14・枝5",b:"N,N-ジメチルホルムアミドによる障害として顕著なものには、視力低下を伴う視神経障害がある。",a:false,e:"誤り：N,N-ジメチルホルムアミドは、頭痛、めまい、肝機能障害等を生じさせる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問15・枝1",b:"人が聴くことができる音の周波数は、およそ20～20,000Hzである。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：等価騒音レベルは、変動する騒音レベルを一定時間内の平均的な値として騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問15・枝2",b:"音圧レベルは、通常、その音圧と人間が聴くことができる最も小さな音圧(20μPa)との比の常用対数を20倍して求められ、その単位はデシベル(dB)で表される。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：等価騒音レベルは、変動する騒音レベルを一定時間内の平均的な値として騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問15・枝3",b:"等価騒音レベルは、単位時間(1時間)について10分間ごとのピーク値の騒音レベルを平均化した評価値で、変動する騒音に対して適用される。",a:false,e:"誤り：等価騒音レベルは、変動する騒音レベルを一定時間内の平均的な値として騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問15・枝4",b:"騒音性難聴では、通常、会話音域より高い音域から聴力低下が始まる。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：等価騒音レベルは、変動する騒音レベルを一定時間内の平均的な値として騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問15・枝5",b:"騒音性難聴は、音を神経に伝達する内耳の聴覚器官の有毛細胞の変性によって起こる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問16・枝1",b:"レイノー現象は、振動工具などによる末梢循環障害で、冬期に発生しやすい。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問16・枝2",b:"けい肺は、鉄、アルミニウムなどの金属粉じんによる肺の線維増殖性変化で、けい肺結節という線維性の結節が形成される。",a:false,e:"誤り：「鉄、アルミニウムなどの金属粉じん」⇒「遊離けい酸の粉じん」。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問16・枝3",b:"金属熱は、鉄、アルミニウムなどの金属を溶融する作業などに長時間従事した際に、高温環境により体温調節機能が障害を受けることにより発生する。",a:false,e:"誤り：金属熱は、金属の溶融作業などで亜鉛、銅などのヒュームを吸入した数時間後に、悪寒、発熱、関節痛などの症状がみられる。選択肢の症状は熱中症。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問16・枝4",b:"電離放射線による造血器障害は、確率的影響に分類され、被ばく線量がしきい値を超えると発生率及び重症度が線量に対応して増加する。",a:false,e:"誤り：「確率的影響」⇒「確定的影響」。造血器障害（白血球減少、貧血等、出血傾向）は、確定的影響に分類される。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問16・枝5",b:"熱けいれんは、高温環境下での労働において、皮膚の血管に血液がたまり、脳への血液の流れが少なくなることにより発生し、めまい、失神などの症状がみられる。",a:false,e:"誤り：熱けいれんは、大量の発汗により体内の水分と塩分が失われたところへ水分のみが補給されたとき、体内の塩分濃度が低下することにより発生し、手足や腹筋に痙攣の症状がみられる。選択肢の症状は熱失神。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問17・枝1",b:"塩素による中毒では、再生不良性貧血、溶血などの造血機能の障害がみられる。",a:false,e:"誤り：塩素による中毒は、流涙、咽頭痛、咳などの粘膜刺激症状のほか、高濃度では肺水腫を生じる。再生不良性貧血、溶血などの造血機能の障害がみられるのは、ベンゼンによる健康障害。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問17・枝2",b:"シアン化水素による中毒では、細胞内の酸素の利用の障害による呼吸困難、けいれんなどがみられる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問17・枝3",b:"弗化水素による中毒では、脳神経細胞が侵され、幻覚、錯乱などの精神障害がみられる。",a:false,e:"誤り：弗化水素による中毒は、骨の硬化、斑状歯、歯牙酸蝕症などがみられる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問17・枝4",b:"酢酸メチルによる慢性中毒では、微細動脈瘤を伴う脳卒中などがみられる。",a:false,e:"誤り：酢酸メチルによる慢性中毒は、眼の刺激、乾燥発赤、かすみ、皮膚のひび割れ等が起きる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問17・枝5",b:"二酸化窒素による慢性中毒では、骨の硬化、斑状歯などがみられる。",a:false,e:"誤り：二酸化窒素による慢性中毒は、歯牙酸蝕症、慢性気管支炎、胃腸障害が生じる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問18・枝1",b:"ガス又は蒸気状の有害物質が粉じんと混在している作業環境中で防毒マスクを使用するときは、防じん機能を有する防毒マスクを選択する。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：送気マスクは、清浄な空気をパイプやホースなどにより作業者に給気する呼吸用保護具である。自給式呼吸器には、ボンベに充てんされた清浄空気を作業者に供給する空気呼吸器等がある。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問18・枝2",b:"防毒マスクの吸収缶の色は、一酸化炭素用は赤色で、有機ガス用は黒色である。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：送気マスクは、清浄な空気をパイプやホースなどにより作業者に給気する呼吸用保護具である。自給式呼吸器には、ボンベに充てんされた清浄空気を作業者に供給する空気呼吸器等がある。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問18・枝3",b:"送気マスクは、清浄な空気をボンベに詰めたものを空気源として作業者に供給する自給式呼吸器である。",a:false,e:"誤り：送気マスクは、清浄な空気をパイプやホースなどにより作業者に給気する呼吸用保護具である。自給式呼吸器には、ボンベに充てんされた清浄空気を作業者に供給する空気呼吸器等がある。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問18・枝4",b:"遮光保護具には、遮光度番号が定められており、溶接作業などの作業の種類に応じて適切な遮光度番号のものを使用する。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：送気マスクは、清浄な空気をパイプやホースなどにより作業者に給気する呼吸用保護具である。自給式呼吸器には、ボンベに充てんされた清浄空気を作業者に供給する空気呼吸器等がある。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問18・枝5",b:"騒音作業における聴覚保護具（防音保護具）として、耳覆い（イヤーマフ）又は耳栓のどちらを選ぶかは、作業の性質や騒音の特性で決まるが、非常に強烈な騒音に対しては両者の併用も有効である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問19・枝1",b:"馬尿酸鉛尿",a:false,e:"「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、スチレンについては、尿中の[A：マンデル酸 ]及びフェニルグリオキシル酸の総量を測定し、[B：鉛 ]については、[C：尿 ]中のデルタアミノレブリン酸の量を測定する。」"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問19・枝2",b:"馬尿酸水銀血液",a:false,e:"「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、スチレンについては、尿中の[A：マンデル酸 ]及びフェニルグリオキシル酸の総量を測定し、[B：鉛 ]については、[C：尿 ]中のデルタアミノレブリン酸の量を測定する。」"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問19・枝3",b:"メチル馬尿酸鉛血液",a:false,e:"「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、スチレンについては、尿中の[A：マンデル酸 ]及びフェニルグリオキシル酸の総量を測定し、[B：鉛 ]については、[C：尿 ]中のデルタアミノレブリン酸の量を測定する。」"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問19・枝4",b:"マンデル酸水銀血液",a:false,e:"「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、スチレンについては、尿中の[A：マンデル酸 ]及びフェニルグリオキシル酸の総量を測定し、[B：鉛 ]については、[C：尿 ]中のデルタアミノレブリン酸の量を測定する。」"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問19・枝5",b:"マンデル酸鉛尿",a:true,e:"「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、スチレンについては、尿中の[A：マンデル酸 ]及びフェニルグリオキシル酸の総量を測定し、[B：鉛 ]については、[C：尿 ]中のデルタアミノレブリン酸の量を測定する。」"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問20・枝1",b:"ダクトの形状には円形、角形などがあり、その断面積を大きくするほど、ダクトの圧力損失が増大する。",a:false,e:"誤り：ダクトの断面積を大きくするほど、ダクトの圧力損失は減少するが、管内風速（搬送速度）は遅くなる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問20・枝2",b:"フード開口部の周囲にフランジがあると、フランジがないときに比べ、気流の整流作用が増すため、大きな排風量が必要となる。",a:false,e:"誤り：フランジがあることで気流の整流作用が増し、少ない排風量で効果を得ることができる。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問20・枝3",b:"キャノピ型フードは、発生源からの熱による上昇気流を利用して捕捉するもので、レシーバ式フードに分類される。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問20・枝4",b:"スロット型フードは、作業面を除き周りが覆われているもので、囲い式フードに分類される。",a:false,e:"誤り：スロット型フードは、外付け式フードに分類される。作業面を除き周りが覆われているのは、囲い式のドラフトチェンバ型、建築ブース型である。"},
{c:"労働衛生（有害業務）",y:"R5-4",s:"問20・枝5",b:"空気清浄装置を付設する局所排気装置を設置する場合、排風機は、一般に、フードに接続した吸引ダクトと空気清浄装置の間に設ける。",a:false,e:"誤り：吸引ダクト ⇒ 空気清浄装置 ⇒ 排風機（ファン）⇒ 排気ダクトの順に配置する。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問21・枝1",b:"常時200人の労働者を使用する医療業の事業場において、衛生工学衛生管理者免許を受けた者のうちから衛生管理者を1人選任している。",a:false,e:"正しい：第1項3。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問21・枝2",b:"常時200人の労働者を使用する旅館業の事業場において、第二種衛生管理者免許を有する者のうちから衛生管理者を1人選任している。",a:false,e:"正しい：第1項3。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問21・枝3",b:"常時60人の労働者を使用する電気業の事業場において、第二種衛生管理者免許を有する者のうちから衛生管理者を1人選任している。",a:true,e:"誤り：「第二種衛生管理者免許を有する者」⇒「第一種衛生管理者免許を有する者」。電気業では、第一種衛生管理者若しくは衛生工学衛生管理者免許を有する者又は医師、歯科医師、労働衛生コンサルタントのうちから選任しなければならない。第1項3"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問21・枝4",b:"常時600人の労働者を使用する各種商品小売業の事業場において、3人の衛生管理者のうち2 人を事業場に専属で第一種衛生管理者免許を有する者のうちから選任し、他の1人を事業場に専属でない労働衛生コンサルタントから選任している。",a:false,e:"正しい：第1項2、3。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問21・枝5",b:"常時1,200人の労働者を使用する各種商品卸売業の事業場において、第二種衛生管理者免許を有する者のうちから、衛生管理者を4人選任し、そのうち1人を専任の衛生管理者としているが、他の3人には他の業務を兼務させている。",a:false,e:"正しい：第1項4、5。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問22・枝2",b:"清掃業",a:false,e:"※安衛令第2条（総括安全衛生管理者を選任すべき事業場） （1）（2）（4）（5）義務付けられている ：第1項1 （3）義務付けられていない ：第1項2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問22・枝3",b:"燃料小売業",a:true,e:"義務付けられていない ：第1項2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問22・枝4",b:"建設業",a:false,e:"※安衛令第2条（総括安全衛生管理者を選任すべき事業場） （1）（2）（4）（5）義務付けられている ：第1項1 （3）義務付けられていない ：第1項2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問22・枝5",b:"運送業",a:false,e:"義務付けられている ：第1項1"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問23・枝1",b:"衛生委員会の議長は、衛生管理者である委員のうちから、事業者が指名しなければならない。",a:false,e:"誤り：「衛生管理者」⇒「総括安全衛生管理者又は総括衛生管理者以外の者で当該事業場においてその事業の実施を統括管理するもの若しくはこれに準ずる者」。安衛法第 18 条（衛生委員会）第2項1、第4項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問23・枝2",b:"産業医のうち衛生委員会の委員として指名することができるのは、当該事業場に専属の産業医に限られる。",a:false,e:"誤り：産業医の指名に関してそのように定められていない。安衛法第18条（衛生委員会）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問23・枝3",b:"衛生管理者として選任しているが事業場に専属でない労働衛生コンサルタントを、衛生委員会の委員として指名することはできない。",a:false,e:"誤り：衛生委員会の委員として指名する労働衛生コンサルタントの指名に関して、専属の者でなければ指名できないとの定めはない。また、安衛則第7条第1項2により、「2人以上の衛生管理者を選任する場合において、労働衛生コンサルタント1人まではその事業場に専属でなくともよく、安衛法第18条第2項2により、衛生委員会の委員は「衛生管理者のうち事業者が指名した者」である。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問23・枝4",b:"当該事業場の労働者で、作業環境測定を実施している作業環境測定士を衛生委員会の委員として指名することができる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第3項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問23・枝5",b:"衛生委員会は、毎月1回以上開催するようにし、議事で重要なものに係る記録を作成して、これを5年間保存しなければならない。",a:false,e:"誤り：「5年間保存」⇒「3年間保存」。委員会の開催の都度、所定の事項を記録し、これを3年間保存しなければならない。安衛則第23条（委員会の会議）第4項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問24・枝1",b:"深夜業を含む業務に常時従事する労働者に対し、6か月以内ごとに1回、定期に、健康診断を行わなければならないが、胸部エックス線検査については、1年以内ごとに1回、定期に、行うことができる。",a:true,e:"正しい：安衛則第45条（特定業務従事者の健康診断）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問24・枝2",b:"雇入時の健康診断の項目のうち、聴力の検査は、1,000Hz及び4,000Hzの音について行わなければならない。",a:true,e:"正しい：安衛則第43条（雇入時の健康診断）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問24・枝3",b:"雇入時の健康診断において、医師による健康診断を受けた後3か月を経過しない者が、その健康診断結果を証明する書面を提出したときは、その健康診断の項目に相当する項目を省略することができる。",a:true,e:"正しい：安衛則第43条（雇入時の健康診断）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問24・枝4",b:"定期健康診断を受けた労働者に対し、健康診断を実施した日から3か月以内に、当該健康診断の結果を通知しなければならない。",a:false,e:"誤り：「健康診断を実施した日から3か月以内に」⇒「遅滞なく」。健康診断の結果の通知は、健康診断を受けた労働者に対し、遅滞なく、その健康診断の結果を通知しなければならない。安衛則第51条の4条（健康診断の結果の通知）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問24・枝5",b:"定期健康診断の結果に基づき健康診断個人票を作成して、これを5年間保存しなければならない。",a:true,e:"正しい：安衛則第51条（健康診断結果の記録の作成）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問25・枝1",b:"面接指導の対象となる労働者の要件は、原則として、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり80時間を超え、かつ、疲労の蓄積が認められる者であることとする。",a:true,e:"正しい：安衛則第52条の2（面接指導の対象となる労働者の要件）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問25・枝2",b:"事業者は、面接指導を実施するため、タイムカードによる記録等の客観的な方法その他の適切な方法により、監督又は管理の地位にある者を除き、労働者の労働時間の状況を把握しなければならない。",a:false,e:"誤り：面接指導の対象労働者について、監督又は管理の地位にある者を除くとは定められていない。安衛法第66条の8の3（面接指導等）、労基法第41条の2（労働時間等に関する規定の適用除外）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問25・枝3",b:"面接指導を行う医師として事業者が指定することのできる医師は、当該事業場の産業医に限られる。",a:false,e:"誤り：面接指導を行う医師は産業医に限られるとは定められていない。安衛法第66条の8（面接指導等）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問25・枝4",b:"事業者は、面接指導の対象となる労働者の要件に該当する労働者から面接指導を受ける旨の申出があったときは、申出の日から3か月以内に、面接指導を行わなければならない。",a:false,e:"誤り：「申し出の日から 3 か月以内」⇒「申し出があったときは、遅滞なく」。安衛則第52条の3 3（面接指導の実施方法等）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問25・枝5",b:"事業者は、面接指導の結果に基づき、当該面接指導の結果の記録を作成して、これを3年間保存しなければならない。",a:false,e:"誤り：「3年間保存」⇒「5年間保存」。安衛則第52条の6（面接指導結果の記録の作成）"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問26・枝1",b:"機械による換気のための設備については、3か月以内ごとに1回、定期に、異常の有無を点検しなければならない。",a:false,e:"誤り ：「3か月以内ごとに1回」⇒「2か月以内ごとに1回」。事務所則第9条。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問26・枝2",b:"燃焼器具を使用するときは、発熱量が著しく少ないものを除き、1か月以内ごとに1回、定期に、異常の有無を点検しなければならない。",a:false,e:"誤り ：「1か月以内ごとに1回」⇒「毎日」。事務所則第6条第2項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問26・枝3",b:"空気調和設備内に設けられた排水受けについては、原則として、2か月以内ごとに1回、定期に、その汚れ及び閉塞の状況を点検しなければならない。",a:false,e:"誤り ：「2か月以内ごとに1回」⇒「1か月以内ごとに1回」。事務所則第9条の2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問26・枝4",b:"空気調和設備の加湿装置については、原則として、2か月以内ごとに1回、定期に、その汚れの状況を点検しなければならない。",a:false,e:"誤り ：「2か月以内ごとに1回」⇒「1か月以内ごとに1回」。事務所則第9条の2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問26・枝5",b:"空気調和設備の冷却塔及び冷却水については、原則として、1か月以内ごとに1回、定期に、その汚れの状況を点検し、必要に応じ、その清掃及び換水等を行わなければならない。",a:true,e:"正しい ：事務所則第9条の2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問27・D",b:"産業カウンセラー",a:false,e:"実施者は、法定研修を修了した歯科医師〔B〕、看護師、精神保健福祉士又は公認心理師〔A〕である。安衛則第52条の10（検査の実施者等）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問28・枝1",b:"常時男性5人及び女性35人の労働者を使用している事業場で、男女共用の休憩室のほかに、女性用の臥床することのできる休養室を設けているが、男性用の休養室や休養所は設けていない。",a:false,e:"違反あり：常時女性30人以上の労働者を使用しているので、休養室等は男性用と女性用に区別して設けなければならない。安衛則第618条（休養室等）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問28・枝2",b:"60人の労働者を常時就業させている屋内作業場の気積を、設備の占める容積及び床面から3m を超える高さにある空間を除き600㎥としている。",a:true,e:"違反なし：安衛則第600条（気積）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問28・枝3",b:"労働衛生上の有害業務を有しない事業場において、窓その他の開口部の直接外気に向かって開放することができる部分の面積が、常時床面積の25分の1である屋内作業場に、換気設備を設けていない。",a:false,e:"違反あり：窓その他の開口部の直接外気に向かって開放することができる部分の面積は、常時床面積の20分の1以上としなければならない。安衛則第601条（換気）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問28・枝4",b:"事業場に附属する食堂の床面積を、食事の際の1人について、0.8㎡としている。",a:false,e:"違反あり：食堂の床面積を、食事の際の1人について、1 ㎡以上としなければならない。安衛則第630条（食堂及び炊事場）第1項2"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問28・枝5",b:"日常行う清掃のほか、1年以内ごとに1回、定期に、統一的に大掃除を行っている。",a:false,e:"違反あり：大掃除は6か月以内ごとに1回、定期に、統一的に行わなければならない。安衛則第619条（清掃等の実施）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問29・枝1",b:"1日8時間を超えて労働させることができるのは、時間外労働の協定を締結し、これを所轄労働基準監督署長に届け出た場合に限られている。",a:false,e:"誤り：時間外の労使協定を締結しなくとも、災害時等で臨時の必要がある場合において使用者は行政官庁の許可を受けて、その必要の限度において労働時間を延長し、または休日に労度させることができる。労基法第33条（災害時による臨時の必要がある場合の時間外労働等）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問29・枝2",b:"労働時間が8時間を超える場合においては、少なくとも45分の休憩時間を労働時間の途中に与えなければならない。",a:false,e:"誤り：「少なくとも45分」⇒「少なくとも1時間」。労基法第34条（休憩）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問29・枝3",b:"機密の事務を取り扱う労働者に対する労働時間に関する規定の適用の除外については、所轄労働基準監督署長の許可を受けなければならない。",a:false,e:"誤り：機密の事務を取り扱う者には、所轄労働基準監督署長の許可を必要としない。労基法第 41条（労働時間等に関する規定の適用除外）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問29・枝4",b:"フレックスタイム制の清算期間は、3か月以内の期間に限られる。",a:true,e:"正しい：労基法第32条の3第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問29・枝5",b:"満20歳未満の者については、時間外・休日労働をさせることはできない。",a:false,e:"誤り：「満20歳未満の者」⇒「満18歳未満」。満18歳に満たない者については、変形労働時間制、フレックスタイム制、時間外及び休日等の規定は適用されない。労基法第60条（労働時間及び休日）。"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問30・枝2",b:"10日",a:false,e:"設問の要件の年次有給休暇日数は以下の通り。 16×4÷5.2＝12.3… 12日労基法第39条（年次有給休暇）第3項、労基則第24条の3（所定労働日数が少ない労働者に対する年次有給休暇）第3項。【労働衛生（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問30・枝3",b:"11日",a:false,e:"設問の要件の年次有給休暇日数は以下の通り。 16×4÷5.2＝12.3… 12日労基法第39条（年次有給休暇）第3項、労基則第24条の3（所定労働日数が少ない労働者に対する年次有給休暇）第3項。【労働衛生（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問30・枝4",b:"12日",a:true,e:"設問の要件の年次有給休暇日数は以下の通り。 16×4÷5.2＝12.3… 12日労基法第39条（年次有給休暇）第3項、労基則第24条の3（所定労働日数が少ない労働者に対する年次有給休暇）第3項。【労働衛生（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R5-4",s:"問30・枝5",b:"13日",a:false,e:"設問の要件の年次有給休暇日数は以下の通り。 16×4÷5.2＝12.3… 12日労基法第39条（年次有給休暇）第3項、労基則第24条の3（所定労働日数が少ない労働者に対する年次有給休暇）第3項。【労働衛生（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問31・枝1",b:"19 ㎥/h",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量（㎥/h）＝ ×1,000,000 室内二酸化炭素基準濃度― 外気の二酸化炭素濃度 11人 × 0.02 ＝ ×1,000,000 1000 ― 400 0.22 ＝ ×1,000,000 600 ＝ 366.6… ≒ 370（㎥/h）"},

{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問32・枝1",b:"温度感覚を左右する環境条件は、気温、湿度及びふく射（放射）熱の三つの要素で決まる。",a:false,e:"誤り：「気温、湿度及びふく射（放射）熱の三つの要素」⇒「気温、湿度、気流、ふく射熱（放射熱）の四つの要素」。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問32・枝2",b:"熱中症はⅠ度からⅢ度までに分類され、このうちⅢ度が最も重症である。",a:true,e:"記述のとおり。熱中症はI度（熱失神・熱けいれん）、II度（熱疲労）、III度（熱射病）に分類され、III度が最も重症で、意識障害や臓器障害を伴う。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問32・枝3",b:"WBGTは、暑熱環境による熱ストレスの評価に用いられる指標で、日射がない場合は、自然湿球温度と黒球温度の測定値から算出される。",a:true,e:"（1）誤り：「気温、湿度及びふく射（放射）熱の三つの要素」⇒「気温、湿度、気流、ふく射熱（放射熱）の四つの要素」。（2）～（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問32・枝4",b:"WBGT基準値は、暑熱順化者に用いる値の方が、暑熱非順化者に用いる値より大きな値となる。",a:true,e:"（1）誤り：「気温、湿度及びふく射（放射）熱の三つの要素」⇒「気温、湿度、気流、ふく射熱（放射熱）の四つの要素」。（2）～（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問32・枝5",b:"相対湿度とは、空気中の水蒸気圧とその温度における飽和水蒸気圧との比を百分率で示したものである。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問33・A",b:"座位での情報機器作業における作業姿勢は、椅子に深く腰をかけて背もたれに背を十分あて、履き物の足裏全体が床に接した姿勢を基本とする。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D 作業管理：作業方法の変更、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C 健康管理：健康診断、健"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問33・B",b:"情報機器作業において、書類上及びキーボード上における照度を400ルクス程度とする。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D 作業管理：作業方法の変更、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C 健康管理：健康診断、健"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問33・C",b:"高温多湿作業場所において労働者を作業に従事させる場合には、計画的に、暑熱順化期間を設ける。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D 作業管理：作業方法の変更、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C 健康管理：健康診断、健"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問33・D",b:"空気調和設備を設け、事務室内の気温を調節する。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D 作業管理：作業方法の変更、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C 健康管理：健康診断、健"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問33・E",b:"介護作業等腰部に著しい負担のかかる作業に従事する労働者に対し、腰痛予防体操を実施させる。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D 作業管理：作業方法の変更、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C 健康管理：健康診断、健"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問34・A",b:"メンタルヘルスケアを中長期的視点に立って継続的かつ計画的に行うため策定する「心の健康づくり計画」は、各事業場における労働安全衛生に関する計画の中に位置付けることが望ましい。",a:false,e:"B：「心の健康づくり計画」の策定は、衛生委員会や安全衛生委員会において十分調査審議を行う。 C：四つのケアに「家族によるケア」はない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問34・B",b:"「心の健康づくり計画」の策定に当たっては、プライバシー保護の観点から、衛生委員会や安全衛生委員会での調査審議は避ける。",a:false,e:"「心の健康づくり計画」の策定は、衛生委員会や安全衛生委員会において十分調査審議を行う。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問34・C",b:"「セルフケア」、「家族によるケア」、「ラインによるケア」及び「事業場外資源によるケア」の四つのケアを効果的に推進する。",a:false,e:"四つのケアに「家族によるケア」はない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問34・D",b:"「セルフケア」とは、労働者自身がストレスや心の健康について理解し、自らのストレスを予防、軽減する、又はこれに対処することである。",a:false,e:"B：「心の健康づくり計画」の策定は、衛生委員会や安全衛生委員会において十分調査審議を行う。 C：四つのケアに「家族によるケア」はない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問35・枝1",b:"喫煙専用室の出入口において、室外から室内に流入する空気の気流が、0.2m/s以上であること。",a:true,e:"（1）（3）～（5）正しい（2）誤り：ガイドラインにはそのような定めはない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問35・枝2",b:"喫煙専用室の出入口における室外から室内に流入する空気の気流について、6か月以内ごとに 1回、定期に測定すること。",a:false,e:"誤り：ガイドラインにはそのような定めはない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問35・枝3",b:"喫煙専用室のたばこの煙が室内から室外に流出しないよう、喫煙専用室は、壁、天井等によって区画されていること。",a:true,e:"記述のとおり。改正健康増進法に基づき、喫煙専用室は壁、天井等によって区画され、たばこの煙が室外に流出しないようにしなければならない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問35・枝4",b:"喫煙専用室のたばこの煙が屋外又は外部の場所に排気されていること。",a:true,e:"（1）（3）～（5）正しい（2）誤り：ガイドラインにはそのような定めはない。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問35・枝5",b:"喫煙専用室の出入口の見やすい箇所に必要事項を記載した標識を掲示すること。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問36・枝1",b:"生体から得られたある指標が正規分布である場合、そのばらつきの程度は、平均値及び中央値によって表される。",a:false,e:"誤り：「平均値及び中央値」⇒「分散及び標準偏差」。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問36・枝2",b:"集団を比較する場合、調査の対象とした項目のデータの平均値が等しくても分散が異なっていれば、異なった特徴をもつ集団であると評価される。",a:true,e:"記述のとおり。統計学上、平均値が同じでも分散（ばらつき）が異なれば、集団の特徴は異なると評価される。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問36・枝3",b:"健康管理統計において、ある時点での集団に関するデータを静態データといい、「有所見率」は静態データの一つである。",a:true,e:"（1）誤り：「平均値及び中央値」⇒「分散及び標準偏差」。（2）～（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問36・枝4",b:"ある事象と健康事象との間に、統計上、一方が多いと他方も多いというような相関関係が認められたとしても、それらの間に因果関係があるとは限らない。",a:true,e:"（1）誤り：「平均値及び中央値」⇒「分散及び標準偏差」。（2）～（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問36・枝5",b:"健康診断において、対象人数、受診者数などのデータを計数データといい、身長、体重などのデータを計量データという。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問37・枝1",b:"出血性の脳血管障害は、脳表面のくも膜下腔に出血するくも膜下出血、脳実質内に出血する脳出血などに分類される。",a:true,e:"（1）（3）～（5）正しい（2）誤り：脳塞栓症と脳血栓症の説明が逆。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問37・枝2",b:"虚血性の脳血管障害である脳梗塞は、脳血管自体の動脈硬化性病変による脳塞栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳血栓症に分類される。",a:false,e:"誤り：脳塞栓症と脳血栓症の説明が逆。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問37・枝3",b:"高血圧性脳症は、急激な血圧上昇が誘因となって、脳が腫脹する病気で、頭痛、悪心、嘔吐、意識障害、視力障害、けいれんなどの症状がみられる。",a:true,e:"記述のとおり。高血圧性脳症は急激な血圧上昇により脳が腫脹し、頭痛、悪心、嘔吐、意識障害、視力障害、けいれんなどの症状がみられる。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問37・枝4",b:"虚血性心疾患は、心筋の一部分に可逆的な虚血が起こる狭心症と、不可逆的な心筋壊死が起こる心筋梗塞とに大別される。",a:true,e:"（1）（3）～（5）正しい（2）誤り：脳塞栓症と脳血栓症の説明が逆。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問37・枝5",b:"運動負荷心電図検査は、虚血性心疾患の発見に有用である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問38・枝1",b:"黄色ブドウ球菌による食中毒は、食品に付着した菌が食品中で増殖した際に生じる毒素により発症する。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：腸炎ビブリオ菌は、熱に弱い。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問38・枝2",b:"サルモネラ菌による食中毒は、鶏卵が原因となることがある。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：腸炎ビブリオ菌は、熱に弱い。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問38・枝3",b:"腸炎ビブリオ菌は、熱に強い。",a:false,e:"誤り：腸炎ビブリオ菌は、熱に弱い。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問38・枝4",b:"ボツリヌス菌は、缶詰、真空パック食品など酸素のない食品中で増殖して毒性の強い神経毒を産生し、筋肉の麻痺症状を起こす。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：腸炎ビブリオ菌は、熱に弱い。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問38・枝5",b:"ノロウイルスの失活化には、煮沸消毒又は塩素系の消毒剤が効果的である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問39・枝1",b:"人間の抵抗力が低下した場合は、通常、多くの人には影響を及ぼさない病原体が病気を発症させることがあり、これを日和見感染という。",a:true,e:"記述のとおり。日和見感染とは、免疫力が低下した場合に、通常は無害な病原体が感染症を引き起こすことをいう。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問39・枝2",b:"感染が成立しているが、症状が現れない状態が継続することを不顕性感染という。",a:true,e:"（1）～（3）（5）正しい（4）誤り：「空気感染」⇒「飛沫感染」。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問39・枝3",b:"感染が成立し、症状が現れるまでの人をキャリアといい、感染したことに気付かずに病原体をばらまく感染源になることがある。",a:true,e:"（1）～（3）（5）正しい（4）誤り：「空気感染」⇒「飛沫感染」。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問39・枝4",b:"感染源の人が咳やくしゃみをして、唾液などに混じった病原体が飛散することにより感染することを空気感染といい、インフルエンザや普通感冒の代表的な感染経路である。",a:false,e:"誤り：「空気感染」⇒「飛沫感染」。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問39・枝5",b:"インフルエンザウイルスにはA型、B型及びC型の三つの型があるが、流行の原因となるのは、主として、A型及びB型である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問40・枝1",b:"健康保持増進対策の推進に当たっては、事業者が労働者等の意見を聴きつつ事業場の実態に即した取組を行うため、労使、産業医、衛生管理者等で構成される衛生委員会等を活用する。",a:false,e:"誤り：健康保持増進対策の推進体制として活用するのは「衛生委員会等」ではなく、事業場内健康保持増進体制（健康保持増進計画の策定・実施体制）である。THP指針参照。"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問40・枝2",b:"健康測定の結果に基づき行う健康指導には、運動指導、メンタルヘルスケア、栄養指導、口腔保健指導、保健指導が含まれる。",a:false,e:"（1）～（4）正しい（5）誤り：健康測定とは、健康指導を行うために実施される調査、測定等のことをいい、疾病の早期発見に重点をおいた健康診断を活用しつつ、追加で生活状況調査等を実施し、生活習慣の偏りを把握することが大切である。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問40・枝3",b:"健康保持増進措置は、主に生活習慣上の課題を有する労働者の健康状態の改善を目指すために個々の労働者に対して実施するものと、事業場全体の健康状態の改善や健康増進に係る取組の活性化等、生活習慣上の課題の有無に関わらず労働者を集団として捉えて実施するものがある。",a:false,e:"（1）～（4）正しい（5）誤り：健康測定とは、健康指導を行うために実施される調査、測定等のことをいい、疾病の早期発見に重点をおいた健康診断を活用しつつ、追加で生活状況調査等を実施し、生活習慣の偏りを把握することが大切である。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問40・枝4",b:"健康保持増進に関する課題の把握や目標の設定等においては、労働者の健康状態等を客観的に把握できる数値を活用することが望ましい。",a:false,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-4",s:"問40・枝5",b:"健康測定とは、健康指導を行うために実施される調査、測定等のことをいい、疾病の早期発見に重点をおいた健康診断の各項目の結果を健康測定に活用することはできない。",a:true,e:"誤り：健康測定とは、健康指導を行うために実施される調査、測定等のことをいい、疾病の早期発見に重点をおいた健康診断を活用しつつ、追加で生活状況調査等を実施し、生活習慣の偏りを把握することが大切である。【労働生理】"},
{c:"労働生理",y:"R5-4",s:"問41・枝1",b:"呼吸は、胸膜が運動することで胸腔内の圧力を変化させ、肺を受動的に伸縮させることにより行われる。",a:false,e:"誤り：呼吸運動は、横隔膜や肋間筋などの呼吸筋が協調運動することで胸腔内の圧力を変化させ、肺を受動的に伸縮させることにより行われる。"},
{c:"労働生理",y:"R5-4",s:"問41・枝2",b:"肺胞内の空気と肺胞を取り巻く毛細血管中の血液との間で行われるガス交換は、内呼吸である。",a:false,e:"択肢の内容は外呼吸。内呼吸は、全身の組織細胞とそれを取り巻く毛細血管中の血液との間で行われる、酸素と二酸化炭素のガス交換をいう。"},
{c:"労働生理",y:"R5-4",s:"問41・枝3",b:"成人の呼吸数は、通常、1分間に16～20回であるが、食事、入浴、発熱などによって増加する。",a:true,e:"正しい"},
{c:"労働生理",y:"R5-4",s:"問41・枝4",b:"チェーンストークス呼吸とは、肺機能の低下により呼吸数が増加した状態をいい、喫煙が原因となることが多い。",a:false,e:"誤り：チェーンストークス呼吸とは、心不全や脳卒中などが重症化し、脳への酸素の供給が不十分なときに見られる状態である。"},
{c:"労働生理",y:"R5-4",s:"問41・枝5",b:"身体活動時には、血液中の窒素分圧の上昇により呼吸中枢が刺激され、1回換気量及び呼吸数が増加する。",a:false,e:"誤り：身体活動時には、血液中の二酸化炭素分圧の上昇により呼吸中枢が刺激され、1回換気量及び呼吸数が増加する。"},
{c:"労働生理",y:"R5-4",s:"問42・枝1",b:"心臓は、自律神経の中枢で発生した刺激が刺激伝導系を介して心筋に伝わることにより、規則正しく収縮と拡張を繰り返す。",a:false,e:"誤り：心臓は、右心房にある洞結節（同房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく拡張を繰り返す。"},
{c:"労働生理",y:"R5-4",s:"問42・枝2",b:"肺循環により左心房に戻ってきた血液は、左心室を経て大動脈に入る。",a:true,e:"記述のとおり。肺循環で酸素を取り込んだ血液は左心房→左心室→大動脈の順に流れ、全身に送り出される（体循環）。"},
{c:"労働生理",y:"R5-4",s:"問42・枝3",b:"大動脈を流れる血液は動脈血であるが、肺動脈を流れる血液は静脈血である。",a:true,e:"（1）誤り：心臓は、右心房にある洞結節（同房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく拡張を繰り返す。（2）～（5）正しい"},
{c:"労働生理",y:"R5-4",s:"問42・枝4",b:"心臓の拍動による動脈圧の変動を末梢の動脈で触知したものを脈拍といい、一般に、手首の橈骨動脈で触知する。",a:true,e:"（1）誤り：心臓は、右心房にある洞結節（同房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく拡張を繰り返す。（2）～（5）正しい"},
{c:"労働生理",y:"R5-4",s:"問42・枝5",b:"心臓自体は、大動脈の起始部から出る冠動脈によって酸素や栄養分の供給を受けている。",a:true,e:"正しい"},
{c:"労働生理",y:"R5-4",s:"問43・枝1",b:"Aは、大脳皮質の前頭葉で、運動機能中枢、運動性言語中枢及び精神機能中枢がある。",a:true,e:"（2）誤り：Bは脳梁。脳梁は頭の中心にあり、左右の大脳をつなぐはたらきの太い束で、約2億～ 3億5000万の神経線維を含む。小脳は、延髄と橋の背側に位置し、手のこぶし大の大きさのものである。"},
{c:"労働生理",y:"R5-4",s:"問43・枝2",b:"Bは、小脳で、体の平衡を保つ中枢がある。",a:false,e:"誤り：Bは脳梁。脳梁は頭の中心にあり、左右の大脳をつなぐはたらきの太い束で、約2億～ 3億5000万の神経線維を含む。小脳は、延髄と橋の背側に位置し、手のこぶし大の大きさのものである。"},
{c:"労働生理",y:"R5-4",s:"問43・枝3",b:"Cは、大脳皮質の後頭葉で、視覚中枢がある。",a:true,e:"（2）誤り：Bは脳梁。脳梁は頭の中心にあり、左右の大脳をつなぐはたらきの太い束で、約2億～ 3億5000万の神経線維を含む。小脳は、延髄と橋の背側に位置し、手のこぶし大の大きさのものである。"},
{c:"労働生理",y:"R5-4",s:"問43・枝4",b:"Dは、延髄で、呼吸運動、循環器官・消化器官の働きなど、生命維持に重要な機能の中枢がある。",a:true,e:"（2）誤り：Bは脳梁。脳梁は頭の中心にあり、左右の大脳をつなぐはたらきの太い束で、約2億～ 3億5000万の神経線維を含む。小脳は、延髄と橋の背側に位置し、手のこぶし大の大きさのものである。"},
{c:"労働生理",y:"R5-4",s:"問43・枝5",b:"Eは、間脳の視床下部で、自律神経系の中枢がある。",a:true,e:"（2）誤り：Bは脳梁。脳梁は頭の中心にあり、左右の大脳をつなぐはたらきの太い束で、約2億～ 3億5000万の神経線維を含む。小脳は、延髄と橋の背側に位置し、手のこぶし大の大きさのものである。"},
{c:"労働生理",y:"R5-4",s:"問44・枝1",b:"マルターゼリパーゼトリプシン",a:true,e:"正しい：マルターゼは、小腸壁から分泌され、麦芽糖（炭水化物・でんぷん）をブドウ糖に分解する消化酵素。"},
{c:"労働生理",y:"R5-4",s:"問44・枝2",b:"トリプシンアミラーゼペプシン",a:false,e:"（1）正しい：マルターゼは、小腸壁から分泌され、麦芽糖（炭水化物・でんぷん）をブドウ糖に分解する消化酵素。"},
{c:"労働生理",y:"R5-4",s:"問44・枝3",b:"ペプシンマルターゼトリプシン",a:false,e:"（1）正しい：マルターゼは、小腸壁から分泌され、麦芽糖（炭水化物・でんぷん）をブドウ糖に分解する消化酵素。"},
{c:"労働生理",y:"R5-4",s:"問44・枝4",b:"ペプシンリパーゼマルターゼ",a:false,e:"（1）正しい：マルターゼは、小腸壁から分泌され、麦芽糖（炭水化物・でんぷん）をブドウ糖に分解する消化酵素。"},
{c:"労働生理",y:"R5-4",s:"問44・枝5",b:"アミラーゼトリプシンリパーゼ",a:false,e:"（1）正しい：マルターゼは、小腸壁から分泌され、麦芽糖（炭水化物・でんぷん）をブドウ糖に分解する消化酵素。"},
{c:"労働生理",y:"R5-4",s:"問45・枝1",b:"糸球体では、血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。",a:true,e:"記述のとおり。糸球体では血液中の蛋白質以外の血漿成分がボウマン嚢に濾過され、原尿が生成される。"},
{c:"労働生理",y:"R5-4",s:"問45・枝2",b:"尿細管では、原尿に含まれる大部分の水分、電解質、栄養分などが血液中に再吸収される。",a:true,e:"（1）～（4）正しい（5）誤り：尿素窒素（BUN）は血液の検査項目である。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R5-4",s:"問45・枝3",b:"尿の生成・排出により、体内の水分の量やナトリウムなどの電解質の濃度を調節するとともに、生命活動によって生じた不要な物質を排出する。",a:true,e:"（1）～（4）正しい（5）誤り：尿素窒素（BUN）は血液の検査項目である。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R5-4",s:"問45・枝4",b:"尿の約95％は水分で、約5％が固形物であるが、その成分は全身の健康状態をよく反映するので、尿検査は健康診断などで広く行われている。",a:true,e:"正しい"},
{c:"労働生理",y:"R5-4",s:"問45・枝5",b:"血液中の尿素窒素(BUN)の値が低くなる場合は、腎臓の機能の低下が考えられる。",a:false,e:"誤り：尿素窒素（BUN）は血液の検査項目である。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R5-4",s:"問46・枝1",b:"血液は、血漿と有形成分から成り、有形成分は赤血球、白血球及び血小板から成る。",a:true,e:"（1）（3）～（5）：正しい（2）誤り：グロブリンとアルブミンの説明が逆。アルブミンは血液浸透圧の維持に関与し、グロブリンは免疫物質の抗体を含む。"},
{c:"労働生理",y:"R5-4",s:"問46・枝2",b:"血漿中の蛋白質のうち、グロブリンは血液浸透圧の維持に関与し、アルブミンは免疫物質の抗体を含む。",a:false,e:"誤り：グロブリンとアルブミンの説明が逆。アルブミンは血液浸透圧の維持に関与し、グロブリンは免疫物質の抗体を含む。"},
{c:"労働生理",y:"R5-4",s:"問46・枝3",b:"血液中に占める血球（主に赤血球）の容積の割合をヘマトクリットといい、男性で約45％、女性で約40％である。",a:true,e:"記述のとおり。ヘマトクリット値は血液中に占める赤血球の容積の割合で、男性で約45％、女性で約40％である。"},
{c:"労働生理",y:"R5-4",s:"問46・枝4",b:"血液の凝固は、血漿中のフィブリノーゲンがフィブリンに変化し、赤血球などが絡みついて固まる現象である。",a:true,e:"（1）（3）～（5）：正しい（2）誤り：グロブリンとアルブミンの説明が逆。アルブミンは血液浸透圧の維持に関与し、グロブリンは免疫物質の抗体を含む。"},
{c:"労働生理",y:"R5-4",s:"問46・枝5",b:"ABO式血液型は、赤血球の血液型分類の一つで、A型の血清は抗B抗体を持つ。",a:true,e:"：正しい"},
{c:"労働生理",y:"R5-4",s:"問47・枝1",b:"眼軸が短過ぎるために、平行光線が網膜の後方で像を結ぶものを遠視という。",a:true,e:"（1）（2）（4）（5）：正しい（3）誤り：温度感覚は、皮膚や口腔などの粘膜の当該局所に高温・低温刺激に対して現れる。温覚と冷覚があり、一般に冷覚の方が温覚よりも鋭敏である。温覚は徐々に起こるのに対して冷覚は急速に現れる。"},
{c:"労働生理",y:"R5-4",s:"問47・枝2",b:"嗅覚と味覚は化学感覚ともいわれ、物質の化学的性質を認知する感覚である。",a:true,e:"（1）（2）（4）（5）：正しい（3）誤り：温度感覚は、皮膚や口腔などの粘膜の当該局所に高温・低温刺激に対して現れる。温覚と冷覚があり、一般に冷覚の方が温覚よりも鋭敏である。温覚は徐々に起こるのに対して冷覚は急速に現れる。"},
{c:"労働生理",y:"R5-4",s:"問47・枝3",b:"温度感覚は、皮膚のほか口腔などの粘膜にも存在し、一般に温覚の方が冷覚よりも鋭敏である。",a:false,e:"誤り：温度感覚は、皮膚や口腔などの粘膜の当該局所に高温・低温刺激に対して現れる。温覚と冷覚があり、一般に冷覚の方が温覚よりも鋭敏である。温覚は徐々に起こるのに対して冷覚は急速に現れる。"},
{c:"労働生理",y:"R5-4",s:"問47・枝4",b:"深部感覚は、筋肉や腱にある受容器から得られる身体各部の位置、運動などを認識する感覚である。",a:true,e:"（1）（2）（4）（5）：正しい（3）誤り：温度感覚は、皮膚や口腔などの粘膜の当該局所に高温・低温刺激に対して現れる。温覚と冷覚があり、一般に冷覚の方が温覚よりも鋭敏である。温覚は徐々に起こるのに対して冷覚は急速に現れる。"},
{c:"労働生理",y:"R5-4",s:"問47・枝5",b:"中耳にある鼓室は、耳管によって咽頭に通じており、その内圧は外気圧と等しく保たれている。",a:true,e:"：正しい"},
{c:"労働生理",y:"R5-4",s:"問48・枝1",b:"抗原とは、免疫に関係する細胞によって異物として認識される物質のことである。",a:true,e:"記述のとおり。抗原とは、免疫担当細胞によって異物として認識される物質のことである。"},
{c:"労働生理",y:"R5-4",s:"問48・枝2",b:"抗原となる物質には、蛋白質、糖質などがある。",a:true,e:"（1）～（4）正しい（5）誤り：細胞性免疫と体液性免疫の説明が逆。免疫にはリンパ球が産生する抗体によって病原体を排除する体液性免疫と、リンパ球などが直接、病原体などの異物を排除する細胞性免疫がある。"},
{c:"労働生理",y:"R5-4",s:"問48・枝3",b:"抗原に対する免疫が、逆に、人体の組織や細胞に傷害を与えてしまうことをアレルギーといい、主なアレルギー性疾患としては、気管支ぜんそく、アトピー性皮膚炎などがある。",a:true,e:"（1）～（4）正しい（5）誤り：細胞性免疫と体液性免疫の説明が逆。免疫にはリンパ球が産生する抗体によって病原体を排除する体液性免疫と、リンパ球などが直接、病原体などの異物を排除する細胞性免疫がある。"},
{c:"労働生理",y:"R5-4",s:"問48・枝4",b:"免疫の機能が失われたり低下したりすることを免疫不全といい、免疫不全になると、感染症にかかりやすくなったり、がんに罹患しやすくなったりする。",a:true,e:"正しい"},
{c:"労働生理",y:"R5-4",s:"問48・枝5",b:"免疫には、リンパ球が産生する抗体によって病原体を攻撃する細胞性免疫と、リンパ球などが直接に病原体などを取り込んで排除する体液性免疫の二つがある。",a:false,e:"誤り：細胞性免疫と体液性免疫の説明が逆。免疫にはリンパ球が産生する抗体によって病原体を排除する体液性免疫と、リンパ球などが直接、病原体などの異物を排除する細胞性免疫がある。"},
{c:"労働生理",y:"R5-4",s:"問49・枝1",b:"横紋筋は、骨に付着して身体の運動の原動力となる筋肉で意志によって動かすことができるが、平滑筋は、心筋などの内臓に存在する筋肉で意志によって動かすことができない。",a:false,e:"誤り：心筋は内臓に存在する不随意筋であるが、横紋筋でできている。"},
{c:"労働生理",y:"R5-4",s:"問49・枝2",b:"筋肉は神経からの刺激によって収縮するが、神経より疲労しにくい。",a:false,e:"誤り：筋肉は神経に比べて疲労しやすい。"},
{c:"労働生理",y:"R5-4",s:"問49・枝3",b:"荷物を持ち上げたり、屈伸運動を行うときは、筋肉が長さを変えずに外力に抵抗して筋力を発生させる等尺性収縮が生じている。",a:false,e:"誤り：「等尺性収縮」⇒「等張性収縮」。荷物を持ち上げたり、屈伸運動を行うときは、筋肉が長さを変えながら一定の張力で筋力を発生させる等張性収縮が生じている。"},
{c:"労働生理",y:"R5-4",s:"問49・枝4",b:"強い力を必要とする運動を続けていると、筋肉を構成する個々の筋線維の太さは変わらないが、その数が増えることによって筋肉が太くなり筋力が増強する。",a:false,e:"誤り：強い力を必要とする運動を続けていると、筋線維の数は変わらないが太くなることで筋力が増強する。"},
{c:"労働生理",y:"R5-4",s:"問49・枝5",b:"筋肉自体が収縮して出す最大筋力は、筋肉の断面積1㎝2当たりの平均値をとると、性差、年齢差がほとんどない。",a:true,e:"正しい"},
{c:"労働生理",y:"R5-4",s:"問50・枝1",b:"入眠の直後にはノンレム睡眠が生じ、これが不十分な時には、日中に眠気を催しやすい。",a:true,e:"記述のとおり。入眠直後にはノンレム睡眠（深い眠り）が生じ、その後レム睡眠と交互に繰り返される。ノンレム睡眠が不十分だと日中の眠気を催しやすい。"},
{c:"労働生理",y:"R5-4",s:"問50・枝2",b:"副交感神経系は、身体の機能を回復に向けて働く神経系で、休息や睡眠状態で活動が高まり、心拍数を減少し、消化管の運動を亢進する。",a:true,e:"（1）～（4）正しい。（5）誤り：「セクレチン」⇒「メラトニン」。睡眠と覚醒のリズムの調節に関与しているのは、脳内の松果体から分泌されるメラトニンである。セクレチンは、十二指腸から分泌される消化液分泌促進に関与するホルモンである。"},
{c:"労働生理",y:"R5-4",s:"問50・枝3",b:"睡眠と覚醒のリズムは、体内時計により約1日の周期に調節されており、体内時計の周期を外界の24時間周期に適切に同調させることができないために生じる睡眠の障害を、概日リズム睡眠障害という。",a:true,e:"（1）～（4）正しい。（5）誤り：「セクレチン」⇒「メラトニン」。睡眠と覚醒のリズムの調節に関与しているのは、脳内の松果体から分泌されるメラトニンである。セクレチンは、十二指腸から分泌される消化液分泌促進に関与するホルモンである。"},
{c:"労働生理",y:"R5-4",s:"問50・枝4",b:"睡眠と食事は深く関係しているため、就寝直前の過食は、肥満のほか不眠を招くことになる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-4",s:"問50・枝5",b:"脳下垂体から分泌されるセクレチンは、夜間に分泌が上昇するホルモンで、睡眠と覚醒のリズムの調節に関与している。",a:false,e:"誤り：「セクレチン」⇒「メラトニン」。睡眠と覚醒のリズムの調節に関与しているのは、脳内の松果体から分泌されるメラトニンである。セクレチンは、十二指腸から分泌される消化液分泌促進に関与するホルモンである。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問1・枝1",b:"総括安全衛生管理者を選任しなければならない。",a:true,e:"正しい：「常時300人以上の労働者を使用する製造業の事業場」に該当するため、総括安全衛生管理者を選任しなければならない。安衛法第10条（総括安全衛生管理者）第1項、安衛令（総括安全衛生管理者を選任すべき事業場）第2条2。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問1・枝2",b:"衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。",a:false,e:"誤り：衛生管理者のうち少なくとも1人を専任の衛生管理者とする必要がある場合は、常時500 人を超える労働者を使用する事業場で、一定の有害業務がある場合のため、設問の事業場は該当しない。安衛則（衛生管理者の選任）第7条第1項5。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問1・枝3",b:"衛生管理者は、全て第一種衛生管理者免許を有する者のうちから選任することができる。",a:true,e:"正しい：製造業の事業場においては、第1種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は安衛則第10条各号に掲げる者（医師、歯科医師、労働衛生コンサルタント等）の中から衛生管理者を選任することとされており、設問の第1種衛生管理者免許を有する者のみで差し支えない。安衛則第7条（衛生管理者の選任）第1項3、6。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問1・枝4",b:"産業医は、この事業場に専属でない者を選任することができる。",a:true,e:"正しい：専属の産業医を選任要件は、「常時1,000人以上の労働者を使用する事業場又は、一定の有害業務に500人以上の労働者を従事させる事業場」であるため、該当しない。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問1・枝5",b:"特定化学物質作業主任者を選任しなくてよい。",a:true,e:"正しい：塩素を試験研究のため取扱う作業は、特定化学物質作業主任者を選任しなければならない業務には該当しない。安衛令（作業主任者を選任すべき作業）第6条18。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問2・枝1",b:"赤外線又は紫外線にさらされる業務",a:false,e:"該当しない：赤外線又は紫外線にさらされる業務は、特別教育を必要とする業務に該当しない。安衛則第36条。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問2・枝2",b:"有機溶剤等を用いて行う接着の業務",a:false,e:"該当しない：有機溶剤等を用いて行う接着の業務は、特別教育を必要とする業務に該当しない。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問2・枝3",b:"塩酸を用いて行う分析の業務",a:false,e:"該当しない：塩酸を用いて行う分析の業務は、特別教育を必要とする業務に該当しない。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問2・枝4",b:"エックス線回折装置を用いて行う分析の業務",a:false,e:"：該当しない。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問2・枝5",b:"廃棄物の焼却施設において焼却灰を取り扱う業務",a:true,e:"該当する：安衛則第36条（特別教育を必要とする業務）36。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問3・枝1",b:"潜水士免許",a:true,e:"記述のとおり。潜水士免許は、都道府県労働局長が与える免許である。安衛法第72条、安衛令第20条第9号。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問3・枝2",b:"高圧室内作業主任者免許",a:true,e:"安衛法第14条（作業主任者）、安衛則第16条（作業主任者の選任）及び別表第1。（1）～（3）（5）：規定されている。（4）規定されていない：石綿作業主任者は技能講習を修了した者であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問3・枝3",b:"エックス線作業主任者免許",a:true,e:"安衛法第14条（作業主任者）、安衛則第16条（作業主任者の選任）及び別表第1。（1）～（3）（5）：規定されている。（4）規定されていない：石綿作業主任者は技能講習を修了した者であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問3・枝4",b:"石綿作業主任者免許",a:false,e:"規定されていない：石綿作業主任者は技能講習を修了した者であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問3・枝5",b:"ガンマ線透過写真撮影作業主任者免許",a:true,e:"：規定されている。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問4・枝1",b:"アルファ-ナフチルアミン",a:true,e:"記述のとおり。アルファ-ナフチルアミンは、製造等が禁止されている有害物質である。安衛法第55条、安衛令第16条。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問4・枝2",b:"塩素化ビフェニル(別名PCB)",a:true,e:"※ 安衛法第56条（製造の許可）第1項、安衛令第17条（製造の許可を受けるべき有害物）別表第 3（製造許可物質）。（1）～（3）（5）：必要。特定化学物質第1類物質（許可物質）。（4）必要としない：特定化学物質第2類物質。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問4・枝3",b:"オルト-トリジン",a:true,e:"※ 安衛法第56条（製造の許可）第1項、安衛令第17条（製造の許可を受けるべき有害物）別表第 3（製造許可物質）。（1）～（3）（5）：必要。特定化学物質第1類物質（許可物質）。（4）必要としない：特定化学物質第2類物質。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問4・枝4",b:"オルト-トルイジン",a:false,e:"必要としない：特定化学物質第2類物質。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問4・枝5",b:"ベンゾトリクロリド",a:true,e:"：必要。特定化学物質第1類物質（許可物質）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問5・A",b:"屋内において、耐火物を用いた炉を解体する箇所",a:false,e:"該当しない：（別表第119）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問5・B",b:"屋内の、ガラスを製造する工程において、原料を溶解炉に投げ入れる箇所",a:false,e:"該当しない：（別表第112）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問5・C",b:"屋内において、研磨材を用いて手持式動力工具により金属を研磨する箇所",a:false,e:"該当しない：（別表第17のうち別表第36に該当）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問5・D",b:"屋内において、粉状の炭素製品を袋詰めする箇所",a:true,e:"該当する：（別表第29）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問5・E",b:"屋内において、固定の溶射機により金属を溶射する箇所",a:true,e:"該当する：（別表第215）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問6・枝1",b:"地下室の内部で第一種有機溶剤等を用いて作業を行わせるとき、その作業場所に局所排気装置を設け、有効に稼働させているが、作業者に送気マスクも有機ガス用防毒マスクも使用させていない。",a:false,e:"違反なし：有機則第5条（第1種有機溶剤等又は第2種有機溶剤等に係る設備）、第18条（換気装置の稼働）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問6・枝2",b:"屋内作業場で、第二種有機溶剤等が付着している物の乾燥の業務に労働者を従事させるとき、その作業場所に最大 0.4m/s の制御風速を出し得る能力を有する側方吸引型外付け式フードの局所排気装置を設け、かつ、作業に従事する労働者に有機ガス用防毒マスクを使用させている。",a:true,e:"違反あり：「0.4m/s」⇒「0.5m/s」。有機則第16条（局所排気装置の性能）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問6・枝3",b:"屋内作業場に設けた空気清浄装置のない局所排気装置の排気口で、厚生労働大臣が定める濃度以上の有機溶剤を排出するものの高さを、屋根から1.5mとしている。",a:false,e:"違反なし：有機則第15条の2（排気口）第2項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問6・枝4",b:"屋外作業場において有機溶剤含有物を用いて行う塗装の業務に常時従事する労働者に対し、1年以内ごとに1回、定期に、有機溶剤等健康診断を行っている。",a:false,e:"違反なし：有機則第29条（健康診断）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問6・枝5",b:"有機溶剤等を入れてあった空容器で有機溶剤の蒸気が発散するおそれのあるものを、密閉して屋内の一定の場所に集積している。",a:false,e:"違反なし：有機則第36条（空容器の処理）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問7・枝1",b:"1年 50mSv 1か月 5mSv",a:false,e:"※ 電離則第 4 条（放射線業務従事者の被ばく限度）第 1 項、第 7 条（緊急作業時における被ばく限度）第1項。「男性又は妊娠する可能性がないと診断された女性が受ける実効線量の限度は、緊急作業に従事する場合を除き、[A：5年 ]間につき[B：100ミリシーベルト（mSv）]、かつ、[C：1年"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問7・枝2",b:"3年 100mSv 3か月 10mSv",a:false,e:"※ 電離則第 4 条（放射線業務従事者の被ばく限度）第 1 項、第 7 条（緊急作業時における被ばく限度）第1項。「男性又は妊娠する可能性がないと診断された女性が受ける実効線量の限度は、緊急作業に従事する場合を除き、[A：5年 ]間につき[B：100ミリシーベルト（mSv）]、かつ、[C：1年"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問7・枝3",b:"3年 100mSv 1年 50mSv",a:false,e:"※ 電離則第 4 条（放射線業務従事者の被ばく限度）第 1 項、第 7 条（緊急作業時における被ばく限度）第1項。「男性又は妊娠する可能性がないと診断された女性が受ける実効線量の限度は、緊急作業に従事する場合を除き、[A：5年 ]間につき[B：100ミリシーベルト（mSv）]、かつ、[C：1年"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問7・枝4",b:"5年 100mSv 1年 50mSv",a:true,e:"※ 電離則第 4 条（放射線業務従事者の被ばく限度）第 1 項、第 7 条（緊急作業時における被ばく限度）第1項。「男性又は妊娠する可能性がないと診断された女性が受ける実効線量の限度は、緊急作業に従事する場合を除き、[A：5年 ]間につき[B：100ミリシーベルト（mSv）]、かつ、[C：1年"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問7・枝5",b:"5年 250mSv 1年 100mSv",a:false,e:"※ 電離則第 4 条（放射線業務従事者の被ばく限度）第 1 項、第 7 条（緊急作業時における被ばく限度）第1項。「男性又は妊娠する可能性がないと診断された女性が受ける実効線量の限度は、緊急作業に従事する場合を除き、[A：5年 ]間につき[B：100ミリシーベルト（mSv）]、かつ、[C：1年"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問8・枝1",b:"炭酸ガス(二酸化炭素)濃度が0.15％を超える場所には、関係者以外の者が立ち入ることを禁止し、かつ、その旨を見やすい箇所に表示しなければならない。",a:false,e:"誤り：「0.15％」⇒「1.5％」。安衛則第585条（立入禁止等）第1項4。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問8・枝2",b:"強烈な騒音を発する屋内作業場においては、その伝ぱを防ぐため、隔壁を設ける等必要な措置を講じなければならない。",a:true,e:"正しい：安衛則第584条（騒音の伝ぱの防止）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問8・枝3",b:"多筒抄紙機により紙を抄く業務を行う屋内作業場については、6か月以内ごとに1回、定期に、等価騒音レベルを測定しなければならない。",a:true,e:"正しい：安衛法第65条（作業環境測定）第1項、安衛令第21条（作業環境測定を行うべき作業場）3、安衛則第588条8、第590条（騒音の測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問8・枝4",b:"著しく暑熱又は多湿の作業場においては、坑内等特殊な作業場でやむを得ない事由がある場合を除き、休憩の設備を作業場外に設けなければならない。",a:true,e:"正しい：安衛則第614条（有害作業場の休憩設備）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問8・枝5",b:"屋内作業場に多量の熱を放散する溶融炉があるときは、加熱された空気を直接屋外に排出し、又はその放射するふく射熱から労働者を保護する措置を講じなければならない。",a:true,e:"正しい：安衛則第608条（ふく射熱からの保護）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問9・枝1",b:"溶融ガラスからガラス製品を成型する業務を行う屋内作業場の気温、湿度及びふく射熱の測定・・・・・・・・・・・・・・・半月以内ごとに1回",a:true,e:"正しい：安衛則第587条（作業環境測定を行うべき作業場）8、第607条（気温、湿度の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問9・枝2",b:"通気設備が設けられている坑内の作業場における通気量の測定・・・・・半月以内ごとに1回",a:true,e:"正しい：安衛則第589条3、第603条（坑内の通気量の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問9・枝3",b:"非密封の放射性物質を取り扱う作業室における空気中の放射性物質の濃度の測定・・・・・・・・・・・・・・1か月以内ごとに1回",a:true,e:"正しい：電離則第53条（作業環境測定を行うべき作業場）2、第55条（放射性物質の濃度の測定）。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問9・枝4",b:"鉛ライニングの業務を行う屋内作業場における空気中の鉛濃度の測定・・・・・・・・・・・・・・6か月以内ごとに1回",a:false,e:"誤り：「6か月以内ごとに1回」⇒「1年以内ごとに1回」。鉛則第52条（測定）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問9・枝5",b:"常時特定粉じん作業を行う屋内作業場における空気中の粉じん濃度の測定・・・・・・・・・・・・・・6か月以内ごとに1回",a:true,e:"正しい：粉じん則第25条（作業環境測定を行うべき屋内作業場）、第26条（粉じん濃度の測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問10・枝1",b:"さく岩機、鋲打機等身体に著しい振動を与える機械器具を用いて行う業務",a:true,e:"記述のとおり。さく岩機、鋲打機等身体に著しい振動を与える機械器具を用いて行う業務は、年少者の就業制限の対象である。年少則第8条。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問10・枝2",b:"著しく寒冷な場所における業務",a:true,e:"該当する：著しく寒冷な場所における業務は、年少者の就業制限の対象である。年少則第8条。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問10・枝3",b:"20kgの重量物を継続的に取り扱う業務",a:true,e:"該当する：16歳未満の男性が20kgの重量物を継続的に取り扱うことは、年少者の就業制限の対象である。年少則第7条。"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問10・枝4",b:"超音波にさらされる業務",a:false,e:"該当しない。【労働衛生（有害業務に係るもの）】"},
{c:"関係法令（有害業務）",y:"R5-10",s:"問10・枝5",b:"強烈な騒音を発する場所における業務",a:true,e:"該当する。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問11・枝1",b:"アクリロニトリル・・・・・・・・・ガス",a:true,e:"誤り：アクリロニトリルは、常温・常圧では蒸気として存在する。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問11・枝2",b:"アセトン・・・・・・・・・・・・・蒸気",a:false,e:"該当しない：アセトンの蒸気は、有機溶剤中毒予防規則に基づく管理が必要であるが、本問の常温常圧における状態に関する記述が誤りである。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問11・枝3",b:"アンモニア・・・・・・・・・・・・ガス",a:false,e:"（1）誤り：アクリロニトリルは、常温・常圧では蒸気として存在する。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問11・枝4",b:"ホルムアルデヒド・・・・・・・・・ガス",a:false,e:"（1）誤り：アクリロニトリルは、常温・常圧では蒸気として存在する。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問11・枝5",b:"硫酸ジメチル・・・・・・・・・・・蒸気",a:false,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問12・A",b:"座位での情報機器作業における作業姿勢は、椅子に深く腰をかけて背もたれに背を十分あて、履き物の足裏全体が床に接した姿勢を基本とする。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D。作業管理：作業方法、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C。健康管理：健康診断、健康"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問12・B",b:"有機溶剤業務を行う作業場所に設置した局所排気装置のフード付近の気流の風速を測定する。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D。作業管理：作業方法、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C。健康管理：健康診断、健康"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問12・C",b:"放射線業務を行う作業場所において、外部放射線による実効線量を算定し、管理区域を設定する。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D。作業管理：作業方法、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C。健康管理：健康診断、健康"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問12・D",b:"ずい道建設工事の掘削作業において、土石又は岩石を湿潤な状態に保つための設備を稼働する。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D。作業管理：作業方法、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C。健康管理：健康診断、健康"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問12・E",b:"介護作業等腰部に著しい負担のかかる作業に従事する労働者に対し、腰痛予防体操を実施する。",a:false,e:"作業環境管理：設備の設置、作業環境測定、作業環境に起因する有害因子の低減対策等：B、D。作業管理：作業方法、作業強度の軽減、作業姿勢の改善、作業の標準化、保護具等：A、C。健康管理：健康診断、健康"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問13・枝1",b:"化学物質等に係る機械設備等の密閉化",a:false,e:"疾病のリスク低減措置の優先度が高い順は、次の通り。 1 化学反応のプロセス等の運転条件の変更：（3）。 2 化学物質等に係る機械設備等の密閉化、局所排気装置等の設置等の工学的対策：（1）（2）。 3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策：（5）。 4 化学物質等の有害性に応じ"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問13・枝2",b:"化学物質等に係る機械設備等への局所排気装置の設置",a:false,e:"。 3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策："},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問13・枝3",b:"化学反応のプロセス等の運転条件の変更",a:true,e:"。 2 化学物質等に係る機械設備等の密閉化、局所排気装置等の設置等の工学的対策："},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問13・枝4",b:"化学物質等の有害性に応じた有効な保護具の使用",a:false,e:"リスク低減措置の検討の優先順位として、保護具の使用は最も優先度が低い。有害性に応じた代替物質への変更、工学的対策、管理的対策を優先した上で、最後の手段として保護具の使用を検討する。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問13・枝5",b:"作業手順の改善",a:false,e:"。 4 化学物質等の有害性に応じた有効な保護具の使用："},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問14・枝1",b:"一酸化炭素による中毒では、ヘモグロビン合成の障害による貧血、溶血などがみられる。",a:false,e:"誤り：一酸化炭素による中毒では、赤血球中のヘモグロビンと強く結合し、体内組織の酸素欠乏状態を起こす。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問14・枝2",b:"弗化水素による中毒では、脳神経細胞が侵され、幻覚、錯乱などの精神障害がみられる。",a:false,e:"誤り：弗化水素による中毒は、骨の硬化、斑状歯、歯牙酸蝕症などがみられる。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問14・枝3",b:"シアン化水素による中毒では、細胞内の酸素の利用の障害による呼吸困難、けいれんなどがみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問14・枝4",b:"塩化ビニルによる慢性中毒では、慢性気管支炎、歯牙酸蝕症などがみられる。",a:false,e:"誤り：塩化ビニルによる慢性中毒では、レイノー症状、指の骨の溶解、皮膚の硬化、肝障害がみられ、がんの一種である肝血管肉腫を生じる。慢性気管支炎は、二酸化硫黄や二酸化窒素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問14・枝5",b:"塩素による中毒では、再生不良性貧血、溶血などの造血機能の障害がみられる。",a:false,e:"誤り：塩素による中毒は、流涙、咽頭痛、咳などの粘膜刺激症状のほか、高濃度では肺水腫を生じる。再生不良性貧血、溶血などの造血機能の障害がみられるのは、ベンゼンによる健康障害。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問15・枝1",b:"騒音レベルの測定は、通常、騒音計の周波数重み付け特性Aで行い、その大きさはdBで表す。",a:true,e:"記述のとおり。騒音レベルの測定は、騒音計の周波数重み付け特性A（A特性）で行い、単位はdB（デシベル）で表す。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問15・枝2",b:"騒音性難聴は、初期には気付かないことが多く、また、不可逆的な難聴であるという特徴がある。",a:true,e:"（1）～（4）正しい。（5）誤り：等価騒音レベルは、変動している騒音レベルを一定時間内の平均値として表した値。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問15・枝3",b:"騒音は、自律神経系や内分泌系へも影響を与えるため、騒音ばく露により、交感神経の活動の亢進や副腎皮質ホルモンの分泌の増加が認められることがある。",a:true,e:"（1）～（4）正しい。（5）誤り：等価騒音レベルは、変動している騒音レベルを一定時間内の平均値として表した値。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問15・枝4",b:"騒音性難聴では、通常、会話音域より高い音域から聴力低下が始まる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問15・枝5",b:"等価騒音レベルは、中心周波数500Hz、1,000Hz、2,000Hz及び4,000Hzの各オクターブバンドの騒音レベルの平均値で、変動する騒音に対する人間の生理・心理的反応とよく対応する。",a:false,e:"誤り：等価騒音レベルは、変動している騒音レベルを一定時間内の平均値として表した値。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問16・枝1",b:"ベリリウム中毒では、接触皮膚炎、肺炎などの症状がみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。低分子蛋白尿や、歯への黄色の色素沈着（黄色環）がみられるのは、カドミウムによる中毒。視野狭窄の症状は、有機水銀による中毒。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問16・枝2",b:"マンガン中毒では、歩行障害、発語障害、筋緊張亢進などの症状がみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。低分子蛋白尿や、歯への黄色の色素沈着（黄色環）がみられるのは、カドミウムによる中毒。視野狭窄の症状は、有機水銀による中毒。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問16・枝3",b:"クロム中毒では、低分子蛋白たん尿、歯への黄色の色素沈着、視野狭窄などの症状がみられる。",a:false,e:"誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。低分子蛋白尿や、歯への黄色の色素沈着（黄色環）がみられるのは、カドミウムによる中毒。視野狭窄の症状は、有機水銀による中毒。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問16・枝4",b:"カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。低分子蛋白尿や、歯への黄色の色素沈着（黄色環）がみられるのは、カドミウムによる中毒。視野狭窄の症状は、有機水銀による中毒。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問16・枝5",b:"金属水銀中毒では、感情不安定、幻覚などの精神障害、手指の震えなどの症状がみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問17・枝1",b:"レーザー光線は、おおむね1nmから180nmまでの波長域にある。",a:false,e:"誤り：「1nmから180nm」⇒「180nmから1mm」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問17・枝2",b:"レーザー光線は、単一波長で位相のそろった人工光線である。",a:true,e:"記述のとおり。レーザー光線は、単一波長で位相のそろったコヒーレントな人工光線であり、指向性や集光性に優れている。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問17・枝3",b:"レーザー光線の強い指向性や集束性を利用し、高密度のエネルギーを発生させることができる。",a:true,e:"（1）誤り：「1nmから180nm」⇒「180nmから1mm」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問17・枝4",b:"出力パワーが最も弱いクラス1又はクラス2のレーザー光線は、可視光のレーザーポインタとして使用されている。",a:true,e:"（1）誤り：「1nmから180nm」⇒「180nmから1mm」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問17・枝5",b:"レーザー光線にさらされるおそれのある業務は、レーザー機器の出力パワーなどに基づくクラス分けに応じた労働衛生上の対策を講じる必要がある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問18・枝1",b:"潜水業務における減圧症は、浮上による減圧に伴い、血液中に溶け込んでいた酸素が気泡となり、血管を閉塞したり組織を圧迫することにより発生する。",a:false,e:"誤り：「血液中に溶け込んでいた酸素」⇒「血液中に溶け込んでいた窒素」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問18・枝2",b:"熱けいれんは、高温環境下での労働において、皮膚の血管に血液がたまり、脳への血液の流れが少なくなることにより発生し、めまい、失神などの症状がみられる。",a:false,e:"誤り：選択肢の症状は熱失神。熱けいれんは、大量の発汗により体内の水分と塩分が失われたところへ水分のみが補給されたとき、体内の塩分濃度が低下することにより発生し、手足や腹筋にけいれんの症状がみられる。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問18・枝3",b:"全身振動障害では、レイノー現象などの末梢循環障害や手指のしびれ感などの末梢神経障害がみられ、局所振動障害では、関節痛などの筋骨格系障害がみられる。",a:false,e:"誤り：選択肢の症状は全て局所振動障害。全身振動障害では、腰痛などの脊柱障害がみられる。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問18・枝4",b:"低体温症は、低温下の作業で全身が冷やされ、体の中心部の温度が35℃程度以下に低下した状態をいう。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問18・枝5",b:"マイクロ波は、赤外線より波長が短い電磁波で、照射部位の組織を加熱する作用がある。",a:false,e:"誤り：マイクロ波は、赤外線より波長が長い電磁波である。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問19・枝1",b:"有害物質を取り扱う装置を構造上又は作業上の理由で完全に密閉できない場合は、装置内の圧力を外気圧より高くする。",a:false,e:"誤り：「装置内の圧力を外気圧より高くする」⇒「装置内の圧力を外気圧よりわずかに低くする」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問19・枝2",b:"局所排気装置を設置する場合は、給気量が不足すると排気効果が低下するので、排気量に見合った給気経路を確保する。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問19・枝3",b:"有害物質を発散する作業工程では、局所排気装置の設置を密閉化や自動化より優先して検討する。",a:false,e:"誤り：「局所排気装置の設置を密閉化や自動化より優先して検討する」⇒「密閉化や自動化を局所排気装置の設置より優先して検討する」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問19・枝4",b:"局所排気装置を設ける場合、ダクトが細すぎると搬送速度が不足し、太すぎると圧力損失が増大することを考慮して、ダクト径を決める。",a:false,e:"誤り：「ダクトが細すぎると搬送速度が不足し、太すぎると圧力損失が増大する」⇒「ダクトが太すぎると搬送速度が不足し、細すぎると圧力損失が増大する」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問19・枝5",b:"局所排気装置に設ける空気清浄装置は、一般に、ダクトに接続された排風機を通過した後の空気が通る位置に設置する。",a:false,e:"誤り：一般に、ダクト⇒空気清浄装置⇒排風機（ファン）⇒排気ダクトの順に配置する。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問20・枝1",b:"トルエン・・・・・・・・・・・・トリクロロ酢酸",a:false,e:"誤り：「トリクロロ酢酸」⇒「馬尿酸」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問20・枝2",b:"キシレン・・・・・・・・・・・・メチル馬尿酸",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問20・枝3",b:"スチレン・・・・・・・・・・・・馬尿酸",a:false,e:"誤り：「馬尿酸」⇒「マンデル酸」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問20・枝4",b:"N,N-ジメチルホルムアミド・・・デルタ-アミノレブリン酸",a:false,e:"誤り：「デルタ-アミノレブリン酸」⇒「N-メチルホルムアミド」。"},
{c:"労働衛生（有害業務）",y:"R5-10",s:"問20・枝5",b:"鉛・・・・・・・・・・・・・・・マンデル酸",a:false,e:"誤り：「マンデル酸」⇒「デルタ-アミノレブリン酸」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問21・枝1",b:"常時300人以上の労働者を使用する各種商品小売業の事業場では、総括安全衛生管理者を選任しなければならない。",a:true,e:"正しい：安衛則第2条（総括安全衛生管理者を選任すべき事業場）2。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問21・枝2",b:"常時 50 人以上の労働者を使用する通信業の事業場では、第二種衛生管理者免許を受けた者のうちから衛生管理者を選任することができる。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3ロ。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問21・枝3",b:"常時 50 人以上の労働者を使用する運送業の事業場では、第二種衛生管理者免許を受けた者のうちから衛生管理者を選任することができる。",a:false,e:"誤り：「第二種衛生管理者免許」⇒「第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は医師、歯科医師、労働衛生コンサルタント等」。安衛則第7条（衛生管理者の選任）第1項3イ。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問21・枝4",b:"常時 50 人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3ロ。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問21・枝5",b:"常時 50 人以上の労働者を使用する旅館業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3ロ。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問22・枝1",b:"産業医を選任しなければならない事業場は、常時50人以上の労働者を使用する事業場である。",a:true,e:"正しい：安衛令第5条（産業医を選任すべき事業場）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問22・枝2",b:"常時使用する労働者数が2,000人を超える事業場では、産業医を2人以上選任しなければならない。",a:false,e:"誤り：「2,000人を超える」⇒「3,000人を超える」。安衛則第13条（産業医の選任等）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問22・枝3",b:"重量物の取扱い等重激な業務に常時500人以上の労働者を従事させる事業場では、その事業場に専属の産業医を選任しなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問22・枝4",b:"産業医が、事業者から、毎月1回以上、所定の情報の提供を受けている場合であって、事業者の同意を得ているときは、産業医の作業場等の巡視の頻度を、毎月1回以上から2か月に1回以上にすることができる。",a:true,e:"正しい：安衛則第15条（産業医の定期巡視）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問22・枝5",b:"産業医は、労働者に対する衛生教育に関することであって、医学に関する専門的知識を必要とする事項について、総括安全衛生管理者に対して勧告することができる。",a:true,e:"正しい：安衛則第14条（産業医及び産業歯科医の職務等）第1項、第3項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問23・枝1",b:"衛生委員会の議長を除く委員の半数については、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者の推薦に基づき指名しなければならない。",a:true,e:"正しい：安衛法第18条（衛生委員会）第4項、第17条第4項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問23・枝2",b:"衛生委員会の議長は、原則として、総括安全衛生管理者又は総括安全衛生管理者以外の者で事業場においてその事業の実施を統括管理するもの若しくはこれに準ずる者のうちから事業者が指名した委員がなるものとする。",a:true,e:"正しい：安衛法第18条（衛生委員会）第2項1。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問23・枝3",b:"事業場に専属ではないが、衛生管理者として選任している労働衛生コンサルタントを、衛生委員会の委員として指名することができる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第2項2。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問23・枝4",b:"作業環境測定を外部の作業環境測定機関に委託して実施している場合、当該作業環境測定を実施している作業環境測定士を、衛生委員会の委員として指名することができる。",a:false,e:"誤り：作業環境測定士は、事業場に専属の労働者である必要がある。安衛法第18条（衛生委員会）第3項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問23・枝5",b:"衛生委員会の付議事項には、長時間にわたる労働による労働者の健康障害の防止を図るための対策の樹立に関することが含まれる。",a:true,e:"正しい：安衛則第22条（衛生委員会の付議事項）9。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問24・枝1",b:"雇入時の健康診断において、医師による健康診断を受けた後3か月を経過しない者が、その健康診断結果を証明する書面を提出したときは、その健康診断の項目に相当する項目を省略することができる。",a:true,e:"正しい：安衛則第44条（定期健康診断）第3項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問24・枝2",b:"雇入時の健康診断の項目のうち、聴力の検査は、1,000Hz 及び 4,000Hz の音について行わなければならない。",a:true,e:"正しい：安衛則第43条（雇入時の健康診断）3。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問24・枝3",b:"深夜業を含む業務に常時従事する労働者に対し、6か月以内ごとに1回、定期に、健康診断を行わなければならないが、胸部エックス線検査については、1年以内ごとに1回、定期に、行うことができる。",a:true,e:"正しい：安衛則第45条（特定業務従事者の健康診断）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問24・枝4",b:"定期健康診断を受けた労働者に対し、健康診断を実施した日から3か月以内に、当該健康診断の結果を通知しなければならない。",a:false,e:"誤り：健康診断の結果の通知は、遅滞なく行わなければならない。安衛則第51条の4（健康診断の結果の通知）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問24・枝5",b:"定期健康診断の結果に基づき健康診断個人票を作成して、これを5年間保存しなければならない。",a:true,e:"正しい：安衛則第51条（健康診断結果の記録の作成）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問25・枝1",b:"常時男性35人、女性10人の労働者を使用している事業場で、労働者が臥床することのできる男女別々の休養室又は休養所を設けていない。",a:true,e:"違反なし：設問の事業場は、常時45人、女性10人を使用している事業場であり、常時50人以上または女性30人以上の要件には該当しない。安衛則第618条（休養室等）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問25・枝2",b:"常時 50 人の労働者を就業させている屋内作業場の気積が、設備の占める容積及び床面から4m を超える高さにある空間を除き450㎥となっている。",a:false,e:"違反あり：常時50人の労働者を使用している場合、必要とされる気積は設備の占める容積及び床面から4メートルを超える高さにある空間を除き500㎥である。安衛則第600条（気積）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問25・枝3",b:"日常行う清掃のほか、毎年1回、12 月下旬の平日を大掃除の日と決めて大掃除を行っている。",a:false,e:"違反あり：清掃等の実施について、大掃除は6か月以内ごとに行わなければならない。安衛則第619条（清掃等の実施）1。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問25・枝4",b:"事業場に附属する食堂の床面積を、食事の際の1人について、0.5㎡としている。",a:false,e:"違反あり：食堂の床面積は、食事の際の1人について1平方メートル以上としなければならない。安衛則第630条（食堂及び炊事場）2。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問25・枝5",b:"労働衛生上の有害業務を有しない事業場において、窓その他の開口部の直接外気に向かって開放することができる部分の面積が、常時床面積の 25 分の1である屋内作業場に、換気設備を設けていない。",a:false,e:"違反あり：換気設備が設けられていない場合、直接外気に向かって開放することができる部分の面積は、常時床面積の20分の1以上としなければならない。安衛則第601条（換気）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問26・枝1",b:"労働衛生コンサルタントは、他人の求めに応じ報酬を得て、労働者の衛生の水準の向上を図るため、事業場の衛生についての診断及びこれに基づく指導を行うことを業とする。",a:true,e:"正しい：安衛法第81条（業務）第2項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問26・枝2",b:"労働衛生コンサルタント試験には、保健衛生及び労働衛生工学の2つの区分がある。",a:true,e:"正しい：コンサルタント則第10条（試験の区分）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問26・枝3",b:"労働衛生コンサルタント試験に合格した者は、厚生労働大臣の指定する指定登録機関に備える労働衛生コンサルタント名簿に、氏名、生年月日等所定の事項の登録を受けることにより、労働衛生コンサルタントとなることができる。",a:true,e:"正しい：安衛法第84条（登録）第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問26・枝4",b:"労働衛生コンサルタントが、その業務に関して知り得た秘密を漏らし、又は盗用したときは、その登録を取り消されることがある。",a:true,e:"正しい：安衛法第85条（登録の取消し）第2項、第86条（義務）第2項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問26・枝5",b:"労働衛生コンサルタントの診断及び指導を受けた事業者は、その記録を作成して、これを3年間保存しなければならない。",a:false,e:"誤り：コンサルタントが依頼者の氏名等を記載して保存する義務はあるが、事業者に設問の義務を課した規定はない。安衛法第103条（書類の保存等）第3項、コンサルタント則第22条（帳簿）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問27・枝1",b:"ストレスチェックを受ける労働者について解雇、昇進又は異動に関して直接の権限を持つ監督的地位にある者は、ストレスチェックの実施の事務に従事してはならない。",a:true,e:"正しい：安衛則第52条の10（検査の実施者等）第2項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問27・枝2",b:"事業者は、ストレスチェックの結果が、衛生管理者及びストレスチェックを受けた労働者に通知されるようにしなければならない。",a:false,e:"誤り：検査結果の通知は、ストレスチェックを受けた労働者に対して行われなければならない。安衛則第52条の12（検査結果の通知）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問27・枝3",b:"面接指導を行う医師として事業者が指名できる医師は、当該事業場の産業医に限られる。",a:false,e:"誤り：面接指導を行う医師は、指針（「心理的な負担の程度を把握するための検査及び面接指導の実施並びに面接指導結果に基づき事業者が講ずべき措置に関する指針」：平成 30 年8月 22 日付け心理的な負担の程度を把握するための検査等指針公示第3号）等において産業医等が行うことが望ましいとされているが、産業医に限定した規定はない。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問27・枝4",b:"面接指導の結果は、健康診断個人票に記載しなければならない。",a:false,e:"誤り：健康診断個人票に記入することとはされておらず、面接指導の結果の記録を作成しなければならない。安衛則第52条の18（面接指導結果の記録の作成）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問27・枝5",b:"事業者は、面接指導の結果に基づき、当該労働者の健康を保持するため必要な措置について、面接指導が行われた日から3か月以内に、医師の意見を聴かなければならない。",a:false,e:"誤り：「面接指導が行われた日から、3か月以内に」⇒「面接指導が行われた後、遅滞なく」。安衛則第52条の19（面接指導の結果についての医師からの意見聴取）。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問28・枝1",b:"1,000 0.3",a:false,e:"※ 事務所則第5条（空気調査設備等による調整）第1項2、第2項。「1 空気調和設備又は機械換気設備を設けている場合は、室に供給される空気が、1気圧、温度25℃ とした場合の当該空気中に占める二酸化炭素の含有率が100万分の[A：1,000 ]以下となるように、当該設備を調整しなければならない。 "},

{c:"関係法令（有害業務以外）",y:"R5-10",s:"問29・枝1",b:"時間外・休日労働に関する協定を締結し、これを所轄労働基準監督署長に届け出ている場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き、時間外・休日労働をさせてはならない。",a:true,e:"正しい：妊産婦が請求した場合には、変形労働時間制の定め及び時間外労働等に関する労使協定にかかわらず時間外・休日労働をさせてはならないが、労働基準法第 41 条に規定する管理監督者には労働時間に関する規定が適用されないため、時間外・休日労働の禁止規定が除外される。労働基準法第41条（労働時間等に関する規定の適用除外）、第66条第1項・第2項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問29・枝2",b:"フレックスタイム制を採用している場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き、1週40時間、1日8時間を超えて労働させてはならない。",a:false,e:"誤り：フレックスタイム制を規定した労働基準法第32条の3は、同法第66条第1項において規定している変形労働時間制の条項に含まれない。労働基準法第66条第1項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問29・枝3",b:"妊産婦が請求した場合には、深夜業をさせてはならない。",a:true,e:"正しい：労働基準法第66条第3項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問29・枝4",b:"妊娠中の女性が請求した場合においては、他の軽易な業務に転換させなければならない。",a:true,e:"正しい：労働基準法第65条（産前産後）第3項。"},
{c:"関係法令（有害業務以外）",y:"R5-10",s:"問29・枝5",b:"原則として、産後8週間を経過しない女性を就業させてはならない。",a:true,e:"正しい：原則は産後8週間を経過しない女性は就業が禁止される。例外として6週間を経過して当該労働者が請求した場合において、医師が支障なしとして認めた業務に就かせることができるのみとなる。労働基準法第65条（産前産後）第2項。"},
