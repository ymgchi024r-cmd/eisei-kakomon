  btn.textContent=new Date(examDate).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})+'に変更';
}

function buildGraph(){
  const body=document.getElementById('graph-body');
  body.innerHTML='';
  Object.keys(CATS).forEach(cat=>{
    const st=catStats[cat]||{a:0,t:0};
    const pct=st.t>0?Math.round(st.a/st.t*100):0;
    const col=CATS[cat].bar;
    const row=document.createElement('div');
    row.className='graph-row';
    row.innerHTML=`<div class="graph-cat">${CATS[cat].short}</div><div class="graph-bar-wrap"><div class="graph-bar-fill" style="width:${pct}%;background:${col};"></div></div><div class="graph-pct" style="color:${pct>=80?'#1D9E75':pct>=60?'#EF9F27':'#e24b4a'}">${pct}%</div><div class="graph-count">${st.t}問</div>`;
    body.appendChild(row);
  });
}

function buildHome(){
  updateCountdown();buildGraph();
  document.getElementById('h-wrong').textContent=wrongIds.size;
  document.getElementById('h-acc').textContent=totalAnswered>0?Math.round(totalCorrect/totalAnswered*100)+'%':'―';
  const panel=document.getElementById('cat-panel');
  panel.innerHTML='';
  Object.keys(CATS).forEach(cat=>{
    const total=Q.filter(q=>q.c===cat).length;
    const wrong=Q.map((q,i)=>({q,i})).filter(x=>x.q.c===cat&&wrongIds.has(x.i)).length;
    const st=catStats[cat]||{a:0,t:0};
    const pct=st.t>0?Math.round(st.a/st.t*100):0;
    const item=document.createElement('div');
    item.className='cat-item';
    item.innerHTML=`<div class="cat-dot" style="background:${CATS[cat].bar};"></div><div class="cat-item-name">${cat}</div><div class="cat-item-pct" style="color:${CATS[cat].color};">${pct}%</div>${wrong>0?`<span class="cat-wrong-badge">✕${wrong}</span>`:''}<div class="cat-item-count">${total}問</div>`;
    item.onclick=()=>startCat(cat);
    panel.appendChild(item);
  });
  const wc=wrongIds.size;
  document.getElementById('review-count').textContent=wc+'問';
  document.getElementById('review-card').classList.toggle('disabled',wc===0);
  const bc=bookmarkIds.size;
  document.getElementById('bm-count').textContent=bc+'問';
  document.getElementById('bm-card').classList.toggle('disabled',bc===0);
}

function toggleCat(){
  catOpen=!catOpen;
  document.getElementById('cat-panel').classList.toggle('open',catOpen);
  document.getElementById('cat-arrow').textContent=catOpen?'∨':'›';
}

function startRandom(){isReviewMode=false;sessionOrder=shuffle(Q.map((_,i)=>i));startSession('ランダム');}
function startCat(cat){isReviewMode=false;sessionOrder=shuffle(Q.map((_,i)=>i).filter(i=>Q[i].c===cat));startSession(cat);}
function startReview(){if(wrongIds.size===0)return;isReviewMode=true;sessionOrder=shuffle([...wrongIds]);startSession('復習モード');}
function retryWrong(){if(wrongIds.size===0){goHome();return;}isReviewMode=true;sessionOrder=shuffle([...wrongIds]);startSession('復習モード');}

function startSession(title){
  sessionIdx=0;sessionCorrect=0;sessionWrong=0;sessionAnswered=false;
  document.getElementById('quiz-title').textContent=title;
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('screen-home').style.display='none';
  document.getElementById('screen-bookmark').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  loadQ();
}

function loadQ(){
  const qIdx=sessionOrder[sessionIdx];
  const q=Q[qIdx];
  document.getElementById('quiz-num').textContent=`${sessionIdx+1}/${sessionOrder.length}`;
  document.getElementById('q-year').textContent=q.y;
  document.getElementById('q-cat').textContent=CATS[q.c]?CATS[q.c].short:q.c;
  document.getElementById('q-rev').style.display=isReviewMode?'inline-block':'none';
  document.getElementById('q-stem').innerHTML=`<strong>【問】</strong>${q.s}`;
  document.getElementById('q-branch').textContent=q.b;
  document.getElementById('bm-btn').style.opacity=bookmarkIds.has(qIdx)?'1':'0.35';
  ['btn-o','btn-x'].forEach(id=>{const b=document.getElementById(id);b.className='ox-btn';b.disabled=false;});
  document.getElementById('result-badge').style.display='none';
  document.getElementById('explanation').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('prog').style.width=Math.round(sessionIdx/sessionOrder.length*100)+'%';
  document.getElementById('sc').textContent=sessionCorrect;
  document.getElementById('sw').textContent=sessionWrong;
  document.getElementById('sa').textContent=sessionIdx>0?Math.round(sessionCorrect/sessionIdx*100)+'%':'―';
  sessionAnswered=false;
}

function toggleBookmark(){
  const qIdx=sessionOrder[sessionIdx];
  if(bookmarkIds.has(qIdx))bookmarkIds.delete(qIdx);
  else bookmarkIds.add(qIdx);
  document.getElementById('bm-btn').style.opacity=bookmarkIds.has(qIdx)?'1':'0.35';
  save();
}

function answer(isTrue){
  if(sessionAnswered)return;
  sessionAnswered=true;
  const qIdx=sessionOrder[sessionIdx];
  const q=Q[qIdx];
  const ok=isTrue===q.a;
  document.getElementById('btn-o').disabled=true;
  document.getElementById('btn-x').disabled=true;
  if(isTrue)document.getElementById('btn-o').classList.add(ok?'correct':'wrong');
  else document.getElementById('btn-x').classList.add(ok?'correct':'wrong');
  if(ok){sessionCorrect++;wrongIds.delete(qIdx);}
  else{sessionWrong++;wrongIds.add(qIdx);}
  if(!catStats[q.c])catStats[q.c]={a:0,t:0};
  catStats[q.c].t++;if(ok)catStats[q.c].a++;
  totalAnswered++;if(ok)totalCorrect++;
  save();
  const rb=document.getElementById('result-badge');
  rb.style.display='block';rb.className='result-badge '+(ok?'ok':'ng');
  rb.textContent=ok?'正解！':`不正解　正解は${q.a?'○':'×'}`;
  document.getElementById('explanation').innerHTML=`<strong>解説：</strong>${q.e}`;
  document.getElementById('explanation').style.display='block';
  document.getElementById('sc').textContent=sessionCorrect;
  document.getElementById('sw').textContent=sessionWrong;
  document.getElementById('sa').textContent=Math.round(sessionCorrect/(sessionIdx+1)*100)+'%';
  const nb=document.getElementById('btn-next');
  nb.style.display='block';
  nb.textContent=sessionIdx<sessionOrder.length-1?'次へ →':'結果を見る →';
}

function nextQ(){
  sessionIdx++;
  if(sessionIdx>=sessionOrder.length)showResult();
  else loadQ();
}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=sessionOrder.length;
  const pct=Math.round(sessionCorrect/total*100);
  document.getElementById('rs-score').textContent=`${sessionCorrect}/${total}`;
  document.getElementById('rs-msg').textContent=pct>=80?'合格圏内です！':pct>=60?'もう少し！':'要復習';
  document.getElementById('rs-sub').textContent=`正答率 ${pct}%`;
  document.getElementById('prog').style.width='100%';
  const rb=document.getElementById('rs-retry');
  rb.style.display=sessionWrong>0?'block':'none';
  if(sessionWrong>0)rb.textContent=`間違えた${sessionWrong}問を復習`;
}

function showBookmarks(){
  if(bookmarkIds.size===0)return;
  document.getElementById('screen-home').style.display='none';
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-bookmark').style.display='block';
  const list=document.getElementById('bm-list');
  list.innerHTML='<div class="bm-title">ブックマーク済み問題</div>';
  [...bookmarkIds].forEach(idx=>{
    const q=Q[idx];
    const div=document.createElement('div');
    div.className='bm-item';
    div.innerHTML=`<div class="bm-item-cat">${q.c} · ${q.y}</div><div class="bm-item-text">${q.b}</div>`;
    div.onclick=()=>{isReviewMode=false;sessionOrder=[idx];startSession('ブックマーク');};
    list.appendChild(div);
  });
}

function goHome(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-bookmark').style.display='none';
  document.getElementById('screen-home').style.display='block';
  buildHome();
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
buildHome();
</script>
</body>
</html>
