{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問31・枝1",b:"温度感覚を左右する環境条件は、気温、湿度及びふく射(放射)熱の三つの要素で決まる。",a:false,e:"誤り：「気温、湿度及びふく射（放射）熱の三つの要素」⇒「気温、湿度、気流、ふく射熱（放射熱）の四つの要素」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問31・枝2",b:"実効温度は、人の温熱感に基礎を置いた指標で、気温、湿度及び気流の総合効果を温度目盛りで表したものである。",a:true,e:"記述のとおり。実効温度（ET）は、気温、湿度、気流の3要素の総合効果を温度目盛りで表した温熱指標である。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問31・枝3",b:"相対湿度は、乾球温度と湿球温度によって求められる。",a:true,e:"（1）誤り：「気温、湿度及びふく射（放射）熱の三つの要素」⇒「気温、湿度、気流、ふく射熱（放射熱）の四つの要素」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問31・枝4",b:"WBGT基準値は、身体に対する負荷が大きな作業の方が、負荷が小さな作業より小さな値となる。",a:true,e:"（1）誤り：「気温、湿度及びふく射（放射）熱の三つの要素」⇒「気温、湿度、気流、ふく射熱（放射熱）の四つの要素」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問31・枝5",b:"WBGT値がその基準値を超えるおそれのあるときには、冷房などによりWBGT値を低減すること、代謝率レベルの低い作業に変更することなどの対策が必要である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問32・A",b:"人間の呼気の成分の中で、酸素の濃度は約16％、二酸化炭素の濃度は約4％である。",a:false,e:"A 正しい。 B 誤り：「0.3～0.4％」⇒「0.03～0.04％」。 C 正しい。 D 誤り：「1％」⇒「0.1％」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問32・B",b:"新鮮な外気中の酸素濃度は約21％、二酸化炭素濃度は0.3～0.4％程度である。",a:false,e:"A 正しい。 B 誤り：「0.3～0.4％」⇒「0.03～0.04％」。 C 正しい。 D 誤り：「1％」⇒「0.1％」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問32・C",b:"室内の必要換気量(㎥/h)は、次の式により算出される。室内にいる人が1時間に呼出する二酸化炭素量（㎥/h） × 100 室内二酸化炭素基準濃度（％）― 外気の二酸化炭素濃度（％）",a:false,e:"A 正しい。 B 誤り：「0.3～0.4％」⇒「0.03～0.04％」。 C 正しい。 D 誤り：「1％」⇒「0.1％」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問32・D",b:"必要換気量の算出に当たって、室内二酸化炭素基準濃度は、通常、1％とする。",a:false,e:"A 正しい。 B 誤り：「0.3～0.4％」⇒「0.03～0.04％」。 C 正しい。 D 誤り：「1％」⇒「0.1％」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問33・枝1",b:"ディスプレイとの視距離は、おおむね50cmとし、ディスプレイ画面の上端を眼の高さよりもやや下にしている。",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問33・枝2",b:"書類上及びキーボード上における照度を400ルクス程度とし、書類及びキーボード面における明るさと周辺の明るさの差はなるべく小さくしている。",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問33・枝3",b:"一連続作業時間が1時間を超えないようにし、次の連続作業までの間に5分の作業休止時間を設け、かつ、一連続作業時間内において2回の小休止を設けている。",a:true,e:"誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問33・枝4",b:"1日の情報機器作業の作業時間が4時間未満である労働者については、自覚症状を訴える者についてのみ、情報機器作業に係る定期健康診断の対象としている。",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問33・枝5",b:"情報機器作業に係る定期健康診断において、眼科学的検査と筋骨格系に関する検査のそれぞれの実施日が異なっている。",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問34・枝1",b:"HDLコレステロールは、善玉コレステロールとも呼ばれ、低値であることは動脈硬化の危険因子となる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：ヘモグロビンA1cは、ヘモグロビンに糖が結合した糖化ヘモグロビンで、ヘモグロビン全体に対する割合（％）で表される。食事から採血までの時間の影響を受けにくく、過去2～3 か月の平均的な血糖値を反映する。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問34・枝2",b:"γ-GTPは、正常な肝細胞に含まれている酵素で、肝細胞が障害を受けると血液中に流れ出し、特にアルコールの摂取で高値を示す特徴がある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：ヘモグロビンA1cは、ヘモグロビンに糖が結合した糖化ヘモグロビンで、ヘモグロビン全体に対する割合（％）で表される。食事から採血までの時間の影響を受けにくく、過去2～3 か月の平均的な血糖値を反映する。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問34・枝3",b:"ヘモグロビンA1c は、血液1µL中に含まれるヘモグロビンの数を表す値であり、貧血の有無を調べるために利用される。",a:false,e:"誤り：ヘモグロビンA1cは、ヘモグロビンに糖が結合した糖化ヘモグロビンで、ヘモグロビン全体に対する割合（％）で表される。食事から採血までの時間の影響を受けにくく、過去2～3 か月の平均的な血糖値を反映する。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問34・枝4",b:"尿素窒素(BUN)は、腎臓から排泄される老廃物の一種で、腎臓の働きが低下すると尿中に排泄されず、血液中の値が高くなる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：ヘモグロビンA1cは、ヘモグロビンに糖が結合した糖化ヘモグロビンで、ヘモグロビン全体に対する割合（％）で表される。食事から採血までの時間の影響を受けにくく、過去2～3 か月の平均的な血糖値を反映する。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問34・枝5",b:"血清トリグリセライド(中性脂肪)は、食後に値が上昇する脂質で、内臓脂肪が蓄積している者において、空腹時にも高値が持続することは動脈硬化の危険因子となる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問35・D",b:"たばこの煙の流出を防止するための技術的基準に適合した喫煙専用室においては、食事はしてはならないが、飲料を飲むことは認められている。",a:false,e:"A、B 正しい。 C 誤り：「特定の時間を禁煙とする時間分煙が認められている」⇒ 時間分煙は定められていない。 D 誤り：「食事はしてはならないが、飲料を飲むことは認められている」⇒「飲食等を行うこと"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問35・A",b:"第一種施設とは、多数のものが利用する施設のうち、学校、病院、国や地方公共団体の行政機関の庁舎などをいい、「原則敷地内禁煙」とされている。",a:false,e:"A、B 正しい。 C 誤り：「特定の時間を禁煙とする時間分煙が認められている」⇒ 時間分煙は定められていない。 D 誤り：「食事はしてはならないが、飲料を飲むことは認められている」⇒「飲食等を行うこと"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問35・B",b:"一般の事務所や工場は、第二種施設に含まれ、「原則屋内禁煙」とされている。",a:false,e:"A、B 正しい。 C 誤り：「特定の時間を禁煙とする時間分煙が認められている」⇒ 時間分煙は定められていない。 D 誤り：「食事はしてはならないが、飲料を飲むことは認められている」⇒「飲食等を行うこと"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問35・C",b:"第二種施設においては、特定の時間を禁煙とする時間分煙が認められている。",a:false,e:"A、B 正しい。 C 誤り：「特定の時間を禁煙とする時間分煙が認められている」⇒ 時間分煙は定められていない。 D 誤り：「食事はしてはならないが、飲料を飲むことは認められている」⇒「飲食等を行うこと"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問36・枝1",b:"生体から得られたある指標が正規分布である場合、そのばらつきの程度は、平均値や最頻値によって表される。",a:false,e:"誤り：「平均値や最頻値」⇒「分散や標準偏差」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問36・枝2",b:"集団を比較する場合、調査の対象とした項目のデータの平均値が等しくても分散が異なっていれば、異なった特徴をもつ集団であると評価される。",a:true,e:"記述のとおり。統計学上、平均値が同じでも分散（ばらつき）が異なれば、集団の特徴は異なると評価される。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問36・枝3",b:"健康管理統計において、ある時点での検査における有所見者の割合を有所見率といい、このようなデータを静態データという。",a:true,e:"（1）誤り：「平均値や最頻値」⇒「分散や標準偏差」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問36・枝4",b:"健康診断において、対象人数、受診者数などのデータを計数データといい、身長、体重などのデータを計量データという。",a:true,e:"（1）誤り：「平均値や最頻値」⇒「分散や標準偏差」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問36・枝5",b:"ある事象と健康事象との間に、統計上、一方が多いと他方も多いというような相関関係が認められたとしても、それらの間に因果関係があるとは限らない。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問37・枝1",b:"既往歴及び業務歴の調査",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：負荷心電図は、運動負荷を加えた状態で心電図の変化をみる検査で、狭心症、虚血性心疾患などの発見に有用な検査項目である。腰痛健康診断の項目ではない。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問37・枝2",b:"自覚症状の有無の検査",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：負荷心電図は、運動負荷を加えた状態で心電図の変化をみる検査で、狭心症、虚血性心疾患などの発見に有用な検査項目である。腰痛健康診断の項目ではない。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問37・枝3",b:"負荷心電図検査",a:true,e:"誤り：負荷心電図は、運動負荷を加えた状態で心電図の変化をみる検査で、狭心症、虚血性心疾患などの発見に有用な検査項目である。腰痛健康診断の項目ではない。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問37・枝4",b:"神経学的検査",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：負荷心電図は、運動負荷を加えた状態で心電図の変化をみる検査で、狭心症、虚血性心疾患などの発見に有用な検査項目である。腰痛健康診断の項目ではない。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問37・枝5",b:"脊柱の検査",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問38・枝1",b:"虚血性の脳血管障害である脳梗塞は、脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。",a:true,e:"（1）（3）～（5）正しい（2）誤り：「数日後」⇒「急激な」。くも膜下出血は脳動脈瘤破裂により、くも膜下腔に出血している病態で、急激で激しい痛みを伴う頭痛が特徴である。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問38・枝2",b:"くも膜下出血は、通常、脳動脈瘤が破れて数日後、激しい頭痛で発症する。",a:false,e:"誤り：「数日後」⇒「急激な」。くも膜下出血は脳動脈瘤破裂により、くも膜下腔に出血している病態で、急激で激しい痛みを伴う頭痛が特徴である。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問38・枝3",b:"虚血性心疾患は、冠動脈による心筋への血液の供給が不足したり途絶えることにより起こる心筋障害である。",a:true,e:"記述のとおり。虚血性心疾患は、冠動脈の狭窄や閉塞により心筋への血液供給が不足・途絶することで起こる心筋障害で、狭心症や心筋梗塞が含まれる。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問38・枝4",b:"心筋梗塞では、突然激しい胸痛が起こり、「締め付けられるように痛い」、「胸が苦しい」などの症状が、1時間以上続くこともある。",a:true,e:"（1）（3）～（5）正しい（2）誤り：「数日後」⇒「急激な」。くも膜下出血は脳動脈瘤破裂により、くも膜下腔に出血している病態で、急激で激しい痛みを伴う頭痛が特徴である。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問38・枝5",b:"運動負荷心電図検査は、虚血性心疾患の発見に有用である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問39・枝1",b:"感染型食中毒は、食物に付着した細菌そのものの感染によって起こる食中毒で、サルモネラ菌によるものがある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問39・枝2",b:"赤身魚などに含まれるヒスチジンが細菌により分解されて生成されるヒスタミンは、加熱調理によって分解する。",a:false,e:"誤り：「加熱調理によって分解する」⇒「加熱しても分解されにくく、一度産生されると取り除くことが困難である」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問39・枝3",b:"エンテロトキシンは、フグ毒の主成分で、手足のしびれや呼吸麻痺を起こす。",a:false,e:"誤り：「エンテロトキシン」⇒「テトロドトキシン」。エンテロトキシンは黄色ブドウ球菌の毒素。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問39・枝4",b:"カンピロバクターは、カビの産生する毒素で、腹痛や下痢を起こす。",a:false,e:"誤り：「カビの産生する毒素」⇒「鶏や牛の腸に住み、食品や飲料水を通して感染し」。"},
{c:"労働衛生（有害業務以外）",y:"R5-10",s:"問39・枝5",b:"ボツリヌス菌は、缶詰や真空パックなど酸素のない密封食品中でも増殖するが、熱には弱く、 60℃、10分間程度の加熱で殺菌することができる。",a:false,e:"誤り：「熱には弱く60℃、10分間程度の加熱で殺菌することができる」⇒「熱に強く、菌が芽胞という形態をとると長時間煮沸しても死滅しない」。"},
{c:"労働生理",y:"R5-10",s:"問41・枝1",b:"血液は、血漿成分と有形成分から成り、血漿成分は血液容積の約55％を占める。",a:true,e:"記述のとおり。血液は血漿（約55％）と有形成分（血球、約45％）から成る。血漿は水、蛋白質、電解質などを含む液体成分である。"},
{c:"労働生理",y:"R5-10",s:"問41・枝2",b:"血漿中の蛋白質のうち、アルブミンは血液の浸透圧の維持に関与している。",a:true,e:"（1）～（3）（5）：正しい。（4）誤り。：「血小板」⇒「白血球」。"},
{c:"労働生理",y:"R5-10",s:"問41・枝3",b:"白血球のうち、好中球には、体内に侵入してきた細菌や異物を貪食する働きがある。",a:true,e:"（1）～（3）（5）：正しい。（4）誤り。：「血小板」⇒「白血球」。"},
{c:"労働生理",y:"R5-10",s:"問41・枝4",b:"血小板のうち、リンパ球には、Bリンパ球、Tリンパ球などがあり、これらは免疫反応に関与している。",a:false,e:"誤り。：「血小板」⇒「白血球」。"},
{c:"労働生理",y:"R5-10",s:"問41・枝5",b:"血液の凝固は、血漿中のフィブリノーゲンがフィブリンに変化し、赤血球などが絡みついて固まる現象である。",a:true,e:"：正しい。"},
{c:"労働生理",y:"R5-10",s:"問42・枝1",b:"心拍数は、左心房に存在する洞結節からの電気刺激によってコントロールされている。",a:false,e:"誤り。：「左心房」⇒「右心房」。"},
{c:"労働生理",y:"R5-10",s:"問42・枝2",b:"心臓の拍動による動脈圧の変動を末梢の動脈で触知したものを脈拍といい、一般に、手首の橈骨動脈で触知する。",a:true,e:"記述のとおり。脈拍は、心臓の拍動による動脈圧の変動を末梢動脈で触知したもので、通常は手首の橈骨動脈で測定する。"},
{c:"労働生理",y:"R5-10",s:"問42・枝3",b:"心臓自体は、大動脈の起始部から出る冠動脈によって酸素や栄養分の供給を受けている。",a:true,e:"（1）誤り。：「左心房」⇒「右心房」。（2）～（5）正しい。"},
{c:"労働生理",y:"R5-10",s:"問42・枝4",b:"肺循環により左心房に戻ってきた血液は、左心室を経て大動脈に入る。",a:true,e:"（1）誤り。：「左心房」⇒「右心房」。（2）～（5）正しい。"},
{c:"労働生理",y:"R5-10",s:"問42・枝5",b:"大動脈を流れる血液は動脈血であるが、肺動脈を流れる血液は静脈血である。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問43・枝1",b:"呼吸運動は、横隔膜、肋間筋などの呼吸筋が収縮と弛緩をすることにより行われる。",a:true,e:"記述のとおり。呼吸運動は、横隔膜や肋間筋などの呼吸筋の収縮・弛緩により胸郭の容積を変化させて行われる。"},
{c:"労働生理",y:"R5-10",s:"問43・枝2",b:"胸郭内容積が増し、その内圧が低くなるにつれ、鼻腔、気管などの気道を経て肺内へ流れ込む空気が吸気である。",a:true,e:"（1）～（4）正しい。（5）誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R5-10",s:"問43・枝3",b:"肺胞内の空気と肺胞を取り巻く毛細血管中の血液との間で行われるガス交換は、外呼吸である。",a:true,e:"（1）～（4）正しい。（5）誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R5-10",s:"問43・枝4",b:"血液中の二酸化炭素濃度が増加すると、呼吸中枢が刺激され、呼吸が速く深くなる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問43・枝5",b:"呼吸のリズムをコントロールしているのは、間脳の視床下部である。",a:false,e:"誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R5-10",s:"問44・枝1",b:"マルターゼリパーゼトリプシン",a:true,e:" 炭水化物（糖質）の消化酵素：アミラーゼ、マルターゼ。  脂質の消化酵素：リパーゼ。  蛋白質の消化酵素：ペプシン、トリプシン。"},
{c:"労働生理",y:"R5-10",s:"問44・枝2",b:"トリプシンアミラーゼペプシン",a:false,e:" 炭水化物（糖質）の消化酵素：アミラーゼ、マルターゼ。  脂質の消化酵素：リパーゼ。  蛋白質の消化酵素：ペプシン、トリプシン。"},
{c:"労働生理",y:"R5-10",s:"問44・枝3",b:"ペプシンマルターゼトリプシン",a:false,e:" 炭水化物（糖質）の消化酵素：アミラーゼ、マルターゼ。  脂質の消化酵素：リパーゼ。  蛋白質の消化酵素：ペプシン、トリプシン。"},
{c:"労働生理",y:"R5-10",s:"問44・枝4",b:"ペプシンリパーゼマルターゼ",a:false,e:" 炭水化物（糖質）の消化酵素：アミラーゼ、マルターゼ。  脂質の消化酵素：リパーゼ。  蛋白質の消化酵素：ペプシン、トリプシン。"},
{c:"労働生理",y:"R5-10",s:"問44・枝5",b:"アミラーゼトリプシンリパーゼ",a:false,e:" 炭水化物（糖質）の消化酵素：アミラーゼ、マルターゼ。  脂質の消化酵素：リパーゼ。  蛋白質の消化酵素：ペプシン、トリプシン。"},
{c:"労働生理",y:"R5-10",s:"問45・枝1",b:"コレステロールを合成する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：ヘモグロビンは骨髄で合成される。"},
{c:"労働生理",y:"R5-10",s:"問45・枝2",b:"尿素を合成する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：ヘモグロビンは骨髄で合成される。"},
{c:"労働生理",y:"R5-10",s:"問45・枝3",b:"ヘモグロビンを合成する。",a:false,e:"誤り：ヘモグロビンは骨髄で合成される。"},
{c:"労働生理",y:"R5-10",s:"問45・枝4",b:"胆汁を生成する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：ヘモグロビンは骨髄で合成される。"},
{c:"労働生理",y:"R5-10",s:"問45・枝5",b:"グリコーゲンを合成し、及び分解する。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問46・枝1",b:"代謝において、細胞に取り入れられた体脂肪、グリコーゲンなどが分解されてエネルギーを発生し、ATPが合成されることを同化という。",a:false,e:"誤り：「同化」⇒「異化」。"},
{c:"労働生理",y:"R5-10",s:"問46・枝2",b:"代謝において、体内に摂取された栄養素が、種々の化学反応によって、細胞を構成する蛋白質などの生体に必要な物質に合成されることを異化という。",a:false,e:"誤り：「異化」⇒「同化」。"},
{c:"労働生理",y:"R5-10",s:"問46・枝3",b:"基礎代謝量は、安静時における心臓の拍動、呼吸、体温保持などに必要な代謝量で、睡眠中の測定値で表される。",a:false,e:"誤り：「睡眠中」⇒「覚醒状態」。"},
{c:"労働生理",y:"R5-10",s:"問46・枝4",b:"エネルギー代謝率は、一定時間中に体内で消費された酸素と排出された二酸化炭素の容積比である。",a:false,e:"誤り：「一定時間中に体内で消費された酸素と排出された二酸化炭素の容積比」⇒「作業に要したエネルギー量が基礎代謝量の何倍にあたるかを示す数値」。"},
{c:"労働生理",y:"R5-10",s:"問46・枝5",b:"エネルギー代謝率は、動的筋作業の強度を表すことができるが、精神的作業や静的筋作業には適用できない。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問47・枝1",b:"横紋筋は、骨に付着して身体の運動の原動力となる筋肉で意志によって動かすことができるが、平滑筋は、心筋などの内臓に存在する筋肉で意志によって動かすことができない。",a:false,e:"誤り：心筋は不随意筋であるが、横紋筋でできている。"},
{c:"労働生理",y:"R5-10",s:"問47・枝2",b:"筋肉は神経からの刺激によって収縮するが、神経より疲労しにくい。",a:false,e:"誤り：「疲労しにくい」⇒「疲労しやすい」。"},
{c:"労働生理",y:"R5-10",s:"問47・枝3",b:"荷物を持ち上げたり、屈伸運動を行うときは、筋肉が長さを変えずに外力に抵抗して筋力を発生させる等尺性収縮が生じている。",a:false,e:"誤り：「筋肉が長さを変えずに外力に抵抗して筋力を発生させる等尺性収縮」⇒「筋肉が長さを変えながら一定の張力で筋力を発生させる等張性収縮」。"},
{c:"労働生理",y:"R5-10",s:"問47・枝4",b:"強い力を必要とする運動を続けていると、筋肉を構成する個々の筋線維の太さは変わらないが、その数が増えることによって筋肉が太くなり筋力が増強する。",a:false,e:"誤り：強い力を必要とする運動を続けていると、筋繊維が太くなり、筋力が増強する。"},
{c:"労働生理",y:"R5-10",s:"問47・枝5",b:"刺激に対して意識とは無関係に起こる定型的な反応を反射といい、四肢の皮膚に熱いものが触れたときなどに、その肢を体幹に近づけるような反射は屈曲反射と呼ばれる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問48・枝1",b:"騒音性難聴は、音を神経に伝達する内耳の聴覚器官の有毛細胞の変性によって起こる。",a:true,e:"記述のとおり。騒音性難聴は、内耳の蝸牛にある有毛細胞が騒音により変性・脱落することで起こる感音性難聴である。"},
{c:"労働生理",y:"R5-10",s:"問48・枝2",b:"耳介で集められた音は、鼓膜を振動させ、その振動は耳小骨によって増幅され、内耳に伝えられる。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：前庭が体の傾きの方向や大きさを感じ、半規管が体の回転の方向や速度を感じる。"},
{c:"労働生理",y:"R5-10",s:"問48・枝3",b:"内耳は、前庭、半規管及び蝸牛(うずまき管)の三つの部位からなり、前庭と半規管が平衡感覚、蝸牛が聴覚をそれぞれ分担している。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：前庭が体の傾きの方向や大きさを感じ、半規管が体の回転の方向や速度を感じる。"},
{c:"労働生理",y:"R5-10",s:"問48・枝4",b:"前庭は、体の回転の方向や速度を感じ、半規管は、体の傾きの方向や大きさを感じる。",a:false,e:"誤り：前庭が体の傾きの方向や大きさを感じ、半規管が体の回転の方向や速度を感じる。"},
{c:"労働生理",y:"R5-10",s:"問48・枝5",b:"鼓室は、耳管によって咽頭に通じており、その内圧は外気圧と等しく保たれている。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問49・枝1",b:"外部からの刺激であるストレッサーは、その形態や程度にかかわらず、自律神経系と内分泌系を介して、心身の活動を抑圧する。",a:false,e:"誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」。"},
{c:"労働生理",y:"R5-10",s:"問49・枝2",b:"ストレスに伴う心身の反応には、ノルアドレナリン、アドレナリンなどのカテコールアミンや副腎皮質ホルモンが深く関与している。",a:true,e:"記述のとおり。ストレス反応では、交感神経-副腎髄質系からカテコールアミン（ノルアドレナリン、アドレナリン）が、視床下部-下垂体-副腎皮質系から副腎皮質ホルモンが分泌される。"},
{c:"労働生理",y:"R5-10",s:"問49・枝3",b:"昇進、転勤、配置替えなどがストレスの原因となることがある。",a:true,e:"（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」。（2）～（5）正しい。"},
{c:"労働生理",y:"R5-10",s:"問49・枝4",b:"職場環境における騒音、気温、湿度、悪臭などがストレスの原因となることがある。",a:true,e:"（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」。（2）～（5）正しい。"},
{c:"労働生理",y:"R5-10",s:"問49・枝5",b:"ストレスにより、高血圧症、狭心症、十二指腸潰瘍などの疾患が生じることがある。",a:true,e:"正しい。"},
{c:"労働生理",y:"R5-10",s:"問50・枝1",b:"ガストリン胃胃酸分泌刺激",a:true,e:"記述のとおり。ガストリンは胃から分泌されるホルモンで、胃酸の分泌を刺激する作用がある。"},
{c:"労働生理",y:"R5-10",s:"問50・枝2",b:"アルドステロン副腎皮質体液中の塩類バランスの調節",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「膵臓」⇒「副腎皮質」。"},
{c:"労働生理",y:"R5-10",s:"問50・枝3",b:"パラソルモン副甲状腺血中のカルシウム量の調節",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「膵臓」⇒「副腎皮質」。"},
{c:"労働生理",y:"R5-10",s:"問50・枝4",b:"コルチゾール膵臓血糖量の増加",a:false,e:"誤り：「膵臓」⇒「副腎皮質」。"},
{c:"労働生理",y:"R5-10",s:"問50・枝5",b:"副腎皮質刺激ホルモン下垂体副腎皮質の活性化",a:true,e:"正しい。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問1・枝1",b:"総括安全衛生管理者を選任しなければならない。",a:true,e:"正しい：「300人以上の製造業」に該当する。安衛令第2条（総括安全衛生管理者を選任すべき事業所）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問1・枝2",b:"衛生管理者のうち1人を、衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。",a:false,e:"誤り：「多量の低温物体を取り扱う業務に100人が常時従事している事業場」「特定化学物質のうち第三類物質を製造する業務に20人が常時従事している事業場」は、衛生工学衛生管理者の選任要件には該当しない。安衛則第7条（衛生管理者の選任）第1項6。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問1・枝3",b:"衛生管理者のうち少なくとも1人を、専任の衛生管理者としなければならない。",a:true,e:"正しい：「多量の低温物体を取り扱う業務に100人が常時従事している事業場」は、少なくとも 1人を専任の衛生管理者に選任しなければならない。安衛則第7条（衛生管理者の選任）第1項 5ロ。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問1・枝4",b:"産業医としての法定の要件を満たしている医師で、この事業場に専属でないものを産業医として選任することができる。",a:true,e:"正しい：「深夜業を含む業務に常時500人以上の労働者を従事させる事業場」に該当しない。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問1・枝5",b:"特定化学物質作業主任者を選任しなければならない。",a:true,e:"正しい：特定化学物質のうち第三類物質を製造する業務は、特定化学物質作業主任者を選任しなければならない。安衛令（作業主任者を選任すべき作業）第6条18。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問2・枝1",b:"排気量40㎤以上の内燃機関を内蔵するチェーンソー",a:true,e:"該当する：排気量40㎤以上の内燃機関を内蔵するチェーンソーは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第28号。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問2・枝2",b:"放射線測定器",a:false,e:"該当しない"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問2・枝3",b:"アンモニア用防毒マスク",a:true,e:"該当する：防毒マスクは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第29号。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問2・枝4",b:"ろ過材及び面体を有する防じんマスク",a:true,e:"該当する：防じんマスクは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第28号。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問2・枝5",b:"再圧室",a:true,e:"該当する：安衛法第42条（機械等の譲渡等の制限）第1項。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問3・枝1",b:"木材加工用丸のこ盤を使用する屋内の作業場所に設けた局所排気装置",a:false,e:"規定されていない。木材加工用丸のこ盤を使用する屋内の作業場所に設けた局所排気装置、定期自主検査の対象とならない。粉じん則第17条（局所排気装置等の定期自主検査）第1項。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問3・枝2",b:"塩酸を使用する屋内の作業場所に設けた局所排気装置",a:false,e:"規定されていない。塩酸は特定化学物質第3類に分類され、局所排気装置は定期自主検査の対象とならない。特化則第7条他（局所排気装置等の要件）"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問3・枝3",b:"エタノールを使用する作業場所に設けた局所排気装置",a:false,e:"規定されていない。エタノールを使用する作業場所の局所排気装置は、定期自主検査の対象とならない。エタノールはアルコールと呼ばれ、揮発性で特異な芳香と味をもつ無色の液体である。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問3・枝4",b:"トルエンを重量の10％含有する塗料を用いて塗装する屋内の作業場所に設けた局所排気装置",a:true,e:"規定されている：トルエンを5％を超えて含有するものは第2種有機溶剤であるため、屋内作業場に設けられた局所排気装置は定期自主検査の実施義務がある。有機則第5条（第1種有機溶剤等又は第2種有機溶剤等に係る設備）、第20条（局所排気装置の定期自主検査）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問3・枝5",b:"アンモニアを使用する屋内の作業場所に設けたプッシュプル型換気装置",a:false,e:"規定されていない。アンモニアは特定化学物質第3類に分類され、プッシュプル型換気装置は定期自主検査の対象とならない。特化則第7条他（局所排気装置等の要件）"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問4・枝1",b:"水深10m以上の場所における潜水の作業",a:false,e:"安衛法第45条（定期自主検査）、安衛令第15条（定期自主検査を行うべき機械等）。（1）（2）（4）（5）義務付けられていない（3）義務付けられている。硝酸は特定化学物質第3類物質であり、設問の作業は特定化学物質作業主任者の選任すべき作業である。安衛令第6 条（作業主任者を選任すべき作業）第1項"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問4・枝2",b:"チェーンソーを用いて行う立木の伐木の作業",a:false,e:"安衛法第45条（定期自主検査）、安衛令第15条（定期自主検査を行うべき機械等）。（1）（2）（4）（5）義務付けられていない（3）義務付けられている。硝酸は特定化学物質第3類物質であり、設問の作業は特定化学物質作業主任者の選任すべき作業である。安衛令第6 条（作業主任者を選任すべき作業）第1項"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問4・枝3",b:"製造工程において硝酸を用いて行う洗浄の作業",a:true,e:"義務付けられている。硝酸は特定化学物質第3類物質であり、設問の作業は特定化学物質作業主任者の選任すべき作業である。安衛令第6 条（作業主任者を選任すべき作業）第1項18、安衛令別表第3第3号（第3類物質）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問4・枝4",b:"セメント製造工程においてセメントを袋詰めする作業",a:false,e:"安衛法第45条（定期自主検査）、安衛令第15条（定期自主検査を行うべき機械等）。（1）（2）（4）（5）義務付けられていない（3）義務付けられている。硝酸は特定化学物質第3類物質であり、設問の作業は特定化学物質作業主任者の選任すべき作業である。安衛令第6 条（作業主任者を選任すべき作業）第1項"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問4・枝5",b:"強烈な騒音を発する場所における作業",a:false,e:"義務付けられていない"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問5・枝1",b:"通気設備が設けられている坑内の作業場における通気量の測定・・・・・・・・・・・・・・半月以内ごとに1回",a:true,e:"正しい：安衛令第21条（作業環境測定を行うべき作業場）第1項4、安衛則第589条（作業環境測定を行うべき作業場）3、同第603条（坑内の通気量の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問5・枝2",b:"非密封の放射性物質を取り扱う作業室における空気中の放射性物質の濃度の測定・・・・・・・・・・・・・・1か月以内ごとに1回",a:true,e:"正しい： 安衛令第21条（作業環境測定を行うべき作業場）第1項6。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問5・枝3",b:"溶融ガラスからガラス製品を成型する業務を行う屋内作業場における気温、湿度及びふく射熱の測定・・・・・・・・・・・・・・1か月以内ごとに1回",a:false,e:"誤り：「1か月以内ごとに1回」⇒「半月以内ごとに1回」。安衛令第21条（作業環境測定を行うべき作業場）第1項2、安衛則第587条（作業環境測定を行うべき暑熱、寒冷又は多湿な作業場等）第1項8。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問5・枝4",b:"チッパーによりチップする業務を行う屋内作業場における等価騒音レベルの測定・・・・・・・・・・・・・・6か月以内ごとに1回",a:true,e:"正しい：安衛令第21条（作業環境測定を行うべき作業場）第1項3、安衛則第588条（著しい騒音を発する屋内作業場）7。安衛則第590条（騒音の測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問5・枝5",b:"鉛蓄電池の解体工程において鉛等を切断する業務を行う屋内作業場における空気中の鉛の濃度の測定・・・・・・・・・・・・・・・1年以内ごとに1回",a:true,e:"正しい：安衛令第 21 条（作業環境測定を行うべき作業場）第 1 項8。安衛令別表第4（鉛業務）2。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問6・枝1",b:"ホルムアルデヒドを取り扱う作業・・・・・・・・・・・・・・・有機溶剤中毒予防規則",a:false,e:"誤り： ホルムアルデヒドは特定化学物質第2類に該当するため、当該作業は特定化学物質障害予防規則が適用される。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問6・枝2",b:"レーザー光線による金属の加工の作業・・・・・・・・・・・・・電離放射線障害防止規則",a:false,e:"誤り："},
{c:"関係法令（有害業務）",y:"R6-4",s:"問6・枝3",b:"ドライアイスを使用して冷凍を行う冷凍庫の内部における作業・・酸素欠乏症等防止規則",a:true,e:"正しい： ドライアイスを使用して冷凍を行う冷凍庫の内部における作業は、酸素欠乏危険作業に該当するため、酸素欠乏症等防止規則が適用される。安衛令別表第610"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問6・枝4",b:"窒素を入れたことのある化学設備のタンク内を点検する作業・・・高気圧作業安全衛生規則",a:false,e:"誤り："},
{c:"関係法令（有害業務）",y:"R6-4",s:"問6・枝5",b:"自然換気が不十分な場所におけるはんだ付けの作業・・・・・・・粉じん障害防止規則",a:false,e:"誤り："},
{c:"関係法令（有害業務）",y:"R6-4",s:"問7・枝1",b:"作業に従事する労働者が有機溶剤により汚染され、又はこれを吸入しないように、作業の方法を決定し、労働者を指揮すること。",a:true,e:"定められている。有機則第19条の21。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問7・枝2",b:"保護具の使用状況を監視すること。",a:true,e:"定められている。有機則第19条の23。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問7・枝3",b:"タンクの内部において有機溶剤業務に労働者が従事するときは、退避設備の整備等法定の措置が講じられていることを確認すること。",a:true,e:"定められている。有機則第19条の24。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問7・枝4",b:"局所排気装置、プッシュプル型換気装置又は全体換気装置を1か月を超えない期間ごとに点検すること。",a:true,e:"定められている。有機則第19条の22。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問7・枝5",b:"第一種有機溶剤等又は第二種有機溶剤等に係る有機溶剤業務を行う屋内作業場について、作業環境測定を実施すること。",a:false,e:"定められていない。作業環境測定法第3条第1項により「指定作業場」に係わる安衛法第65条第1項の作業環境測定は「作業環境測定士」によって行われなくてはならないこととされており、有機溶剤業務に係わる作業場は、作業環境測定法施行令第1条により指定作業場とされている。したがって、有機則第28条の測定は、作業環境測定士によって実施されなければならない。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問8・枝1",b:"酸素欠乏とは、空気中の酸素の濃度が18％未満である状態をいう。",a:true,e:"正しい：酸欠則第2条（定義）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問8・枝2",b:"第二種酸素欠乏危険作業を行う作業場については、その日の作業を開始する前に、当該作業場における空気中の酸素及び硫化水素の濃度を測定しなければならない。",a:true,e:"正しい：酸欠則第3条（作業環境測定等）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問8・枝3",b:"酸素欠乏危険作業に労働者を従事させるときは、労働者を当該作業を行う場所に入場させ、及び退場させる時に、人員を点検しなければならない。",a:true,e:"正しい：酸欠則第8条（人員の点検）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問8・枝4",b:"汚水を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、硫化水素中毒の防止について必要な知識を有する者のうちから指揮者を選任し、作業を指揮させなければならない。",a:true,e:"正しい：酸欠則第25条の2（設備の改造等の作業）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問8・枝5",b:"パルプ液を入れたことのある槽の内部における作業については、酸素欠乏危険作業主任者技能講習を修了した者のうちから、酸素欠乏危険作業主任者を選任しなければならない。",a:false,e:"誤り：「酸素欠乏危険作業主任者技能講習を修了した者」⇒「酸素欠乏・硫化水素危険作業主任者技能講習を修了した者」。パルプ液を入れたことのある槽の内部における作業は、第2種酸素欠乏危険作業に該当するため、酸素欠乏・硫化水素危険作業主任者技能講習を修了した者のうちから酸素欠乏危険作業主任者を選任しなければならない。安衛令別表第63の3、酸欠則第11条第1項（作業主任者）。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問9・A",b:"特別管理物質を製造する屋内作業場について行った作業環境測定の記録又はその写し",a:false,e:"義務あり。特化則第53条（報告関係）1"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問9・B",b:"特別管理物質の製造プロセス等の運転条件及び製造量の記録又はその写し",a:false,e:"義務なし。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問9・C",b:"特別管理物質を製造する作業場において、労働者が常時従事した作業の概要及び当該作業に従事した期間等の記録又はその写し",a:false,e:"義務あり。特化則第53条（報告関係）2"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問9・D",b:"特別管理物質を製造する作業場所に設けられた局所排気装置の定期自主検査の記録又はその写し",a:false,e:"義務なし。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問9・E",b:"特別管理物質を製造する業務に常時従事する労働者に対し行った特定化学物質健康診断の結果に基づく特定化学物質健康診断個人票又はその写し",a:true,e:"義務あり。特化則第53条（報告関係）3 従って、AとCとEが正しいものの組み合わせとなる。"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問10・A",b:"病原体によって汚染された物を取り扱う業務",a:false,e:"A 該当しない。 B 該当しない。 C 該当する：労基則第18条（労働時間延長の制限業務）第1項2 D 該当する：労基則第18条（労働時間延長の制限業務）第1項7 従って、CとDが正しいものの組み合わ"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問10・B",b:"鋼材やくず鉄を入れてある船倉の内部における業務",a:false,e:"A 該当しない。 B 該当しない。 C 該当する：労基則第18条（労働時間延長の制限業務）第1項2 D 該当する：労基則第18条（労働時間延長の制限業務）第1項7 従って、CとDが正しいものの組み合わ"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問10・C",b:"多量の低温物体を取り扱う業務",a:false,e:"A 該当しない。 B 該当しない。 C 該当する：労基則第18条（労働時間延長の制限業務）第1項2 D 該当する：労基則第18条（労働時間延長の制限業務）第1項7 従って、CとDが正しいものの組み合わ"},
{c:"関係法令（有害業務）",y:"R6-4",s:"問10・D",b:"重量物の取扱い等重激なる業務",a:false,e:"A 該当しない。 B 該当しない。 C 該当する：労基則第18条（労働時間延長の制限業務）第1項2 D 該当する：労基則第18条（労働時間延長の制限業務）第1項7 従って、CとDが正しいものの組み合わ"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問11・枝1",b:"有害業務への配置替えの際に行う特殊健康診断には、業務適性の判断と、その後の業務による影響を調べるための基礎資料を得るという目的がある。",a:true,e:"記述のとおり。配置替え時の特殊健康診断には、業務適性の判断とその後の業務による健康影響を調べるための基礎データを得るという目的がある。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問11・枝2",b:"特殊健康診断において適切な健診デザインを行うためには、作業内容と有害要因へのばく露状況を把握する必要がある。",a:true,e:"、"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問11・枝3",b:"情報機器作業に係る健康診断では、眼科学的検査などとともに、上肢及び下肢の運動機能の検査を行う。",a:false,e:"誤り：「上肢及び下肢」⇒「上肢」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問11・枝4",b:"マンガンを取り扱う業務に常時従事する労働者に対して行う特殊健康診断の項目として、握力の測定がある。",a:true,e:"記述のとおり。マンガンを取り扱う業務の特殊健康診断では、神経系への影響を調べるため握力の測定が項目に含まれている。特化則第39条。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問11・枝5",b:"有機溶剤は、生物学的半減期が短いので、有機溶剤等健康診断における尿中の代謝物の量の検査のための採尿の時刻は、厳重に管理する必要がある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問12・枝1",b:"管理濃度は、有害物質に関する作業環境の状態を単位作業場所の作業環境測定結果から評価するための指標として設定されたものである。",a:true,e:"記述のとおり。管理濃度は、作業環境測定結果を評価するための指標であり、個々の労働者のばく露限界を示すものではない。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問12・枝2",b:"A測定は、単位作業場所における有害物質の気中濃度の平均的な分布を知るために行う測定である。",a:true,e:"（1）～（4）正しい（5）誤り：「管理濃度」⇒「管理濃度の1.5倍」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問12・枝3",b:"B測定は、単位作業場所中の有害物質の発散源に近接する場所で作業が行われる場合において、空気中の有害物質の最高濃度を知るために行う測定である。",a:true,e:"（1）～（4）正しい（5）誤り：「管理濃度」⇒「管理濃度の1.5倍」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問12・枝4",b:"A測定の第二評価値が管理濃度を超えている単位作業場所の管理区分は、B測定の結果に関係なく第三管理区分になる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問12・枝5",b:"B測定の測定値が管理濃度を超えている単位作業場所の管理区分は、A測定の結果に関係なく第三管理区分になる。",a:false,e:"誤り：「管理濃度」⇒「管理濃度の1.5倍」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問13・枝1",b:"シアン化水素による中毒では、細胞内での酸素利用の障害による呼吸困難、けいれんなどがみられる。",a:true,e:"記述のとおり。シアン化水素は細胞内のチトクロム酸化酵素を阻害し、細胞内での酸素利用を障害する。これにより呼吸困難やけいれんなどが生じる。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問13・枝2",b:"硫化水素による中毒では、意識消失、呼吸麻痺などがみられる。",a:true,e:"（1）～（4）正しい（5）誤り：「末梢神経障害」⇒「慢性気管支炎、歯牙酸蝕症、胃腸障害」"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問13・枝3",b:"弗化水素による慢性中毒では、骨の硬化、斑状歯などがみられる。",a:true,e:"（1）～（4）正しい（5）誤り：「末梢神経障害」⇒「慢性気管支炎、歯牙酸蝕症、胃腸障害」"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問13・枝4",b:"二酸化硫黄による慢性中毒では、慢性気管支炎、歯牙酸蝕症などがみられる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問13・枝5",b:"二酸化窒素による中毒では、末梢神経障害などがみられる。",a:false,e:"誤り：「末梢神経障害」⇒「慢性気管支炎、歯牙酸蝕症、胃腸障害」"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問14・枝1",b:"電離放射線の被ばくによる生体への影響には、身体的影響と遺伝的影響がある。",a:true,e:"記述のとおり。電離放射線の生体影響には、被ばくした本人に現れる身体的影響と、子孫に現れる遺伝的影響がある。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問14・枝2",b:"造血器、消化管粘膜など細胞分裂の頻度の高い細胞が多い組織・臓器は、一般に、電離放射線の影響を受けやすい。",a:true,e:"（1）～（4）正しい（5）誤り：「症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問14・枝3",b:"電離放射線に被ばく後、30日以内に現れる造血器障害は、急性障害に分類される。",a:true,e:"（1）～（4）正しい（5）誤り：「症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問14・枝4",b:"電離放射線の被ばくによる身体的影響のうち、白内障は晩発障害に分類される。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問14・枝5",b:"電離放射線の被ばくによる発がんと遺伝的影響は、確率的影響に分類され、症状の程度は線量に依存する。",a:false,e:"誤り：「症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問15・枝1",b:"有機溶剤の多くは、揮発性が高く、その蒸気は空気より軽い。",a:false,e:"誤り：「軽い」⇒「重い」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問15・枝2",b:"有機溶剤は、脂溶性が低いため、脂肪の多い脳などには入りにくい。",a:false,e:"誤り：「脂溶性が低いため、脂肪の多い脳などには入りにくい」⇒「脂溶性があり、脂肪の多い脳などには入りやすい」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問15・枝3",b:"メタノールによる障害として顕著なものには、網膜の微細動脈瘤を伴う脳血管障害がある。",a:false,e:"誤り：メタノールの健康障害は、視神経障害である。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問15・枝4",b:"二硫化炭素は、動脈硬化を進行させたり、精神障害を生じさせることがある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問15・枝5",b:"N,N-ジメチルホルムアミドによる障害として顕著なものには、視力低下を伴う視神経障害がある。",a:false,e:"誤り：N,N-ジメチルホルムアミドの健康障害は、頭痛、めまい、肝機能障害等である。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問16・枝1",b:"アセトン・・・・・・・・・・・ガス",a:false,e:"誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問16・枝2",b:"塩素・・・・・・・・・・・・・ガス",a:true,e:"記述のとおり。塩素は常温で黄緑色の刺激臭のあるガスであり、気道粘膜を強く刺激する。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問16・枝3",b:"テトラクロロエチレン・・・・・蒸気",a:true,e:"（2）～（5）正しい（1）誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問16・枝4",b:"ナフタレン・・・・・・・・・・蒸気",a:true,e:"（2）～（5）正しい（1）誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問16・枝5",b:"フェノール・・・・・・・・・・蒸気",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問17・枝1",b:"塩化ビニル・・・・・・・・・・・・・・・肝血管肉腫",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問17・枝2",b:"ベンジジン・・・・・・・・・・・・・・・皮膚がん",a:false,e:"誤り：ベンジジン・・・・・・・・・・・・膀胱がん。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問17・枝3",b:"ビス（クロロメチル）エーテル・・・・・・膀胱がん",a:false,e:"誤り：ビス（クロロメチル）エーテル・・・肺がん。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問17・枝4",b:"クロム酸・・・・・・・・・・・・・・・・大腸がん",a:false,e:"誤り：クロム酸・・・・・・・・・・・・・肺がん、上気道がん。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問17・枝5",b:"石綿・・・・・・・・・・・・・・・・・・胃がん",a:false,e:"誤り：石綿・・・・・・・・・・・・・・・肺がん、胸膜中皮腫。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問18・枝1",b:"リスクアセスメントの基本的手順のうち最初に実施するのは、労働者の就業に係る化学物質等による危険性又は有害性を特定することである。",a:true,e:"、"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問18・枝2",b:"ハザードは、労働災害発生の可能性と負傷又は疾病の重大性(重篤度)の組合せであると定義される。",a:false,e:"誤り：選択肢の内容はリスク。ハザードは、労働者の就業に係る危険性又は有害性をいう。建設物、設備、原材料、ガス、蒸気、粉じん等により、作業行動その他業務に起因する。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問18・枝3",b:"化学物質等による疾病のリスク低減措置の検討では、化学物質等の有害性に応じた有効な保護具の使用よりも作業手順の改善、立入禁止等の管理的対策を優先する。",a:true,e:"記述のとおり。リスク低減措置の優先順位は、1.危険有害性の除去・代替、2.工学的対策、3.管理的対策、4.保護具の使用の順である。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問18・枝4",b:"化学物質等による疾病のリスク低減措置の検討では、法令に定められた事項を除けば、危険性又は有害性のより低い物質への代替等を最優先する。",a:true,e:"（1）、（3）～（5）正しい（2）誤り：選択肢の内容はリスク。ハザードは、労働者の就業に係る危険性又は有害性をいう。建設物、設備、原材料、ガス、蒸気、粉じん等により、作業行動その他業務に起因する。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問18・枝5",b:"化学物質等による疾病のリスク低減措置の検討に当たっては、より優先順位の高い措置を実施することにした場合であって、当該措置により十分にリスクが低減される場合には、当該措置よりも優先順位の低い措置の検討は必要ない。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問19・枝1",b:"キャノピ型フードは、発生源からの熱による上昇気流を利用して捕捉するもので、レシーバ式フードに分類される。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問19・枝2",b:"スロット型フードは、作業面を除き周りが覆われているもので、囲い式フードに分類される。",a:false,e:"誤り：スロット型フードは外付け式フードに分類される。作業面を除き周りが覆われているのは、囲い式のドラフトチェンバ型・建築ブース型である。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問19・枝3",b:"囲い式フードの排気効果を型別に比較すると、ドラフトチェンバ型は、カバー型より排気効果が大きい。",a:false,e:"誤り：「排気効果が大きい」⇒「排気効果が小さい」。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問19・枝4",b:"ダクトの形状には円形、角形などがあり、その断面積を大きくするほど、ダクトの圧力損失が増大する。",a:false,e:"誤り：ダクトの断面積を大きくするほど、ダクトの圧力損失は減少するが、管内風速（搬送速度）は遅くなる。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問19・枝5",b:"空気清浄装置を付設する局所排気装置を設置する場合、排風機は、一般に、フードに接続した吸引ダクトと空気清浄装置の間に設ける。",a:false,e:"誤り：吸引ダクト⇒空気清浄装置⇒排風機（ファン）⇒排気ダクトの順に設置する。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問20・枝1",b:"隔離式防毒マスクは、直結式防毒マスクよりも有害ガスの濃度が高い大気中で使用することができる。",a:true,e:"記述のとおり。隔離式防毒マスクは吸収缶が隔離されており、直結式よりも高濃度の有害ガス環境下で使用できる。"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問20・枝2",b:"ガス又は蒸気状の有害物質が粉じんと混在している作業環境中で防毒マスクを使用するときは、防じん機能を有する防毒マスクを選択する。",a:true,e:"（1）～（3）、（5）正しい（4）誤り：「使用できない」⇒「使用できる」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問20・枝3",b:"防毒マスクの吸収缶の色は、アンモニア用は緑色で、有機ガス用は黒色である。",a:true,e:"、"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問20・枝4",b:"使い捨て式防じんマスクは、粒径1µm程度のヒュームには使用できない。",a:false,e:"誤り：「使用できない」⇒「使用できる」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R6-4",s:"問20・枝5",b:"防じんマスクは、面体と顔面との間にタオルなどを挟んで着用してはならない。",a:true,e:"正しい"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問21・枝1",b:"常時40人の労働者を使用する飲食店の事業場において、衛生管理者は選任していないが、衛生推進者を1人選任している。",a:false,e:"正しい：安衛則第12条の2（安全衛生推進者等）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問21・枝2",b:"常時100人の労働者を使用する水道業の事業場において、第二種衛生管理者免許を有する者のうちから、衛生管理者を1人選任している。",a:true,e:"誤り：「第二種衛生管理者免許」⇒「第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は医師、歯科医師、労働衛生コンサルタント等」。安衛則第7条（衛生管理者の選任）第1項3"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問21・枝3",b:"常時200人の労働者を使用する不動産業の事業場において、第一種衛生管理者免許を有する者のうちから、衛生管理者を1人選任している。",a:false,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問21・枝4",b:"常時200人の労働者を使用する旅館業の事業場において、第二種衛生管理者免許を有する者のうちから衛生管理者を1人選任している。",a:false,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問21・枝5",b:"常時600人の労働者を使用する各種商品小売業の事業場において、3人の衛生管理者のうち 2人を事業場に専属で第一種衛生管理者免許を有する者のうちから選任し、他の1人を事業場に専属でない労働衛生コンサルタントから選任している。",a:false,e:"正しい：安衛則第7条（衛生管理者の選任）第1項234。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問22・枝1",b:"通信業",a:false,e:"該当しない：通信業は、総括安全衛生管理者の選任が義務付けられている業種のうち、常時300人以上の労働者を使用する業種に該当しない。安衛令第2条。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問22・枝2",b:"各種商品小売業",a:false,e:"（1）～（4）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項2 （5）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問22・枝3",b:"旅館業",a:false,e:"（1）～（4）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項2 （5）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問22・枝4",b:"ゴルフ場業",a:false,e:"義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項2"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問22・枝5",b:"警備業",a:true,e:"義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問23・枝1",b:"化学物質等による危険性又は有害性等の調査及びその結果に基づき講ずる措置に関すること。",a:true,e:"定められている：安衛法第10条第1項1。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問23・枝2",b:"健康診断の実施その他健康の保持増進のための措置に関すること。",a:true,e:"定められている：安衛法第10条第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問23・枝3",b:"労働者の衛生のための教育の実施に関すること。",a:true,e:"定められている：安衛法第10条第1項2。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問23・枝4",b:"労働者の健康を確保するため必要があると認めるとき、事業者に対し、労働者の健康管理等について必要な勧告をすること。",a:false,e:"定められていない：設問の内容は、産業医に定められている。安衛法第13条（産業医等）第5項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問23・枝5",b:"少なくとも毎週1回作業場等を巡視し、衛生状態に有害のおそれがあるときは、直ちに、労働者の健康障害を防止するため必要な措置を講じること。",a:true,e:"定められている：安衛則第11条（衛生管理者の定期巡視及び権限の付与）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問24・枝1",b:"常時50人以上の労働者を使用する事業者は、1年以内ごとに1回、定期に、心理的な負担の程度を把握するための検査結果等報告書を所轄労働基準監督署長に提出しなければならない。",a:true,e:"正しい：安衛則第52条の21（検査及び面接指導結果の報告）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問24・枝2",b:"事業者は、面接指導の対象となる労働者の要件に該当する労働者から申出があったときは、申出の日から3か月以内に、面接指導を行わなければならない。",a:false,e:"誤り：該当する労働者から申し出があったときは、遅滞なく、面接指導を行わなければならない。安衛則第52条の16（面接指導の実施方法等）第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問24・枝3",b:"事業者は、面接指導を行った場合は、当該面接指導の結果を当該事業場の当該部署に所属する労働者の集団その他の一定規模の集団ごとに集計し、その結果について分析しなければならない。",a:false,e:"誤り：事業者ではなく、検査を行った医師等が分析する。安衛則第52条の14（検査結果の集団ごとの分析等）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問24・枝4",b:"面接指導の結果は、健康診断個人票に記載しなければならない。",a:false,e:"誤り：健康診断個人票に記入することとはされておらず、面接指導の結果の記録を作成しなけならない。安衛則第52条の18（面接指導結果の記録の作成）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問24・枝5",b:"面接指導を行う医師として事業者が指名できる医師は、法定の研修を修了した医師に限られる。",a:false,e:"誤り：医師の指名要件はない。安衛則第52条の10（検査の実施者等）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問25・枝1",b:"安全衛生に関する方針の表明に関すること。",a:false,e:"定められていない：総括安全衛生管理者が統括管理する業務。安衛則第3条の2第1項1。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問25・枝2",b:"作業の管理に関すること。",a:true,e:"定められている：5"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問25・枝3",b:"健康診断の実施に関すること。",a:true,e:"定められている：1"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問25・枝4",b:"衛生教育に関すること。",a:true,e:"定められている：8"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問25・枝5",b:"労働者の健康障害の原因の調査及び再発防止のための措置に関すること。",a:true,e:"定められている：9"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問26・枝1",b:"労働衛生コンサルタントは、他人の求めに応じ報酬を得て、労働者の衛生の水準の向上を図るため、事業場の衛生についての診断及びこれに基づく指導を行うことを業とする。",a:true,e:"正しい：安衛法第81条（業務）"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問26・枝2",b:"労働衛生コンサルタント試験には、保健衛生及び労働衛生工学の2つの区分がある。",a:true,e:"正しい：コンサル則第10条（試験の区分）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問26・枝3",b:"労働衛生コンサルタント試験に合格した者は、厚生労働大臣の指定する指定登録機関に備える労働衛生コンサルタント名簿に、氏名、生年月日等所定の事項の登録を受けることにより、労働衛生コンサルタントとなることができる。",a:true,e:"正しい：安衛法第84条（登録）"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問26・枝4",b:"労働衛生コンサルタントが、その業務に関して知り得た秘密を漏らし、又は盗用したときは、その登録を取り消されることがある。",a:true,e:"正しい：安衛法第85条（登録の取消し）、安衛法第86条（義務）"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問26・枝5",b:"労働衛生コンサルタントは、法定の研修を修了することにより、ストレスチェックの実施者となることができる。",a:false,e:"誤り：ストレスチェックの実施者は、医師、保健師と、法廷の研修を修了した歯科医師、看護師、精神保健福祉士又は公認心理士。安衛則第52条の10（検査の実施者等）。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問27・枝1",b:"既往歴及び業務歴の調査",a:false,e:"該当しない"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問27・枝2",b:"心電図検査",a:true,e:"記述のとおり。心電図検査は、定期健康診断において医師が必要でないと認めるときに省略できる項目である。安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問27・枝3",b:"肝機能検査",a:true,e:"該当する：肝機能検査は、定期健康診断において医師が必要でないと認めるときに省略できる項目である。安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問27・枝4",b:"血中脂質検査",a:true,e:"該当する：血中脂質検査は、定期健康診断において医師が必要でないと認めるときに省略できる項目である。安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問27・枝5",b:"貧血検査",a:true,e:"該当する：安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問28・枝1",b:"1,000 0.3",a:false,e:"※ 事務所則第5条（空気調査設備等による調整）第1項2、第2項。「1 空気調和設備又は機械換気設備を設けている場合は、室に供給される空気が、1気圧、温度 25℃ とした場合の当該空気中に占める二酸化炭素の含有率が100万分の[A：1,000]以下となるように、当該設備を調整しなければならない。 "},

{c:"関係法令（有害業務以外）",y:"R6-4",s:"問28・枝4",b:"2,000 0.5",a:false,e:"※ 事務所則第5条（空気調査設備等による調整）第1項2、第2項。「1 空気調和設備又は機械換気設備を設けている場合は、室に供給される空気が、1気圧、温度 25℃ とした場合の当該空気中に占める二酸化炭素の含有率が100万分の[A：1,000]以下となるように、当該設備を調整しなければならない。 "},

{c:"関係法令（有害業務以外）",y:"R6-4",s:"問29・枝1",b:"1日8時間を超えて労働させることができるのは、時間外労働の協定を締結し、これを所轄労働基準監督署長に届け出た場合に限られている。",a:false,e:"誤り：時間外の労使協定を締結しなくとも、災害時等で臨時の必要がある場合において使用者は行政官庁の許可を受けて、その必要の限度において労働時間を延長し、または休日に労度させることができる。労基法第33条（災害時による臨時の必要がある場合の時間外労働等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問29・枝2",b:"労働時間に関する規定の適用については、事業場を異にする場合は労働時間を通算しない。",a:false,e:"誤り：事業場を異にする場合においても、労働時間に関する規程の適用については通算する。労基法第38条（時間計算）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問29・枝3",b:"労働時間が8時間を超える場合においては、少なくとも45分の休憩時間を労働時間の途中に与えなければならない。",a:false,e:"誤り：所定労働時間と延長した労働時間が8時間以内であれば、45分の休憩時間を与えればよいが、8時間を超えた場合には、少なくとも1時間の休憩時間を労働時間の途中に与えなければならない。労基法第34条（休憩）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問29・枝4",b:"機密の事務を取り扱う労働者については、所轄労働基準監督署長の許可を受けなくても労働時間に関する規定は適用されない。",a:true,e:"正しい：労基法第41条（労働時間等に関する規定の適用除外）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-4",s:"問29・枝5",b:"フレックスタイム制の清算期間は、6か月以内の期間に限られる。",a:false,e:"誤り：「6か月以内」⇒「3か月以内」。労基法第32条の3（フレックスタイム制）第1項2。"},

{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問31・枝2",b:"Q ＝｛ D /（A － C）｝× 100",a:true,e:"適切：濃度を表す単位が「%」であるため、最後に「×100」とすること。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問31・枝3",b:"Q ＝｛ D /（B － A）｝× 100",a:false,e:"誤り：必要換気量Qの計算式として正しくないものである。正しい計算式はQ = M /（B - A）× 100ではなく、室内CO2基準濃度と外気CO2濃度の差を用いる。"},

{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問32・枝1",b:"温度感覚を左右する環境要素は、気温、湿度、気流及びふく射(放射)熱である。",a:true,e:"記述のとおり。温度感覚は気温、湿度、気流及びふく射（放射）熱の4要素によって左右される。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問32・枝2",b:"実効温度は、人の温熱感に基礎を置いた指標で、気温、湿度及び気流の総合効果を温度目盛りで表したものである。",a:true,e:"（1）～（4）正しい（5）誤り：「基準値未満である」⇒「基準値を超える」。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問32・枝3",b:"相対湿度は、空気中の水蒸気量と、その温度における飽和水蒸気量との比を百分率で示したものである。",a:true,e:"（1）～（4）正しい（5）誤り：「基準値未満である」⇒「基準値を超える」。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問32・枝4",b:"WBGTは、暑熱環境による熱ストレスの評価に用いられる指標で、日射がある場合は、自然湿球温度、黒球温度及び気温（乾球温度）の測定値から算出される。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問32・枝5",b:"算出したWBGTの値が、作業内容に応じて設定されたWBGT基準値未満である場合には、熱中症が発生するリスクが高まる。",a:false,e:"誤り：「基準値未満である」⇒「基準値を超える」。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問33・枝1",b:"照度の単位はルクスで、1ルクスは光度1カンデラの光源から1m離れた所で、その光に直角な面が受ける明るさに相当する。",a:true,e:"記述のとおり。1ルクスは、1カンデラの光源から1m離れた位置で、光に直角な面が受ける照度と定義される。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問33・枝2",b:"前方から明かりをとるときは、まぶしさをなくすため、眼と光源を結ぶ線と視線が作る角度は、おおむね30°以上になるようにする。",a:true,e:"、"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問33・枝3",b:"全般照明と局部照明を併用する場合、全般照明による照度は、局部照明による照度の15分の1 以下になるようにしている。",a:false,e:"誤り：「15分の1以下」⇒「10分の1以上」。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問33・枝4",b:"室内の彩色で、目の高さ以下の壁や床には、まぶしさを防ぐため濁色を用いるようにする。",a:true,e:"記述のとおり。室内の彩色では、目の高さ以下の壁や床にはまぶしさを防ぐため濁色（彩度の低い色）を用いることが推奨される。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問33・枝5",b:"高齢者は、若年者に比較して、一般に、高い照度が必要であるが、水晶体の混濁により、まぶしさを感じやすくなっている場合もあるので、注意が必要である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問34・枝1",b:"「心の健康づくり計画」の策定に当たっては、衛生委員会又は安全衛生委員会において十分調査審議を行う。",a:false,e:"誤り：「心の健康づくり計画」の策定に当たっては衛生委員会等で調査審議を行うとされているが、本問の記述内容自体は正しいため、他の枝との比較で誤りとされる場合がある。出題文の文脈を確認すること。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問34・枝2",b:"「セルフケア」、「ラインによるケア」、「事業場内産業保健スタッフ等によるケア」及び「事業場外資源によるケア」の四つのケアを継続的かつ計画的に行う。",a:false,e:"（1）～（4）正しい（5）誤り：事業者は、自らがストレスチェック制度を含めたメンタルヘルスケアを積極的に推進することを表明するとともに、衛生委員会や安全衛生委員会において、十分調査審議を行う。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問34・枝3",b:"メンタルヘルスケアを推進するに当たって、労働者の個人情報を主治医等の医療職や家族から取得する際には、あらかじめこれらの情報を取得する目的を労働者に明らかにして承諾を得るとともに、これらの情報は労働者本人から提出を受けることが望ましい。",a:false,e:"（1）～（4）正しい（5）誤り：事業者は、自らがストレスチェック制度を含めたメンタルヘルスケアを積極的に推進することを表明するとともに、衛生委員会や安全衛生委員会において、十分調査審議を行う。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問34・枝4",b:"労働者の心の健康は、職場配置、人事異動、職場の組織等の要因によって影響を受ける可能性があるため、人事労務管理部門と連携するようにする。",a:false,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問34・枝5",b:"プライバシー保護の観点から、衛生委員会や安全衛生委員会において、ストレスチェック制度に関する調査審議とメンタルヘルスケアに関する調査審議を関連付けて行うことは避ける。",a:true,e:"誤り：事業者は、自らがストレスチェック制度を含めたメンタルヘルスケアを積極的に推進することを表明するとともに、衛生委員会や安全衛生委員会において、十分調査審議を行う。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問35・枝1",b:"筋力・・・・・・・・・・握力",a:true,e:"記述のとおり。筋力の測定には握力計を用いる。健康測定における運動機能検査の一項目である。"},

{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問37・枝1",b:"脳血管障害は、脳の血管の病変が原因で生じ、出血性病変、虚血性病変などに分類される。",a:true,e:"記述のとおり。脳血管障害は脳の血管病変により生じ、出血性病変（脳出血、くも膜下出血）と虚血性病変（脳梗塞）に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問37・枝2",b:"出血性の脳血管障害は、脳表面のくも膜下腔に出血するくも膜下出血、脳実質内に出血する脳出血などに分類される。",a:true,e:"、"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問37・枝3",b:"くも膜下出血は、通常、脳動脈瘤が破れて数日後に発症し、激しい頭痛を伴う。",a:false,e:"誤り：くも膜下出血は、脳動脈瘤破裂により、くも膜下腔に出血する病態で、急激に激しい痛みを伴う頭痛が特徴である。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問37・枝4",b:"虚血性心疾患は、心筋の一部分に可逆的な虚血が起こる狭心症と、不可逆的な心筋壊死が起こる心筋梗塞とに大別される。",a:true,e:"記述のとおり。虚血性心疾患は、可逆的な心筋虚血である狭心症と、不可逆的な心筋壊死を伴う心筋梗塞に大別される。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問37・枝5",b:"心筋梗塞では、突然激しい胸痛が起こり、「締め付けられるように痛い」、「胸が苦しい」などの症状が、1時間以上続くこともある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問38・枝1",b:"単純骨折とは、骨にひびが入った状態をいう。",a:false,e:"誤り：単純骨折とは、皮膚に損傷がなく、皮膚の下で骨が折れている状態をいう。骨にひびが入った状態は、単純骨折の不完全骨折に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問38・枝2",b:"複雑骨折とは、骨が多数の骨片に破砕された状態をいう。",a:false,e:"誤り：複雑骨折とは、開放骨折のことをいい、皮膚及び皮下組織が損傷し骨折した骨が外に出ている状態をいう。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問38・枝3",b:"不完全骨折では、骨折端どうしが擦れ合う軋轢音や変形などが認められる。",a:false,e:"誤り：「不完全骨折」⇒「完全骨折」。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問38・枝4",b:"脊髄損傷が疑われる場合は、動かさないことを原則とするが、やむを得ず搬送する場合は、負傷者に振動を与えないようにするため、柔らかいマットに乗せる。",a:false,e:"誤り：脊髄損傷が疑われる場合は、硬い板の上にのせて固定し、搬送する。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問38・枝5",b:"骨折に対する処置として、副子を手や足に当てるときは、骨折部分の上下の関節まで固定できる長さで、かつ、幅の広いものを用いる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問39・枝1",b:"食品に付着したウイルスが食品中で増殖し、ウイルスが産生した毒素により発症する。",a:false,e:"誤り：食品に付着したウイルスが人間の小腸で増殖することにより発症する。ウイルスが産生した毒素により発症するのは、毒素型の細菌による中毒である。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問39・枝2",b:"ウイルスの感染性は、長時間煮沸しても失われない。",a:false,e:"誤り：ノロウイルスの失活化には、長時間煮沸することは効果的である。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問39・枝3",b:"潜伏期間は、1～2日である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問39・枝4",b:"発生時期は、夏季が多い。",a:false,e:"誤り：発生時期は冬季が多い。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問39・枝5",b:"症状は、筋肉の麻痺などの神経症状が特徴である。",a:false,e:"誤り：症状は、吐気、嘔吐、下痢などの急性胃腸炎である。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問40・枝1",b:"BMIは肥満や低体重（痩せ）の判定に用いられる指数で、この数値が大きいほど肥満の傾向があり、小さいほど痩せの傾向がある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問40・枝2",b:"BMIを算出するには、腹囲の値が必要である。",a:false,e:"＆"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問40・枝3",b:"BMIを算出するには、体脂肪率の値が必要である。",a:false,e:"誤り：BMIを算出するには、身長と体重の値が必要である。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問40・枝4",b:"BMIは、内臓脂肪の重量と直線的な比例関係にある。",a:false,e:"誤り：腹囲は、内臓脂肪の面積と直線的な比例関係にある。"},
{c:"労働衛生（有害業務以外）",y:"R6-4",s:"問40・枝5",b:"BMIによる肥満度の判定基準には、男性の方が女性より大きな数値が用いられる。",a:false,e:"誤り：BMIによる肥満度の判定基準には、男性と女性で同じ数値が用いられる。【労働生理】"},
{c:"労働生理",y:"R6-4",s:"問41・枝1",b:"呼吸は、胸膜が運動することで胸腔内の圧力を変化させ、肺を受動的に伸縮させることにより行われる。",a:false,e:"誤り：呼吸運動は、横隔膜や肋間筋などの呼吸筋が協調運動することで胸腔内の圧力を変化させ、肺を受動的に伸縮させることにより行われる。"},
{c:"労働生理",y:"R6-4",s:"問41・枝2",b:"肺胞内の空気と肺胞を取り巻く毛細血管中の血液との間で行われるガス交換は、内呼吸である。",a:false,e:"誤り：「内呼吸」⇒「外呼吸」。内呼吸は、全身の組織細胞とそれを取り巻く毛細血管中の血液との間で行われる、酸素と二酸化炭素のガス交換をいう。"},
{c:"労働生理",y:"R6-4",s:"問41・枝3",b:"通常の呼吸の場合の呼気には、酸素が約16％、二酸化炭素が約4％含まれる。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問41・枝4",b:"チェーンストークス呼吸とは、肺機能の低下により呼吸数が増加した状態をいい、喫煙が原因となることが多い。",a:false,e:"誤り：チェーンストークス呼吸とは、心不全や脳卒中などが重症化し、脳への酸素の供給が不十分なときに見られる状態である。"},
{c:"労働生理",y:"R6-4",s:"問41・枝5",b:"身体活動時には、血液中の窒素分圧の上昇により呼吸中枢が刺激され、1回換気量及び呼吸数が増加する。",a:false,e:"誤り：「窒素分圧」⇒「二酸化炭素分圧」。身体活動時には、血液中の二酸化炭素分圧の上昇により呼吸中枢が刺激され、1回換気量及び呼吸数が増加する。"},
{c:"労働生理",y:"R6-4",s:"問42・枝1",b:"神経細胞の細胞体が集合しているところを、中枢神経系では神経節といい、末梢神経系では神経核という。",a:false,e:"誤り ：「神経節」と「神経核」の説明が逆。神経細胞の細胞体が集合しているところを、中枢神経系では「神経核」といい、末梢神経系で「神経節」はという。「神経核」は、中枢神経系である脳や脊髄の中にある神経細胞体が塊状に集まっている場所で灰白質の一つである。「神経節」は末梢神経の途中で、神経細胞と神経線維とが集まってこぶ状に太くなった部分である。"},
{c:"労働生理",y:"R6-4",s:"問42・枝2",b:"大脳の外側の皮質は、神経細胞の細胞体が集合した灰白質で、感覚、運動、思考などの作用を支配する中枢として機能する。",a:true,e:"記述のとおり。大脳皮質は灰白質からなり、神経細胞の細胞体が集合している。感覚、運動、思考、記憶などの高次機能の中枢である。"},
{c:"労働生理",y:"R6-4",s:"問42・枝3",b:"副交感神経系は、身体の機能を回復に向けて働く神経系で、休息や睡眠状態で活動が高まり、心拍数を減少し、消化管の運動を亢進する。",a:true,e:"（1）誤り ：「神経節」と「神経核」の説明が逆。神経細胞の細胞体が集合しているところを、中枢神経系では「神経核」といい、末梢神経系で「神経節」はという。「神経核」は、中枢神経系である脳や脊髄の中にある神経細胞体が塊状に集まっている場所で灰白質の一つである。「神経節」は末梢神経の途中で、神経細"},
{c:"労働生理",y:"R6-4",s:"問42・枝4",b:"自律神経系は、交感神経系と副交感神経系とに分類され、各種臓器に対して両方の神経が支配している。",a:true,e:"（1）誤り ：「神経節」と「神経核」の説明が逆。神経細胞の細胞体が集合しているところを、中枢神経系では「神経核」といい、末梢神経系で「神経節」はという。「神経核」は、中枢神経系である脳や脊髄の中にある神経細胞体が塊状に集まっている場所で灰白質の一つである。「神経節」は末梢神経の途中で、神経細"},
{c:"労働生理",y:"R6-4",s:"問42・枝5",b:"体性神経には感覚器官からの情報を中枢に伝える感覚神経と、中枢からの命令を運動器官に伝える運動神経がある。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問43・枝1",b:"心臓は、自律神経の中枢で発生した刺激が刺激伝導系を介して心筋に伝わることにより、規則正しく収縮と拡張を繰り返す。",a:false,e:"誤り：心臓は、右心房にある洞結節（同房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく収縮と拡張を繰り返す。"},
{c:"労働生理",y:"R6-4",s:"問43・枝2",b:"肺循環により左心房に戻ってきた血液は、左心室を経て大動脈に入る。",a:true,e:"記述のとおり。肺循環で酸素を取り込んだ血液は左心房→左心室→大動脈の順に流れ、全身に送り出される。"},
{c:"労働生理",y:"R6-4",s:"問43・枝3",b:"大動脈を流れる血液は動脈血であるが、肺動脈を流れる血液は静脈血である。",a:true,e:"（1）誤り：心臓は、右心房にある洞結節（同房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく収縮と拡張を繰り返す。（2）～（5）正しい"},
{c:"労働生理",y:"R6-4",s:"問43・枝4",b:"心臓の拍動による動脈圧の変動を末梢の動脈で触知したものを脈拍といい、一般に、手首の橈骨動脈で触知する。",a:true,e:"（1）誤り：心臓は、右心房にある洞結節（同房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく収縮と拡張を繰り返す。（2）～（5）正しい"},
{c:"労働生理",y:"R6-4",s:"問43・枝5",b:"動脈硬化とは、コレステロールの蓄積などにより、動脈壁が肥厚・硬化して弾力性を失った状態であり、進行すると血管の狭窄や閉塞を招き、臓器への酸素や栄養分の供給が妨げられる。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問44・枝1",b:"脂肪は、膵臓から分泌される消化酵素である膵アミラーゼにより脂肪酸とグリセリンに分解される。",a:false,e:"誤り：「膵アミラーゼ」⇒「膵リパーゼ」。脂肪は、膵臓から分泌される消化酵素である膵リパーゼにより脂肪酸とグリセリン（モノグリセリン）に分解される。"},
{c:"労働生理",y:"R6-4",s:"問44・枝2",b:"胆汁は、アルカリ性で、消化酵素は含まないが、食物中の脂肪を乳化させ、脂肪分解の働きを助ける。",a:true,e:"記述のとおり。胆汁は肝臓で生成されるアルカリ性の液体で、消化酵素は含まないが、脂肪を乳化して消化・吸収を助ける。"},
{c:"労働生理",y:"R6-4",s:"問44・枝3",b:"肝臓は、過剰な蛋白質及び糖質を中性脂肪に変換する。",a:true,e:"（2）～（5）正しい（1）誤り：「膵アミラーゼ」⇒「膵リパーゼ」。脂肪は、膵臓から分泌される消化酵素である膵リパーゼにより脂肪酸とグリセリン（モノグリセリン）に分解される。"},
{c:"労働生理",y:"R6-4",s:"問44・枝4",b:"コレステロールやリン脂質は、神経組織の構成成分となる。",a:true,e:"（2）～（5）正しい（1）誤り：「膵アミラーゼ」⇒「膵リパーゼ」。脂肪は、膵臓から分泌される消化酵素である膵リパーゼにより脂肪酸とグリセリン（モノグリセリン）に分解される。"},
{c:"労働生理",y:"R6-4",s:"問44・枝5",b:"脂質は、糖質や蛋白質に比べて多くのATPを産生するエネルギー源となるが、摂取量が多すぎると肥満の原因となる。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問45・A",b:"腎臓の皮質にある腎小体では、糸球体から血液中の糖以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。",a:false,e:"B、C 正しい A 誤り：「糖」⇒「蛋白質」。腎臓の皮質にある腎小体では、糸球体から血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。糖はボウマン嚢に濾し出され、尿細管で再吸"},
{c:"労働生理",y:"R6-4",s:"問45・B",b:"腎臓の尿細管では、原尿に含まれる大部分の水分及び身体に必要な成分が血液中に再吸収され、残りが尿として生成される。",a:false,e:"B、C 正しい A 誤り：「糖」⇒「蛋白質」。腎臓の皮質にある腎小体では、糸球体から血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。糖はボウマン嚢に濾し出され、尿細管で再吸"},
{c:"労働生理",y:"R6-4",s:"問45・C",b:"尿は淡黄色の液体で、固有の臭気を有し、通常、弱酸性である。",a:false,e:"B、C 正しい A 誤り：「糖」⇒「蛋白質」。腎臓の皮質にある腎小体では、糸球体から血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。糖はボウマン嚢に濾し出され、尿細管で再吸"},
{c:"労働生理",y:"R6-4",s:"問45・D",b:"尿酸は、体内のプリン体と呼ばれる物質の代謝物で、健康診断において尿中の尿酸の量の検査が広く行われている。",a:false,e:"B、C 正しい A 誤り：「糖」⇒「蛋白質」。腎臓の皮質にある腎小体では、糸球体から血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。糖はボウマン嚢に濾し出され、尿細管で再吸"},
{c:"労働生理",y:"R6-4",s:"問46・枝1",b:"眼軸が短過ぎるために、平行光線が網膜の後方で像を結ぶものを遠視という。",a:true,e:"記述のとおり。遠視は眼軸が短過ぎるために、平行光線が網膜の後方で像を結ぶ屈折異常である。"},
{c:"労働生理",y:"R6-4",s:"問46・枝2",b:"嗅覚と味覚は化学感覚ともいわれ、物質の化学的性質を認知する感覚である。",a:true,e:"（1）～（4）：正しい（5）誤り：「中耳」⇒「内耳」。"},
{c:"労働生理",y:"R6-4",s:"問46・枝3",b:"温度感覚は、皮膚のほか口腔などの粘膜にも存在し、一般に冷覚の方が温覚よりも鋭敏である。",a:true,e:"（1）～（4）：正しい（5）誤り：「中耳」⇒「内耳」。"},
{c:"労働生理",y:"R6-4",s:"問46・枝4",b:"深部感覚は、筋肉や腱にある受容器から得られる身体各部の位置、運動などを認識する感覚である。",a:true,e:"：正しい"},
{c:"労働生理",y:"R6-4",s:"問46・枝5",b:"平衡感覚に関係する器官である前庭及び半規管は、中耳にあって、体の傾きや回転の方向を知覚する。",a:false,e:"誤り：「中耳」⇒「内耳」。"},
{c:"労働生理",y:"R6-4",s:"問47・枝1",b:"アルドステロン副腎髄質血糖量の増加",a:false,e:"誤り：「血糖量の増加」⇒「体液中の塩類バランスの調節」。アルドステロンは副腎皮質から分泌されるホルモンで、水分や塩分の調整を行う働きがある。"},
{c:"労働生理",y:"R6-4",s:"問47・枝2",b:"インスリン膵臓血糖量の減少",a:true,e:"記述のとおり。インスリンは膵臓のランゲルハンス島β細胞から分泌され、血糖値を低下させるホルモンである。"},
{c:"労働生理",y:"R6-4",s:"問47・枝3",b:"パラソルモン副甲状腺血中のカルシウム量の調節",a:true,e:"（2）～（5）正しい（1）誤り：「血糖量の増加」⇒「体液中の塩類バランスの調節」。アルドステロンは副腎皮質から分泌されるホルモンで、水分や塩分の調整を行う働きがある。"},
{c:"労働生理",y:"R6-4",s:"問47・枝4",b:"プロラクチン下垂体黄体形成の促進",a:true,e:"（2）～（5）正しい（1）誤り：「血糖量の増加」⇒「体液中の塩類バランスの調節」。アルドステロンは副腎皮質から分泌されるホルモンで、水分や塩分の調整を行う働きがある。"},
{c:"労働生理",y:"R6-4",s:"問47・枝5",b:"副腎皮質刺激下垂体副腎皮質の活性化ホルモン",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問48・枝1",b:"抗原とは、免疫に関係する細胞によって異物として認識される物質のことである。",a:true,e:"記述のとおり。抗原とは、免疫担当細胞によって異物として認識される物質のことである。"},
{c:"労働生理",y:"R6-4",s:"問48・枝2",b:"抗原となる物質には、蛋白質、糖質などがある。",a:true,e:"（1）～（4）正しい（5）誤り：「Tリンパ球」と「Bリンパ球」の説明が逆。白血球のうち約 30％を占めるリンパ球には、Tリンパ球やBリンパ球などの種類があり、Bリンパ球は抗体を産生する。Tリンパ球のキラーT細胞は、抗体などを介さず免疫細胞そのものが異物となる細胞を認識して破壊する。リンパ球が"},
{c:"労働生理",y:"R6-4",s:"問48・枝3",b:"抗体とは、体内に入ってきた抗原に対して体液性免疫において作られる免疫グロブリンと呼ばれる蛋白質のことである。",a:true,e:"（1）～（4）正しい（5）誤り：「Tリンパ球」と「Bリンパ球」の説明が逆。白血球のうち約 30％を占めるリンパ球には、Tリンパ球やBリンパ球などの種類があり、Bリンパ球は抗体を産生する。Tリンパ球のキラーT細胞は、抗体などを介さず免疫細胞そのものが異物となる細胞を認識して破壊する。リンパ球が"},
{c:"労働生理",y:"R6-4",s:"問48・枝4",b:"好中球は白血球の一種であり、偽足を出してアメーバ様運動を行い、体内に侵入してきた細菌などを貪食する。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問48・枝5",b:"リンパ球には、血液中の抗体を作るTリンパ球と、細胞性免疫の作用を持つBリンパ球がある。",a:false,e:"誤り：「Tリンパ球」と「Bリンパ球」の説明が逆。白血球のうち約 30％を占めるリンパ球には、Tリンパ球やBリンパ球などの種類があり、Bリンパ球は抗体を産生する。Tリンパ球のキラーT細胞は、抗体などを介さず免疫細胞そのものが異物となる細胞を認識して破壊する。リンパ球が産生する抗体によって病原体を排除する免疫反応を「体液性免疫」という。また、リンパ球などが直接、病原体などの異物を排除する免疫反応を「細胞性免疫」という。"},
{c:"労働生理",y:"R6-4",s:"問49・枝1",b:"外部からの刺激であるストレッサーは、その形態や程度にかかわらず、自律神経系と内分泌系を介して、心身の活動を抑圧する。",a:false,e:"誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」"},
{c:"労働生理",y:"R6-4",s:"問49・枝2",b:"ストレスに伴う心身の反応には、ノルアドレナリン、アドレナリンなどのカテコールアミンや副腎皮質ホルモンが深く関与している。",a:true,e:"記述のとおり。ストレス反応では、カテコールアミン（ノルアドレナリン、アドレナリン）や副腎皮質ホルモンが深く関与している。"},
{c:"労働生理",y:"R6-4",s:"問49・枝3",b:"昇進、転勤、配置替えなどがストレスの原因となることがある。",a:true,e:"（2）～（5）正しい（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」"},
{c:"労働生理",y:"R6-4",s:"問49・枝4",b:"職場環境における騒音、気温、湿度、悪臭などがストレスの原因となることがある。",a:true,e:"（2）～（5）正しい（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」"},
{c:"労働生理",y:"R6-4",s:"問49・枝5",b:"ストレスにより、高血圧症、狭心症、十二指腸潰瘍などの疾患が生じることがある。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問50・枝1",b:"体温調節中枢は、間脳の視床下部にある。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-4",s:"問50・枝2",b:"体温調節のように、外部環境が変化しても身体内部の状態を一定に保つ生体の仕組みを同調性といい、筋肉と神経系により調整されている。",a:false,e:"誤り：「同調性」⇒「恒常性（ホメオスタシス）」。「筋肉と神経系」⇒「主に自律神経系と内分泌系」。"},
{c:"労働生理",y:"R6-4",s:"問50・枝3",b:"寒冷な環境においては、皮膚の血管が拡張して血流量を増し、皮膚温を上昇させる。",a:false,e:"誤り：寒冷な環境においては、皮膚の血管を収縮させて血流量を減らし、皮膚温を低下させて身体表面からの熱の放散を減らす。"},
{c:"労働生理",y:"R6-4",s:"問50・枝4",b:"計算上、体重70kgの人の体表面から10gの汗が蒸発すると、体温が約1℃下がる。",a:false,e:"誤り：「10g」⇒「100g」"},
{c:"労働生理",y:"R6-4",s:"問50・枝5",b:"不感蒸泄とは、水分が発汗により失われることをいう。",a:false,e:"誤り：身体は、発汗のない状態でも皮膚及び呼吸器から1日約 850gの水が蒸発しており、感覚的に意識していないことから、これをを「不感蒸泄」という。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問1・枝1",b:"選任している衛生管理者数が少ないことが違反である。",a:false,e:"誤り：「200人を超え500人以下」の事業場の規模に該当するため違反ではない。安衛則第7条（衛生管理者の選任）第1項4。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問1・枝2",b:"衛生管理者として選任している労働衛生コンサルタントがこの事業場に専属でないことが違反である。",a:false,e:"誤り：違反ではない。2人以上の衛生管理者を選任する場合で、当該衛生管理者の中に労働衛生コンサルタントがいるときは、当該者のうち1人については専属の者でなくともよい。安衛則第7条（衛生管理者の選任）第1項2。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問1・枝3",b:"衛生工学衛生管理者免許を受けた者のうちから選任した衛生管理者が1人もいないことが違反である。",a:false,e:"誤り：有害業務に常時30人以上が従事しているが、「常時500人を超える労働者を使用する事業場」に該当しないため違反ではない。安衛則第7条（衛生管理者の選任）第1項6。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問1・枝4",b:"専任の衛生管理者が1人もいないことが違反である。",a:false,e:"誤り：有害業務に常時30人以上が従事しているが、「常時500人を超える労働者を使用する事業場」に該当しないため違反ではない。安衛則第7条（衛生管理者の選任）第1項5ロ。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問1・枝5",b:"本問における衛生管理者の選任の状況については、違反はない。",a:true,e:"正しい。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問2・枝1",b:"ドライアイスを使用して冷蔵を行っている冷蔵庫の内部における作業",a:true,e:"義務付けられている：酸素欠乏危険作業主任者を選任する。安衛令別表第6（酸素欠乏危険場所）10"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問2・枝2",b:"屋内で粉状のアルミニウムを袋詰めする作業",a:false,e:"該当しない：屋内で粉状のアルミニウムを袋詰めする作業は、粉じん則の対象であるが、本問で問われている業務には該当しない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問2・枝3",b:"レーザー光線による金属加工の作業",a:false,e:"安衛令第6条（作業主任者を選任すべき作業）第1項。（1）義務付けられている：酸素欠乏危険作業主任者を選任する。安衛令別表第6（酸素欠乏危険場所）10 （2）～（5）義務付けられていない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問2・枝4",b:"試験研究業務として塩素を取り扱う作業",a:false,e:"安衛令第6条（作業主任者を選任すべき作業）第1項。（1）義務付けられている：酸素欠乏危険作業主任者を選任する。安衛令別表第6（酸素欠乏危険場所）10 （2）～（5）義務付けられていない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問2・枝5",b:"潜水器を用いボンベからの給気を受けて行う潜水作業",a:false,e:"義務付けられていない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問3・枝1",b:"石綿等を取り扱う屋内作業場については、6か月以内ごとに1回、定期に、空気中の石綿の濃度を測定するとともに、測定結果等を記録し、これを40年間保存しなければならない。",a:true,e:"正しい：石綿則第36条（石綿濃度の測定及びその記録）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問3・枝2",b:"石綿等の粉じんが発散する屋内作業場に設けられた局所排気装置については、原則として、 1年以内ごとに1回、定期に、自主検査を行うとともに、検査の結果等を記録し、これを3年間保存しなければならない。",a:true,e:"正しい：石綿則第22条（定期自主検査）、石綿則第23条（定期自主検査の記録）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問3・枝3",b:"石綿等の取扱いに伴い石綿の粉じんを発散する場所における業務に常時従事する労働者に対し、雇入れ又は当該業務への配置替えの際及びその後6か月以内ごとに1回、定期に、特別の項目について医師による健康診断を行い、その結果に基づき、石綿健康診断個人票を作成し、これを当該労働者が当該事業場において常時当該業務に従事しないこととなった日から40年間保存しなければならない。",a:true,e:"正しい：石綿則第40条（健康診断の実施）、石綿則第41条（健康診断の結果の記録）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問3・枝4",b:"石綿等の取扱いに伴い石綿の粉じんを発散する場所において、常時石綿等を取り扱う作業に従事する労働者については、1か月を超えない期間ごとに、作業の概要、従事した期間等を記録し、これを当該労働者が当該事業場において常時当該作業に従事しないこととなった日から 40年間保存するものとする。",a:true,e:"正しい：石綿則第35条（作業の記録）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問3・枝5",b:"石綿等を常時取り扱う作業場の床等については、水洗する等粉じんの飛散しない方法によって、毎週1回以上、掃除を行わなければならない。",a:false,e:"誤り：毎日1回以上、掃除を行わなければならない。石綿則第30条（掃除の実施）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問4・枝1",b:"放射線測定器",a:false,e:"該当しない：放射線測定器は該当しない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問4・枝2",b:"潜水器",a:true,e:"記述のとおり。潜水器は、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される機械等に該当する。安衛令第13条。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問4・枝3",b:"アンモニア用防毒マスク",a:true,e:"該当する：防毒マスクは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第29号。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問4・枝4",b:"ろ過材及び面体を有する防じんマスク",a:true,e:"該当する：防じんマスクは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第28号。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問4・枝5",b:"排気量40㎤以上の内燃機関を内蔵するチェーンソー",a:true,e:"該当する。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問5・枝1",b:"接着のためにする有機溶剤等の塗布の業務",a:true,e:"記述のとおり。接着のためにする有機溶剤等の塗布の業務は、有機溶剤業務に該当する。有機則第1条第1項第6号。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問5・枝2",b:"有機溶剤等が付着している物の乾燥の業務",a:true,e:"該当する：有機溶剤等が付着している物の乾燥の業務は、有機溶剤業務に該当する。有機則第1条第1項第6号。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問5・枝3",b:"有機溶剤含有物を用いて行う印刷の業務",a:true,e:"該当する：有機溶剤含有物を用いて行う印刷の業務は、有機溶剤業務に該当する。有機則第1条第1項第6号。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問5・枝4",b:"有機溶剤含有物を用いて行う文字の書込み又は描画の業務",a:true,e:"該当する。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問5・枝5",b:"有機溶剤含有物で塗装した建築物又は工作物の解体若しくは破砕の業務",a:false,e:"該当しない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問6・枝1",b:"エックス線作業主任者免許",a:true,e:"記述のとおり。エックス線作業主任者免許は、都道府県労働局長が与える免許である。安衛法第72条、安衛令第20条第7号。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問6・枝2",b:"ガンマ線透過写真撮影作業主任者免許",a:true,e:"安衛法第72条（免許）、安衛則第62条（免許を受けることができる者）別表第4、安衛法第14条（作業主任者）、安衛則第16条（作業主任者の選任）別表第1。（1）～（3）（5）定められている。（4）定められていない：特定化学物質作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問6・枝3",b:"高圧室内作業主任者免許",a:true,e:"安衛法第72条（免許）、安衛則第62条（免許を受けることができる者）別表第4、安衛法第14条（作業主任者）、安衛則第16条（作業主任者の選任）別表第1。（1）～（3）（5）定められている。（4）定められていない：特定化学物質作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問6・枝4",b:"特定化学物質作業主任者免許",a:false,e:"定められていない：特定化学物質作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明する文書であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問6・枝5",b:"潜水士免許",a:true,e:"定められている。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問7・枝1",b:"酸素欠乏とは、空気中の酸素の濃度が18%未満である状態をいう。",a:true,e:"正しい：酸欠則第2条（定義）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問7・枝2",b:"第二種酸素欠乏危険作業を行う作業場については、その日の作業を開始する前に、当該作業場における空気中の酸素及び硫化水素の濃度を測定しなければならない。",a:true,e:"正しい：酸欠則第3条（作業環境測定等）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問7・枝3",b:"酸素欠乏危険作業に労働者を従事させるときは、労働者を当該作業を行う場所に入場させ、及び退場させる時に、人員を点検しなければならない。",a:true,e:"正しい：酸欠則第8条（人員の点検）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問7・枝4",b:"汚水を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、硫化水素中毒の防止について必要な知識を有する者のうちから指揮者を選任し、作業を指揮させなければならない。",a:true,e:"正しい：酸欠則第25条の2（設備の改造等の作業）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問7・枝5",b:"パルプ液を入れたことのある槽の内部における作業については、酸素欠乏危険作業主任者技能講習を修了した者のうちから、酸素欠乏危険作業主任者を選任しなければならない。",a:false,e:"誤り：「酸素欠乏危険作業主任者技能講習を修了した者」⇒「酸素欠乏・硫化水素危険作業主任者技能講習を修了した者」。パルプ液を入れたことのある槽の内部における作業は、第2種酸素欠乏危険作業に該当するため、酸素欠乏・硫化水素危険作業主任者技能講習を修了した者のうちから酸素欠乏危険作業主任者を選任しなければならない。安衛令別表第63の3、酸欠則第11 条第1項（作業主任者）。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問8・枝1",b:"ジアニシジンを取り扱う業務に3か月以上従事した者",a:false,e:"該当しない：ジアニシジンを取り扱う業務に3か月以上従事した者は、特定化学物質の健康管理手帳の交付対象に該当しない。安衛法第67条、安衛令第23条。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問8・枝2",b:"ベータ－ナフチルアミンを取り扱う業務に3か月以上従事した者",a:false,e:"安衛法第67条（健康管理手帳）、安衛令第23条（健康管理手帳の交付）第1項（1）～（3）（5）交付対象となる。（4）交付対象とならない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問8・枝3",b:"ベンジジンを取り扱う業務に3か月以上従事した者",a:false,e:"安衛法第67条（健康管理手帳）、安衛令第23条（健康管理手帳の交付）第1項（1）～（3）（5）交付対象となる。（4）交付対象とならない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問8・枝4",b:"水銀を取り扱う業務に5年以上従事した者",a:true,e:"交付対象とならない。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問8・枝5",b:"粉じん作業に従事した者で、じん肺管理区分が管理二又は管理三のもの",a:false,e:"交付対象となる。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問9・枝1",b:"屋内の特定粉じん発生源については、発生源の区分に応じて、密閉する設備、局所排気装置、プッシュプル型換気装置若しくは湿潤な状態に保つための設備の設置又はこれらと同等以上の措置を講じなければならない。",a:true,e:"正しい：粉じん則第4条（特定粉じん発生源に係る措置）第1項。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問9・枝2",b:"特定粉じん発生源に係る局所排気装置に、法令に基づき設ける除じん装置は、粉じんの種類がヒュームである場合には、サイクロンによる除じん方式のものでなければならない。",a:false,e:"誤り：ヒュームは、ろ過除じん方式、電気除じん方式、これと同等以上の性能を有する除じん方式によらなければならない。粉じん則第13条（除じん）第1項、第8項。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問9・枝3",b:"特定粉じん作業以外の粉じん作業を行う屋内作業場については、全体換気装置による換気の実施又はこれと同等以上の措置を講じなければならない。",a:true,e:"正しい：粉じん則第5条（換気の実施等）第1項。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問9・枝4",b:"常時特定粉じん作業を行う屋内作業場については、6か月以内ごとに1回、定期に、空気中の粉じんの濃度の測定を行い、その測定結果等を記録して、これを7年間保存しなければならない。",a:true,e:"正しい：粉じん則第25条（作業環境測定を行うべき屋内作業場）、粉じん則第26条（粉じんの濃度の測定等）第1項、第8項。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問9・枝5",b:"土石、岩石又は鉱物に係る特定粉じん作業を常時行う屋内作業場について、法令に基づき空気中の粉じんの濃度の測定を行うときは、当該土石、岩石又は鉱物中の遊離けい酸の含有率が明らかな場合を除き、当該粉じん中の遊離けい酸の含有率を測定しなければならない。",a:true,e:"正しい：粉じん則第26条（粉じん濃度の測定等）第2項。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問10・枝1",b:"20 12 20",a:false,e:"誤り：本問の数値の組合せ（20、12、20）は、年少者の重量物取扱い制限の正しい数値に該当しない。年少則第7条を参照。"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問10・枝2",b:"20 12 25",a:false,e:"（1）～（3）（5）誤り。（4）正しい：労基法第64条の3（危険有害業務の就業制限）第3項、女性則（危険有害業務の就業制限の範囲等）第3条。【労働衛生（有害業務に係るもの）】"},
{c:"関係法令（有害業務）",y:"R6-10",s:"問10・枝3",b:"20 15 25",a:false,e:"（1）～（3）（5）誤り。（4）正しい：労基法第64条の3（危険有害業務の就業制限）第3項、女性則（危険有害業務の就業制限の範囲等）第3条。【労働衛生（有害業務に係るもの）】"},

{c:"労働衛生（有害業務）",y:"R6-10",s:"問12・枝1",b:"発生可能性及び重篤度を相対的に尺度化し、それらを縦軸と横軸として、あらかじめ発生可能性及び重篤度に応じてリスクが割り付けられた表を使用する方法",a:false,e:"誤り：本問の記述はリスクマトリクス法の説明であるが、本問で求められている方法とは異なる。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問12・枝2",b:"発生可能性及び重篤度を一定の尺度によりそれぞれ数値化し、それらを加算又は乗算等する方法",a:false,e:"（1）～（3）（5）適切である。（4）適切でない：「年間の取扱量及び作業時間」⇒「発生可能性及び重篤度」。選択肢は数値化法である。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問12・枝3",b:"発生可能性及び重篤度を段階的に分岐していく方法",a:false,e:"（1）～（3）（5）適切である。（4）適切でない：「年間の取扱量及び作業時間」⇒「発生可能性及び重篤度」。選択肢は数値化法である。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問12・枝4",b:"取り扱うリスクアセスメント対象物の年間の取扱量及び作業時間を一定の尺度によりそれぞれ数値化し、それらを加算又は乗算等する方法",a:true,e:"適切でない：「年間の取扱量及び作業時間」⇒「発生可能性及び重篤度」。選択肢は数値化法である。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問12・枝5",b:"リスクアセスメント対象物への労働者のばく露の程度及び当該物質による有害性の程度を相対的に尺度化し、それらを縦軸と横軸とし、あらかじめばく露の程度及び有害性の程度に応じてリスクが割り付けられた表を使用する方法",a:false,e:"適切である。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問13・枝1",b:"有機溶剤の多くは、揮発性が高く、その蒸気は空気より重い。",a:true,e:"記述のとおり。有機溶剤の多くは揮発性が高く、その蒸気の比重は空気より大きいため、低所に滞留しやすい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問13・枝2",b:"有機溶剤による障害のうち、皮膚や粘膜の症状には、皮膚の角化、結膜炎などがある。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：メタノールは、視神経障害を生じる。網膜微細動脈瘤を伴う脳血管障害は、二硫化炭素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問13・枝3",b:"低濃度の有機溶剤の繰り返しばく露では、頭痛、めまい、記憶力減退、不眠などの不定愁訴がみられる。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：メタノールは、視神経障害を生じる。網膜微細動脈瘤を伴う脳血管障害は、二硫化炭素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問13・枝4",b:"メタノールによる障害として顕著なものは、網膜微細動脈瘤を伴う脳血管障害である。",a:false,e:"誤り：メタノールは、視神経障害を生じる。網膜微細動脈瘤を伴う脳血管障害は、二硫化炭素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問13・枝5",b:"キシレンのばく露の生物学的モニタリングの指標としての尿中代謝物は、メチル馬尿酸である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問14・枝1",b:"一酸化炭素は、赤血球中のヘモグロビンと強く結合し、体内組織の酸素欠乏状態を起こす。",a:true,e:"記述のとおり。一酸化炭素はヘモグロビンとの親和性が酸素の約200～250倍と極めて強く、COHbを形成して酸素運搬を阻害する。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問14・枝2",b:"シアン化水素による中毒では、細胞内での酸素利用の障害による呼吸困難、けいれんなどがみられる。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：塩化ビニルによる低濃度の長期ばく露では、レイノー症状、指の骨の溶解、皮膚の硬化、肝障害がみられ、がんの一種である肝血管肉腫を生じる。慢性気管支炎、歯牙酸蝕症がみられるのは二酸化硫黄。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問14・枝3",b:"硫化水素による中毒では、意識消失、呼吸麻痺などがみられる。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：塩化ビニルによる低濃度の長期ばく露では、レイノー症状、指の骨の溶解、皮膚の硬化、肝障害がみられ、がんの一種である肝血管肉腫を生じる。慢性気管支炎、歯牙酸蝕症がみられるのは二酸化硫黄。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問14・枝4",b:"塩化ビニルによる慢性中毒では、慢性気管支炎、歯牙酸蝕症などがみられる。",a:false,e:"誤り：塩化ビニルによる低濃度の長期ばく露では、レイノー症状、指の骨の溶解、皮膚の硬化、肝障害がみられ、がんの一種である肝血管肉腫を生じる。慢性気管支炎、歯牙酸蝕症がみられるのは二酸化硫黄。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問14・枝5",b:"弗化水素による慢性中毒では、骨の硬化、斑状歯などがみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問15・枝1",b:"金属水銀中毒では、感情不安定、幻覚などの精神障害、手指の震えなどの症状がみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。指の骨の溶解、肝臓の血管肉腫がみられるのは塩化ビニル。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問15・枝2",b:"鉛中毒では、貧血、末梢神経障害、腹部の疝痛などの症状がみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。指の骨の溶解、肝臓の血管肉腫がみられるのは塩化ビニル。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問15・枝3",b:"クロム中毒では、指の骨の溶解、肝臓の血管肉腫などがみられる。",a:false,e:"誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。指の骨の溶解、肝臓の血管肉腫がみられるのは塩化ビニル。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問15・枝4",b:"カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：クロム中毒では、気道に吸入すると、咳などの上気道の刺激症状、鼻中隔穿孔、肺がん、上気道がんを生じる。指の骨の溶解、肝臓の血管肉腫がみられるのは塩化ビニル。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問15・枝5",b:"砒素中毒では、角化症、黒皮症などの皮膚障害、鼻中隔穿孔などの症状がみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問16・枝1",b:"電離放射線の被ばくによる生体への影響には、身体的影響と遺伝的影響がある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「確定的影響」⇒「確率的影響」、「しきい値があり、しきい値を超えると発生率及び症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問16・枝2",b:"電離放射線の被ばくによる身体的影響のうち、白内障は晩発障害に分類される。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「確定的影響」⇒「確率的影響」、「しきい値があり、しきい値を超えると発生率及び症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問16・枝3",b:"電離放射線の被ばくによる発がんと遺伝的影響は、確定的影響に分類され、その発生には、しきい値があり、しきい値を超えると発生率及び症状の程度は線量に依存する。",a:false,e:"誤り：「確定的影響」⇒「確率的影響」、「しきい値があり、しきい値を超えると発生率及び症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問16・枝4",b:"電離放射線に被ばく後、数週間程度までに現れる造血器系障害は、急性障害に分類される。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「確定的影響」⇒「確率的影響」、「しきい値があり、しきい値を超えると発生率及び症状の程度は線量に依存する」⇒「しきい値がなく、被ばく線量が増えると発現の確率も増加する」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問16・枝5",b:"造血器、生殖腺、腸粘膜など頻繁に細胞分裂している組織・臓器は、電離放射線の影響を受けやすい。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問17・枝1",b:"音圧レベルは、通常、その音圧と人間が聴くことができる最も小さな音圧(20µPa)との比の常用対数を20倍して求められ、その単位はデシベル(dB)で表される。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：等価騒音レベルは、時間と共に変動する騒音について、一定時間の平均的な騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問17・枝2",b:"等価騒音レベルは、単位時間(1分間)における音圧レベルを 10 秒間ごとに平均化した幾何平均値で、変動する騒音レベルの平均値として表した値である。",a:false,e:"誤り：等価騒音レベルは、時間と共に変動する騒音について、一定時間の平均的な騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問17・枝3",b:"人が聴くことができる音の周波数は、およそ20～20,000Hzである。",a:true,e:"記述のとおり。人が聴くことができる音の周波数範囲は、およそ20～20,000Hz（可聴域）である。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問17・枝4",b:"騒音性難聴の初期に認められる4,000Hz付近の音を中心とする聴力低下の型をc⁵dipという。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：等価騒音レベルは、時間と共に変動する騒音について、一定時間の平均的な騒音の程度を表す指標のひとつ。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問17・枝5",b:"騒音は、自律神経系や内分泌系へも影響を与えるため、騒音ばく露により、交感神経の活動の亢進や副腎皮質ホルモンの分泌の増加が認められることがある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問18・枝1",b:"じん肺は、粉じんを吸入することによって肺に生じた線維増殖性変化を主体とする疾病で、けい肺、石綿肺などがある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸（SiO ） 2 の粉じん」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問18・枝2",b:"じん肺がある程度進行すると、粉じんへのばく露を中止しても肺の線維化が進行する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸（SiO ） 2 の粉じん」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問18・枝3",b:"けい肺は、鉄、アルミニウムなどの金属粉じんを吸入することによって発症するじん肺である。",a:false,e:"誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸（SiO ） 2 の粉じん」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問18・枝4",b:"石綿肺では、胸膜の肥厚（プラーク）、胸膜の石灰化などがみられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸（SiO ） 2 の粉じん」。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問18・枝5",b:"木材の粉じんを吸入することによって、ぜんそくを起こすことがある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問19・枝1",b:"呼吸用保護具は、計算により求めた要求防護係数よりも大きな値の指定防護係数をもつものを選択する。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問19・枝2",b:"型式検定合格標章のある防じんマスクでも、ヒュームのような微細な粒子に対しては使用してはならない。",a:false,e:"誤り：防じんマスクは、空気中に浮遊する粉じん（固体粒子）、ミスト（液体粒子）、ヒューム（気体の凝固粒子）等の粒子状物質の吸入を防止するためのものなので、有効である。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問19・枝3",b:"防じんマスクの面体の接顔部に接顔メリヤスを使用すると、マスクと顔面との密着性が良くなる。",a:false,e:"誤り：面体の接顔部に接顔メリヤスを使用すると密着性が悪くなり、粉じんがマスク内に漏れ込むおそれがある。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問19・枝4",b:"一酸化炭素用防毒マスクの吸収缶の色は、黄色である。",a:false,e:"誤り：一酸化炭素用は赤色である。黄色は硫化水素用。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問19・枝5",b:"2種類以上の有害ガスが混在している場合には、そのうち最も毒性の強いガス用の防毒マスクを使用する。",a:false,e:"誤り：2種類以上の有害ガスが混在している場合や、対象ガスの種類や濃度が不明な場合は防毒マスクを使用してはならない。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問20・枝1",b:"外付け式グリッド型",a:true,e:"記述のとおり。外付け式フードのグリッド型は、局所排気装置のフード形式の一つである。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問20・枝2",b:"囲い式ドラフトチェンバ型",a:true,e:"（1）～（4）正しい。（5）誤り：「外付け式スロット型」⇒「レシーバ式カバー型（グラインダ型）」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問20・枝3",b:"レシーバ式キャノピ型",a:true,e:"（1）～（4）正しい。（5）誤り：「外付け式スロット型」⇒「レシーバ式カバー型（グラインダ型）」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問20・枝4",b:"外付け式ルーバ型",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R6-10",s:"問20・枝5",b:"外付け式スロット型",a:false,e:"誤り：「外付け式スロット型」⇒「レシーバ式カバー型（グラインダ型）」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問21・枝1",b:"常時40人の労働者を使用する金融業の事業場において、衛生管理者は選任していないが、衛生推進者を1人選任している。",a:false,e:"違反していない：安衛法第12条の2（安全衛生推進者等）、安衛則第12条の2（安全衛生推進者等を選任すべき事業場）。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問21・枝2",b:"常時200人の労働者を使用する水産業の事業場において、衛生工学衛生管理者免許を有する者のうちから衛生管理者を1人選任している。",a:false,e:"違反していない：安衛則第7条（衛生管理者の選任）第1項34。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問21・枝3",b:"常時300人の労働者を使用する電気業の事業場において、第二種衛生管理者免許を有する者のうちから衛生管理者を2人選任している。",a:true,e:"違反している：「第二種衛生管理者免許」⇒「第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は医師、歯科医師、労働衛生コンサルタント等」。安衛則第7条（衛生管理者の選任）第1項34。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問21・枝4",b:"常時600人の労働者を使用する各種商品小売業の事業場において、3人の衛生管理者のうち2 人を事業場に専属で第一種衛生管理者免許を有する者のうちから選任し、他の1人を事業場に専属でない労働衛生コンサルタントから選任している。",a:false,e:"違反していない：安衛則第7条（衛生管理者の選任）第1項234。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問21・枝5",b:"常時1,200人の労働者を使用する各種商品卸売業の事業場において、第二種衛生管理者免許を有する者のうちから、衛生管理者を4人選任し、そのうち1人を専任の衛生管理者としているが、他の3人には他の業務を兼務させている。",a:false,e:"違反していない：安衛則第7条（衛生管理者の選任）第1項345。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問22・枝1",b:"衛生委員会の議長は、衛生管理者である委員のうちから、事業者が指名しなければならない。",a:false,e:"誤り：「衛生管理者」⇒「総括安全衛生管理者又は総括衛生管理者以外の者で当該事業場においてその事業の実施を統括管理するもの若しくはこれに準ずる者のうちから事業者が指名した者」。安衛法第 18条（衛生委員会）第2項1、第4項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問22・枝2",b:"衛生委員会の議長を除く全委員については、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者の推薦に基づき指名しなければならない。",a:false,e:"誤り：「全委員」⇒「委員の半数」。安衛法第18条（衛生委員会）第4項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問22・枝3",b:"衛生管理者として選任しているが事業場に専属でない労働衛生コンサルタントを、衛生委員会の委員として指名することはできない。",a:false,e:"誤り：衛生委員会の委員として指名する労働衛生コンサルタントの指名に関して、専属の者でなければ指名できないとの定めはない。また、安衛則第7条第1項2により、「2人以上の衛生管理者を選任する場合において、労働衛生コンサルタント1人まではその事業場に専属でなくともよく、安衛法第18条第2項2により、衛生委員会の委員は「衛生管理者のうち事業者が指名した者」である。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問22・枝4",b:"当該事業場の労働者で、作業環境測定を実施している作業環境測定士を衛生委員会の委員として指名することができる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第3項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問22・枝5",b:"衛生委員会は、毎月1回以上開催するようにし、議事で重要なものに係る記録を作成して、これを5年間保存しなければならない",a:false,e:"誤り：「5年間」⇒「3年間」。安衛則第23条（委員会の会議）第1項、第4項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問23・枝1",b:"製造業",a:false,e:"該当しない：製造業における総括安全衛生管理者の選任は常時300人以上の事業場に義務付けられているが、本問の記述はその要件に該当しない場合がある。安衛令第2条。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問23・枝2",b:"熱供給業",a:false,e:"該当しない：熱供給業は、総括安全衛生管理者の選任義務がある業種に該当するが、常時使用する労働者数が300人以上の場合に選任が必要である。安衛令第2条。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問23・枝3",b:"水道業",a:false,e:"義務付けられていない：300人以上の業種に該当のため。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問23・枝4",b:"医療業",a:false,e:"義務付けられていない：1,000人以上の業種に該当のため。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問23・枝5",b:"清掃業",a:true,e:"義務付けられている。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問24・枝1",b:"面接指導の対象となる労働者の要件は、原則として、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり100時間を超え、かつ、疲労の蓄積が認められる者であることとする。",a:false,e:"誤り：「1か月当たり100時間」⇒「1か月当たり80時間」。安衛則第52条の2（面接指導の対象となる労働者の要件等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問24・枝2",b:"事業者は、面接指導を実施するため、タイムカードによる記録等の客観的な方法その他の適切な方法により、労働者の労働時間の状況を把握し、その記録を作成して3年間保存するための必要な措置を講じなければならない。",a:true,e:"正しい：安衛法第66条の8の3、安衛則第52条の7の3（法第66条の8の3の厚生労働省令で定める方法等）第1項、第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問24・枝3",b:"事業者は、労働時間の状況等が一定の要件に該当する労働者から申出があったときは、3か月以内に、面接指導を行わなければならない。",a:false,e:"誤り：「3か月以内に」⇒「遅滞なく」。安衛則第52条の3（面接指導の実施方法等）第3項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問24・枝4",b:"面接指導を行う医師として事業者が指定することのできる医師は、当該事業場の産業医に限られる。",a:false,e:"誤り：産業医に限るとの定めはない。安衛法第66条の8（面接指導等）第1項、第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問24・枝5",b:"事業者は、面接指導の結果に基づき、労働者の健康を保持するために必要な措置について、原則として、面接指導が行われた日から3か月以内に、医師の意見を聴かなければならない。",a:false,e:"誤り：「3か月以内に」⇒「遅滞なく」。安衛則第52条の7（面接指導の結果についての医師からの意見聴取）。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問25・枝1",b:"常時50人以上の労働者を使用する事業場においては、6か月以内ごとに1回、定期に、ストレスチェックを行わなければならない。",a:false,e:"誤り：「6か月以内ごとに1回」⇒「1年以内ごとに1回」。安衛則第52条の9（心理的な負担の程度を把握するための検査の実施方法）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問25・枝2",b:"ストレスチェックを行うために必要な知識についての研修であって厚生労働大臣が定めるものを修了した労働衛生コンサルタントは、ストレスチェックの実施者となることができる。",a:false,e:"誤り：「労働衛生コンサルタント」⇒「医師、保健師若しくは所定の研修を修了した歯科医師、看護師、精神保健福祉士又は公認心理士」。安衛則第52条の10（検査の実施者等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問25・枝3",b:"事業者は、ストレスチェックの結果が、衛生管理者及びストレスチェックを受けた労働者に通知されるようにしなければならない。",a:false,e:"誤り：ストレスチェックを受けた労働者以外の者に結果を通知してはならない。安衛法第66条の10 （心理的な負担の程度を把握するための検査等）第2項、安衛則第52条の12（検査結果の通知）。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問25・枝4",b:"ストレスチェックを受ける労働者について解雇、昇進又は異動に関して直接の権限を持つ監督的地位にある者は、ストレスチェックの実施の事務に従事してはならない。",a:true,e:"正しい：安衛則第52条の10（検査の実施者等）第2項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問25・枝5",b:"事業者は、ストレスチェックの結果、心理的な負担の程度が高い労働者全員に対し、医師による面接指導を行わなければならない。",a:false,e:"誤り：「心理的な負担の程度が高い労働者全員」⇒「心理的な負担の程度が高い労働者であって、面接指導を受ける必要があると検査を行った医師等が認めたもの」。安衛則第52 条の 15（面接指導の対象となる労働者の要件）。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問26・枝1",b:"医師のうち、労働衛生コンサルタント試験に合格した者で、その試験の区分が保健衛生であるものは、産業医として選任することができる。",a:true,e:"正しい：安衛則第14条（産業医及び産業歯科医の職務等）第2項3。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問26・枝2",b:"産業医の選任は、選任すべき事由が発生した日から14日以内に行わなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任等）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問26・枝3",b:"事業者は、産業医が辞任したとき又は産業医を解任したときは、遅滞なく、その旨及びその理由を衛生委員会又は安全衛生委員会に報告しなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任等）第4項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問26・枝4",b:"常時使用する労働者数が2,000人を超える事業場では、産業医を2人以上選任しなければならない。",a:true,e:"誤り：「2，000 人を超える場合」⇒「3,000 人を超える場合」。安衛則第 13 条（産業医の選任等）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問26・枝5",b:"産業医は、労働者に対する衛生教育に関することであって、医学に関する専門的知識を必要とする事項について、総括安全衛生管理者に対して勧告することができる。",a:false,e:"正しい：設問の「労働者に対する衛生教育に関すること」は、安衛則第14条（産業医及び産業歯科医の職務等）に該当するため、正しい。安衛法第13条（産業医等）第5項、安衛則第14条（産業医及び産業歯科医の職務等）第3項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問27・枝1",b:"日常行う清掃のほか、大掃除を、1年に1回、定期に、統一的に行っている。",a:false,e:"違反している：「1年に1回」⇒「6か月以内ごとに1回」。安衛則第 619 条（清掃等の実施）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問27・枝2",b:"男性25人、女性25人の労働者を常時使用している事業場で、労働者が臥床することのできる休養室又は休養所を男性用と女性用に区別して設けていない。",a:false,e:"違反している：「区別して設けていない」⇒「区別して設けなければならない」。常時50人以上であれば男女で区別した労働者が臥床することのできる休養室又は休養所が必要である。安衛則第618条（休養室等）。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問27・枝3",b:"60人の労働者を常時就業させている屋内作業場の気積が、設備の占める容積及び床面から4m を超える高さにある空間を除き、500㎥となっている。",a:false,e:"違反している：500㎥／60人＝8.3･･・㎥となり、1人10㎥以上を満たない。安衛則第600条（気積）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問27・枝4",b:"事業場に附属する食堂の床面積を、食事の際の1人について、0.8㎡としている。",a:false,e:"違反している：「0.8㎡」⇒「1㎡以上」。安衛則第630条（食堂及び炊事場）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問27・枝5",b:"労働者を常時就業させる場所の作業面の照度を、精密な作業については500ルクス、粗な作業については100ルクスとしている。",a:true,e:"違反していない：安衛則第604条（照度）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問28・枝1",b:"機械による換気のための設備については、6か月以内ごとに1回、定期に、異常の有無を点検しなければならない。",a:false,e:"誤り：「6か月以内ごとに1回」⇒「2か月以内ごとに1回」。事務所則第9条（点検等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問28・枝2",b:"空気調和設備の加湿装置については、原則として、1か月以内ごとに1回、定期に、その汚れの状況を点検し、必要に応じ、その清掃等を行わなければならない。",a:true,e:"正しい：事務所則第9条の2第1項3。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問28・枝3",b:"空気調和設備内に設けられた排水受けについては、原則として、1か月以内ごとに1回、定期に、その汚れ及び閉塞の状況を点検しなければならない。",a:true,e:"正しい：事務所則第9条の2第1項4。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問28・枝4",b:"事務室の建築、大規模の修繕又は大規模の模様替を行ったときは、その事務室における空気中のホルムアルデヒドの濃度を、その事務室の使用を開始した日以後所定の期間に1回、測定しなければならない。",a:true,e:"正しい：事務所則第7条の2第1項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問28・枝5",b:"事務室の照明設備については、6か月以内ごとに1回、定期に、点検しなければならない。",a:true,e:"正しい：事務所則第10条（照度等）第3項。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問29・枝1",b:"生後満1年に達しない生児を育てる労働者は、男性、女性共に育児時間を請求することができる。",a:false,e:"誤り：「労働者は、男性、女性共に」⇒「女性は」。育児時間の請求は女性のみ。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問29・枝2",b:"育児時間は、1日2回、1回当たり少なくとも30分の時間を請求することができる。",a:true,e:"記述のとおり。育児時間は、生後満1年に達しない生児を育てる女性が、1日2回各々少なくとも30分請求できる。労基法第67条。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問29・枝3",b:"育児時間中は、育児時間を請求した労働者を使用してはならない。",a:true,e:"労基法第67条（育児時間）。（1）誤り：「労働者は、男性、女性共に」⇒「女性は」。育児時間の請求は女性のみ。（2）～（5）正しい。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問29・枝4",b:"育児時間を請求しない労働者に対しては、育児時間を与えなくてもよい。",a:true,e:"労基法第67条（育児時間）。（1）誤り：「労働者は、男性、女性共に」⇒「女性は」。育児時間の請求は女性のみ。（2）～（5）正しい。"},
{c:"関係法令（有害業務以外）",y:"R6-10",s:"問29・枝5",b:"育児時間は、必ずしも有給としなくてもよい。",a:true,e:"正しい。"},
