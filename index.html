{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問31・枝1",b:"黒球温度風速",a:false,e:"WBGTの算出式は、以下のとおり。日射がある場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.2 ×黒球温度 ＋ 0.1 × 気温（乾球温度）日射がない場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.3 ×黒球温度"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問31・枝2",b:"黒球温度気温（乾球温度）",a:true,e:"WBGTの算出式は、以下のとおり。日射がある場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.2 ×黒球温度 ＋ 0.1 × 気温（乾球温度）日射がない場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.3 ×黒球温度"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問31・枝3",b:"風速黒球温度",a:false,e:"WBGTの算出式は、以下のとおり。日射がある場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.2 ×黒球温度 ＋ 0.1 × 気温（乾球温度）日射がない場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.3 ×黒球温度"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問31・枝4",b:"気温（乾球温度）風速",a:false,e:"WBGTの算出式は、以下のとおり。日射がある場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.2 ×黒球温度 ＋ 0.1 × 気温（乾球温度）日射がない場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.3 ×黒球温度"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問31・枝5",b:"気温（乾球温度）黒球温度",a:false,e:"WBGTの算出式は、以下のとおり。日射がある場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.2 ×黒球温度 ＋ 0.1 × 気温（乾球温度）日射がない場合： WBGT＝ 0.7 × 自然湿球温度 ＋ 0.3 ×黒球温度"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問32・枝1",b:"北向きの窓では、直射日光はほとんど入らないが一年中平均した明るさが得られる。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「10分の1以下」⇒「10分の1以上」"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問32・枝2",b:"全般照明と局部照明を併用する場合、全般照明による照度は、局部照明による照度の10分の1 以下になるようにする。",a:false,e:"誤り：「10分の1以下」⇒「10分の1以上」"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問32・枝3",b:"前方から明かりを取るときは、まぶしさをなくすため、眼と光源を結ぶ線と視線とがなす角度が、おおむね30°以上になるように光源の位置を決めるとよい。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「10分の1以下」⇒「10分の1以上」"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問32・枝4",b:"あらゆる方向から同程度の明るさの光がくると、見る物に影ができなくなり立体感がなくなるので、不都合な場合がある。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「10分の1以下」⇒「10分の1以上」"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問32・枝5",b:"部屋の彩色として、目の高さ以下は、まぶしさを防ぎ安定感を出すために濁色とし、目より上方の壁や天井は、明るい色を用いるとよい。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問33・枝1",b:"Q ＝｛ D /（A － B）｝× 100",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問33・枝2",b:"Q ＝｛ D /（A － C）｝× 100",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問33・枝3",b:"Q ＝｛ D /（B － C）｝× 100",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問33・枝4",b:"Q ＝｛ D /（A － B）｝× 1,000,000",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問33・枝5",b:"Q ＝｛ D /（B － C）｝× 1,000,000",a:true,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問34・枝1",b:"心の健康づくり計画の実施に当たっては、メンタルヘルス不調を未然に防止する「一次予防」、メンタルヘルス不調を早期に発見し、適切な措置を行う「二次予防」及びメンタルヘルス不調となった労働者の職場復帰支援等を行う「三次予防」が円滑に行われるようにする必要がある。",a:false,e:"（1）（3）（4）（5）正しい。（2）誤り：ストレスチェック制度に関する調査審議とメンタルヘルスケアに関する調査審議を関連付けて行うことが望ましい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問34・枝2",b:"プライバシー保護の観点から、衛生委員会や安全衛生委員会において、ストレスチェック制度に関する調査審議とメンタルヘルスケアに関する調査審議を関連付けて行うことは避ける。",a:true,e:"誤り：ストレスチェック制度に関する調査審議とメンタルヘルスケアに関する調査審議を関連付けて行うことが望ましい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問34・枝3",b:"「セルフケア」とは、労働者自身がストレスや心の健康について理解し、自らのストレスを予防、軽減する、あるいはこれに対処することである。",a:false,e:"（1）（3）（4）（5）正しい。（2）誤り：ストレスチェック制度に関する調査審議とメンタルヘルスケアに関する調査審議を関連付けて行うことが望ましい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問34・枝4",b:"心の健康問題を抱える労働者に対して、健康問題以外の観点から評価が行われる傾向が強いという問題があることに留意する。",a:false,e:"（1）（3）（4）（5）正しい。（2）誤り：ストレスチェック制度に関する調査審議とメンタルヘルスケアに関する調査審議を関連付けて行うことが望ましい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問34・枝5",b:"労働者の心の健康は、職場配置、人事異動、職場の組織等の要因によって影響を受ける可能性があるため、人事労務管理部門と連携するようにする。",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問35・枝1",b:"健康保持増進措置は、主に生活習慣上の課題を有する労働者の健康状態の改善を目指すために個々の労働者に対して実施するものと、事業場全体の健康状態の改善や健康保持増進に係る取組の活性化等、生活習慣上の課題の有無に関わらず労働者を集団として捉えて実施するものがある。",a:false,e:"（1）（2）（3）（4）正しい。（5）誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問35・枝2",b:"健康保持増進に関する課題の把握や目標の設定等においては、労働者の健康状態等を客観的に把握できる数値を活用することが望ましい。",a:false,e:"（1）（2）（3）（4）正しい。（5）誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問35・枝3",b:"健康測定の結果に基づき行う健康指導には、運動指導、メンタルヘルスケア、栄養指導、口腔保健指導、保健指導が含まれる。",a:false,e:"（1）（2）（3）（4）正しい。（5）誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問35・枝4",b:"健康保持増進対策の推進に当たっては、事業者が労働者等の意見を聴きつつ事業場の実態に即した取組を行うため、労使、産業医、衛生管理者等で構成される衛生委員会等を活用する。",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問35・枝5",b:"医療保険者と連携したコラボヘルス等の労働者の健康保持増進対策を推進するためであっても、定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に提供してはならない。",a:true,e:"誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問36・枝1",b:"毒素型食中毒は、食物に付着した細菌により産生された毒素によって起こる食中毒で、ボツリヌス菌によるものがある。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：ヒスタミンは加熱しても分解されにくく、一度産生されると取り除くことが困難である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問36・枝2",b:"感染型食中毒は、食物に付着した細菌そのものの感染によって起こる食中毒で、サルモネラ菌によるものがある。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：ヒスタミンは加熱しても分解されにくく、一度産生されると取り除くことが困難である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問36・枝3",b:"O-157やO-111は、ベロ毒素を産生する大腸菌で、これらによる食中毒は、腹痛や出血を伴う水様性の下痢などの症状を呈する。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：ヒスタミンは加熱しても分解されにくく、一度産生されると取り除くことが困難である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問36・枝4",b:"ノロウイルスの失活化には、煮沸消毒又は塩素系の消毒剤が効果的である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問36・枝5",b:"魚、チーズなどに含まれるヒスチジンが細菌により分解されて生成するヒスタミンは、加熱により分解される。",a:false,e:"誤り：ヒスタミンは加熱しても分解されにくく、一度産生されると取り除くことが困難である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問37・枝1",b:"運動負荷心電図検査は、心筋の異常や不整脈の発見には役立つが、虚血性心疾患の発見には有用でない。",a:false,e:"誤り： 運動負荷心電図検査は、虚血性心疾患の発見に有用である。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問37・枝2",b:"虚血性心疾患は、狭心症と心筋梗塞とに大別される。",a:true,e:"（1）誤り： 運動負荷心電図検査は、虚血性心疾患の発見に有用である。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問37・枝3",b:"狭心症は、心臓の血管の一部の血流が一時的に悪くなる病気である。",a:true,e:"（1）誤り： 運動負荷心電図検査は、虚血性心疾患の発見に有用である。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問37・枝4",b:"心筋梗塞では、突然激しい胸痛が起こり、「締め付けられるように痛い」、「胸が苦しい」などの症状が長時間続き、1時間以上になることもある。",a:true,e:"（1）誤り： 運動負荷心電図検査は、虚血性心疾患の発見に有用である。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問37・枝5",b:"狭心症の痛みの場所は、心筋梗塞とほぼ同じであるが、その発作が続く時間は、通常数分程度で、長くても15分以内におさまることが多い。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問38・枝1",b:"開放骨折のことを複雑骨折という。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り： 単純骨折とは、皮膚には損傷がなく皮膚の下で骨が折れている状態をいう。骨にひびが入った状態は不完全骨折。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問38・枝2",b:"複雑骨折は、感染が起こりやすく治りにくい。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り： 単純骨折とは、皮膚には損傷がなく皮膚の下で骨が折れている状態をいう。骨にひびが入った状態は不完全骨折。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問38・枝3",b:"骨折部を副子で固定するときには、骨折した部分が変形していても、そのままの状態を保持して、直近の関節部を含めた広い範囲を固定する。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り： 単純骨折とは、皮膚には損傷がなく皮膚の下で骨が折れている状態をいう。骨にひびが入った状態は不完全骨折。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問38・枝4",b:"単純骨折とは、骨にひびが入った状態のことをいう。",a:false,e:"誤り： 単純骨折とは、皮膚には損傷がなく皮膚の下で骨が折れている状態をいう。骨にひびが入った状態は不完全骨折。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問38・枝5",b:"完全骨折では、骨折端どうしが擦れ合う軋轢音が認められることがある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問39・枝1",b:"健康管理統計において、ある時点での検査における有所見者の割合を有所見率といい、これは発生率と同じ意味で用いられる。",a:false,e:"誤り： 「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問39・枝2",b:"集団を比較する場合、調査の対象とした項目のデータの平均値が等しくても分散が異なっていれば、異なった特徴をもつ集団であると評価される。",a:true,e:"（1）誤り： 「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問39・枝3",b:"ばらつきをもって分布するデータの代表値として、平均値、中央値などがあるが、どの代表値を選択するかは、データの内容と分布による。",a:true,e:"（1）誤り： 「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問39・枝4",b:"ある事象と健康事象との間に、統計上、一方が多いと他方も多いというような相関関係が認められたとしても、それらの間に因果関係があるとは限らない。",a:true,e:"（1）誤り： 「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問39・枝5",b:"病休度数率は、在籍労働者の延べ実労働時間数 100 万時間当たりの疾病休業件数で示される。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問40・枝1",b:"BMIは肥満や低体重（痩せ）の判定に用いられる指数で、この数値が大きいほど肥満の傾向があり、小さいほど痩せの傾向がある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り： 腹囲は、内臓脂肪の面積と直線的な比例関係にある。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問40・枝2",b:"BMIによる肥満度の判定基準には、男性と女性とで同一の数値が用いられる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り： 腹囲は、内臓脂肪の面積と直線的な比例関係にある。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問40・枝3",b:"BMIは、内臓脂肪の重量と直線的な比例関係にある。",a:false,e:"誤り： 腹囲は、内臓脂肪の面積と直線的な比例関係にある。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問40・枝4",b:"BMIが22になる場合の体重は、標準体重といわれる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り： 腹囲は、内臓脂肪の面積と直線的な比例関係にある。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R7-10",s:"問40・枝5",b:"BMIが18.5以上25未満の範囲となる場合の体重は、普通体重といわれる",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問41・枝1",b:"血中の蛋白質は、糸球体からボウマン嚢に濾し出される。",a:false,e:"誤り：「濾し出される」⇒「濾し出されない」。"},
{c:"労働生理",y:"R7-10",s:"問41・枝2",b:"血中の老廃物は、尿細管からボウマン嚢に濾し出される。",a:false,e:"誤り：「尿細管」⇒「糸球体」。"},
{c:"労働生理",y:"R7-10",s:"問41・枝3",b:"原尿中に濾し出された水分の大部分は、そのまま尿として排出される。",a:false,e:"誤り：「そのまま尿として排出される」⇒「尿細管から血中に再吸収される」。"},
{c:"労働生理",y:"R7-10",s:"問41・枝4",b:"尿は淡黄色の液体で、固有の臭気を有し、通常、弱アルカリ性である。",a:false,e:"誤り：「弱アルカリ性」⇒「弱酸性」。"},
{c:"労働生理",y:"R7-10",s:"問41・枝5",b:"原尿中に濾し出された電解質の多くは、尿細管から血中に再吸収される。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問42・枝1",b:"心臓の中にある洞結節（洞房結節）で発生した刺激が、刺激伝導系を介して心筋に伝わることにより、心臓は規則正しく収縮と拡張を繰り返す。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「右心室から肺静脈を経て肺の毛細血管に入り、肺動脈を通って左心房に戻る」⇒「右心室から肺動脈を経て肺の毛細血管に入り、肺静脈を通って左心房に戻る」。"},
{c:"労働生理",y:"R7-10",s:"問42・枝2",b:"心臓の拍動は、自律神経の支配を受けている。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「右心室から肺静脈を経て肺の毛細血管に入り、肺動脈を通って左心房に戻る」⇒「右心室から肺動脈を経て肺の毛細血管に入り、肺静脈を通って左心房に戻る」。"},
{c:"労働生理",y:"R7-10",s:"問42・枝3",b:"体循環では、血液は左心室から大動脈に入り、静脈血となって右心房に戻ってくる。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「右心室から肺静脈を経て肺の毛細血管に入り、肺動脈を通って左心房に戻る」⇒「右心室から肺動脈を経て肺の毛細血管に入り、肺静脈を通って左心房に戻る」。"},
{c:"労働生理",y:"R7-10",s:"問42・枝4",b:"肺循環とは、右心室から肺静脈を経て肺の毛細血管に入り、肺動脈を通って左心房に戻る血液の循環をいう。",a:false,e:"誤り：「右心室から肺静脈を経て肺の毛細血管に入り、肺動脈を通って左心房に戻る」⇒「右心室から肺動脈を経て肺の毛細血管に入り、肺静脈を通って左心房に戻る」。"},
{c:"労働生理",y:"R7-10",s:"問42・枝5",b:"動脈硬化とは、コレステロールの蓄積などにより、動脈壁が肥厚・硬化して弾力性を失った状態であり、進行すると血管の狭窄や閉塞を招き、臓器への酸素や栄養分の供給が妨げられる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問43・枝1",b:"コルチゾール副腎皮質血糖量の増加",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-10",s:"問43・枝2",b:"アルドステロン副腎皮質体液中の塩類バランスの調節",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-10",s:"問43・枝3",b:"メラトニン副甲状腺体液中のカルシウムバランスの調節",a:false,e:"誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-10",s:"問43・枝4",b:"インスリン膵臓血糖量の減少",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-10",s:"問43・枝5",b:"グルカゴン膵臓血糖量の増加",a:true,e:"正しい"},
{c:"労働生理",y:"R7-10",s:"問44・枝1",b:"蛋白質は、約20種類のアミノ酸が結合してできており、内臓、筋肉、皮膚など人体の臓器等を構成する主成分である。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「膵リパーゼ」⇒「トリプシン」。"},
{c:"労働生理",y:"R7-10",s:"問44・枝2",b:"蛋白質は、膵臓から分泌される消化酵素である膵リパーゼなどによりアミノ酸に分解され、小腸から吸収される。",a:false,e:"誤り：「膵リパーゼ」⇒「トリプシン」。"},
{c:"労働生理",y:"R7-10",s:"問44・枝3",b:"血液循環に入ったアミノ酸は、体内の各組織において蛋白質に再合成される。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「膵リパーゼ」⇒「トリプシン」。"},
{c:"労働生理",y:"R7-10",s:"問44・枝4",b:"肝臓では、アミノ酸から血漿蛋白質が合成される。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「膵リパーゼ」⇒「トリプシン」。"},
{c:"労働生理",y:"R7-10",s:"問44・枝5",b:"飢餓時には、肝臓などでアミノ酸などからブドウ糖を生成する糖新生が行われる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問45・枝1",b:"十二指腸に胃から酸性の消化物が入ってくると、アルカリ性の膵液が分泌され、酸を中和する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R7-10",s:"問45・枝2",b:"無機塩及びビタミン類は、酵素による分解を受けないでそのまま吸収される。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R7-10",s:"問45・枝3",b:"胆汁はアルカリ性で、蛋白質を分解するトリプシンなどの消化酵素を含んでいる。",a:false,e:"誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R7-10",s:"問45・枝4",b:"ペプシノーゲンは、胃酸によってペプシンという消化酵素になり、蛋白質を分解する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R7-10",s:"問45・枝5",b:"小腸の表面は、ビロード状の絨毛という小突起で覆われており、栄養素の吸収の効率を上げるために役立っている。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問46・枝1",b:"赤血球は、骨髄で産生され、寿命は約120日で、血球の中で最も多い。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-10",s:"問46・枝2",b:"血液中に占める赤血球の容積の割合をヘマトクリットといい、貧血になるとその値は低くなる。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-10",s:"問46・枝3",b:"好中球は、白血球の約60％を占め、偽足を出してアメーバ様運動を行い、体内に侵入してきた細菌などを貪食する。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-10",s:"問46・枝4",b:"リンパ球は、白血球の約30％を占め、Tリンパ球、Bリンパ球などの種類があり、免疫反応に関与している。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問46・枝5",b:"ABO式血液型は、白血球による血液型分類の一つで、A型血液の血清は抗B抗体をもつ。",a:false,e:"誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-10",s:"問47・枝1",b:"神経系は、中枢神経系と末梢神経系に大別され、中枢神経系は脳と脊髄から成る。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り ：「大脳の内側の髄質」⇒「大脳の外側の皮質」。"},
{c:"労働生理",y:"R7-10",s:"問47・枝2",b:"大脳の内側の髄質は、神経細胞の細胞体が集合した灰白質で、感覚、運動、思考などの作用を支配する中枢として機能する。",a:false,e:"誤り ：「大脳の内側の髄質」⇒「大脳の外側の皮質」。"},
{c:"労働生理",y:"R7-10",s:"問47・枝3",b:"神経系を構成する基本的な単位である神経細胞は、通常、1個の細胞体、1本の軸索、複数の樹状突起から成り、ニューロンともいわれる。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り ：「大脳の内側の髄質」⇒「大脳の外側の皮質」。"},
{c:"労働生理",y:"R7-10",s:"問47・枝4",b:"交感神経系は、心拍数を増加したり、消化管の運動を抑制する。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り ：「大脳の内側の髄質」⇒「大脳の外側の皮質」。"},
{c:"労働生理",y:"R7-10",s:"問47・枝5",b:"体性神経には感覚器官からの情報を中枢に伝える感覚神経と、中枢からの命令を運動器官に伝える運動神経がある。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問48・枝1",b:"刺激に対して意識とは無関係に起こる定型的な反応を反射といい、最も単純な反射には膝蓋腱反射などの伸張反射がある。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中の"},
{c:"労働生理",y:"R7-10",s:"問48・枝2",b:"筋肉が収縮して出す最大筋力は、筋肉の単位断面積当たりの平均値をとると、性差や年齢差はほとんどない。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中の"},
{c:"労働生理",y:"R7-10",s:"問48・枝3",b:"運動することによって筋肉が太くなることを筋肉の活動性肥大という。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中の"},
{c:"労働生理",y:"R7-10",s:"問48・枝4",b:"荷物を持ち上げたり屈伸運動をするとき、関節運動に関与する筋肉には、等張性収縮が生じている。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問48・枝5",b:"筋肉中のグリコーゲンは、酸素が十分に供給されると完全に分解され、最後に乳酸になる。",a:false,e:"誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中のグリコーゲンは、酸素が十分に供給されると、多量のATPと、二酸化炭素と水に完全に分解される。しかし、酸素の供給が不足すると、完全に分解されずに、少量のATPと乳酸を生成する。"},
{c:"労働生理",y:"R7-10",s:"問49・枝1",b:"寒冷な環境においては、皮膚の血管が拡張して血流量を増し、皮膚温を上昇させる。",a:false,e:"誤り：「皮膚の血管が拡張して血流量を増し、皮膚温を上昇させる」⇒「皮膚の血管は収縮して熱の放散を減らす」。"},
{c:"労働生理",y:"R7-10",s:"問49・枝2",b:"暑熱な環境においては、内臓の血流量が増加し体内の代謝活動が亢進することにより、人体からの熱の放散が促進される。",a:false,e:"誤り：「内臓の血流量が増加し体内の代謝活動が亢進することにより」⇒「皮膚の血流量を多くして、発汗量を増やすことにより」。"},
{c:"労働生理",y:"R7-10",s:"問49・枝3",b:"体温調節のように、外部環境が変化しても身体内部の状態を一定に保つ生体の仕組みを同調性といい、筋肉と神経系により調整されている。",a:false,e:"誤り：「同調性」⇒「恒常性」、「筋肉と神経系により調整」⇒「神経系（自律神経）と内分泌系（ホルモン）により調整」。"},
{c:"労働生理",y:"R7-10",s:"問49・枝4",b:"体温調節中枢は、小脳にあり、熱の産生と放散のバランスを維持し体温を一定に保つよう機能している。",a:false,e:"誤り：「小脳」⇒「間脳の視床下部」。"},
{c:"労働生理",y:"R7-10",s:"問49・枝5",b:"甲状腺ホルモンの分泌により、代謝が亢進し、体温は上昇する。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-10",s:"問50・枝1",b:"外部からの刺激であるストレッサーは、その形態や程度にかかわらず、自律神経系と内分泌系を介して、心身の活動を抑圧する。",a:false,e:"誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」"},
{c:"労働生理",y:"R7-10",s:"問50・枝2",b:"ストレスに伴う心身の反応には、ノルアドレナリン、アドレナリンなどのカテコールアミンや副腎皮質ホルモンが深く関与している。",a:true,e:"（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」（2）（3）（4）（5）正しい。"},
{c:"労働生理",y:"R7-10",s:"問50・枝3",b:"昇進、転勤、配置替えなどがストレスの原因となることがある。",a:true,e:"（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」（2）（3）（4）（5）正しい。"},
{c:"労働生理",y:"R7-10",s:"問50・枝4",b:"職場環境における騒音、気温、湿度、悪臭などがストレスの原因となることがある。",a:true,e:"（1）誤り：「その形態や程度にかかわらず」⇒「ストレス反応が大きすぎるたり長く継続しすぎると」（2）（3）（4）（5）正しい。"},
{c:"労働生理",y:"R7-10",s:"問50・枝5",b:"ストレスにより、自律神経系と内分泌系のバランスが崩れ、精神神経科的疾患又は内科的疾患が生じる場合がある。",a:true,e:"正しい。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問1・枝1",b:"総括安全衛生管理者を選任しなければならない。",a:true,e:"正しい：「常時300人以上の労働者を使用する製造業の事業場」に該当するため、総括安全衛生管理者を選任しなければならない。安衛法第10条（総括安全衛生管理者）第1項、安衛令（総括安全衛生管理者を選任すべき事業場）第2条2。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問1・枝2",b:"衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。",a:false,e:"誤り：衛生管理者のうち少なくとも1人を専任の衛生管理者とする必要がある場合は、常時500 人を超える労働者を使用する事業場で、一定の有害業務がある場合のため、設問の事業場は該当しない。安衛則（衛生管理者の選任）第7条第1項5。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問1・枝3",b:"衛生管理者は、全て第一種衛生管理者免許を有する者のうちから選任することができる。",a:true,e:"正しい：400 人の製造業の事業場においては、第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は安衛則第10条各号に掲げる者（医師、歯科医師、労働衛生コンサルタント等）の中から衛生管理者を選任することとされており、設問の第一種衛生管理者免許を有する者のみで差し支えない。安衛則第7条（衛生管理者の選任）第1項3、6。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問1・枝4",b:"産業医は、この事業場に専属でない者を選任することができる。",a:true,e:"正しい：専属の産業医を選任要件は、「常時1,000人以上の労働者を使用する事業場又は、一定の有害業務に500人以上の労働者を従事させる事業場」であるため、該当しない。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問1・枝5",b:"特定化学物質作業主任者を選任しなくてよい。",a:true,e:"正しい：塩素を試験研究のため取扱う作業は、特定化学物質作業主任者を選任しなければならない業務には該当しない。安衛令（作業主任者を選任すべき作業）第6条18。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問2・枝1",b:"防振手袋",a:false,e:"該当しない：防振手袋は、厚生労働大臣が定める規格の具備が義務付けられる機械等に該当しない。安衛法第42条。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問2・枝2",b:"硫化水素用防毒マスク",a:false,e:"該当しない：硫化水素用防毒マスクは、本問では防じんマスクが正解であり、防毒マスクは別の規格に該当する。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問2・枝3",b:"防じん機能を有する電動ファン付き呼吸用保護具",a:true,e:"該当する：安衛法第42条（譲渡等の制限等）別表第28（防じんマスク）。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問2・枝4",b:"検知管方式による一酸化炭素検定器",a:false,e:"該当しない：検知管方式による一酸化炭素検定器は、厚生労働大臣が定める規格の具備が義務付けられる機械等に該当しない。安衛法第42条。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問2・枝5",b:"放射線測定器",a:false,e:"該当しない"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問3・枝1",b:"屋内の、砂型を用いて鋳物を製造する工程において、型ばらし装置を用いて砂型を壊す箇所に設置した局所排気装置に設けた除じん装置",a:false,e:"1年以内ごとに1回：粉じん則第17条（局所排気装置等の定期自主検査）第2項3。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問3・枝2",b:"トルエンを用いて洗浄を行う屋内の作業場所に設置したプッシュプル型換気装置",a:false,e:"1年以内ごとに1回：特化則第30条（定期自主検査）第1項2。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問3・枝3",b:"塩化水素を取り扱う特定化学設備",a:true,e:"2年以内ごとに1回：安衛令第15条（定期に自主検査を行うべき機械等）第1項10、特化則第 31条第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問3・枝4",b:"弗化水素を含有する気体を排出する製造設備の排気筒に設置した排ガス処理装置",a:false,e:"1年以内ごとに1回：特化則第30条（定期自主検査）第1項3。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問3・枝5",b:"鉛化合物を製造する工程において鉛等の溶融を行う屋内の作業場所に設置した局所排気装置",a:false,e:"1年以内ごとに1回：鉛則第35条（局所排気装置等の定期自主検査）第2項1。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問4・枝1",b:"第一類物質は、「クロム酸及びその塩」を始めとする7種の発がん性の認められた化学物質並びにそれらを一定量以上含有する混合物である。",a:false,e:"誤り：「クロム酸及びその塩」は、第二類物質に分類される。安衛令第6条別表第3（特定化学物質）2（第二類物質）。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問4・枝2",b:"第一類物質を製造しようとする者は、あらかじめ、物質ごとに、かつ、当該物質を製造するプラントごとに厚生労働大臣の許可を受けなければならない。",a:true,e:"正しい：安衛法第56条（製造の許可）第1項。特化則第48条（製造の許可）第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問4・枝3",b:"第一類物質を容器に入れ、容器から取り出し、又は反応槽等へ投入する作業を行うときは、発散源を密閉する設備、外付け式フードの局所排気装置又はプッシュプル型換気装置を設けなければならない。",a:false,e:"誤り：「外付け式フード」⇒「囲い式フード」。特化則第3条（第一類物質の取扱いに係る設備）第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問4・枝4",b:"第一類物質を取り扱う屋内作業場についての作業環境測定結果及びその評価の記録を保存すべき期間は、3年である。",a:false,e:"誤り：第一類物質のうち特別管理物質（塩素化ビフェニルを除く物質）を取り扱う屋内作業場についての作業環境測定結果及びその評価の記録の保存年限は30年である。安衛令第21条（作業環境測定を行うべき作業場）第1項7。特化則第36条（測定及びその記録）第3項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問4・枝5",b:"第一類物質を取り扱う業務に常時従事する労働者に係る特定化学物質健康診断個人票を保存すべき期間は、全ての第一類物質について30年である。",a:false,e:"誤り：第一類物質のうち特別管理物質を取り扱う業務に常時従事する労働者に係る特定化学物質健康診断個人票の保存期間のみ30年である。特化則第40条（健康診断の結果の記録）第2項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問5・枝1",b:"作業場所に設けた局所排気装置について、下方吸引型外付け式フードの場合は0.5m/sの制御風速を出し得る能力を有するものにする。",a:true,e:"正しい：有機則第16条（局所排気装置の性能）第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問5・枝2",b:"有機溶剤等の区分の色分けによる表示を黄色で行う。",a:true,e:"正しい：有機則第25条（有機溶剤等の区分の表示）第2項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問5・枝3",b:"作業場における空気中の有機溶剤の濃度を、6か月以内ごとに1回、定期に測定する。",a:true,e:"正しい：有機則第28条（測定）第2項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問5・枝4",b:"作業に常時従事する労働者に対し、6か月以内ごとに1回、定期に、特別の項目について医師による健康診断を行い、その結果に基づき作成した有機溶剤等健康診断個人票を3年間保存する。",a:false,e:"誤り：「3年間保存する」⇒「5年間保存する」。有機則第30条（健康診断の結果）。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問5・枝5",b:"労働者が有機溶剤を多量に吸入したときは、速やかに、当該労働者に医師による診察又は処置を受けさせる。",a:true,e:"正しい：有機則第30条の4（緊急診断）第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問6・枝1",b:"屋内の、セメントを袋詰めする場所における業務",a:true,e:"該当する：安衛則第36条第1項29、粉じん則第2条（定義等）別表第29。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問6・枝2",b:"特定化学物質を用いて行う分析の業務",a:false,e:"該当しない：特定化学物質を用いて行う分析の業務は、特別教育を必要とする業務に該当しない。安衛則第36条。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問6・枝3",b:"水深10m以上の場所における潜水業務",a:false,e:"該当しない：水深10m以上の場所における潜水業務は、特別教育ではなく免許（潜水士免許）が必要な業務である。安衛法第61条。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問6・枝4",b:"強烈な騒音を発する場所における業務",a:false,e:"該当しない：強烈な騒音を発する場所における業務は、特別教育を必要とする業務に該当しない。安衛則第36条。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問6・枝5",b:"人力により重量物を取り扱う業務",a:false,e:"：該当しない"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問7・枝1",b:"潜水士",a:true,e:"該当する：潜水士は、都道府県労働局長の免許を受けた者でなければならない。安衛法第72条、安衛令第20条第9号。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問7・枝2",b:"鉛作業主任者",a:false,e:"該当しない：鉛作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明する文書であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問7・枝3",b:"高圧室内作業主任者",a:true,e:"該当する：高圧室内作業主任者は、都道府県労働局長の免許を受けた者でなければならない。安衛法第72条、安衛令第20条第4号。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問7・枝4",b:"エックス線作業主任者",a:true,e:"該当する：エックス線作業主任者は、都道府県労働局長の免許を受けた者でなければならない。安衛法第72条、安衛令第20条第7号。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問7・枝5",b:"ガンマ線透過写真撮影作業主任者",a:true,e:"規定されている"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問8・枝1",b:"安定性及び反応性",a:true,e:"定められている：安衛法第57条（表示等）第1項1ニ、安衛則第33条第1項3"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問8・枝2",b:"人体に及ぼす作用",a:true,e:"定められている：安衛法第57条（表示等）第1項1ロ"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問8・枝3",b:"表示する者の氏名（法人にあっては、その名称）、住所及び電話番号",a:true,e:"定められている：安衛法第57条（表示等）第1項1ニ、安衛則第33条第1項1"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問8・枝4",b:"注意喚起語",a:true,e:"定められている：安衛法第57条（表示等）第1項1ニ、安衛則第33条第1項2"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問8・枝5",b:"適用される法令",a:false,e:"定められていない"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問9・枝1",b:"溶融ガラスからガラス製品を成型する業務を行う屋内作業場 …………………………… 空気中の粉じんの濃度",a:false,e:"誤り：「粉じん濃度」⇒「気温、湿度及びふく射熱」。安衛則第587条（作業環境測定を行うべき作業場）8、第607条（気温、湿度等の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問9・枝2",b:"加硫がまによりゴムを加硫する業務を行う屋内作業場 ……………………………………… 気温及び湿度",a:true,e:"正しい：安衛則第587条（作業環境測定を行うべき作業場）9、第607条（気温、湿度等の測定）。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問9・枝3",b:"ドラムバーカーにより、木材を削皮する業務を行う屋内作業場 …………………………………… 等価騒音レベル",a:true,e:"正しい：安衛令第21条（作業環境測定を行うべき作業場）第1項3、安衛則第588条（著しい騒音を発する屋内作業場）6。安衛則第590条（騒音の測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問9・枝4",b:"エックス線装置を用いて透過写真撮影の業務を行う作業場の管理区域 ………………………… 線量当量率又は線量当量",a:true,e:"正しい：安衛令第21条第1項6、別表第 21、電離則第53条（作業環境測定を行うべき作業場）1、電離則第54条（線量当量率等の測定等）。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問9・枝5",b:"廃棄物の焼却施設において焼却灰を取り扱う業務(設備の解体等に伴うものを除く。)を行う作業場 ………………… 空気中のダイオキシン類の濃度",a:true,e:"正しい：安衛則第36条（特別の教育を必要とする業務）34、安衛則第592条の2（ダイオキシン類の濃度及び含有率の測定）。"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問10・枝1",b:"著しく湿潤な場所における業務",a:false,e:"※労基法第36条（時間外及び休日の労働）第6項1。（1）（3）（4）（5）超えてもよい（2）超えてはならない：労基則第18条第1項2 【労働衛生（有害業務に係るもの）】"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問10・枝2",b:"著しく寒冷な場所における業務",a:true,e:"超えてはならない：労基則第18条第1項2 【労働衛生（有害業務に係るもの）】"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問10・枝3",b:"情報機器を用いる計器監視作業の業務",a:false,e:"※労基法第36条（時間外及び休日の労働）第6項1。（1）（3）（4）（5）超えてもよい（2）超えてはならない：労基則第18条第1項2 【労働衛生（有害業務に係るもの）】"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問10・枝4",b:"病原体によって汚染されたものを取り扱う業務",a:false,e:"※労基法第36条（時間外及び休日の労働）第6項1。（1）（3）（4）（5）超えてもよい（2）超えてはならない：労基則第18条第1項2 【労働衛生（有害業務に係るもの）】"},
{c:"関係法令（有害業務）",y:"R8-4",s:"問10・枝5",b:"ヘリウム、アルゴン等の不活性の気体を入れたことのあるタンクの内部における業務",a:false,e:"超えてもよい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問11・枝1",b:"アクリロニトリル",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問11・枝2",b:"アンモニア",a:false,e:"誤り：アンモニアは、ガスとして存在する。特化物第3類物質。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問11・枝3",b:"エチレンオキシド",a:false,e:"誤り：エチレンオキシドは無色の気体で、ガスとして存在する。特化物第2類物質。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問11・枝4",b:"二酸化硫黄",a:false,e:"誤り：二酸化硫黄は、ガスとして存在する。特化則第3類物質。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問11・枝5",b:"ホルムアルデヒド",a:false,e:"誤り：ホルムアルデヒドは、ガスとして存在する。特化物第2類物質。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問12・枝1",b:"作業手順の改善",a:false,e:"。 4 化学物質等の有害性に応じた有効な保護具の使用："},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問12・枝2",b:"化学物質等に係る機械設備等の密閉化",a:false,e:"疾病のリスク低減措置の優先度が高い順は、次の通り。 1 危険性又は有害性のより低い物質への代替等の本質的対策：（3）。 2 化学物質等に係る機械設備等の密閉化、局所排気装置等の設置等の工学的対策：（2）（5）。 3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策：（1）。 4 化学物質"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問12・枝3",b:"危険性又は有害性のより低い物質への代替",a:true,e:"。 2 化学物質等に係る機械設備等の密閉化、局所排気装置等の設置等の工学的対策："},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問12・枝4",b:"化学物質等の有害性に応じた有効な保護具の使用",a:false,e:"リスク低減措置の優先順位として、保護具の使用は最も優先度が低い。有害性の除去・代替、工学的対策、管理的対策を優先した上で、最後の手段として保護具の使用を検討する。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問12・枝5",b:"化学物質等に係る機械設備等への局所排気装置の設置",a:false,e:"。 3 作業手順の改善、マニュアルの整備、立入禁止措置等の管理的対策："},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問13・枝1",b:"有機溶剤は、一般に揮発性が高く、その蒸気は空気より軽い。",a:false,e:"誤り：「軽い」⇒「重い」。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問13・枝2",b:"有機溶剤は、脂溶性が低いため、脂肪の多い脳などには入りにくい。",a:false,e:"誤り：「脂溶性が低いため、脂肪の多い脳などには入りにくい」⇒「脂溶性があり、脂肪の多い脳などには入りやすい」。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問13・枝3",b:"メタノールによる障害として顕著なものには、網膜の微細動脈瘤を伴う脳血管障害がある。",a:false,e:"誤り：メタノールの健康障害は、視神経障害である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問13・枝4",b:"二硫化炭素は、精神障害や意識障害を起こすことがある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問13・枝5",b:"N,N-ジメチルホルムアミドによる障害として顕著なものには、視力低下を伴う視神経障害がある。",a:false,e:"誤り：N,N-ジメチルホルムアミドの健康障害は、頭痛、めまい、肝機能障害等である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問14・枝1",b:"衛生管理者、安全衛生推進者等から騒音障害防止対策の管理者を選任し、ガイドラインで定める事項に取り組ませる必要がある。",a:false,e:"（1）（3）（4）（5）正しい（2）誤り：「聴覚保護具の使用」⇒「騒音発生源対策」。騒音対策で最も効果的なのが、騒音発生源対策である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問14・枝2",b:"騒音対策としては、騒音発生源対策、伝ぱ経路対策、受音者対策（聴覚保護具の使用、作業時間の制限）があるが、このうち聴覚保護具の使用が最優先の対策である。",a:true,e:"誤り：「聴覚保護具の使用」⇒「騒音発生源対策」。騒音対策で最も効果的なのが、騒音発生源対策である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問14・枝3",b:"屋内作業場では、原則として作業環境測定（定点測定）により等価騒音レベルの測定を行うが、騒音源が移動する場合には、個人ばく露測定により測定することができる。",a:false,e:"（1）（3）（4）（5）正しい（2）誤り：「聴覚保護具の使用」⇒「騒音発生源対策」。騒音対策で最も効果的なのが、騒音発生源対策である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問14・枝4",b:"雇い入れの際の騒音健康診断では、250Hz、500Hz、1,000Hz、2,000Hz、4,000Hz、6,000H z及び8,000Hzにおける聴力の検査を行う。",a:false,e:"（1）（3）（4）（5）正しい（2）誤り：「聴覚保護具の使用」⇒「騒音発生源対策」。騒音対策で最も効果的なのが、騒音発生源対策である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問14・枝5",b:"騒音健康診断結果に基づく事後措置を講じる際には、加齢性難聴の影響を考慮する必要がある。",a:false,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問15・枝1",b:"赤外線は、可視光線より波長が長い電磁波で、ガラス加工作業などでばく露のおそれがあり、白内障を起こすことがある。",a:true,e:"（1）（2）（3）（4）正しい（5）誤り：「アルファ線」⇒「ガンマ線」、「角膜の損傷」⇒「白内障」。ガンマ線は、セシウム137、コバルト60，イリジウム192などの放射性同位元素から放射される。本質的には、エックス線と同じもので、物体の透過力が強く非破壊検査や各種計器に利用される。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問15・枝2",b:"紫外線は、可視光線より波長が短い電磁波で、アーク溶接作業などでばく露のおそれがあり、電光性眼炎を起こすことがある。",a:true,e:"（1）（2）（3）（4）正しい（5）誤り：「アルファ線」⇒「ガンマ線」、「角膜の損傷」⇒「白内障」。ガンマ線は、セシウム137、コバルト60，イリジウム192などの放射性同位元素から放射される。本質的には、エックス線と同じもので、物体の透過力が強く非破壊検査や各種計器に利用される。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問15・枝3",b:"レーザー光線は、誘導放出による光の増幅によって人工的に作られた電磁波で、レーザー機器による金属加工作業などでばく露のおそれがあり、網膜の損傷を起こすことがある。",a:true,e:"（1）（2）（3）（4）正しい（5）誤り：「アルファ線」⇒「ガンマ線」、「角膜の損傷」⇒「白内障」。ガンマ線は、セシウム137、コバルト60，イリジウム192などの放射性同位元素から放射される。本質的には、エックス線と同じもので、物体の透過力が強く非破壊検査や各種計器に利用される。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問15・枝4",b:"マイクロ波は、赤外線より波長が長い電磁波で、熱接着加工作業などでばく露のおそれがあり、組織壊死を起こすことがある。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問15・枝5",b:"アルファ線は、セシウム 137 などの原子核から放出される電磁波で、物体への透過力が強く、非破壊検査作業などでばく露のおそれがあり、角膜の損傷を起こすことがある。",a:false,e:"誤り：「アルファ線」⇒「ガンマ線」、「角膜の損傷」⇒「白内障」。ガンマ線は、セシウム137、コバルト60，イリジウム192などの放射性同位元素から放射される。本質的には、エックス線と同じもので、物体の透過力が強く非破壊検査や各種計器に利用される。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問16・枝1",b:"直結式防毒マスクは、隔離式防毒マスクよりも有害ガスの濃度が高い大気中で使用することができる。",a:false,e:"誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問16・枝2",b:"ガス又は蒸気状の有害物質が粉じんと混在している作業環境中で防毒マスクを使用するときは、防じん機能を有する防毒マスクを選択する。",a:true,e:"（1）誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。（2）（3）（4）（5）正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問16・枝3",b:"酸素濃度18％未満の場所で使用できる呼吸用保護具には、送気マスク、空気呼吸器のほか、酸素呼吸器がある。",a:true,e:"（1）誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。（2）（3）（4）（5）正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問16・枝4",b:"聴覚保護具は、日本産業規格（JIS）に規定する試験方法により測定された遮音値を目安に、必要かつ十分な遮音値のものを選定する。",a:true,e:"（1）誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。（2）（3）（4）（5）正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問16・枝5",b:"保護めがねは、研磨、化学薬品取扱いなどの作業で、飛散する粒子、薬品の飛沫などによる眼の障害を防止するために使用する。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問17・枝1",b:"カドミウム中毒では、感情不安定、幻覚などの精神障害や手指の震えなどの症状がみられる。",a:false,e:"誤り：カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。設問の内容は、金属水銀中毒の症状である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問17・枝2",b:"クロム中毒では、貧血、腹部の疝痛などの症状がみられる。",a:false,e:"誤り：クロム中毒では、鼻中隔穿孔、肺がん、上気道がんを生じる。設問の内容は、鉛中毒の症状である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問17・枝3",b:"ベリリウム中毒では、溶血性貧血、尿の赤色化などの症状がみられる。",a:false,e:"誤り：ベリリウム中毒では、急性中毒で接触性皮膚炎、皮膚潰瘍、肺炎を生じる。設問の内容は、砒素中毒の症状である。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問17・枝4",b:"マンガン中毒では、指の骨の溶解、肝臓の血管肉腫などがみられる。",a:false,e:"誤り：マンガン中毒では、筋のこわばり、ふるえ、歩行困難などの神経症状がみられる。設問の内容は、塩化ビニル中毒による中毒。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問17・枝5",b:"金属水銀の標的臓器は脳で、その中毒では、手指の震え、精神障害などがみられる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問18・枝1",b:"建築ブース型フードは、作業面を除き周りが覆われているもので、囲い式フードに分類される。",a:true,e:"（1）（3）（4）（5）正しい（2）誤り：「吸い込み時の圧力損失が小さく、少ない排風量とすることができる」⇒「余分な空気を吸い込まねばならず、排風量を大きくする必要がある」。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問18・枝2",b:"外付け式フードは、有害物質の発散源の近くで有害物質を吸い込み気流によりフードまで吸引するものであり、囲い式フードと比較して吸い込み時の圧力損失が小さく、少ない排風量とすることができる。",a:false,e:"誤り：「吸い込み時の圧力損失が小さく、少ない排風量とすることができる」⇒「余分な空気を吸い込まねばならず、排風量を大きくする必要がある」。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問18・枝3",b:"フード開口部の周囲にフランジを付けることにより、フランジがないときと比較して、少ない排風量とすることができる。",a:true,e:"（1）（3）（4）（5）正しい（2）誤り：「吸い込み時の圧力損失が小さく、少ない排風量とすることができる」⇒「余分な空気を吸い込まねばならず、排風量を大きくする必要がある」。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問18・枝4",b:"ダクトの形状には円形、角形などがあるが、その断面積を小さくすると、ダクトの圧力損失が増大する。",a:true,e:"（1）（3）（4）（5）正しい（2）誤り：「吸い込み時の圧力損失が小さく、少ない排風量とすることができる」⇒「余分な空気を吸い込まねばならず、排風量を大きくする必要がある」。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問18・枝5",b:"排風機には、遠心式と軸流式があるが、いずれの方式の排風機も、一般に、空気清浄装置の後の清浄空気が通る位置に設置する。",a:true,e:"正しい"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問19・枝1",b:"有害業務への配置替えの際に行う特殊健康診断には、業務適性の判断と、その後の業務による影響を調べるための基礎資料を得るという目的がある。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問19・枝2",b:"特殊健康診断の実施に当たっては、現在の作業内容及び有害要因へのばく露状況を把握する必要がある。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問19・枝3",b:"体内に取り込まれた多くの有機溶剤は、生物学的半減期が短いので、有機溶剤等健康診断における尿中の代謝物の量の検査のための採尿の時刻は、厳重にチェックする必要がある。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問19・枝4",b:"眼底検査は、電離放射線健康診断で実施され、動脈硬化の進展の有無を検査する。",a:false,e:"誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問19・枝5",b:"振動工具取扱い作業者に対する特殊健康診断を1年に2回実施する場合、そのうち1回は冬季に行うとよい。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問20・枝1",b:"鉛・・・・・・・・・・・・・・・デルタアミノレブリン酸",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「馬尿酸」⇒「マンデル酸」【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問20・枝2",b:"スチレン・・・・・・・・・・・・馬尿酸",a:false,e:"誤り：「馬尿酸」⇒「マンデル酸」【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問20・枝3",b:"キシレン・・・・・・・・・・・・メチル馬尿酸",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「馬尿酸」⇒「マンデル酸」【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問20・枝4",b:"ノルマルヘキサン・・・・・・・・ 2,5-ヘキサンジオン",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：「馬尿酸」⇒「マンデル酸」【関係法令（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務）",y:"R8-4",s:"問20・枝5",b:"トリクロロエチレン・・・・・・・トリクロロ酢酸",a:true,e:"正しい。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問21・枝1",b:"常時300人以上の労働者を使用する各種商品小売業の事業場では、総括安全衛生管理者を選任しなければならない。",a:true,e:"正しい：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問21・枝2",b:"常時1,000人を超え2,000人以下の労働者を使用する事業場では、4人以上の衛生管理者を選任しなければならない。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問21・枝3",b:"常時900人の労働者を使用し、そのうち、深夜業を含む業務に常時100人の労働者を従事させる事業場では、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。",a:false,e:"誤り：専任が必要となる業務に該当しない。安衛則第7条（衛生管理者の選任）第1項5ロ、労基則第18条。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問21・枝4",b:"常時50人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3ロ。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問21・枝5",b:"常時1,000人以上の労働者を使用する事業場では、その事業場に専属の産業医を選任しなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問22・枝1",b:"産業医の選任は、選任すべき事由が発生した日から14日以内に行わなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任等）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問22・枝2",b:"常時使用する労働者数が2,000人を超える事業場では、産業医を2人以上選任しなければならない。",a:false,e:"誤り：「2，000 人を超える場合」⇒「3,000 人を超える場合」。安衛則第 13 条（産業医の選任等）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問22・枝3",b:"産業医が、事業者から、毎月1回以上、所定の情報の提供を受けている場合であって、事業者の同意を得ているときは、産業医の作業場等の巡視の頻度を、毎月1回以上から2か月に1回以上にすることができる。",a:true,e:"正しい：安衛則第15条（産業医の定期巡視）。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問22・枝4",b:"事業者は、産業医から労働者の健康管理等について勧告を受けたときは、当該勧告の内容及び当該勧告を踏まえて講じた措置の内容（措置を講じない場合にあっては、その旨及びその理由）を記録し、これを3年間保存しなければならない。",a:true,e:"正しい：安衛則第14条の3（産業医による勧告等）第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問22・枝5",b:"事業者は、産業医が辞任したとき又は産業医を解任したときは、遅滞なく、その旨及びその理由を衛生委員会又は安全衛生委員会に報告しなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任等）第4項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問23・枝1",b:"労働衛生コンサルタント試験には、保健衛生及び労働衛生工学の2つの区分がある。",a:true,e:"正しい：コンサル則第10条（試験の区分）。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問23・枝2",b:"労働衛生コンサルタント試験に合格した者は、厚生労働大臣の指定する指定登録機関に備える労働衛生コンサルタント名簿に、氏名、生年月日等所定の事項の登録を受けることにより、労働衛生コンサルタントとなることができる。",a:true,e:"正しい：安衛法第84条（登録）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問23・枝3",b:"労働衛生コンサルタントは、他人の求めに応じ報酬を得て、労働者の衛生の水準の向上を図るため、事業場の衛生についての診断及びこれに基づく指導を行うことを業とする。",a:true,e:"正しい：安衛法第81条（業務）第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問23・枝4",b:"労働衛生コンサルタントが、その業務に関して知り得た秘密を漏らし、又は盗用したときは、その登録を取り消されることがある。",a:true,e:"正しい：安衛法第85条（登録の取消し）第2項、安衛法第86条（義務）第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問23・枝5",b:"労働衛生コンサルタントの診断及び指導を受けた事業者は、その記録を作成して、これを3年間保存しなければならない。",a:false,e:"誤り：コンサルタントが依頼者の氏名等を記載して保存する義務はあるが、事業者に設問の義務を課した規定はない。安衛法第103条（書類の保存等）第3項、コンサルタント則第22条（帳簿）。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問24・枝1",b:"業務歴の調査",a:false,e:"該当しない"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問24・枝2",b:"腹囲の検査",a:true,e:"該当する：腹囲の検査は、定期健康診断において医師が必要でないと認めるときに省略できる項目である。安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問24・枝3",b:"胸部エックス線検査",a:true,e:"該当する：胸部エックス線検査は、定期健康診断において医師が必要でないと認めるときに省略できる項目である。安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問24・枝4",b:"貧血検査",a:true,e:"該当する：貧血検査は、定期健康診断において医師が必要でないと認めるときに省略できる項目である。安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問24・枝5",b:"心電図検査",a:true,e:"該当する：安衛則第44条第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問25・枝1",b:"面接指導の対象となる労働者の要件は、原則として、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり100時間を超え、かつ、疲労の蓄積が認められる者であることとする。",a:false,e:"誤り：「1か月当たり 100時間」⇒「1か月当たり 80時間」。安衛則第 52条の1（面接指導の対象となる労働者の要件等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問25・枝2",b:"事業者は、面接指導を実施するため、タイムカードによる記録等の客観的な方法その他の適切な方法により、労働者の労働時間の状況を把握しなければならない。",a:true,e:"正しい：安衛法第66条の8の3第1項、安衛則第52条の7の3（法第66条の8の3の厚生労働省令で定める方法等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問25・枝3",b:"面接指導の対象となる労働者は、事業者の指定した医師が行う面接指導を受けることを希望しない場合は、他の医師の行う面接指導を受け、その結果を証明する書面を事業者に提出することができる。",a:true,e:"正しい：安衛法第66条の8（面接指導等）第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問25・枝4",b:"事業者は、面接指導の結果に基づき、労働者の健康を保持するために必要な措置について、原則として、面接指導が行われた後、遅滞なく、医師の意見を聴かなければならない。",a:true,e:"正しい：安衛則第52条の7（面接指導結果についての医師からの意見聴取）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問25・枝5",b:"事業者は、面接指導の結果に基づき、当該面接指導の結果の記録を作成して、これを5年間保存しなければならない。",a:true,e:"正しい：安衛則第52条の6（面接指導結果の記録の作成）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問26・枝1",b:"衛生委員会の議長を除く委員の半数は、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者が指名しなければならない。",a:false,e:"誤り：「代表する者」⇒「代表する者の推薦に基づき指名された者」。安衛法第 17 条（安全委員会）第4項、安衛法第18条（衛生委員会）第4項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問26・枝2",b:"産業医のうち衛生委員会の委員として指名することができるのは、当該事業場に専属の産業医に限られる。",a:false,e:"誤り：専属でなくともよい。安衛法第18条（衛生委員会）第2項3。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問26・枝3",b:"当該事業場の労働者で、作業環境測定を実施している作業環境測定士であるものを衛生委員会の委員として指名することはできない。",a:false,e:"誤り：指名できる。安衛法第18条（衛生委員会）第2項4。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問26・枝4",b:"衛生委員会の付議事項には、労働基準監督官から文書により指導を受けた事項のうち、労働者の健康障害の防止に関することが含まれる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第3項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問26・枝5",b:"衛生委員会は、毎月1回以上開催し、全ての議事の概要を記録して、これを2年間保存しなければならない。",a:false,e:"誤り：「2年間」⇒「3年間」。安衛則第23条（委員会の会議）第1項、第4項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問27・枝1",b:"有害業務を行っていない事業場において、窓その他の開口部の直接外気に向かって開放することができる部分の面積が、常時床面積の20分の1以上である屋内作業場に、換気設備を設けていない。",a:false,e:"違反していない：安衛則第601条（換気）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問27・枝2",b:"常時40人の労働者を就業させている屋内作業場の気積が、設備の占める容積及び床面から3 mを超える高さにある空間を除き400㎥となっている。",a:false,e:"違反していない：400㎥／40人＝10となり、1人について10㎥以上を満たす。安衛則第600 条（気積）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問27・枝3",b:"男性5人を含む常時30人の労働者が就業している事業場で、女性用には臥床することのできる休養室を設けているが、男性用には、臥床することのできない休憩設備を利用させている。",a:false,e:"違反していない：設問は、男性5人、女性25人で常時30人なので、男性用と女性用に区別する要件に達していない。安衛則第618条（休養室等）。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問27・枝4",b:"労働者を常時就業させる場所の作業面の照度を、精密な作業については350ルクス、粗な作業については150ルクスとしている。",a:false,e:"違反していない：安衛則第604条（照度）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問27・枝5",b:"事業場に附属する炊事場の入口には、洗浄剤を含浸させたマットを設置して、土足のままでも立ち入ることができるようにしている。",a:true,e:"違反している：炊事場専用の履物を備え、土足のまま立ち入らせてはならない。安衛則第630 条（食堂及び炊事場）第1項15。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問28・枝1",b:"中央管理方式の空気調和設備を設けた建築物内の事務室については、所定の頻度で、空気中の一酸化炭素及び二酸化炭素の含有率、室温及び外気温並びに相対湿度を測定しなければならない。",a:true,e:"正しい：事務所則第7条（作業環境測定等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問28・枝2",b:"空気調和設備の冷却塔、冷却水の水管及び加湿装置の清掃を、それぞれ1年以内ごとに1回、定期に、行わなければならない。",a:true,e:"正しい：事務所則第9条の2第1項5。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問28・枝3",b:"機械による換気のための設備については、6か月以内ごとに1回、定期に、異常の有無を点検しなければならない。",a:false,e:"誤り：「6か月以内ごとに1回」⇒「2か月以内ごとに1回」。事務所則第9条（点検等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問28・枝4",b:"室の照明設備については、6か月以内ごとに1回、定期に、点検しなければならない。",a:true,e:"正しい：事務所則第10条（照度等）第3項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問28・枝5",b:"燃焼器具を使用するときは、発熱量が著しく少ないものを除き、毎日、異常の有無を点検しなければならない。",a:true,e:"正しい：事務所則第6条（燃焼器具）第2項。"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問30・枝1",b:"45 270 80 360",a:false,e:"労基法第36条（時間外及び休日の労働）第4項、第5項「労使協定による時間外労働の限度時間は、変形労働時間制が適用されていない労働者については、 1か月について45時間、1年について360時間とされている。ただし、事業場において通常予見することのできない業務量の大幅な増加等に伴い、臨時的に限度時間"},
{c:"関係法令（有害業務以外）",y:"R8-4",s:"問30・枝2",b:"45 360 80 720",a:false,e:"労基法第36条（時間外及び休日の労働）第4項、第5項「労使協定による時間外労働の限度時間は、変形労働時間制が適用されていない労働者については、 1か月について45時間、1年について360時間とされている。ただし、事業場において通常予見することのできない業務量の大幅な増加等に伴い、臨時的に限度時間"},

{c:"関係法令（有害業務以外）",y:"R8-4",s:"問30・枝5",b:"80 720 120 960",a:false,e:"労基法第36条（時間外及び休日の労働）第4項、第5項「労使協定による時間外労働の限度時間は、変形労働時間制が適用されていない労働者については、 1か月について45時間、1年について360時間とされている。ただし、事業場において通常予見することのできない業務量の大幅な増加等に伴い、臨時的に限度時間"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問31・枝1",b:"16.0 0.1",a:false,e:"（1）（2）（3）（5）適切でない（4）適切 ◎偽陽性率…「疾病無しの者」は、160 人+795 人＝955 人となる。また、疾病無しで陽性（偽陽性）と判定する人は160人となる。この結果、偽陽性率は（160人÷955人）×100％＝16.75…⇒16.8％となる。 ◎偽陰性率…「疾病有りの者"},

{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問31・枝4",b:"16.8 22.2",a:true,e:"適切 ◎偽陽性率…「疾病無しの者」は、160 人+795 人＝955 人となる。また、疾病無しで陽性（偽陽性）と判定する人は160人となる。この結果、偽陽性率は（160人÷955人）×100％＝16.75…⇒16.8％となる。 ◎偽陰性率…「疾病有りの者」は35人+10人＝45人となる。また、疾病有りで陰性（偽陰性）と判定する人は10人となる。この結果、偽陰性率は（10人÷45人）×100％＝22.22…⇒22.2％ となる。"},

{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問32・枝1",b:"毒素型食中毒は、食物に付着した細菌により産生された毒素によって起こる食中毒で、カンピロバクターによるものなどがある。",a:false,e:"誤り：毒素型食中毒の代表的な細菌は、黄色ブドウ球菌やボツリヌス菌である。カンピロバクターは感染型食中毒の代表的な細菌。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問32・枝2",b:"ボツリヌス菌による毒素は、神経毒である。",a:true,e:"（1）誤り：毒素型食中毒の代表的な細菌は、黄色ブドウ球菌やボツリヌス菌である。カンピロバクターは感染型食中毒の代表的な細菌。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問32・枝3",b:"黄色ブドウ球菌による毒素は、熱に強い。",a:true,e:"（1）誤り：毒素型食中毒の代表的な細菌は、黄色ブドウ球菌やボツリヌス菌である。カンピロバクターは感染型食中毒の代表的な細菌。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問32・枝4",b:"腸炎ビブリオ菌は、病原性好塩菌ともいわれる。",a:true,e:"（1）誤り：毒素型食中毒の代表的な細菌は、黄色ブドウ球菌やボツリヌス菌である。カンピロバクターは感染型食中毒の代表的な細菌。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問32・枝5",b:"ノロウイルスの失活化には、煮沸消毒又は塩素系の消毒剤が効果的である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問33・枝1",b:"一次救命処置は、できる限り単独で行うことは避け、大声で周囲に呼びかけ、応援を求める。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：「胸骨の上半分」⇒「胸骨の下半分」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問33・枝2",b:"傷病者の胸と腹部の動きを観察し、胸と腹部が上下に動いていない場合やよくわからない場合には、心停止とみなし、心肺蘇生を開始する。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：「胸骨の上半分」⇒「胸骨の下半分」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問33・枝3",b:"胸骨圧迫は、胸が約5cm 沈む強さで胸骨の上半分を圧迫し、1分間に 100～120 回のテンポで行う。",a:false,e:"誤り：「胸骨の上半分」⇒「胸骨の下半分」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問33・枝4",b:"気道を確保するためには、片手で額を押さえながら、もう一方の手の指であご先を上に引き上げるようにする。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：「胸骨の上半分」⇒「胸骨の下半分」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問33・枝5",b:"AED(自動体外式除細動器)を用いた場合、電気ショックを行った後や電気ショック不要の音声メッセージが出たときは、胸骨圧迫を再開し、心肺蘇生を続ける。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問34・枝1",b:"温度感覚を左右する環境要素は、気温、湿度、気流及びふく射(放射)熱である。",a:true,e:"（1）（2）（3）（4）正しい（5）誤り：「基準値未満である場合」⇒「基準値を超える場合」。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問34・枝2",b:"実効温度は、人の温熱感に基礎を置いた指標で、気温、湿度及び気流の総合効果を温度目盛りで表したものである。",a:true,e:"（1）（2）（3）（4）正しい（5）誤り：「基準値未満である場合」⇒「基準値を超える場合」。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問34・枝3",b:"相対湿度は、空気中の水蒸気量と、その温度における飽和水蒸気量との比を百分率で示したものである。",a:true,e:"（1）（2）（3）（4）正しい（5）誤り：「基準値未満である場合」⇒「基準値を超える場合」。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問34・枝4",b:"WBGTは、自然湿球温度、黒球温度及び気温（乾球温度）から求められる指標で、暑熱環境による熱ストレス評価に用いられる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問34・枝5",b:"算出したWBGTの値が、作業内容に応じて設定されたWBGT基準値未満である場合には、熱中症が発生するリスクが高まる。",a:false,e:"誤り：「基準値未満である場合」⇒「基準値を超える場合」。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問35・枝1",b:"健康保持増進措置は、主に生活習慣上の課題を有する労働者の健康状態の改善を目指すために個々の労働者に対して実施するものと、事業場全体の健康状態の改善や健康保持増進に係る取組の活性化等、生活習慣上の課題の有無に関わらず労働者を集団として捉えて実施するものがある。",a:false,e:"（1）（2）（3）（4）正しい。（5）誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問35・枝2",b:"健康保持増進に関する課題の把握や目標の設定等においては、労働者の健康状態等を客観的に把握できる数値を活用することが望ましい。",a:false,e:"（1）（2）（3）（4）正しい。（5）誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問35・枝3",b:"健康測定の結果に基づき行う健康指導には、運動指導、メンタルヘルスケア、栄養指導、口腔保健指導、保健指導が含まれる。",a:false,e:"（1）（2）（3）（4）正しい。（5）誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問35・枝4",b:"健康保持増進対策の推進に当たっては、事業者が労働者等の意見を聴きつつ事業場の実態に即した取組を行うため、労使、産業医、衛生管理者等で構成される衛生委員会等を活用する。",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問35・枝5",b:"医療保険者と連携したコラボヘルス等の労働者の健康保持増進対策を推進するためであっても、定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に提供してはならない。",a:true,e:"誤り：コラボヘルス等の労働者の健康保持増進対策を推進するため、労働安全衛生法に基づく定期健康診断の結果の記録等、労働者の健康状態等が把握できる客観的な数値等を医療保険者に共有することが必要である。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問36・枝1",b:"単純骨折とは、骨にひびが入った状態をいう。",a:false,e:"誤り：単純骨折とは、皮膚に損傷がなく、皮膚の下で骨が折れている状態をいう。骨にひびが入った状態は、単純骨折の不完全骨折に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問36・枝2",b:"不完全骨折では、骨折端どうしが擦れ合う軋轢音や変形などが認められる。",a:false,e:"誤り：「不完全骨折」⇒「完全骨折」。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問36・枝3",b:"骨折が疑われる部位は、よく動かしてその程度を判断する必要がある。",a:false,e:"誤り：「よく動かしてその程度を判断する必要がある」⇒「動かさないようにする」。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問36・枝4",b:"骨折に対する処置として、副子を手や足に当てるときは、骨折部分の上下の関節まで固定できる長さで、かつ、幅の広いものを用いる。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問36・枝5",b:"脊髄損傷が疑われる場合は、硬い板の上に乗せて搬送してはならない。",a:false,e:"誤り：脊髄損傷が疑われる場合は、硬い板の上にのせて固定し、搬送する。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問37・枝1",b:"虚血性の脳血管疾患である脳梗塞は、脳血管自体の動脈硬化性病変による脳塞栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳血栓症に分類される。",a:false,e:"誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問37・枝2",b:"高血圧性脳症は、急激な血圧上昇が誘因となって、脳が腫脹する病気で、頭痛、悪心、嘔吐、意識障害、視力障害、けいれんなどの症状がみられる。",a:true,e:"（1）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。（2）（3）（4）（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問37・枝3",b:"虚血性心疾患は、冠動脈による心筋への血液の供給が不足したり途絶えることにより起こる心筋障害である。",a:true,e:"（1）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。（2）（3）（4）（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問37・枝4",b:"虚血性心疾患は、心筋の一部分に可逆的な虚血が起こる狭心症と、不可逆的な心筋壊死が起こる心筋梗塞とに大別される。",a:true,e:"（1）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。（2）（3）（4）（5）正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問37・枝5",b:"運動負荷心電図検査は、虚血性心疾患の発見に有用である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問38・枝1",b:"著しく重心の偏っている荷物は、その旨を明示する。",a:true,e:"（1）（3）（4）（5）正しい（2）誤り：「全員に･･･使用させる」⇒「個人により効果が異なるため、一律に使用するのではなく、個人ごとに効果を確認してから使用の可否を判断する。」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問38・枝2",b:"労働者全員に腰部保護ベルトを使用させる。",a:false,e:"誤り：「全員に･･･使用させる」⇒「個人により効果が異なるため、一律に使用するのではなく、個人ごとに効果を確認してから使用の可否を判断する。」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問38・枝3",b:"満 18 歳以上の男性労働者が人力のみにより取り扱う物の重量は、体重のおおむね 40％以下とする。",a:true,e:"（1）（3）（4）（5）正しい（2）誤り：「全員に･･･使用させる」⇒「個人により効果が異なるため、一律に使用するのではなく、個人ごとに効果を確認してから使用の可否を判断する。」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問38・枝4",b:"床面などから荷物を持ち上げる場合には、片足を少し前に出し、膝を曲げ、腰を十分に降ろして当該荷物をかかえ、膝を伸ばすことによって立ち上がるようにする。",a:true,e:"（1）（3）（4）（5）正しい（2）誤り：「全員に･･･使用させる」⇒「個人により効果が異なるため、一律に使用するのではなく、個人ごとに効果を確認してから使用の可否を判断する。」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問38・枝5",b:"当該作業に配置する際及びその後6か月以内ごとに1回、定期に、腰痛の健康診断を実施する。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問39・枝1",b:"14人",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量（㎥/h）＝ ×1,000,000 室内二酸化炭素基準濃度― 外気の二酸化炭素濃度在室者人数＝X 在室者全員が1時間に呼出する二酸化炭素量＝0.018㎥/h 室内二酸化炭素基準濃度＝1,000ppm 外気の二酸化炭素濃度＝400ppm"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問39・枝2",b:"16人",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量（㎥/h）＝ ×1,000,000 室内二酸化炭素基準濃度― 外気の二酸化炭素濃度在室者人数＝X 在室者全員が1時間に呼出する二酸化炭素量＝0.018㎥/h 室内二酸化炭素基準濃度＝1,000ppm 外気の二酸化炭素濃度＝400ppm"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問39・枝3",b:"18人",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量（㎥/h）＝ ×1,000,000 室内二酸化炭素基準濃度― 外気の二酸化炭素濃度在室者人数＝X 在室者全員が1時間に呼出する二酸化炭素量＝0.018㎥/h 室内二酸化炭素基準濃度＝1,000ppm 外気の二酸化炭素濃度＝400ppm"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問39・枝4",b:"20人",a:true,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量（㎥/h）＝ ×1,000,000 室内二酸化炭素基準濃度― 外気の二酸化炭素濃度在室者人数＝X 在室者全員が1時間に呼出する二酸化炭素量＝0.018㎥/h 室内二酸化炭素基準濃度＝1,000ppm 外気の二酸化炭素濃度＝400ppm"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問39・枝5",b:"22人",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量（㎥/h）＝ ×1,000,000 室内二酸化炭素基準濃度― 外気の二酸化炭素濃度在室者人数＝X 在室者全員が1時間に呼出する二酸化炭素量＝0.018㎥/h 室内二酸化炭素基準濃度＝1,000ppm 外気の二酸化炭素濃度＝400ppm"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問40・枝1",b:"照度の単位はルクスで、1ルクスは光度1カンデラの光源から10m離れた所で、その光に直角な面が受ける明るさに相当する。",a:false,e:"誤り：「10m」⇒「1m」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問40・枝2",b:"高齢者は、若年者に比較して、一般に、高い照度が必要であるが、水晶体の混濁により、まぶしさを感じやすくなっている場合もあるので、注意が必要である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問40・枝3",b:"部屋の彩色に当たり、目の高さから上の壁及び天井は、まぶしさを防ぐため濁色にするとよい。",a:false,e:"誤り：「まぶしさを防ぐため濁色」⇒「照明効果を上げるために白などの明るい色」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問40・枝4",b:"前方から明かりをとるとき、目と光源を結ぶ線と視線とが作る角度は、30°以下になるようにする。",a:false,e:"誤り：「30°以下」⇒「30°以上」"},
{c:"労働衛生（有害業務以外）",y:"R8-4",s:"問40・枝5",b:"全般照明の照度は、作業面の局部照明による照度の10分の1以下になるようにする。",a:false,e:"誤り：「10分の1以下」⇒「10分の1以上」【労働生理】"},
{c:"労働生理",y:"R8-4",s:"問41・枝1",b:"物理化学的な刺激の量と人間が意識する感覚の強度とは、直線的な比例関係にある。",a:false,e:"誤り：物理化学的な刺激の量と人間が意識する感覚の強度とは、直線的な比例関係ではない。感覚を感じる最少の刺激量（閾値）を超えると意識する感覚の強さが急に強くなり、刺激量が非常に大きいときはその変化を感じにくくなる関係がある。"},
{c:"労働生理",y:"R8-4",s:"問41・枝2",b:"皮膚感覚には、触圧覚、痛覚、温度覚（温覚・冷覚）などがあり、これらのうち冷覚を感じる冷覚点の密度は他の感覚点に比べて高い。",a:false,e:"誤り：「冷覚点の密度」⇒「痛覚点の密度」。"},
{c:"労働生理",y:"R8-4",s:"問41・枝3",b:"内臓感覚は、内臓の動き、炎症などを感じて、内臓痛などとして部位の特定ができる鋭敏な感覚である。",a:false,e:"誤り：内臓感覚は、内臓の動きや炎症などを感じて、内臓痛などを認識する感覚で、感度は高くない。誤って別の個所の痛みを感じることを関連痛と呼ぶ。"},
{c:"労働生理",y:"R8-4",s:"問41・枝4",b:"網膜の錐状体は色を感じ、杆状体は明暗を感じる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R8-4",s:"問41・枝5",b:"平衡感覚に関係する器官である前庭及び半規管は、中耳にあって、体の傾きや回転の方向を知覚する。",a:false,e:"誤り：前庭及び半規管は、内耳にある。"},
{c:"労働生理",y:"R8-4",s:"問42・枝1",b:"無機塩及びビタミン類は、酵素による分解を受けないでそのまま吸収される。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「胆汁は、酸性」⇒「胆汁は、アルカリ性」。"},
{c:"労働生理",y:"R8-4",s:"問42・枝2",b:"唾液の成分は、ほとんどが水であるが、デンプンをより小さい糖に分解する消化酵素を含む。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「胆汁は、酸性」⇒「胆汁は、アルカリ性」。"},
{c:"労働生理",y:"R8-4",s:"問42・枝3",b:"ペプシノーゲンは、胃酸によってペプシンという消化酵素になり、蛋白質を分解する。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「胆汁は、酸性」⇒「胆汁は、アルカリ性」。"},
{c:"労働生理",y:"R8-4",s:"問42・枝4",b:"胆汁は、酸性で、消化酵素は含まないが、食物中の脂肪を乳化させ、脂肪分解の働きを助ける。",a:false,e:"誤り：「胆汁は、酸性」⇒「胆汁は、アルカリ性」。"},
{c:"労働生理",y:"R8-4",s:"問42・枝5",b:"小腸の表面は、ビロード状の絨毛という小突起で覆われており、栄養素の吸収の効率を上げるために役立っている。",a:true,e:"正しい。"},
{c:"労働生理",y:"R8-4",s:"問43・枝1",b:"神経細胞の細胞体が集合しているところを、中枢神経系では神経節といい、末梢神経系では神経核という。",a:false,e:"誤り：「神経節」⇒「神経核」、「神経核」⇒「神経節」。神経細胞の細胞体が集合しているところを、中枢神経系では神経核といい、末梢神経系では神経節という。"},
{c:"労働生理",y:"R8-4",s:"問43・枝2",b:"中枢神経系は、脳と脊髄から成る。",a:true,e:"（1）誤り：「神経節」⇒「神経核」、「神経核」⇒「神経節」。神経細胞の細胞体が集合しているところを、中枢神経系では神経核といい、末梢神経系では神経節という。（2）（3）（4）（5）正しい。"},
{c:"労働生理",y:"R8-4",s:"問43・枝3",b:"有髄神経線維は、無髄神経線維よりも神経伝導速度が速い。",a:true,e:"（1）誤り：「神経節」⇒「神経核」、「神経核」⇒「神経節」。神経細胞の細胞体が集合しているところを、中枢神経系では神経核といい、末梢神経系では神経節という。（2）（3）（4）（5）正しい。"},

let wrongIds=new Set(JSON.parse(localStorage.getItem('wrongIds')||'[]'));
let bookmarkIds=new Set(JSON.parse(localStorage.getItem('bookmarkIds')||'[]'));
let catStats=JSON.parse(localStorage.getItem('catStats')||'{}');
let totalAnswered=parseInt(localStorage.getItem('totalAnswered')||'0');
let totalCorrect=parseInt(localStorage.getItem('totalCorrect')||'0');
let examDate=localStorage.getItem('examDate')||'';
let sessionOrder=[],sessionIdx=0,sessionCorrect=0,sessionWrong=0,sessionAnswered=false,isReviewMode=false,catOpen=false;

function save(){
  localStorage.setItem('wrongIds',JSON.stringify([...wrongIds]));
  localStorage.setItem('bookmarkIds',JSON.stringify([...bookmarkIds]));
  localStorage.setItem('catStats',JSON.stringify(catStats));
  localStorage.setItem('totalAnswered',totalAnswered);
  localStorage.setItem('totalCorrect',totalCorrect);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* 試験日カウントダウン */
function showDatePicker(){
  const inp=document.getElementById('exam-date-input');
  inp.style.display=inp.style.display==='none'?'block':'none';
  if(examDate)inp.value=examDate;
}
function setExamDate(val){
  examDate=val;localStorage.setItem('examDate',val);
  document.getElementById('exam-date-input').style.display='none';
  updateCountdown();
}
function updateCountdown(){
  const el=document.getElementById('countdown-days');
  const btn=document.getElementById('set-date-btn');
  if(!examDate){el.textContent='―';btn.textContent='試験日を設定';return;}
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);
  const diff=Math.ceil((exam-today)/(1000*60*60*24));
  el.textContent=diff>=0?diff:'終了';
  btn.textContent=new Date(examDate).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})+'に変更';
}

/* 科目別グラフ */
function buildGraph(){
  const body=document.getElementById('graph-body');
  body.innerHTML='';
  Object.keys(CATS).forEach(cat=>{
    const st=catStats[cat]||{a:0,t:0};
    const pct=st.t>0?Math.round(st.a/st.t*100):0;
    const col=CATS[cat].bar;
    const row=document.createElement('div');
    row.className='graph-row';
    row.innerHTML=`<div class="graph-cat">${CATS[cat].short}</div><div class="graph-bar-wrap"><div class="graph-bar-fill" style="width:${pct}%;background:${col};"></div></div><div class="graph-pct" style="color:${pct>=80?'#1D9E75':pct>=60?'#EF9F27':'#e24b4a'}">${pct}%</div><div class="graph-count">${st.t}問</div>`;
    body.appendChild(row);
  });
}

/* ホーム構築 */
function buildHome(){
  updateCountdown();buildGraph();
  document.getElementById('h-wrong').textContent=wrongIds.size;
  document.getElementById('h-acc').textContent=totalAnswered>0?Math.round(totalCorrect/totalAnswered*100)+'%':'―';
  const panel=document.getElementById('cat-panel');
  panel.innerHTML='';
  Object.keys(CATS).forEach(cat=>{
    const total=Q.filter(q=>q.c===cat).length;
    const wrong=Q.map((q,i)=>({q,i})).filter(x=>x.q.c===cat&&wrongIds.has(x.i)).length;
    const st=catStats[cat]||{a:0,t:0};
    const pct=st.t>0?Math.round(st.a/st.t*100):0;
    const item=document.createElement('div');
    item.className='cat-item';
    item.innerHTML=`<div class="cat-dot" style="background:${CATS[cat].bar};"></div><div class="cat-item-name">${cat}</div><div class="cat-item-pct" style="color:${CATS[cat].color};">${pct}%</div>${wrong>0?`<span class="cat-wrong-badge">✕${wrong}</span>`:''}<div class="cat-item-count">${total}問</div>`;
    item.onclick=()=>startCat(cat);
    panel.appendChild(item);
  });
  const wc=wrongIds.size;
  document.getElementById('review-count').textContent=wc+'問';
  document.getElementById('review-card').classList.toggle('disabled',wc===0);
  const bc=bookmarkIds.size;
  document.getElementById('bm-count').textContent=bc+'問';
  document.getElementById('bm-card').classList.toggle('disabled',bc===0);
}

function toggleCat(){
  catOpen=!catOpen;
  document.getElementById('cat-panel').classList.toggle('open',catOpen);
  document.getElementById('cat-arrow').textContent=catOpen?'∨':'›';
}

/* セッション開始 */
function startRandom(){isReviewMode=false;sessionOrder=shuffle(Q.map((_,i)=>i)).slice(0,20);startSession('ランダム 20問');}
function startCat(cat){isReviewMode=false;sessionOrder=shuffle(Q.map((_,i)=>i).filter(i=>Q[i].c===cat));startSession(cat);}
function startReview(){if(wrongIds.size===0)return;isReviewMode=true;sessionOrder=shuffle([...wrongIds]);startSession('復習モード');}
function retryWrong(){if(wrongIds.size===0){goHome();return;}isReviewMode=true;sessionOrder=shuffle([...wrongIds]);startSession('復習モード');}

function startSession(title){
  sessionIdx=0;sessionCorrect=0;sessionWrong=0;sessionAnswered=false;
  document.getElementById('quiz-title').textContent=title;
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('screen-home').style.display='none';
  document.getElementById('screen-bookmark').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  document.getElementById('fixed-bottom').style.display='block';
  document.getElementById('ox-btns').style.display='grid';
  document.getElementById('btn-next').style.display='none';
  loadQ();
}

function loadQ(){
  const qIdx=sessionOrder[sessionIdx];
  const q=Q[qIdx];
  document.getElementById('quiz-num').textContent=`${sessionIdx+1}/${sessionOrder.length}`;
  document.getElementById('q-year').textContent=q.y;
  document.getElementById('q-cat').textContent=CATS[q.c]?CATS[q.c].short:q.c;
  document.getElementById('q-rev').style.display=isReviewMode?'inline-block':'none';
  document.getElementById('q-stem').innerHTML=`<strong>【問】</strong>${q.s}`;
  document.getElementById('q-branch').textContent=q.b;
  document.getElementById('bm-btn').style.opacity=bookmarkIds.has(qIdx)?'1':'0.4';
  const bo=document.getElementById('btn-o'),bx=document.getElementById('btn-x');
  bo.className='ox-btn';bo.disabled=false;
  bx.className='ox-btn';bx.disabled=false;
  document.getElementById('result-badge').style.display='none';
  document.getElementById('explanation').style.display='none';
  document.getElementById('ox-btns').style.display='grid';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('prog').style.width=Math.round(sessionIdx/sessionOrder.length*100)+'%';
  document.getElementById('sc').textContent=sessionCorrect;
  document.getElementById('sw').textContent=sessionWrong;
  document.getElementById('sa').textContent=sessionIdx>0?Math.round(sessionCorrect/sessionIdx*100)+'%':'―';
  sessionAnswered=false;
  /* カードの先頭にスクロール */
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleBookmark(){
  const qIdx=sessionOrder[sessionIdx];
  if(bookmarkIds.has(qIdx))bookmarkIds.delete(qIdx);
  else bookmarkIds.add(qIdx);
  document.getElementById('bm-btn').style.opacity=bookmarkIds.has(qIdx)?'1':'0.4';
  save();
}

function answer(isTrue){
  if(sessionAnswered)return;
  sessionAnswered=true;
  const qIdx=sessionOrder[sessionIdx];
  const q=Q[qIdx];
  const ok=isTrue===q.a;
  const bo=document.getElementById('btn-o'),bx=document.getElementById('btn-x');
  bo.disabled=true;bx.disabled=true;
  if(isTrue)bo.classList.add(ok?'correct':'wrong');
  else bx.classList.add(ok?'correct':'wrong');
  if(ok){sessionCorrect++;wrongIds.delete(qIdx);}
  else{sessionWrong++;wrongIds.add(qIdx);}
  if(!catStats[q.c])catStats[q.c]={a:0,t:0};
  catStats[q.c].t++;if(ok)catStats[q.c].a++;
  totalAnswered++;if(ok)totalCorrect++;
  save();
  const rb=document.getElementById('result-badge');
  rb.style.display='block';rb.className='result-badge '+(ok?'ok':'ng');
  rb.textContent=ok?'✅ 正解！':`❌ 不正解　正解は${q.a?'○':'×'}`;
  document.getElementById('explanation').innerHTML=`<strong>解説：</strong>${q.e}`;
  document.getElementById('explanation').style.display='block';
  document.getElementById('sc').textContent=sessionCorrect;
  document.getElementById('sw').textContent=sessionWrong;
  document.getElementById('sa').textContent=Math.round(sessionCorrect/(sessionIdx+1)*100)+'%';
  /* 固定ボタンを「次へ」に切り替え */
  document.getElementById('ox-btns').style.display='none';
  const nb=document.getElementById('btn-next');
  nb.style.display='block';
  nb.textContent=sessionIdx<sessionOrder.length-1?'次へ →':'結果を見る →';
}

function nextQ(){
  sessionIdx++;
  if(sessionIdx>=sessionOrder.length)showResult();
  else loadQ();
}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-screen').style.display='block';
  document.getElementById('fixed-bottom').style.display='none';
  const total=sessionOrder.length;
  const pct=Math.round(sessionCorrect/total*100);
  document.getElementById('rs-score').textContent=`${sessionCorrect}/${total}`;
  document.getElementById('rs-msg').textContent=pct>=80?'🎉 合格圏内です！':pct>=60?'もう少し！':'要復習';
  document.getElementById('rs-sub').textContent=`正答率 ${pct}%`;
  document.getElementById('prog').style.width='100%';
  const rb=document.getElementById('rs-retry');
  rb.style.display=sessionWrong>0?'block':'none';
  if(sessionWrong>0)rb.textContent=`間違えた${sessionWrong}問を復習`;
}

/* ブックマーク一覧 */
function showBookmarks(){
  if(bookmarkIds.size===0)return;
  document.getElementById('screen-home').style.display='none';
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-bookmark').style.display='block';
  const list=document.getElementById('bm-list');
  list.innerHTML='<div class="bm-title">🔖 ブックマーク済み問題</div>';
  [...bookmarkIds].forEach(idx=>{
    const q=Q[idx];
    const div=document.createElement('div');
    div.className='bm-item';
    div.innerHTML=`<div class="bm-item-cat">${q.c} · ${q.y}</div><div class="bm-item-text">${q.b}</div>`;
    div.onclick=()=>{isReviewMode=false;sessionOrder=[idx];startSession('ブックマーク');};
    list.appendChild(div);
  });
}

function goHome(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-bookmark').style.display='none';
  document.getElementById('screen-home').style.display='block';
  buildHome();
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
buildHome();
</script>
