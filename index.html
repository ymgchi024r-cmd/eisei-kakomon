{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問32・枝1",b:"温度感覚を左右する環境要素は、気温、湿度及び気流であり、この三要素によって温熱環境が定まる。",a:false,e:"誤り：「気温、湿度及び気流であり、この三つの要素」⇒「気温、湿度、気流及びふく射熱（放射熱）であり、この四つの要素」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問32・枝2",b:"実効温度は、人の温熱感に基礎を置いた指標で、気温、湿度及び気流の総合効果を温度目盛りで表したものである。",a:true,e:"記述のとおり。実効温度（ET）は、気温、湿度、気流の3要素の総合効果を温度目盛りで表した温熱指標である。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問32・枝3",b:"相対湿度は、空気中の水蒸気量と、その温度における飽和水蒸気量との比を百分率で示したものである。",a:true,e:"（1）誤り：「気温、湿度及び気流であり、この三つの要素」⇒「気温、湿度、気流及びふく射熱（放射熱）であり、この四つの要素」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問32・枝4",b:"WBGTは、暑熱環境による熱ストレスの評価に用いられる指標で、日射がない場合は、自然湿球温度と黒球温度の測定値から算出される。",a:true,e:"（1）誤り：「気温、湿度及び気流であり、この三つの要素」⇒「気温、湿度、気流及びふく射熱（放射熱）であり、この四つの要素」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問32・枝5",b:"WBGT基準値は、暑熱順化者に用いる値の方が、暑熱非順化者に用いる値より大きな値となる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問33・枝1",b:"ディスプレイは、おおむね50cmの視距離が確保できるようにしている。",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問33・枝2",b:"間接照明の照明器具を用いてグレアを防ぐようにしている。",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問33・枝3",b:"一連続作業時間が1時間を超えないようにし、次の連続作業までの間に5分の作業休止時間を設けている。",a:true,e:"誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問33・枝4",b:"情報機器作業に係る定期健康診断は、1年以内ごとに1回、定期に実施している。",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「5分の作業休止時間」⇒「10～15分の作業休止時間」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問33・枝5",b:"1日の情報機器作業の作業時間が4時間未満である労働者については、自覚症状を訴える者についてのみ、情報機器作業に係る定期健康診断の対象としている。",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問34・枝1",b:"潤いへの配慮",a:false,e:"誤り：事務所の環境管理における配慮事項として「潤いへの配慮」は、事務所衛生基準規則に規定されていない。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問34・枝2",b:"個人差への配慮",a:false,e:"（1）～（4）正しい。（5）誤り：「快適な職場環境の基準値の達成」は「考慮すべき事項」として定められていない。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問34・枝3",b:"労働者の意見の反映",a:false,e:"（1）～（4）正しい。（5）誤り：「快適な職場環境の基準値の達成」は「考慮すべき事項」として定められていない。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問34・枝4",b:"継続的かつ計画的な取組",a:false,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問34・枝5",b:"快適な職場環境の基準値の達成",a:true,e:"誤り：「快適な職場環境の基準値の達成」は「考慮すべき事項」として定められていない。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問35・枝1",b:"作業動作、作業姿勢についての作業標準の策定は、その作業に従事する全ての労働者に一律な作業をさせることになり、個々の労働者の腰痛の発生要因の排除又は低減ができないため、腰痛の予防対策としては適切ではない。",a:false,e:"誤り：指針には、「腰痛の発生要因を排除又は低減できるよう、作業標準を策定すること。」また「作業標準は、個々の労働者の健康状態・特性・技能レベル等を考慮して個別の作業内容に応じたものにしていく必要があるため、定期的に確認し見直すこと。」が定められている。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問35・枝2",b:"介護・看護作業に常時従事する労働者に対しては、当該作業に配置する際及びその後6か月以内ごとに1回、定期に、医師による腰痛の健康診断を行う。",a:true,e:"記述のとおり。腰痛健康診断は、重量物取扱い作業や介護・看護作業等に従事する労働者に対し、配置時及び6か月以内ごとに1回実施する。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問35・枝3",b:"重量物取扱い作業の場合、満18歳以上の男性労働者が人力のみにより取り扱う物の重量は、体重のおおむね40％以下とする。",a:true,e:"（1）誤り：指針には、「腰痛の発生要因を排除又は低減できるよう、作業標準を策定すること。」また「作業標準は、個々の労働者の健康状態・特性・技能レベル等を考慮して個別の作業内容に応じたものにしていく必要があるため、定期的に確認し見直すこと。」が定められている。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問35・枝4",b:"重量物取扱い作業の場合、満18歳以上の女性労働者が人力のみにより取り扱う物の重量は、男性が取り扱うことのできる重量の60％位までとする。",a:true,e:"（1）誤り：指針には、「腰痛の発生要因を排除又は低減できるよう、作業標準を策定すること。」また「作業標準は、個々の労働者の健康状態・特性・技能レベル等を考慮して個別の作業内容に応じたものにしていく必要があるため、定期的に確認し見直すこと。」が定められている。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問35・枝5",b:"床面などから荷物を持ち上げる場合には、片足を少し前に出し、膝を曲げ、腰を十分に降ろして当該荷物をかかえ、膝を伸ばすことによって立ち上がるようにする。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問36・枝1",b:"経営トップ自らが、高齢者労働災害防止対策に取り組む姿勢を示し、企業全体の安全意識を高めるため、高齢者労働災害防止対策に関する事項を盛り込んだ安全衛生方針を表明する。",a:true,e:"適切である。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問36・枝2",b:"高齢者労働災害防止対策には、事業場全体で取り組むことが重要であることから、対策を推進するための特定の部署や担当者を指定することは避けるようにする。",a:false,e:"適切でない：「特定の部署や担当者を指定することは避けるようにする」⇒「高齢者労働災害防止対策に取り組む組織や担当者を指定する等により、高齢者労働災害防止対策の実施体制を明確化すること」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問36・枝3",b:"身体機能が低下した高年齢労働者であっても安全に働き続けることができるよう、事業場の施設、設備、装置等の改善を行うが、危険を知らせるための警報音等は、年齢によらず聞き取りやすい高音域の音を採用するとよい。",a:false,e:"適切でない：「高音域の音」⇒「中低音域の音」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問36・枝4",b:"高年齢労働者が自らの身体機能の維持向上に取り組めるよう、高年齢労働者を対象とした体力チェックを継続的に行うことが望ましいが、個々の労働者に対する不利益につながるおそれがあることから、体力チェックの評価基準は設けないようにする。",a:false,e:"適切でない：「体力チェックの評価基準は設けないようにする」⇒「安全作業に必要な体力について定量的に測定する手法及び評価基準は安全衛生委員会等の審議を踏まえてルール化することが望ましい」。なお、指針には、体力チェックの評価基準を設けない場合及び設ける場合の考慮事項が示されている。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問36・枝5",b:"高年齢労働者は、十分な経験を有しているため、改めて安全衛生教育を行うことは高年齢労働者の自尊心を損なうおそれがあるばかりでなく、長時間にわたり教育を行うことは身体面の負担が大きいことから、最小限の時間と内容で行うことが望ましい。",a:false,e:"適切でない：「高年齢労働者を対象とした教育においては、作業内容とそのリスクについての理解を得やすくするため、十分な時間をかけ、写真や図、映像等の文字以外の情報も活用すること。高年齢労働者が、再雇用や再就職等により経験のない業種や業務に従事する場合には、特に丁寧な教育訓練を行うこと。」とされており、設問は適切ではない。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問37・枝1",b:"出血性の脳血管障害は、脳表面のくも膜下腔に出血するくも膜下出血、脳実質内に出血する脳出血などに分類される。",a:true,e:"（1）（3）～（5）正しい（2）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問37・枝2",b:"虚血性の脳血管障害である脳梗塞は、脳血管自体の動脈硬化性病変による脳塞栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳血栓症に分類される。",a:false,e:"誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問37・枝3",b:"虚血性心疾患は、冠動脈による心筋への血液の供給が不足したり途絶えることにより起こる心筋障害である。",a:true,e:"記述のとおり。虚血性心疾患は、冠動脈の狭窄や閉塞により心筋への血液供給が不足・途絶することで起こる心筋障害である。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問37・枝4",b:"心筋梗塞では、突然激しい胸痛が起こり、「締め付けられるように痛い」、「胸が苦しい」などの症状が、1時間以上続くこともある。",a:true,e:"（1）（3）～（5）正しい（2）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問37・枝5",b:"運動負荷心電図検査は、虚血性心疾患の発見に有用である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問38・枝1",b:"感染が成立し、症状が現れるまでの人をキャリアといい、感染したことに気付かずに病原体をばらまく感染源になることがある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「解熱してもほとんど変化しない」⇒「解熱とともに減少する」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問38・枝2",b:"インフルエンザウイルスにはA型、B型及びC型の三つの型があるが、流行の原因となるのは、主として、A型及びB型である。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「解熱してもほとんど変化しない」⇒「解熱とともに減少する」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問38・枝3",b:"インフルエンザ発症後のウイルスの排出期間は、一般的に7日間程度であるが、この間、排出されるウイルスの量は、解熱してもほとんど変化しない。",a:false,e:"誤り：「解熱してもほとんど変化しない」⇒「解熱とともに減少する」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問38・枝4",b:"結核は、初期症状は風邪とよく似ているが、2週間以上続く咳や痰及び微熱や倦怠感がある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「解熱してもほとんど変化しない」⇒「解熱とともに減少する」。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問38・枝5",b:"風しんは、発熱、発疹、リンパ節腫脹を特徴とするウイルス性発疹症で、免疫のない女性が妊娠初期に風しんにかかると、胎児に感染し出生児が先天性風しん症候群（CRS）となる危険性がある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問39・枝1",b:"腸炎ビブリオ菌は、熱に強い。",a:false,e:"誤り：「熱に強い」⇒「熱に弱い」。腸炎ビブリオ菌は病原性好塩菌ともいわれ、真水や熱に弱い。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問39・枝2",b:"サルモネラ菌による食中毒は、鶏卵が原因となることがある。",a:true,e:"記述のとおり。サルモネラ菌は鶏卵や食肉を介して食中毒を引き起こすことがあり、十分な加熱が予防に重要である。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問39・枝3",b:"黄色ブドウ球菌による食中毒は、食品に付着した菌が食品中で増殖した際に生じる毒素により発症する。",a:true,e:"（1）誤り：「熱に強い」⇒「熱に弱い」。腸炎ビブリオ菌は病原性好塩菌ともいわれ、真水や熱に弱い。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問39・枝4",b:"ウェルシュ菌、セレウス菌及びカンピロバクターは、いずれも細菌性食中毒の原因菌である。",a:true,e:"（1）誤り：「熱に強い」⇒「熱に弱い」。腸炎ビブリオ菌は病原性好塩菌ともいわれ、真水や熱に弱い。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問39・枝5",b:"ノロウイルスによる食中毒は、冬季に集団食中毒として発生することが多く、潜伏期間は、1 ～2日間である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問40・枝1",b:"体内の全血液量は、体重の約8%で、その約3分の1を短時間に失うと生命が危険な状態となる。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：「静脈性出血」⇒「毛細血管性出血」。静脈性出血は、浅い切り傷にみられ、傷口からゆっくり、とぎれることなくあふれるような出血である。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問40・枝2",b:"静脈性出血は、擦り傷のときにみられ、傷口から少しずつにじみ出るような出血である。",a:false,e:"誤り：「静脈性出血」⇒「毛細血管性出血」。静脈性出血は、浅い切り傷にみられ、傷口からゆっくり、とぎれることなくあふれるような出血である。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問40・枝3",b:"止血を行うときは、受傷者の血液による処置者への感染防止のため、ビニール手袋を着用したりビニール袋を活用するようにする。",a:true,e:"記述のとおり。止血の際は、受傷者の血液からの感染を防ぐため、ビニール手袋やビニール袋を活用して直接血液に触れないようにする。"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問40・枝4",b:"止血法には、直接圧迫法、間接圧迫法などがあるが、一般人が行う応急手当としては直接圧迫法が推奨されている。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：「静脈性出血」⇒「毛細血管性出血」。静脈性出血は、浅い切り傷にみられ、傷口からゆっくり、とぎれることなくあふれるような出血である。【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R6-10",s:"問40・枝5",b:"間接圧迫法は、出血部位より心臓に近い部位の動脈を圧迫する方法で、止血点を指で骨に向けて強く圧迫する。",a:true,e:"正しい。"},
{c:"労働生理",y:"R6-10",s:"問41・枝1",b:"赤血球数",a:false,e:"誤り：赤血球数は血液検査の一般的な項目であるが、本問で問われている検査項目には該当しない。"},
{c:"労働生理",y:"R6-10",s:"問41・枝2",b:"ヘモグロビン量",a:false,e:"（1）～（3）（5）性差がある。（4）差がない：血小板数は、正常値に男女差がない。"},
{c:"労働生理",y:"R6-10",s:"問41・枝3",b:"ヘマトクリット値",a:false,e:"（1）～（3）（5）性差がある。（4）差がない：血小板数は、正常値に男女差がない。"},
{c:"労働生理",y:"R6-10",s:"問41・枝4",b:"血小板数",a:true,e:"差がない：血小板数は、正常値に男女差がない。"},
{c:"労働生理",y:"R6-10",s:"問41・枝5",b:"基礎代謝量",a:false,e:"性差がある。"},
{c:"労働生理",y:"R6-10",s:"問42・枝1",b:"肺循環により左心房に戻ってきた血液は、左心室を経て大動脈に入る。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「左心房」⇒「右心房」。"},
{c:"労働生理",y:"R6-10",s:"問42・枝2",b:"大動脈を流れる血液は動脈血であるが、肺動脈を流れる血液は静脈血である。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「左心房」⇒「右心房」。"},
{c:"労働生理",y:"R6-10",s:"問42・枝3",b:"心拍数は、左心房に存在する洞結節からの電気刺激によってコントロールされている。",a:false,e:"誤り：「左心房」⇒「右心房」。"},
{c:"労働生理",y:"R6-10",s:"問42・枝4",b:"心臓の拍動による動脈圧の変動を末梢の動脈で触知したものを脈拍といい、一般に、手首の橈骨動脈で触知する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「左心房」⇒「右心房」。"},
{c:"労働生理",y:"R6-10",s:"問42・枝5",b:"心筋は人間の意思によって動かすことができない不随意筋であるが、随意筋である骨格筋と同じ横紋筋に分類される。",a:true,e:"正しい。"},
{c:"労働生理",y:"R6-10",s:"問43・枝1",b:"横隔膜が下がり、胸郭内の内圧が低くなるにつれ、気道を経て肺内へ流れ込む空気が呼気である。",a:false,e:"誤り：「呼気」⇒「吸気」。"},
{c:"労働生理",y:"R6-10",s:"問43・枝2",b:"呼吸に関与する筋肉は、間脳の視床下部にある呼吸中枢によって支配されている。",a:false,e:"誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R6-10",s:"問43・枝3",b:"肺胞内の空気と肺胞を取り巻く毛細血管中の血液との間で行われるガス交換は、外呼吸である。",a:true,e:"正しい。"},
{c:"労働生理",y:"R6-10",s:"問43・枝4",b:"身体活動時には、血液中の窒素分圧の上昇により呼吸中枢が刺激され、1回換気量及び呼吸数が増加する。",a:false,e:"誤り：「窒素分圧」⇒「二酸化炭素」。"},
{c:"労働生理",y:"R6-10",s:"問43・枝5",b:"チェーンストークス呼吸とは、肺機能の低下により呼吸数が増加した状態をいい、喫煙が原因となることが多い。",a:false,e:"誤り：「呼吸数が増加した状態」⇒「呼吸をしていない状態から次第に呼吸が深まり、やがて再び浅くなって呼吸が止まる状態を交互に繰り返すパターンの呼吸のこと」、「喫煙」⇒「心不全や脳卒中」。"},
{c:"労働生理",y:"R6-10",s:"問44・枝1",b:"ブドウ糖とアミノ酸は、小腸の繊毛の毛細血管に吸収され、門脈を通って肝臓に運ばれる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R6-10",s:"問44・枝2",b:"無機塩及びビタミン類は、酵素による分解を受けないでそのまま吸収される。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R6-10",s:"問44・枝3",b:"胆汁はアルカリ性で、蛋白質を分解するトリプシンなどの消化酵素を含んでいる。",a:false,e:"誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R6-10",s:"問44・枝4",b:"胃は、塩酸やペプシノーゲンを分泌して消化を助けるが、水分の吸収はほとんど行わない。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「蛋白質を分解するトリプシンなどの消化酵素を含んでいる」⇒「消化酵素を含まない」。"},
{c:"労働生理",y:"R6-10",s:"問44・枝5",b:"吸収された栄養分は、血液やリンパによって組織に運搬されてエネルギー源などとして利用される。",a:true,e:"正しい。"},
{c:"労働生理",y:"R6-10",s:"問45・枝1",b:"寒冷な環境においては、皮膚の血管が拡張して血流量を増し、皮膚温を上昇させる。",a:false,e:"誤り：「皮膚の血管が拡張して血流量を増し、皮膚温を上昇させる」⇒「皮膚の血管は収縮して熱の放散を減らす」。"},
{c:"労働生理",y:"R6-10",s:"問45・枝2",b:"暑熱な環境においては、内臓の血流量が増加し体内の代謝活動が亢進することにより、人体からの熱の放散が促進される。",a:false,e:"誤り：「内臓の血流量が増加し体内の代謝活動が亢進することにより」⇒「皮膚の血流量を多くして、発汗量を増やすことにより」。"},
{c:"労働生理",y:"R6-10",s:"問45・枝3",b:"体温調節のように、外部環境が変化しても身体内部の状態を一定に保つ生体の仕組みを同調性といい、筋肉と神経系により調整されている。",a:false,e:"誤り：「同調性」⇒「恒常性」、「筋肉と神経系により調節」⇒「神経系（自律神経）と内分泌系（ホルモン）により調節」。"},
{c:"労働生理",y:"R6-10",s:"問45・枝4",b:"体温調節中枢は、小脳にあり、熱の産生と放散のバランスを維持し体温を一定に保つよう機能している。",a:false,e:"誤り：「小脳」⇒「間脳の視床下部」。"},
{c:"労働生理",y:"R6-10",s:"問45・枝5",b:"甲状腺ホルモンの分泌により、代謝が亢進し、体温は上昇する。",a:true,e:"正しい。"},
{c:"労働生理",y:"R6-10",s:"問46・枝1",b:"耳は、聴覚と平衡感覚をつかさどる器官で、外耳、中耳及び内耳の三つの部位に分けられる。",a:true,e:"記述のとおり。耳は聴覚と平衡感覚を担う器官で、外耳（耳介・外耳道）、中耳（鼓膜・耳小骨）、内耳（蝸牛・前庭・半規管）の三部位から成る。"},
{c:"労働生理",y:"R6-10",s:"問46・枝2",b:"耳介で集められた音は、鼓膜を振動させ、その振動は耳小骨によって増幅され、内耳に伝えられる。",a:true,e:"（1）～（3）（5）：正しい（4）誤り：「音の振幅の大きさ」⇒「周波数」。大きな振動は大きな音として伝えられる。"},
{c:"労働生理",y:"R6-10",s:"問46・枝3",b:"内耳は、前庭、半規管及び蝸牛(うずまき管)の三つの部位からなり、前庭と半規管が平衡感覚、蝸牛が聴覚をそれぞれ分担している。",a:true,e:"（1）～（3）（5）：正しい（4）誤り：「音の振幅の大きさ」⇒「周波数」。大きな振動は大きな音として伝えられる。"},
{c:"労働生理",y:"R6-10",s:"問46・枝4",b:"内耳に伝わった音の振動は、蝸牛の中のリンパ液を介して有毛細胞に伝わり、この時、音の振幅の大きさによって異なる部位の有毛細胞が振動することによって音の高さの違いが伝えられる。",a:false,e:"誤り：「音の振幅の大きさ」⇒「周波数」。大きな振動は大きな音として伝えられる。"},
{c:"労働生理",y:"R6-10",s:"問46・枝5",b:"鼓室は、耳管によって咽頭に通じており、その内圧は外気圧と等しく保たれている。",a:true,e:"：正しい"},
{c:"労働生理",y:"R6-10",s:"問47・枝1",b:"神経細胞の細胞体が集合しているところを、中枢神経系では神経節といい、末梢神経系では神経核という。",a:false,e:"誤り：「神経節」⇒「神経核」、「神経核」⇒「神経節」。神経細胞の細胞体が集合しているところを、中枢神経系では神経核といい、末梢神経系では神経節という。"},
{c:"労働生理",y:"R6-10",s:"問47・枝2",b:"小脳は、随意運動、平衡機能などの調整に関与しており、小脳が侵されると運動失調が生じる。",a:true,e:"記述のとおり。小脳は身体の平衡保持や随意運動の調整を司り、小脳が障害されると運動失調（協調運動障害）が生じる。"},
{c:"労働生理",y:"R6-10",s:"問47・枝3",b:"体性神経には感覚器官からの情報を中枢に伝える感覚神経と、中枢からの命令を運動器官に伝える運動神経がある。",a:true,e:"（1）誤り：「神経節」⇒「神経核」、「神経核」⇒「神経節」。神経細胞の細胞体が集合しているところを、中枢神経系では神経核といい、末梢神経系では神経節という。（2）～（5）正しい"},
{c:"労働生理",y:"R6-10",s:"問47・枝4",b:"自律神経系は、内臓、血管、腺などの不随意筋に広く分布し、各種臓器の消化、呼吸、循環などの機能を意志とは関係なく調節している。",a:true,e:"（1）誤り：「神経節」⇒「神経核」、「神経核」⇒「神経節」。神経細胞の細胞体が集合しているところを、中枢神経系では神経核といい、末梢神経系では神経節という。（2）～（5）正しい"},
{c:"労働生理",y:"R6-10",s:"問47・枝5",b:"交感神経と副交感神経は、同一器官に分布していても、その作用はほぼ正反対であり、例えば、交感神経は心拍数を増加し、消化管の運動を抑制するが、副交感神経は心拍数を減少し、消化管の運動を亢進する。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-10",s:"問48・枝1",b:"代謝において、細胞に取り入れられた体脂肪、グリコーゲンなどが分解されてエネルギーを発生し、ATPが合成されることを同化という。",a:false,e:"誤り：「同化」⇒「異化」。"},
{c:"労働生理",y:"R6-10",s:"問48・枝2",b:"代謝において、体内に摂取された栄養素が、種々の化学反応によって、細胞を構成する蛋白質などの生体に必要な物質に合成されることを異化という。",a:false,e:"誤り：「異化」⇒「同化」。"},
{c:"労働生理",y:"R6-10",s:"問48・枝3",b:"エネルギー代謝率は、一定時間中に体内で消費された酸素と排出された二酸化炭素の容積比である。",a:false,e:"誤り：「一定時間中に体内で消費された酸素と排出された二酸化炭素の容積比」⇒「作業に要したエネルギー量を基礎代謝量で割った値」。"},
{c:"労働生理",y:"R6-10",s:"問48・枝4",b:"基礎代謝量は、安静時における心臓の拍動、呼吸、体温保持などに必要な代謝量で、睡眠中の測定値で表される。",a:false,e:"誤り：「睡眠中の測定値」⇒「目を覚ました状態で横臥し、安静に保った状態の測定値」。"},
{c:"労働生理",y:"R6-10",s:"問48・枝5",b:"メッツ（METs）は、身体活動の強度を示す指標で、座位安静時の酸素消費量に対する運動時の酸素消費量で表される。",a:true,e:"正しい。"},
{c:"労働生理",y:"R6-10",s:"問49・枝1",b:"抗原とは、免疫に関係する細胞によって異物として認識される物質のことである。",a:false,e:"誤り：抗原の定義は正しいが、本問では「抗原」ではなく「抗体」について問われている可能性がある。出題の文脈を確認すること。"},
{c:"労働生理",y:"R6-10",s:"問49・枝2",b:"抗原となる物質には、蛋白質、糖質などがある。",a:true,e:"（1）～（4）正しい（5）誤り：「Tリンパ球」⇒「Bリンパ球」、「Bリンパ球」⇒「Tリンパ球」。血液中の抗体を作るB リンパ球と、細胞性免疫の作用を持つTリンパ球という。"},
{c:"労働生理",y:"R6-10",s:"問49・枝3",b:"抗体とは、体内に入ってきた抗原に対して体液性免疫において作られる免疫グロブリンと呼ばれる蛋白質のことである。",a:true,e:"（1）～（4）正しい（5）誤り：「Tリンパ球」⇒「Bリンパ球」、「Bリンパ球」⇒「Tリンパ球」。血液中の抗体を作るB リンパ球と、細胞性免疫の作用を持つTリンパ球という。"},
{c:"労働生理",y:"R6-10",s:"問49・枝4",b:"好中球は白血球の一種であり、偽足を出してアメーバ様運動を行い、体内に侵入してきた細菌などを貪食する。",a:true,e:"正しい"},
{c:"労働生理",y:"R6-10",s:"問49・枝5",b:"リンパ球には、血液中の抗体を作るTリンパ球と、細胞性免疫の作用を持つBリンパ球がある。",a:true,e:"誤り：「Tリンパ球」⇒「Bリンパ球」、「Bリンパ球」⇒「Tリンパ球」。血液中の抗体を作るB リンパ球と、細胞性免疫の作用を持つTリンパ球という。"},
{c:"労働生理",y:"R6-10",s:"問50・枝1",b:"ネフロン(腎単位)は、尿を生成する単位構造で、1個の腎小体とそれに続く1本の尿細管から成り、1個の腎臓中に約100万個ある。",a:true,e:"記述のとおり。ネフロン（腎単位）は腎小体と尿細管からなる尿生成の機能単位で、片側の腎臓に約100万個存在する。"},
{c:"労働生理",y:"R6-10",s:"問50・枝2",b:"腎臓の腎小体では、糸球体から血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：尿素窒素（BUN）は血液の検査項目である。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R6-10",s:"問50・枝3",b:"腎臓の尿細管では、原尿に含まれる大部分の水分及び身体に必要な成分が血液中に再吸収され、残りが尿として生成される。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：尿素窒素（BUN）は血液の検査項目である。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R6-10",s:"問50・枝4",b:"尿の約95%は水分で、約5%が固形物であるが、その成分が全身の健康状態をよく反映するので、尿を採取して尿素窒素の検査が広く行われている。",a:false,e:"誤り：尿素窒素（BUN）は血液の検査項目である。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R6-10",s:"問50・枝5",b:"尿の生成・排出により、体内の水分の量やナトリウムなどの電解質の濃度を調節するとともに、生命活動によって生じた不要な物質を排出する。",a:true,e:"正しい。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問1・枝1",b:"衛生管理者は、3人以上選任しなければならない。",a:true,e:"正しい：「500人を超え1,000人以下の事業場」に該当する。安衛則第7条（衛生管理者の選任）第1項4。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問1・枝2",b:"衛生管理者のうち1人を、衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。",a:false,e:"誤り：「多量の低温物体を取り扱う業務に100人が常時従事している事業場」「特定化学物質のうち第三類物質を製造する業務に20人が常時従事している事業場」は、衛生工学衛生管理者の選任要件には該当しない。安衛則第7条（衛生管理者の選任）第1項6。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問1・枝3",b:"衛生管理者のうち少なくとも1人を、専任の衛生管理者としなければならない。",a:true,e:"正しい：「常時500人を超え、多量の低温物体を取り扱う業務に30人以上が常時従事している事業場」は、少なくとも1人を専任の衛生管理者に選任しなければならない。安衛則第7条（衛生管理者の選任）第1項5ロ。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問1・枝4",b:"産業医としての法定の要件を満たしている医師で、この事業場に専属でないものを産業医として選任することができる。",a:true,e:"正しい：「深夜業を含む業務に常時 500 人以上の労働者を従事させる事業場」に該当しない。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問1・枝5",b:"特定化学物質作業主任者を選任しなければならない。",a:true,e:"正しい：特定化学物質のうち第三類物質を製造する業務は、特定化学物質作業主任者を選任しなければならない。安衛令第6条（作業主任者を選任すべき作業）第1項18。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問2・枝1",b:"鉛化合物を製造する工程において鉛等の溶融を行う屋内の作業場所に設置した局所排気装置",a:false,e:"1年以内ごとに1回：鉛則第35条（局所排気装置等の定期自主検査）第2項1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問2・枝2",b:"セメントを袋詰めする屋内の作業箇所に設置した局所排気装置に設けた除じん装置",a:false,e:"1年以内ごとに1回：粉じん則第17条（局所排気装置等の定期自主検査）第2項1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問2・枝3",b:"トルエンを用いて洗浄を行う屋内の作業場所に設置したプッシュプル型換気装置",a:false,e:"1年以内ごとに1回：有機則第20 条の 2（プッシュプル型換気装置の定期自主検査）第 2 項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問2・枝4",b:"弗化水素を含有する気体を排出する製造設備の排気筒に設置した排ガス処理装置",a:false,e:"1年以内ごとに1回：特化則第30条（定期自主検査）第1項3。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問2・枝5",b:"硫酸を取り扱う特定化学設備",a:true,e:"2年以内ごとに1回：特定化学設備の定期自主検査は、2年以内ごとに1回とされている。特化則第31条（定期自主検査）第1項1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問3・枝1",b:"潜水器",a:true,e:"記述のとおり。潜水器は、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される機械等に該当する。安衛令第13条。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問3・枝2",b:"一酸化炭素用防毒マスク",a:true,e:"該当する：一酸化炭素用防毒マスクは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第29号。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問3・枝3",b:"ろ過材及び面体を有する防じんマスク",a:true,e:"該当する：防じんマスクは、厚生労働大臣が定める規格を具備しなければ譲渡等が制限される。安衛令第13条第3項第28号。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問3・枝4",b:"放射性物質による汚染を防止するための防護服",a:false,e:"該当しない：防護服は該当しない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問3・枝5",b:"排気量40㎤以上の内燃機関を内蔵するチェーンソー",a:true,e:"該当する。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問4・枝1",b:"潜水士免許",a:true,e:"記述のとおり。潜水士免許は、都道府県労働局長が与える免許である。安衛法第72条、安衛令第20条第9号。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問4・枝2",b:"高圧室内作業主任者免許",a:true,e:"安衛法第14条（作業主任者）、安衛則第16条（作業主任者の選任）及び別表第1。（1）～（3）（5）規定されている。（4）定められていない：石綿作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明する文書であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問4・枝3",b:"エックス線作業主任者免許",a:true,e:"安衛法第14条（作業主任者）、安衛則第16条（作業主任者の選任）及び別表第1。（1）～（3）（5）規定されている。（4）定められていない：石綿作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明する文書であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問4・枝4",b:"石綿作業主任者免許",a:false,e:"定められていない：石綿作業主任者は、技能講習を修了した者に交付される修了証がその資格を証明する文書であり、免許ではない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問4・枝5",b:"ガンマ線透過写真撮影作業主任者免許",a:true,e:"規定されている。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問5・枝1",b:"著しい騒音を発する一定の屋内作業場については、6か月以内ごとに1回、定期に、等価騒音レベルを測定しなければならない。",a:true,e:"正しい：安衛法第65条（作業環境測定）第1項、安衛令第21条（作業環境測定を行うべき作業場）第1項3、第590条（騒音の測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問5・枝2",b:"硫化水素濃度が5ppmを超える場所には、関係者以外の者が立ち入ることを禁止し、かつ、その旨を見やすい箇所に表示しなければならない。",a:false,e:"誤り：「5ppmを超える」⇒「10ppmを超える」。安衛則第585条（立入禁止等）第1項4。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問5・枝3",b:"廃棄物の焼却施設において焼却灰を取り扱う業務（設備の解体等に伴うものを除く。）を行う作業場については、6か月以内ごとに1回、定期に、当該作業場における空気中のダイオキシン類の濃度を測定しなければならない。",a:true,e:"正しい：安衛則第592条の2（ダイオキシン類の濃度及び含有率の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問5・枝4",b:"屋内作業場に多量の熱を放散する溶融炉があるときは、加熱された空気を直接屋外に排出し、又はその放射するふく射熱から労働者を保護する措置を講じなければならない。",a:true,e:"正しい：安衛則第608条（ふく射熱からの保護）第1項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問5・枝5",b:"著しく暑熱又は多湿の作業場においては、坑内等特殊な作業場でやむを得ない事由がある場合を除き、休憩の設備を作業場外に設けなければならない",a:true,e:"正しい：安衛則第614条（有害作業場の休憩設備）。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問6・A",b:"特別管理物質を製造する作業場所に設けられた密閉する設備、局所排気装置又はプッシュプル型換気装置の定期自主検査の記録又はその写し",a:false,e:"定められていない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問6・B",b:"特別管理物質を製造する作業場において、労働者が常時従事した作業の概要及び当該作業に従事した期間等の記録又はその写し",a:false,e:"定められている：特化則第53条2。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問6・C",b:"特別管理物質を製造する屋内作業場について行った作業環境測定の記録又はその写し",a:false,e:"定められている：特化則第53条1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問6・D",b:"特別管理物質を製造し、又は取り扱う作業に係る特定化学物質作業主任者の選任の記録又はその写し",a:false,e:"定められていない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問6・E",b:"特別管理物質を製造する業務に常時従事する労働者に対し行った特定化学物質健康診断の結果に基づく特定化学物質健康診断個人票又はその写し",a:false,e:"定められている：特化則第53条3。したがって、BとCとEが定められているものの組み合わせとなる。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問7・枝1",b:"表示対象物質を容器に入れ、又は包装して、譲渡し、又は提供するときはその容器又は包装に名称等を表示しなければならない。",a:false,e:"正しい：安衛法第57条（表示等）第1項1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問7・枝2",b:"表示対象物質を容器に入れ、かつ、包装して、譲渡し、又は提供するときは、その包装に名称等を表示しなければならない。",a:true,e:"誤り：「その包装に」⇒「その容器に」。表示対象物質を容器に入れ、かつ、包装して、譲渡し、又は提供するときは、その容器に名称等を表示しなければならない。安衛法第57条（表示等）第 1項1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問7・枝3",b:"表示対象物質を容器に入れ、又は包装する以外の方法により譲渡し、又は提供するときは、表示すべき事項を記載した文書を、譲渡し、又は提供する相手方に交付しなければならない。",a:false,e:"正しい：安衛法第57条の2（文書の交付等）第1項2。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問7・枝4",b:"容器又は包装に表示事項等の全てを印刷し、又は表示事項等の全てを印刷した票箋を貼り付けることが困難なときは、表示事項等のうち名称以外のものについては、これらを印刷した票箋を容器又は包装に結びつけることにより表示することができる。",a:false,e:"正しい：安衛則第32条（名称等の表示）。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問7・枝5",b:"表示対象物質を原材料等として新規に採用し、又は変更するときは、当該物質による危険性又は有害性等を調査しなければならない。",a:false,e:"正しい：安衛則第34条の2の7（リスクアセスメントの実施時期等）。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問8・枝1",b:"第一種酸素欠乏危険作業を行う作業場については、その日の作業を開始する前に、当該作業場における空気中の硫化水素の濃度を測定しなければならない。",a:false,e:"誤り：「硫化水素」⇒「酸素」。硫化水素を測定するのは第二種酸素欠乏危険作業。酸欠則第 2 条（定義）、酸欠則第3条（作業環境測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問8・枝2",b:"し尿を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、指揮者を選任し、作業を指揮させなければならない。",a:true,e:"正しい：酸欠則第25条の2（設備の改造等の作業）。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問8・枝3",b:"酸素又は硫化水素の濃度が法定の基準を満たすようにするために酸素欠乏危険作業を行う場所を換気するときは、純酸素を使用してはならない。",a:true,e:"正しい：酸欠則第5条（換気）第2項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問8・枝4",b:"労働者が酸素欠乏症等にかかったときは、遅滞なく、その旨を当該作業を行う場所を管轄する労働基準監督署長に報告しなければならない。",a:true,e:"正しい：酸欠則第29条（事故等の報告）。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問8・枝5",b:"酸素欠乏危険作業に労働者を従事させるときは、労働者を当該作業を行う場所に入場させ、及び退場させる時に、人員を点検しなければならない。",a:true,e:"正しい：酸欠則第8条（人員の点検）第1項。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問9・枝1",b:"チッパーによりチップする業務を行う屋内作業場における等価騒音レベルの測定。",a:false,e:"該当しない：チッパーによりチップする業務は作業環境測定を行う必要があるが、作業環境測定士による測定が義務付けられる指定作業場には該当しない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問9・枝2",b:"放射線業務を行う作業場のうち管理区域に該当する部分についての外部放射線による線量当量の測定。",a:false,e:"該当しない：放射線業務の管理区域は作業環境測定を行う必要があるが、作業環境測定士による測定が義務付けられる指定作業場には該当しない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問9・枝3",b:"常時セメントを袋詰めする作業を行う屋内作業場における空気中の粉じん濃度の測定。",a:true,e:"屋内でセメントを袋詰めする作業は特定粉じん作業であり指定作業場に該当し作業環境測定士の測定が測定を実施しなければならない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問9・枝4",b:"溶融ガラスからガラス製品を成型する業務を行う屋内作業場における気温湿度及びふく射熱の測定。",a:false,e:"該当しない：暑熱な屋内作業場は作業環境測定を行う必要があるが、作業環境測定士による測定が義務付けられる指定作業場には該当しない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問9・枝5",b:"通気設備が設けられている坑内の作業場における通気量の測定。",a:false,e:"作業環境測定を行わなければならないものであるが、指定作業場ではないため、該当しない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問10・枝1",b:"著しく暑熱な場所における業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項1。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問10・枝2",b:"ボイラー製造等強烈な騒音を発する場所における業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項8。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問10・枝3",b:"ヘリウム、アルゴン等の不活性の気体を入れたことのあるタンクの内部における業務。",a:true,e:"制限されない。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問10・枝4",b:"土石、獣毛等のじんあい又は粉末を著しく飛散する場所における業務。びょう",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項4。"},
{c:"関係法令（有害業務）",y:"R7-4",s:"問10・枝5",b:"削岩機、鋲打機等の使用によって身体に著しい振動を与える業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項6。【労働衛生（有害業務に係るもの）】"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問11・枝1",b:"リスクアセスメントの基本的手順のうち最初に実施するのは、労働者の就業に係るリスクアセスメント対象物による危険性又は有害性を特定することである。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「管理濃度」⇒「許容濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問11・枝2",b:"リスクの見積りに当たっては、過去に実際に発生した負傷又は疾病の重篤度ではなく、最悪の状況を想定した最も重篤な負傷又は疾病の重篤度を見積もる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「管理濃度」⇒「許容濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問11・枝3",b:"リスクアセスメント対象物による疾病について、当該物質への労働者のばく露濃度等を測定し、ばく露量をばく露限界と比較しリスクを見積もる場合、ばく露限界としては、管理濃度が最も適している。",a:false,e:"誤り：「管理濃度」⇒「許容濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問11・枝4",b:"リスクアセスメント対象物による疾病のリスク低減措置の検討では、作業手順の改善、立入禁止等の管理的対策よりも局所排気装置の設置等の衛生工学的対策を優先する。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「管理濃度」⇒「許容濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問11・枝5",b:"リスクアセスメント対象物による疾病のリスク低減措置の検討に当たっては、より優先順位の高い措置を実施することにした場合であって、当該措置により十分にリスクが低減される場合には、当該措置よりも優先順位の低い措置の検討は必要ない。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問12・枝1",b:"ホルムアルデヒド…………………ガス",a:true,e:"記述のとおり。ホルムアルデヒドは常温で無色の刺激臭のあるガスであり、発がん性が認められている。特定化学物質第2類物質。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問12・枝2",b:"塩素…………………………………ガス",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「蒸気」⇒「ガス」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問12・枝3",b:"塩化ビニル…………………………ガス",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「蒸気」⇒「ガス」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問12・枝4",b:"二酸化硫黄…………………………蒸気",a:false,e:"誤り：「蒸気」⇒「ガス」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問12・枝5",b:"二硫化炭素…………………………蒸気",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問13・枝1",b:"有機溶剤の蒸気は、空気より重いため、地下室やピットなどの通気が不十分な場所では滞留しやすい。",a:true,e:"記述のとおり。有機溶剤の蒸気は空気より重く、地下室やピットなど通気が不十分な低所に滞留しやすい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問13・枝2",b:"有機溶剤は、全て脂溶性があるほか、揮発性及び引火性があるものが多い。",a:true,e:"（1）～（4）正しい。（5）誤り：「網膜微細動脈瘤を伴う脳血管障害」⇒「視神経障害」。網膜微細動脈瘤を伴う脳血管障害は、二硫化炭素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問13・枝3",b:"有機溶剤による障害のうち、皮膚や粘膜の症状には、皮膚の角化、結膜炎などがある。",a:true,e:"（1）～（4）正しい。（5）誤り：「網膜微細動脈瘤を伴う脳血管障害」⇒「視神経障害」。網膜微細動脈瘤を伴う脳血管障害は、二硫化炭素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問13・枝4",b:"低濃度の有機溶剤の繰り返しばく露では、頭痛、めまい、記憶力減退、不眠などの不定愁訴がみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問13・枝5",b:"メタノールによる障害として顕著なものは、網膜微細動脈瘤を伴う脳血管障害である",a:false,e:"誤り：「網膜微細動脈瘤を伴う脳血管障害」⇒「視神経障害」。網膜微細動脈瘤を伴う脳血管障害は、二硫化炭素による健康障害。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問14・枝1",b:"電離放射線の被ばくによる生体への影響には、身体的影響と遺伝的影響がある。",a:true,e:"記述のとおり。電離放射線の生体影響には、被ばくした本人に現れる身体的影響と、子孫に現れる遺伝的影響がある。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問14・枝2",b:"電離放射線の被ばくによる身体的影響のうち、白内障は晩発障害に分類される。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「症状の程度は線量に依存する」⇒「被ばく線量が増えるほど発生率が高まる」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問14・枝3",b:"電離放射線に被ばく後、数週間程度までに現れる造血器系障害は、急性障害に分類される。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「症状の程度は線量に依存する」⇒「被ばく線量が増えるほど発生率が高まる」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問14・枝4",b:"電離放射線の被ばくによる発がんと遺伝的影響は、確率的影響に分類され、症状の程度は線量に依存する。",a:false,e:"誤り：「症状の程度は線量に依存する」⇒「被ばく線量が増えるほど発生率が高まる」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問14・枝5",b:"造血器、生殖腺、腸粘膜など頻繁に細胞分裂している組織・臓器は、電離放射線の影響を受けやすい。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問15・枝1",b:"カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。",a:true,e:"記述のとおり。カドミウムの慢性中毒では、上気道炎、肺炎のほか、腎障害（近位尿細管障害）がみられる。イタイイタイ病の原因物質でもある。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問15・枝2",b:"鉛中毒では、貧血、末梢神経障害、腹部の疝痛などの症状がみられる。",a:true,e:"（1）～（4）正しい。（5）誤り：「指の骨の溶解、肝臓の血管肉腫など」⇒「筋のこわばり、ふるえ、歩行困難などの神経障害」。指の骨の溶解、肝臓の血管肉腫などは、塩化ビニルの健康障害。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問15・枝3",b:"砒素中毒では、角化症、黒皮症などの皮膚障害、鼻中隔穿孔などの症状がみられる。",a:true,e:"（1）～（4）正しい。（5）誤り：「指の骨の溶解、肝臓の血管肉腫など」⇒「筋のこわばり、ふるえ、歩行困難などの神経障害」。指の骨の溶解、肝臓の血管肉腫などは、塩化ビニルの健康障害。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問15・枝4",b:"ベリリウム中毒では、接触皮膚炎、肺炎などの症状がみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問15・枝5",b:"マンガン中毒では、指の骨の溶解、肝臓の血管肉腫などがみられる。",a:false,e:"誤り：「指の骨の溶解、肝臓の血管肉腫など」⇒「筋のこわばり、ふるえ、歩行困難などの神経障害」。指の骨の溶解、肝臓の血管肉腫などは、塩化ビニルの健康障害。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問16・枝1",b:"マイクロ波は、赤外線より波長が短い電磁波で、照射部位の組織を加熱する作用がある。",a:false,e:"誤り：「波長が短い電磁波」⇒「波長が長い電磁波」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問16・枝2",b:"全身振動障害では、レイノー現象などの末梢循環障害や手指のしびれ感などの末梢神経障害がみられ、局所振動障害では、関節痛などの筋骨格系障害がみられる。",a:false,e:"誤り：選択肢はすべて局所振動障害。全身振動障害では、腰痛などの脊柱障害を起こすことがある。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問16・枝3",b:"熱けいれんは、大量の発汗時に水を補給することで血中の塩分濃度が低下することによって生じ、こむら返り、立ちくらみなどもみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問16・枝4",b:"減圧症は、潜函作業者や潜水作業者などに発症するもので、高圧下作業からの減圧に伴い、血液中や組織中に溶け込んでいた二酸化炭素の気泡化が関与して発生し、皮膚のかゆみ、関節痛、神経の麻痺などの症状がみられる。",a:false,e:"誤り：「二酸化炭素」⇒「窒素」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問16・枝5",b:"けい肺は、鉄、アルミニウムなどの金属粉じんによる肺の線維増殖性変化で、けい肺結節という線維性の結節が形成される。",a:false,e:"誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸を吸入すること」。病状が進行すると胸部エックス線写真でみられる粒状影をけい肺結節という。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問17・枝1",b:"一酸化炭素による中毒では、ヘモグロビン合成の障害による貧血、溶血などがみられる。",a:false,e:"誤り：「ヘモグロビン合成の障害による貧血、溶血などがみられる。」⇒「赤血球中のヘモグロビンと強く結合し、体内組織の酸素欠乏状態を引き起こす」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問17・枝2",b:"二酸化窒素による健康障害では、肺水腫、気管支炎などがみられる。",a:true,e:"記述のとおり。二酸化窒素は赤褐色の刺激性ガスで、吸入により肺水腫や気管支炎などの呼吸器障害を引き起こす。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問17・枝3",b:"シアン化水素による中毒では、細胞内での酸素利用の障害による呼吸困難、けいれんなどがみられる。",a:true,e:"（1）誤り：「ヘモグロビン合成の障害による貧血、溶血などがみられる。」⇒「赤血球中のヘモグロビンと強く結合し、体内組織の酸素欠乏状態を引き起こす」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問17・枝4",b:"硫化水素による健康障害では、脳神経細胞の障害による意識消失、呼吸麻痺などがみられる。",a:true,e:"（1）誤り：「ヘモグロビン合成の障害による貧血、溶血などがみられる。」⇒「赤血球中のヘモグロビンと強く結合し、体内組織の酸素欠乏状態を引き起こす」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問17・枝5",b:"弗化水素による慢性中毒では、骨の硬化、斑状歯などがみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問18・枝1",b:"作業環境測定を実施する場合の単位作業場所は、労働者の作業中の行動範囲、有害物の分布の状況などに基づいて設定する。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：「許容濃度」⇒「管理濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問18・枝2",b:"許容濃度は、有害物質に係る作業環境の状態を、単位作業場所ごとにその作業環境測定結果から評価するための指標として定められている。",a:false,e:"誤り：「許容濃度」⇒「管理濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問18・枝3",b:"A測定は、単位作業場所における有害物質の気中濃度の平均的な分布を知るために行う測定である。",a:true,e:"記述のとおり。A測定は、単位作業場所における有害物質の気中濃度の平均的な分布を把握するために行う測定である。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問18・枝4",b:"B測定は、単位作業場所中の有害物質の発散源に近接する場所で作業が行われる場合において、空気中の有害物質の最高濃度を知るために行う測定である。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：「許容濃度」⇒「管理濃度」。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問18・枝5",b:"A測定とB測定を併せて行う場合は、A測定の測定値を用いて求めた第一評価値及び第二評価値並びにB測定の測定値に基づき、単位作業場所を第一管理区分から第三管理区分までのいずれかに区分する。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問19・枝1",b:"直結式防毒マスクは、隔離式防毒マスクよりも有害ガスの濃度が高い大気中で使用することができる。",a:false,e:"誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問19・枝2",b:"吸気補助具付き防じんマスクは、吸気補助具によって清浄な空気を送る機能がある防じんマスクである。",a:true,e:"記述のとおり。吸気補助具付き防じんマスクは、電動ファン等により清浄な空気を送気する機能を持つ防じんマスクである。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問19・枝3",b:"酸素濃度18％未満の場所で使用できる呼吸用保護具には、送気マスク、空気呼吸器のほか、酸素呼吸器がある。",a:true,e:"（1）誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問19・枝4",b:"遮光保護具は、溶接作業における紫外線などによる眼の障害を防ぐために使用する。",a:true,e:"（1）誤り：「有害ガスの濃度が高い」⇒「有害ガスの濃度が低い」。有害ガス又は蒸気の濃度における防毒マスクの使用範囲について、直結式は1％以下、隔離式はガス濃度2％以下の大気中で使用できる。（2）～（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問19・枝5",b:"保護クリームは、作業中に有害な物質が直接皮膚に付着しないようにする目的で塗布するものである。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問20・枝1",b:"有害物質による健康障害は、多くの場合、諸検査の異常などの他覚的所見より、自覚症状が先に出現するため、特殊健康診断では問診の重要性が高い。",a:false,e:"誤り：有害物質による健康障害の多くは急性発症を除き、初期又は軽度の場合はほとんど無自覚で、諸検査の結果により発見されることが多い。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問20・枝2",b:"特殊健康診断における生物学的モニタリングによる検査は、有害物の体内摂取量や有害物による健康影響の程度を把握するための検査である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問20・枝3",b:"体内に取り込まれた有機溶剤の生物学的半減期は、数か月と長いので、有機溶剤健康診断における採尿は、任意の時期に行ってよい。",a:false,e:"誤り：有機溶剤の生物学的半減期は短いので、有機溶剤健康診断における尿の採取は作業終了後など厳格な管理をする必要がある。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問20・枝4",b:"体内に取り込まれた鉛の生物学的半減期は、数時間と短いので、鉛健康診断における採尿及び採血の時期は、厳重にチェックする必要がある。",a:false,e:"誤り：鉛の生物学的半減期は長いので、鉛健康診断における採尿及び採血の時期は任意の時期でよい。"},
{c:"労働衛生（有害業務）",y:"R7-4",s:"問20・枝5",b:"情報機器作業に係る健康診断では、眼科学的検査などとともに、上肢及び下肢の運動機能の検査を行う。",a:false,e:"誤り：情報機器作業に係る健康診断では、視力検査などの眼科学的検査の他、上肢の運動機能検査などの筋骨格系に関する検査を行うが、下肢の運動機能検査は行わない。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問21・枝1",b:"常時50人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。",a:true,e:"正しい：ゴルフ場業の事業場では、第一種衛生管理者免許、第二種衛生管理者免許、衛生工学衛生管理者免許を有する者、又は医師、歯科医師、労働衛生コンサルタントの中から衛生管理者を選任する。安衛則第7条（衛生管理者の選任）第1項34。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問21・枝2",b:"常時2,000人を超え3,000人以下の労働者を使用する事業場では4人以上の衛生管理者を選任しなければならない。",a:false,e:"誤り：常時使用する労働者数が「2,000人を超え3,000人以下」の事業場は、5人以上の衛生管理者を選任しなければならない。安衛則第7条（衛生管理者の選任）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問21・枝3",b:"常時300人以上1,000人未満の労働者を使用する各種商品小売業の事業場では、総括安全衛生管理者を選任しなくてもよい。",a:false,e:"誤り：安衛令第2条（総括安全衛生管理者を選任すべき業種等）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問21・枝4",b:"常時800人以上の労働者を使用する事業場では、その事業場に専属の産業医を選任しなければならない。",a:false,e:"誤り：「常時800人以上の労働者を使用する事業場」⇒「常時1,000人以上の労働者を使用する事業場」。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問21・枝5",b:"2人以上の衛生管理者を選任すべき事業場では、そのうち1人については、労働衛生コンサルタントのうちから選任しなければならない。",a:false,e:"誤り：「労働衛生コンサルタントのうちから」⇒「その事業場に専属の者を」。労働衛生コンサルタントは専属でないものを選任することができるのであって、選任しなければならないということではない。安衛則第7条（衛生管理者の選任）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問22・枝1",b:"通信業",a:false,e:"該当しない：通信業は、総括安全衛生管理者の選任義務がある300人以上使用する業種に該当しない。安衛令第2条。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問22・枝2",b:"自動車整備業",a:false,e:"（1）～（4）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1 項2。（5）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問22・枝3",b:"旅館業",a:false,e:"（1）～（4）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1 項2。（5）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問22・枝4",b:"清掃業",a:false,e:"義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1 項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問22・枝5",b:"警備業",a:true,e:"義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問23・枝1",b:"危険性又は有害性等の調査及びその結果に基づき講ずる措置に関すること",a:true,e:"定められている：安衛則第3条の2（総括安全衛生管理者が統括管理する業務）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問23・枝2",b:"安全衛生に関する方針の表明に関すること。",a:true,e:"定められている：安衛則第3条の2（総括安全衛生管理者が統括管理する業務）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問23・枝3",b:"衛生推進者の指揮に関すること。",a:false,e:"定められていない。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問23・枝4",b:"労働者の衛生のための教育の実施に関すること。",a:true,e:"定められている：安衛法第10条（総括安全衛生管理者）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問23・枝5",b:"労働災害の原因の調査及び再発防止対策に関すること。",a:true,e:"定められている：安衛法第10条（総括安全衛生管理者）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問24・枝1",b:"衛生委員会の議長には、総括安全衛生管理者である委員はなることができない。",a:false,e:"誤り：「総括安全衛生管理者である委員はなることができない」⇒「総括安全衛生管理者である委員はなることができる」。衛生委員会の議長は、委員のうち総括安全衛生管理者又は総括安全衛生管理者以外の者で当該事業場においてその事業の実施を統括管理する者若しくはこれに準ずる者のうちから事業者が指名する。安衛法第18条（衛生委員会）第2項1、第4項。第17条（安全委員会)第3項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問24・枝2",b:"衛生委員会の議長を除く委員の半数については、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者の推薦に基づき指名しなければならない。",a:true,e:"正しい：安衛法第18条（衛生委員会）第4項、第17条（安全委員会)第4項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問24・枝3",b:"事業場に専属でないが、産業医として選任している医師を、衛生委員会の委員として指名することができる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第2項3。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問24・枝4",b:"作業環境測定を外部の作業環境測定機関に委託して実施している場合、当該作業環境測定を実施している作業環境測定士を衛生委員会の委員として指名することはできない。",a:true,e:"正しい：当該事業場の労働者で、作業環境測定を実施している作業環境測定士を衛生委員会の委員として指名することができる。安衛法第18条（衛生委員会）第3項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問24・枝5",b:"事業場の労働者で、衛生に関し経験を有するものを、衛生委員会の委員として指名することができる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第2項4。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問25・枝1",b:"事業者は、面接指導の対象となる労働者の要件に該当する労働者から申出があったときは、申出の日から3か月以内に、面接指導を行わなければならない。",a:false,e:"誤り：「3か月以内に」⇒「遅滞なく」。安衛則第 52 条の 16（面接指導の実施方法等）第 1 項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問25・枝2",b:"面接指導を行う医師として事業者が指名できる医師は、法定の研修を修了した医師に限られる。",a:false,e:"誤り：面接指導を行う医師として事業者が指名できる医師は、法定の研修を修了した医師に限られるという定めはない。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問25・枝3",b:"事業者は、面接指導を行った場合は、当該面接指導の結果を当該事業場の当該部署に所属する労働者の集団その他の一定規模の集団ごとに集計し、その結果について分析しなければならない。",a:false,e:"誤り：「分析しなければならない」⇒「分析させるよう努めなければならない」。当該検査を行った医師等に、当該検査の結果を当該事業場の当該部署に所属する労働者の集団その他の一定規模の集団ごとに集計させ、その結果について分析させるよう努めなければならない。安衛法第52条の14（検査結果の集団ごとの分析等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問25・枝4",b:"常時50人以上の労働者を使用する事業者は、1年以内ごとに1回定期に心理的な負担の程度を把握するための検査及び面接指導の結果を所轄労働基準監督署長に報告しなければならない。",a:true,e:"正しい：安衛則第 52 条の 9（心理的な負担の程度を把握するための検査の実施方法）、安衛則第52条の21（検査及び面接指導結果の報告）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問25・枝5",b:"面接指導の結果は、健康診断個人票に記載しなければならない。",a:false,e:"誤り：面接指導の結果を健康診断個人票に記載しなければならないという定めはない。安衛則第52条の18（面接指導結果の記録の作成）。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問26・枝1",b:"尿検査では、尿中の馬尿酸及びデルタアミノレブリン酸の量の検査を行う。",a:false,e:"誤り：「馬尿酸及びデルタアミノレブリン酸の量」⇒「糖及び蛋白の有無」安衛則第44条（定期健康診断）第1項10、安衛則第43条（雇入時の健康診断）第1項10。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問26・枝2",b:"定期健康診断項目のうち肝機能検査については、厚生労働大臣が定める基準に基づき、医師が必要でないと認めるときは、省略することができる。",a:true,e:"正しい：安衛則第44条（定期健康診断）第2項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問26・枝3",b:"常時50人以上の労働者を使用する事業場において定期健康診断を行ったときは、遅滞なく、その結果を所轄労働基準監督署長に報告しなければならない。",a:true,e:"正しい：安衛則第52条（健康診断結果報告）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問26・枝4",b:"定期健康診断を受けた労働者に対しては、異常の所見が認められなかった者を含め、遅滞なく、健康診断の結果を通知しなければならない。",a:true,e:"正しい：安衛則第51条の4（健康診断の結果の通知）。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問26・枝5",b:"事業場において実施した定期健康診断の項目に異常の所見があると診断された労働者については、その結果に基づき、健康の保持のために必要な措置について、健康診断が行われた日から3 か月以内に、医師の意見を聴かなければならない。",a:true,e:"正しい：安衛法第66条の4（健康診断の結果についての医師等からの意見聴取）、安衛則第51 条の2（健康診断の結果についての医師等からの意見聴取）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問27・枝1",b:"常時40人の労働者を就業させている屋内作業場の気積が設備の占める容積及び床面から3m を超える高さにある空間を除き400㎥となっている。",a:false,e:"違反していない：400㎥／40人＝10となり、1人について10㎥以上を満たす。安衛則第600 条（気積）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問27・枝2",b:"ねずみ、昆虫等の発生場所、生息場所及び侵入経路並びにねずみ、昆虫等による被害の状況について、3か月ごとに1回、定期に、統一的に調査を実施し、その調査結果に基づき、必要な措置を講じている。が",a:false,e:"違反していない：安衛則第619条（清掃等の実施）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問27・枝3",b:"男性5人を含む常時30人の労働者が就業している事業場で、女性用には臥床することのできがる休養室を設けているが、男性用には、臥床することのできない休憩設備を利用させている。",a:false,e:"違反していない：設問は、男性5人、女性25人で常時30人なので、男性用と女性用に区別する要件に達していない。安衛則第618条（休養室等）。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問27・枝4",b:"事業場に附属する食堂の床面積を、食事の際の1人について、1㎡を超えるようにしている。",a:false,e:"違反していない：安衛則第630条（食堂及び炊事場）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問27・枝5",b:"事業場に附属する炊事場の入口には、洗浄剤を含浸させたマットを設置して、土足のままでも立ち入ることができるようにしている。",a:true,e:"違反している：炊事場専用の履物を備え、土足のまま立ち入らせてはならない。安衛則第630 条（食堂及び炊事場）第1項15。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問28・枝1",b:"一酸化炭素の含有率は、検知管方式による一酸化炭素検定器又はこれと同等以上の性能を有する測定機器により測定する。",a:true,e:"正しい：表中第2項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問28・枝2",b:"室温の測定は、室の通常の使用時間中に、室の中央部の床上150cmの位置において行う。",a:false,e:"誤り：「床上150㎝」⇒「床上75㎝以上120㎝以下」。備考第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問28・枝3",b:"相対湿度は、0.5度目盛の乾湿球の湿度計又はこれと同等以上の性能を有する測定機器により測定する。",a:true,e:"正しい：表中第5項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問28・枝4",b:"二酸化炭素の含有率は、検知管方式による二酸化炭素検定器又はこれと同等以上の性能を有する測定機器により測定する。",a:true,e:"正しい：表中第3項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問28・枝5",b:"室温は、0.5度目盛の温度計又はこれと同等以上の性能を有する測定機器により測定する。",a:true,e:"正しい：表中第4項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問29・枝1",b:"妊産婦とは、妊娠中の女性及び産後1年を経過しない女性をいう。",a:true,e:"正しい：労基法第64条の3（危険有害業務の就業制限）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問29・枝2",b:"妊娠中の女性が請求した場合には、管理監督者等の場合を除き、他の軽易な業務に転換させなければならない。",a:false,e:"誤り：妊産婦が請求した場合には、管理監督者等であっても、他の軽易な業務に転換させなければならない。労基法第65条（産前産後）第3項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問29・枝3",b:"1年単位の変形労働時間制を採用している場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き1週40時間、1日8時間を超えて労働させてはならない。",a:true,e:"正しい：労基法第66条第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問29・枝4",b:"時間外・休日労働に関する協定を締結し、これを所轄労働基準監督署長に届け出ている場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き、時間外・休日労働をさせてはならない。",a:true,e:"正しい：労基法第66条第2項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問29・枝5",b:"生理日の就業が著しく困難な女性が休暇を請求したときは、その者を生理日に就業させてはならない。",a:true,e:"正しい：労基法第68条（生理日の就業が著しく困難な女性に対する措置）。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問30・枝1",b:"休暇の期間については、原則として、最低賃金又は平均賃金の100分の60の額の手当を支払わなければならない。",a:false,e:"誤り：「最低賃金又は平均賃金の100分の60の額の手当」⇒「平均賃金若しくは所定労働時間労働した場合に支払われる通常の賃金又はこれらの額を基準として厚生労働省令で定めるところにより算定した額の賃金」。労基法第39条（年次有給休暇）第9項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問30・枝2",b:"使用者は、労働者の過半数で組織する労働組合(その労働組合がない場合は労働者の過半数を代表する者)との書面による協定により、休暇を与える時季に関する定めをしたときは、休暇のうち 3日を超える部分については、その定めにより休暇を与えることができる。",a:false,e:"誤り：「3日」⇒「5日」。労基法第39条（年次有給休暇）第6項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問30・枝3",b:"法令に基づく育児休業又は介護休業で休業した期間は、出勤率の算定に当たっては、全労働日から除外して算出することができる。",a:false,e:"誤り：「全労働日から除外して」⇒「出勤したものとみなして」。育児休業又は介護休業で休業した期間は、出勤率の算定に当たっては、出勤したものとみなす。労基法第 39 条（年次有給休暇）第10項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問30・枝4",b:"一週間の所定労働時間が 30 時間で一週間の所定労働日数が4日である労働者であって、雇入れの日から起算して3年6か月間継続勤務し、直前の1年間に、全労働日の8割以上出勤したものには、継続し又は分割した14労働日の休暇を新たに与えなければならない。",a:true,e:"正しい：労基法第39条（年次有給休暇）第2項。"},
{c:"関係法令（有害業務以外）",y:"R7-4",s:"問30・枝5",b:"休暇の請求権は、これを1年間行使しなければ時効によって消滅する。",a:false,e:"誤り：「1年間」⇒「2年間」。労基法第115条（時効）。【労働衛生（有害業務に係るもの以外のもの）】"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問31・枝1",b:"Q ＝｛ D /（A － B）｝× 100",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問31・枝2",b:"Q ＝｛ D /（A － C）｝× 100",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問31・枝3",b:"Q ＝｛ D /（B － C）｝× 100",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問31・枝4",b:"Q ＝｛ D /（A － B）｝× 1,000,000",a:false,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問31・枝5",b:"Q ＝｛ D /（B － C）｝× 1,000,000",a:true,e:"室内にいる人が1時間に呼出する二酸化炭素量（㎥/h）必要換気量Q（㎥/h）＝ 室内二酸化炭素基準濃度 － 外気の二酸化炭素濃度濃度を表す単位が「ppm」であるため、1,000,000倍（×1,000,000）とする。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問32・枝1",b:"日射がない場合のWBGTは、気温（乾球温度）と黒球温度から求められる。",a:false,e:"誤り：「気温（乾球温度）」⇒「自然湿球温度」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問32・枝2",b:"WBGTは、暑熱環境による熱ストレスの評価を行うための指標である。",a:true,e:"記述のとおり。WBGT（湿球黒球温度）は、暑熱環境における熱ストレスを評価するための指標で、自然湿球温度、黒球温度、乾球温度から算出される。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問32・枝3",b:"WBGT基準値は、健康な作業者を基準に、ばく露されてもほとんどの者が有害な影響を受けないレベルに相当するものとして設定されている。",a:true,e:"（1）誤り：「気温（乾球温度）」⇒「自然湿球温度」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問32・枝4",b:"WBGT基準値は、身体に対する負荷が大きな作業の方が、負荷が小さな作業より小さな値となる。",a:true,e:"（1）誤り：「気温（乾球温度）」⇒「自然湿球温度」。（2）～（5）正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問32・枝5",b:"WBGT基準値は、暑熱順化者に用いる値の方が、暑熱非順化者に用いる値より大きな値となる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問33・A",b:"座位での情報機器作業における作業姿勢は、椅子に深く腰をかけて背もたれに背を十分あて、履き物の足裏全体が床に接した姿勢を基本とする。",a:true,e:"作業姿勢に関することは「作業管理」に該当する。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問33・B",b:"情報機器作業において、書類上及びキーボード上における照度を400ルクス程度とする。",a:true,e:"照度に関することは「作業環境管理」に該当する。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問33・C",b:"高温多湿作業場所において労働者を作業に従事させる場合には、計画的に、暑熱順化期間を設ける。",a:true,e:"熱への順化期間を設けることは「作業管理」に該当する。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問33・D",b:"空気調和設備を設け、事務室内の気温を調節する。",a:true,e:"設備の設置により気温を調節することは「作業環境管理」に該当する。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問33・E",b:"介護作業等腰部に著しい負担のかかる作業に従事する労働者に対し、腰痛予防体操を実施させる。",a:true,e:"腰痛予防体操は「健康管理」に該当する。したがって、AとCが「作業管理」となる。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問34・枝1",b:"ノート型機器を使用する場合には、外付けキーボードを接続して入力作業を行っている。",a:false,e:"誤り：情報機器作業における労働衛生管理のためのガイドラインでは、ノート型機器を使用する場合に外付けキーボードの使用が推奨されているが、本問では誤りとされる記述がある。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問34・枝2",b:"ディスプレイとの視距離は、おおむね50cmとしディスプレイ画面の上端を眼の高さよりもやや下にしている。",a:false,e:"（1）～（4）適切。（5）適切でない：定期健康診断の視力検査は、1遠見視力（矯正視力のみでよい）、2近見視力（50cm視力又は30cm視力）（矯正視力のみでよい）、3眼位検査（医師の判断による）（40 歳以上のものが対象）（問診、遠見視力及び近見視力に異常がない場合は省略可）、4調節機能検査（"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問34・枝3",b:"グレアの防止、騒音の低減等の措置状況及び椅子、机等の調整状況について定期に点検している。",a:false,e:"（1）～（4）適切。（5）適切でない：定期健康診断の視力検査は、1遠見視力（矯正視力のみでよい）、2近見視力（50cm視力又は30cm視力）（矯正視力のみでよい）、3眼位検査（医師の判断による）（40 歳以上のものが対象）（問診、遠見視力及び近見視力に異常がない場合は省略可）、4調節機能検査（"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問34・枝4",b:"1日の情報機器作業の作業時間が4時間未満である労働者については、自覚症状を訴える者についてのみ、情報機器作業に係る定期健康診断の対象としている。",a:false,e:"適切。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問34・枝5",b:"情報機器作業に係る定期健康診断の視力検査において、近見視力の片眼視力が両眼とも0.5 以上である者については遠見視力の検査を省略している。",a:true,e:"適切でない：定期健康診断の視力検査は、1遠見視力（矯正視力のみでよい）、2近見視力（50cm視力又は30cm視力）（矯正視力のみでよい）、3眼位検査（医師の判断による）（40 歳以上のものが対象）（問診、遠見視力及び近見視力に異常がない場合は省略可）、4調節機能検査（40歳以上のものが対象）（問診、遠見視力及び近見視力に異常がない場合は省略可）、 5その他医師が必要と認める検査である。遠見視力と近見視力の検査は省略できない。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問35・枝1",b:"病休度数率は、在籍労働者の延べ実労働時間数100万時間当たりの疾病休業件数で示される。",a:true,e:"記述のとおり。病休度数率は、在籍労働者の延べ実労働時間数100万時間当たりの疾病休業件数で求められる。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問35・枝2",b:"集団を比較する場合、調査の対象とした項目のデータの平均値が等しくても分散が異なっていれば、異なった特徴をもつ集団であると評価される。",a:true,e:"（1）～（4）正しい。（5）誤り：「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問35・枝3",b:"ばらつきをもって分布するデータの代表値として、平均値、中央値などがあるが、どの代表値を選択するかは、データの内容と分布による。",a:true,e:"（1）～（4）正しい。（5）誤り：「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問35・枝4",b:"二つの事象の間に、統計上、一方が多いと他方も多いというような相関関係が認められても、それらの間に因果関係がないこともある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問35・枝5",b:"健康管理統計において、ある時点での検査における有所見者の割合を有所見率といい、これは発生率と同じ意味で用いられる。",a:false,e:"誤り：「発生率」は、一定期間に有所見等が発生した人の割合で動態データである。有所見率は静態データであり、発生率と同じ意味で用いることはない。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問36・枝1",b:"健康保持増進対策の推進に当たっては、事業者が労働者等の意見を聴きつつ事業場の実態に即した取組を行うため、労使、産業医、衛生管理者等で構成される衛生委員会等を活用する。",a:false,e:"誤り：健康保持増進対策の推進体制として活用するのは「衛生委員会等」だけではなく、THP指針に基づく推進体制の整備が求められる。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問36・枝2",b:"健康測定の結果に基づき行う健康指導には、運動指導、メンタルヘルスケア、栄養指導、口腔保健指導、保健指導が含まれる。",a:false,e:"（1）～（4）適切。（5）適切でない：「疾病の早期発見に重点をおいた健康診断の各項目の結果を健康測定に活用することはできない」⇒「疾病の早期発見に重点をおいた健康診断を活用して、追加で生活状況調査等を実施し、生活習慣の偏りを把握することが大切である」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問36・枝3",b:"健康保持増進措置は、主に生活習慣上の課題を有する労働者の健康状態の改善を目指すために個々の労働者に対して実施するものと、事業場全体の健康状態の改善や健康保持増進に係る取組の活性化等、生活習慣上の課題の有無に関わらず労働者を集団として捉えて実施するものがある。",a:false,e:"（1）～（4）適切。（5）適切でない：「疾病の早期発見に重点をおいた健康診断の各項目の結果を健康測定に活用することはできない」⇒「疾病の早期発見に重点をおいた健康診断を活用して、追加で生活状況調査等を実施し、生活習慣の偏りを把握することが大切である」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問36・枝4",b:"健康保持増進に関する課題の把握や目標の設定等においては、労働者の健康状態等を客観的に把握できる数値を活用することが望ましい。",a:false,e:"適切。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問36・枝5",b:"健康測定とは、健康指導を行うために実施される調査、測定等のことをいい、疾病の早期発見に重点をおいた健康診断の各項目の結果を健康測定に活用することはできない。",a:true,e:"適切でない：「疾病の早期発見に重点をおいた健康診断の各項目の結果を健康測定に活用することはできない」⇒「疾病の早期発見に重点をおいた健康診断を活用して、追加で生活状況調査等を実施し、生活習慣の偏りを把握することが大切である」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問37・枝1",b:"脳血管障害は、出血性病変、虚血性病変などに分類される。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれ脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問37・枝2",b:"出血性の脳血管疾患は、脳表面のくも膜下腔に出血するくも膜下出血、脳実質内に出血する脳出血などに分類される。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれ脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問37・枝3",b:"虚血性の脳血管疾患である脳梗塞は、脳血管自体の動脈硬化性病変による脳塞栓症と、心臓や動脈壁の血栓が剥がれて脳血管を閉塞する脳血栓症に分類される。",a:false,e:"誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれ脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問37・枝4",b:"虚血性心疾患は、冠動脈による心筋への血液の供給が不足したり途絶えることにより起こる心筋障害である。",a:true,e:"（1）（2）（4）（5）正しい（3）誤り：「脳塞栓症」⇒「脳血栓症」。「脳血栓症」⇒「脳塞栓症」。脳血管自体の動脈硬化性病変による脳血栓症と、心臓や動脈壁の血栓が剥がれ脳血管を閉塞する脳塞栓症に分類される。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問37・枝5",b:"運動負荷心電図検査は、虚血性心疾患の発見に有用である。",a:true,e:"正しい"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問38・枝1",b:"常時50人以上の労働者を使用する事業場では受動喫煙防止のための推進計画を策定し、所轄労働基準監督署長に届け出なければならない。",a:false,e:"誤り：受動喫煙防止のための推進計画は、所轄労働基準監督署長に届け出の定めはない。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問38・枝2",b:"たばこの煙の流出を防止するための技術的基準に適合した喫煙専用室においては、食事はしてはならないが、飲料を飲むことは認められている。",a:false,e:"誤り：「食事はしてはならないが、飲料を飲むことは認められている」⇒「飲食等を行うことは認められない」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問38・枝3",b:"第一種施設は、「原則敷地内禁煙」とされており、敷地内に喫煙場所を一切設置してはならない。",a:false,e:"誤り：「敷地内に喫煙場所を一切設置してはならない」⇒「敷地内で受動喫煙を防止するために必要な技術的事項を満たす場所に、特定屋外喫煙場所を設置することができる」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問38・枝4",b:"一般の事務所や工場は、第二種施設に含まれ、「原則屋内禁煙」とされている。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問38・枝5",b:"本ガイドラインの「屋内」とは、外気の流入が妨げられる場所として、屋根がある建物であって、かつ、側壁が全て覆われているものの内部を指し、これに該当しないものは「屋外」となる。",a:false,e:"誤り：「側壁が全て覆われているものの内部」⇒「側壁がおおむね半分以上覆われているものの内部」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問40・枝1",b:"魚、チーズなどに含まれるヒスチジンが細菌により分解されて生成するヒスタミンは、加熱により分解される。",a:false,e:"誤り：「ヒスタミンは、加熱により分解される」⇒「ヒスタミンは加熱しても分解されにくい」。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問40・枝2",b:"ボツリヌス菌による毒素は、神経毒である。",a:true,e:"記述のとおり。ボツリヌス菌が産生する毒素は強力な神経毒であり、筋肉の麻痺などを引き起こす。"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問40・枝3",b:"黄色ブドウ球菌による毒素は、熱に強い。",a:true,e:"（1）誤り：「ヒスタミンは、加熱により分解される」⇒「ヒスタミンは加熱しても分解されにくい」。（2）～（5）正しい【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問40・枝4",b:"サルモネラ菌による食中毒は、食品に付着した菌が腸管内で増殖して発症する。",a:true,e:"（1）誤り：「ヒスタミンは、加熱により分解される」⇒「ヒスタミンは加熱しても分解されにくい」。（2）～（5）正しい【労働生理】"},
{c:"労働衛生（有害業務以外）",y:"R7-4",s:"問40・枝5",b:"ウェルシュ菌、セレウス菌及びカンピロバクターは、いずれも細菌性食中毒の原因菌である。",a:true,e:"正しい【労働生理】"},
{c:"労働生理",y:"R7-4",s:"問41・枝1",b:"赤血球は、骨髄で産生され、寿命は約120日で、血球の中で最も多い。",a:true,e:"記述のとおり。赤血球は骨髄で産生され、寿命は約120日である。血球の中で最も数が多く、酸素の運搬を担う。"},
{c:"労働生理",y:"R7-4",s:"問41・枝2",b:"リンパ球は、白血球の約30％を占め、Tリンパ球、Bリンパ球などの種類があり、免疫反応に関与している。",a:true,e:"（1）～（4）正しい。（5）誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-4",s:"問41・枝3",b:"好中球は、白血球の約60％を占め、偽足を出してアメーバ様運動を行い、体内に侵入してきた細菌などを貪食する。",a:true,e:"（1）～（4）正しい。（5）誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-4",s:"問41・枝4",b:"血小板は、直径2～3µmの不定形細胞で、止血作用を持つ。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問41・枝5",b:"ABO式血液型は、白血球による血液型分類の一つで、A型血液の血清は抗B抗体をもつ。",a:false,e:"誤り：「白血球」⇒「赤血球」。"},
{c:"労働生理",y:"R7-4",s:"問42・枝1",b:"心臓は、自律神経の中枢で発生した刺激が刺激伝導系を介して心筋に伝わることにより、規則正しく収縮と拡張を繰り返す。",a:false,e:"誤り：「自律神経」⇒「洞結節（洞房結節）」。心臓は、右心房にある洞結節（洞房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく収縮と拡張を繰り返す。"},
{c:"労働生理",y:"R7-4",s:"問42・枝2",b:"肺循環により左心房に戻ってきた血液は、左心室を経て大動脈に入る。",a:true,e:"記述のとおり。肺循環で酸素を取り込んだ血液は左心房→左心室→大動脈の順に流れ、体循環により全身に送り出される。"},
{c:"労働生理",y:"R7-4",s:"問42・枝3",b:"大動脈を流れる血液は動脈血であるが、肺動脈を流れる血液は静脈血である。",a:true,e:"（1）誤り：「自律神経」⇒「洞結節（洞房結節）」。心臓は、右心房にある洞結節（洞房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく収縮と拡張を繰り返す。（2）～（5）正しい。"},
{c:"労働生理",y:"R7-4",s:"問42・枝4",b:"心臓の拍動による動脈圧の変動を末梢の動脈で触知したものを脈拍といい、一般に、手首の橈骨動脈で触知する。",a:true,e:"（1）誤り：「自律神経」⇒「洞結節（洞房結節）」。心臓は、右心房にある洞結節（洞房結節）で発生した刺激が刺激伝道系を介して心筋に伝わり、規則正しく収縮と拡張を繰り返す。（2）～（5）正しい。"},
{c:"労働生理",y:"R7-4",s:"問42・枝5",b:"動脈硬化とは、コレステロールの蓄積などにより、動脈壁が肥厚・硬化して弾力性を失った状態であり、進行すると血管の狭窄や閉塞を招き、臓器への酸素や栄養分の供給が妨げられる。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問43・枝1",b:"呼吸運動は、肋間筋、横隔膜などの呼吸筋によって胸郭内容積を周期的に増減し、それに伴って肺を伸縮させることにより行われる。",a:true,e:"記述のとおり。呼吸運動は、肋間筋や横隔膜などの呼吸筋が胸郭内容積を周期的に変化させ、それに伴い肺が伸縮することで行われる。"},
{c:"労働生理",y:"R7-4",s:"問43・枝2",b:"胸郭内容積が増し、その内圧が低くなるにつれ、鼻腔、気管などの気道を経て肺内へ流れ込む空気が吸気である。",a:true,e:"（1）～（4）正しい。（5）誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R7-4",s:"問43・枝3",b:"肺胞内の空気と肺胞を取り巻く毛細血管中の血液との間で行われるガス交換は、外呼吸である。",a:true,e:"（1）～（4）正しい。（5）誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R7-4",s:"問43・枝4",b:"呼吸数は、通常、1分間に16～20回で、成人の安静時の1回呼吸量は、約500mLである。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問43・枝5",b:"身体活動時には、血液中の二酸化炭素分圧の上昇などにより間脳の視床下部にある呼吸中枢が刺激され、1回換気量及び呼吸数が増加する。",a:false,e:"誤り：「間脳の視床下部」⇒「脳幹の延髄」。"},
{c:"労働生理",y:"R7-4",s:"問45・枝1",b:"寒冷な環境においては、皮膚の血管が収縮して血流量が減って、熱の放散が減少する。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：「内臓の血流量が増加し体内の代謝活動が亢進することにより」⇒「皮膚の血管を拡張させて血流量を増やし、発汗量も増やすことで」。"},
{c:"労働生理",y:"R7-4",s:"問45・枝2",b:"暑熱な環境においては、内臓の血流量が増加し体内の代謝活動が亢進することにより、人体からの熱の放散が促進される。",a:false,e:"誤り：「内臓の血流量が増加し体内の代謝活動が亢進することにより」⇒「皮膚の血管を拡張させて血流量を増やし、発汗量も増やすことで」。"},
{c:"労働生理",y:"R7-4",s:"問45・枝3",b:"体温調節にみられるように、外部環境などが変化しても身体内部の状態を一定に保とうとする性質を恒常性(ホメオスタシス)という。",a:true,e:"記述のとおり。恒常性（ホメオスタシス）とは、外部環境の変化に対して体内の状態（体温、血糖値、pH等）を一定に保とうとする生体の性質である。"},
{c:"労働生理",y:"R7-4",s:"問45・枝4",b:"計算上、100gの水分が体重70㎏の人の体表面から蒸発すると、気化熱が奪われ、体温が約1℃ 下がる。",a:true,e:"（1）（3）～（5）正しい。（2）誤り：「内臓の血流量が増加し体内の代謝活動が亢進することにより」⇒「皮膚の血管を拡張させて血流量を増やし、発汗量も増やすことで」。"},
{c:"労働生理",y:"R7-4",s:"問45・枝5",b:"熱の放散は、ふく射(放射)、伝導、蒸発などの物理的な過程で行われ、蒸発には、発汗と不感蒸泄によるものがある。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問46・枝1",b:"腎臓の腎小体では、糸球体から血液中の蛋白質以外の血漿成分がボウマン嚢に濾し出され、原尿が生成される。",a:true,e:"記述のとおり。腎小体の糸球体では、血液中の蛋白質以外の血漿成分がボウマン嚢に濾過され、原尿が生成される。"},
{c:"労働生理",y:"R7-4",s:"問46・枝2",b:"腎臓の尿細管では、原尿に含まれる大部分の水分及び身体に必要な成分が血液中に再吸収され、残りが尿として生成される。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「値が低くなる」⇒「値が高くなる」。尿素窒素（BUN）は血液の検査項目。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R7-4",s:"問46・枝3",b:"尿の生成・排出により、体内の水分の量やナトリウムなどの電解質の濃度を調節するとともに、生命活動によって生じた不要な物質を排出する。",a:true,e:"（1）～（3）（5）正しい。（4）誤り：「値が低くなる」⇒「値が高くなる」。尿素窒素（BUN）は血液の検査項目。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R7-4",s:"問46・枝4",b:"血液中の尿素窒素(BUN)の値が低くなる場合は、腎臓の機能の低下が考えられる。",a:false,e:"誤り：「値が低くなる」⇒「値が高くなる」。尿素窒素（BUN）は血液の検査項目。腎臓から排泄される老廃物の一種で、腎臓の機能が低下すると尿中へ排泄されず、血液中の値が高くなる。"},
{c:"労働生理",y:"R7-4",s:"問46・枝5",b:"尿の約95％は水分で、約5％が固形物であるが、その成分は全身の健康状態をよく反映するので、尿検査は健康診断などで広く行われている。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問47・枝1",b:"筋肉は、神経から送られてくる刺激によって収縮するが、神経に比べて疲労しやすい。",a:true,e:"記述のとおり。筋肉は神経からの刺激で収縮するが、神経に比べて疲労しやすい性質がある。"},
{c:"労働生理",y:"R7-4",s:"問47・枝2",b:"筋収縮には、グリコーゲン、りん酸化合物などのエネルギー源が必要で、特に、直接のエネルギーはATPの加水分解によってまかなわれる。",a:true,e:"（1）～（4）正しい。（5）誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中のグリコー"},
{c:"労働生理",y:"R7-4",s:"問47・枝3",b:"筋肉が収縮して出す最大筋力は、筋肉の単位断面積当たりの平均値をとると、性差や年齢差はほとんどない。",a:true,e:"（1）～（4）正しい。（5）誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中のグリコー"},
{c:"労働生理",y:"R7-4",s:"問47・枝4",b:"運動することによって筋肉が太くなることを筋肉の活動性肥大という。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問47・枝5",b:"筋肉中のグリコーゲンは、酸素が十分に供給されると完全に分解され、最後に乳酸になる。",a:false,e:"誤り：「最後に乳酸になる」⇒「多量のATPと、二酸化炭素と水に完全に分解される」。筋収縮の直接のエネルギーは、筋肉中のアデノシン三リン酸（ATP）が分解することによってまかなわれる。ATPは、血液中のグルコースや筋肉中のグリコーゲンから合成される。筋肉中のグリコーゲンは、酸素が十分に供給されると、多量のATPと、二酸化炭素と水に完全に分解される。しかし、酸素の供給が不足すると、完全に分解されずに、少量のATPと乳酸を生成する。"},
{c:"労働生理",y:"R7-4",s:"問48・枝1",b:"網膜には、色を感じる杆状体(杆体)と明暗を感じる錐状体(錐体)という2種類の視細胞が並んでいる。",a:false,e:"誤り：「色を感じる杆状体」⇒「色を感じる錐状体」。「明暗を感じる錐状体」⇒「明暗を感じる杆状体」。杆状体と錐状体の説明が逆。"},
{c:"労働生理",y:"R7-4",s:"問48・枝2",b:"老視(老眼)とは、加齢によって水晶体が徐々に変性して調節できる範囲が狭まり、近点が遠くなり、遠点が近くなることをいう。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問48・枝3",b:"半規管は体の傾きの方向や大きさを感じ、前庭は体の回転の方向や速度を感じる平衡感覚器であり、いずれも内耳にある。",a:false,e:"誤り：「半規管は体の傾きの方向や大きさを感じ」⇒「前庭は体の傾きの方向や大きさを感じ」。「前庭は体の回転の方向や速度を感じる」⇒「半規管は体の回転の方向や速度を感じる」。半気管と前庭の説明が逆。"},
{c:"労働生理",y:"R7-4",s:"問48・枝4",b:"嗅覚は、味覚と同様に物質の化学的性質を認知する感覚であるが、同じ臭気に対して疲労しにくいという特徴がある。",a:false,e:"誤り：「同じ臭気に対して疲労しにくい」⇒「同じ臭気について疲労しやすい」。嗅覚は、わずかな匂いでも感じるほど鋭敏である反面、同一臭気に対しては疲労しやすく、しばらくすると匂いを感じなくなる。"},
{c:"労働生理",y:"R7-4",s:"問48・枝5",b:"皮膚感覚には触圧覚、温度覚(温覚と冷覚)、痛覚などがあり、これらのうち温覚を感じる場所(温点)は、他の感覚を感じる場所よりも密度が高い。",a:false,e:"誤り：「温覚を感じる場所（温点）」⇒「痛覚を感じる場所」。"},
{c:"労働生理",y:"R7-4",s:"問49・枝1",b:"個人にとって適度なストレッサーは、身体的には活動の亢進を、心理的には意欲の向上、満足感、充実感などを生じさせる。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「副腎皮質ホルモンの分泌の著しい減少がある」⇒「副腎皮質ホルモンの分泌が亢進する」。"},
{c:"労働生理",y:"R7-4",s:"問49・枝2",b:"個人の能力や感性に適合しないストレッサーは心理的には不安、焦燥感、抑うつ感などを、身体的には疲労を生じることがある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「副腎皮質ホルモンの分泌の著しい減少がある」⇒「副腎皮質ホルモンの分泌が亢進する」。"},
{c:"労働生理",y:"R7-4",s:"問49・枝3",b:"典型的なストレス反応として、副腎皮質ホルモンの分泌の著しい減少がある。",a:false,e:"誤り：「副腎皮質ホルモンの分泌の著しい減少がある」⇒「副腎皮質ホルモンの分泌が亢進する」。"},
{c:"労働生理",y:"R7-4",s:"問49・枝4",b:"ストレスにより、高血圧症、狭心症、十二指腸潰瘍などの疾患が生じることがある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：「副腎皮質ホルモンの分泌の著しい減少がある」⇒「副腎皮質ホルモンの分泌が亢進する」。"},
{c:"労働生理",y:"R7-4",s:"問49・枝5",b:"昇進、転勤、配置替えなどがストレスの原因となることがある。",a:true,e:"正しい。"},
{c:"労働生理",y:"R7-4",s:"問50・枝1",b:"セクレチン十二指腸消化液の分泌促進",a:true,e:"（1）（3）～（5）正しい。（2）誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-4",s:"問50・枝2",b:"メラトニン副腎髄質体液中の塩類バランスの調節",a:false,e:"誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-4",s:"問50・枝3",b:"パラソルモン副甲状腺血中のカルシウム量の調節",a:true,e:"記述のとおり。パラソルモン（副甲状腺ホルモン）は副甲状腺から分泌され、血中カルシウム濃度を上昇させる作用がある。"},
{c:"労働生理",y:"R7-4",s:"問50・枝4",b:"インスリン膵臓血糖量の減少",a:true,e:"（1）（3）～（5）正しい。（2）誤り：メラトニンは「松果体」から分泌され、「睡眠を誘発」するはたらきをする。"},
{c:"労働生理",y:"R7-4",s:"問50・枝5",b:"グルカゴン膵臓血糖量の増加",a:true,e:"正しい。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問1・枝1",b:"総括安全衛生管理者を選任しなければならない。",a:true,e:"正しい：「常時300人以上の労働者を使用する製造業の事業場」に該当するため、総括安全衛生管理者を選任しなければならない。安衛法第10条（総括安全衛生管理者）第1項、安衛令（総括安全衛生管理者を選任すべき事業場）第2条2。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問1・枝2",b:"衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。",a:false,e:"誤り：衛生管理者のうち少なくとも1人を専任の衛生管理者とする必要がある場合は、常時500 人を超える労働者を使用する事業場で、一定の有害業務がある場合のため、設問の事業場は該当しない。安衛則（衛生管理者の選任）第7条第1項5。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問1・枝3",b:"衛生管理者は、全て第一種衛生管理者免許を有する者のうちから選任することができる。",a:true,e:"正しい：400 人の製造業の事業場においては、第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は安衛則第10条各号に掲げる者（医師、歯科医師、労働衛生コンサルタント等）の中から衛生管理者を選任することとされており、設問の第一種衛生管理者免許を有する者のみで差し支えない。安衛則第7条（衛生管理者の選任）第1項3、6。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問1・枝4",b:"産業医は、この事業場に専属でない者を選任することができる。",a:true,e:"正しい：専属の産業医を選任要件は、「常時1,000人以上の労働者を使用する事業場又は、一定の有害業務に500人以上の労働者を従事させる事業場」であるため、該当しない。安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問1・枝5",b:"特定化学物質作業主任者を選任しなくてよい。",a:true,e:"正しい：塩素を試験研究のため取扱う作業は、特定化学物質作業主任者を選任しなければならない業務には該当しない。安衛令（作業主任者を選任すべき作業）第6条18。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問2・A",b:"水深10m以上の場所における潜水の作業",a:false,e:"安衛法第14条（作業主任者）、安衛令第6条（作業主任者を選任すべき作業）。 A．義務付けられていない B．義務付けられていない C．義務付けられている：設問の作業は「高圧室内作業」のため、高圧室内作業"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問2・B",b:"セメント製造工程においてセメントを袋詰めする作業",a:false,e:"安衛法第14条（作業主任者）、安衛令第6条（作業主任者を選任すべき作業）。 A．義務付けられていない B．義務付けられていない C．義務付けられている：設問の作業は「高圧室内作業」のため、高圧室内作業"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問2・C",b:"圧気工法により、大気圧を超える気圧下の作業室において行う作業業",a:false,e:"安衛法第14条（作業主任者）、安衛令第6条（作業主任者を選任すべき作業）。 A．義務付けられていない B．義務付けられていない C．義務付けられている：設問の作業は「高圧室内作業」のため、高圧室内作業"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問2・D",b:"石炭を入れてあるホッパーの内部における作業",a:false,e:"安衛法第14条（作業主任者）、安衛令第6条（作業主任者を選任すべき作業）。 A．義務付けられていない B．義務付けられていない C．義務付けられている：設問の作業は「高圧室内作業」のため、高圧室内作業"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問3・枝1",b:"騒音計",a:false,e:"該当しない：騒音計は、厚生労働大臣が定める規格の具備が義務付けられる機械等に該当しない。安衛法第42条。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問3・枝2",b:"放射線測定器",a:false,e:"該当しない：放射線測定器は、厚生労働大臣が定める規格の具備が義務付けられる機械等に該当しない。安衛法第42条。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問3・枝3",b:"検知管方式による一酸化炭素検定器",a:false,e:"該当しない：検知管方式による一酸化炭素検定器は、厚生労働大臣が定める規格の具備が義務付けられる機械等に該当しない。安衛法第42条。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問3・枝4",b:"アンモニア用防毒マスク",a:true,e:"該当する：安衛法第42条（譲渡等の制限等）別表第29（防毒マスク）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問3・枝5",b:"化学防護服",a:false,e:"該当しない"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問4・A",b:"特別管理物質を製造する作業場所に設けられた密閉する設備、局所排気装置又はプッシュプル型換気装置の定期自主検査の記録又はその写し",a:false,e:"義務なし"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問4・B",b:"特別管理物質を製造する作業場において、労働者が常時従事した作業の概要及び当該作業に従事した期間等の記録又はその写し",a:false,e:"義務あり：特化則第53条（報告関係）2"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問4・C",b:"特別管理物質を製造する屋内作業場について行った作業環境測定の記録又はその写し",a:false,e:"義務あり：特化則第53条（報告関係）1"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問4・D",b:"特別管理物質を製造する作業場所に設けられた特定化学設備の定期自主検査の記録又はその写し",a:false,e:"義務なし"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問4・E",b:"特別管理物質を製造する業務に常時従事する労働者に対し行った特定化学物質健康診断の結果に基づく特定化学物質健康診断個人票又はその写し",a:false,e:"義務あり：特化則第53条（報告関係）3"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問5・枝1",b:"多量のドライアイスを取り扱う業務を行う屋内作業場については、半月以内ごとに1回、定期に、当該作業場における気温、湿度及びふく射熱を測定しなければならない。",a:false,e:"誤り：「気温、湿度及びふく射熱」⇒「気温及び湿度」。安衛則第587条（作業環境測定を行うべき作業場）11、第607条（気温、湿度の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問5・枝2",b:"強烈な騒音を発する屋内作業場においては、その伝ぱを防ぐため、隔壁を設ける等必要な措置を講じなければならない。",a:true,e:"正しい：安衛則第584条（騒音の伝ぱの防止）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問5・枝3",b:"屋内作業場に多量の熱を放散する溶融炉があるときは、加熱された空気を直接屋外に排出し、又はその放射するふく射熱から労働者を保護する措置を講じなければならない。",a:true,e:"正しい：安衛則第608条（ふく射熱からの保護）第1項。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問5・枝4",b:"坑内における気温は、原則として、37℃以下にしなければならない。",a:true,e:"正しい：安衛則第611条（坑内の気温）第1項。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問5・枝5",b:"著しく暑熱又は多湿の作業場においては、坑内等特殊な作業場でやむを得ない事由がある場合を除き、休憩の設備を作業場外に設けなければならない。",a:true,e:"正しい：安衛則第614条（有害作業場の休憩設備）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問6・A",b:"屋内において、耐火物を用いた炉を解体する箇所",a:false,e:"該当しない：（粉じん則別表第119）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問6・B",b:"屋内の、ガラスを製造する工程において、原料を溶解炉に投げ入れる箇所",a:false,e:"該当しない：（粉じん則別表第112のうち原料若しくは調合物を溶解炉に投げ入れる作業に該当）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問6・C",b:"屋内において、研磨材を用いて手持式動力工具により金属を研磨する箇所",a:false,e:"該当しない：（粉じん則別表第17のうち別表第36に該当）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問6・D",b:"屋内において、粉状の炭素製品を袋詰めする箇所",a:true,e:"該当する：（粉じん則別表第29）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問6・E",b:"屋内において、固定の溶射機により金属を溶射する箇所",a:true,e:"該当する：（粉じん則別表第215）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問7・枝1",b:"し尿を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、指揮者を選任し、作業を指揮させなければならない。",a:true,e:"正しい：酸欠則第25条の2（設備の改造等の作業）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問7・枝2",b:"パルプ液を入れたことのある槽の内部における作業については、酸素欠乏危険作業主任者技能講習を修了した者のうちから、酸素欠乏危険作業主任者を選任しなければならない。",a:false,e:"誤り：「酸素欠乏危険作業主任者技能講習を修了した者」⇒「酸素欠乏・硫化水素危険作業主任者技能講習を修了した者」。パルプ液を入れたことのある槽の内部における作業は、第2種酸素欠乏危険作業に該当するため、酸素欠乏・硫化水素危険作業主任者技能講習を修了した者のうちから酸素欠乏危険作業主任者を選任しなければならない。安衛令別表第 63の 3、酸欠則第 11 条第1項（作業主任者）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問7・枝3",b:"硫化水素中毒とは、硫化水素の濃度が10ppmを超える空気を吸入することにより生ずる症状が認められる状態をいう。",a:true,e:"正しい：酸欠則第2条（定義）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問7・枝4",b:"タンクの内部その他通風が不十分な場所において、アルゴン等を使用して行う溶接の作業に労働者を従事させるときは、作業を行う場所の空気中の酸素の濃度を18％以上に保つように換気し、又は労働者に空気呼吸器、酸素呼吸器若しくは送気マスクを使用させなければならない。",a:true,e:"正しい：酸欠則第21条（溶接に係る措置）第1項12。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問7・枝5",b:"第一種酸素欠乏危険作業を行う作業場については、その日の作業を開始する前に、当該作業場における空気中の酸素の濃度を測定しなければならない。",a:true,e:"正しい：酸欠則第3条第1項（作業環境測定等）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問8・枝1",b:"溶融ガラスからガラス製品を成型する業務を行う屋内作業場 …………………………… 空気中の粉じんの濃度",a:false,e:"誤り：「粉じん濃度」⇒「気温、湿度及びふく射熱」。安衛則第587条（作業環境測定を行うべき作業場）8、第607条（気温、湿度等の測定）第1項。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問8・枝2",b:"加硫がまによりゴムを加硫する業務を行う屋内作業場 ……………………………………… 気温及び湿度",a:true,e:"正しい： 安衛則第587条（作業環境測定を行うべき作業場）9、第607条（気温、湿度等の測定）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問8・枝3",b:"ドラムバーカーにより、木材を削皮する業務を行う屋内作業場 …………………………………… 等価騒音レベル",a:true,e:"正しい： 安衛令第21条（作業環境測定を行うべき作業場）第1項3、安衛則第588条（著しい騒音を発する屋内作業場）6。安衛則第590条（騒音の測定等）第1項。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問8・枝4",b:"エックス線装置を用いて透過写真撮影の業務を行う作業場の管理区域 ………………………… 線量当量率又は線量当量",a:true,e:"正しい： 安衛令第21条第1項6、別表第21、電離則第53条（作業環境測定を行うべき作業場）1、電離則第54条（線量当量率又は線量当量）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問8・枝5",b:"廃棄物の焼却施設において焼却灰を取り扱う業務(設備の解体等に伴うものを除く。)を行う作業場 ………………… 空気中のダイオキシン類の濃度",a:true,e:"正しい： 安衛則第 36条（特別の教育を必要とする業務）34、安衛則第 592 条の 2（ダイオキシン類の濃度及び含有率の測定）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問9・枝1",b:"地下室の内部で第一種有機溶剤等を用いて作業を行わせるとき、その作業場所に局所排気装置を設け、有効に稼働させているが、作業者に送気マスクも有機ガス用防毒マスクも使用させていない。",a:false,e:"違反なし：有機則第5条（第一種有機溶剤等又は第二種有機溶剤等に係る設備）、第18条（換気装置の稼働）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問9・枝2",b:"地下室の内部で第二種有機溶剤等を用いて作業を行わせるとき、その作業場所にプッシュプル型換気装置を設けブース内の気流の乱れもなく稼働させているが、作業者に送気マスクも有機ガス用防毒マスクも使用させていない。",a:false,e:"違反なし：有機則第5条（第一種有機溶剤等又は第二種有機溶剤等に係る設備）、第18条（換気装置の稼働）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問9・枝3",b:"地下室の内部で第三種有機溶剤等を用いて吹付けによる作業を行わせるとき、その作業場所に全体換気装置を設け有効に稼働させ、作業者に有機ガス用防毒マスクを使用させている。",a:true,e:"違反している：タンク等の内部（地下室の内部含む）で第三種有機溶剤等を用いて吹付けによる作業を行わせるときは、発散源を密閉する設備、局所排気装置又はプッシュプル型換気装置を設けなければならない。有機則第6条（第三種有機溶剤等に係る設備）第2項"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問9・枝4",b:"屋内作業場に設けた空気清浄装置のない局所排気装置の排気口で、厚生労働大臣が定める濃度以上の有機溶剤を排出するものの高さを、屋根から2mとしている。",a:false,e:"違反なし：有機則第15条の2（排気口）第2項。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問9・枝5",b:"有機溶剤等を入れてあった空容器で有機溶剤の蒸気が発散するおそれのあるものを、屋外の一定の場所に集積している。",a:false,e:"違反なし：有機則第36条（空容器の処理）。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問10・枝1",b:"著しく暑熱な場所における業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項1。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問10・枝2",b:"多量の低温物体を取り扱う業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項2。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問10・枝3",b:"ヘリウム、アルゴン等の不活性の気体を入れたことのあるタンクの内部における業務。びょう",a:true,e:"制限されない。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問10・枝4",b:"削岩機、鋲打機等の使用によって身体に著しい振動を与える業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項6。"},
{c:"関係法令（有害業務）",y:"R7-10",s:"問10・枝5",b:"土石、獣毛等のじんあい又は粉末を著しく飛散する場所における業務。",a:false,e:"制限される：労基則第18条（労働時間延長の制限業務）第1項4。【労働衛生（有害業務に係るもの）】"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問11・枝1",b:"ホルムアルデヒド ……………………… ガス",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問11・枝2",b:"塩化ビニル ……………………………… ガス",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問11・枝3",b:"アクリロニトリル ……………………… ガス",a:true,e:"誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問11・枝4",b:"二硫化炭素 ……………………………… 蒸気",a:false,e:"（1）（2）（4）（5）正しい。（3）誤り：「ガス」⇒「蒸気」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問11・枝5",b:"アセトン ………………………………… 蒸気",a:false,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問12・枝1",b:"ベリリウム中毒では、溶血性貧血、尿の赤色化などの症状がみられる。",a:false,e:"誤り：「溶血性貧血、尿の赤色化」⇒「接触性皮膚炎、肺炎」。ベリリウムによる急性中毒では、接触性皮膚炎、皮膚潰瘍、肺炎の症状がみられ、慢性中毒の場合は、肺に肉芽腫を生じるベリリウム肺が発生する。溶血性貧血の症状がみられるのは、砒素による中毒。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問12・枝2",b:"砒素中毒では、角化症、黒皮症などの皮膚障害、末梢神経障害などがみられる。",a:true,e:"（1）誤り：「溶血性貧血、尿の赤色化」⇒「接触性皮膚炎、肺炎」。ベリリウムによる急性中毒では、接触性皮膚炎、皮膚潰瘍、肺炎の症状がみられ、慢性中毒の場合は、肺に肉芽腫を生じるベリリウム肺が発生する。溶血性貧血の症状がみられるのは、砒素による中毒。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問12・枝3",b:"マンガン中毒では、筋のこわばり、震え、歩行困難などのパーキンソン病に似た症状がみられる。",a:true,e:"（1）誤り：「溶血性貧血、尿の赤色化」⇒「接触性皮膚炎、肺炎」。ベリリウムによる急性中毒では、接触性皮膚炎、皮膚潰瘍、肺炎の症状がみられ、慢性中毒の場合は、肺に肉芽腫を生じるベリリウム肺が発生する。溶血性貧血の症状がみられるのは、砒素による中毒。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問12・枝4",b:"カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。",a:true,e:"（1）誤り：「溶血性貧血、尿の赤色化」⇒「接触性皮膚炎、肺炎」。ベリリウムによる急性中毒では、接触性皮膚炎、皮膚潰瘍、肺炎の症状がみられ、慢性中毒の場合は、肺に肉芽腫を生じるベリリウム肺が発生する。溶血性貧血の症状がみられるのは、砒素による中毒。（2）（3）（4）（5）正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問12・枝5",b:"金属水銀中毒では、感情不安定、幻覚などの精神障害がみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問13・枝1",b:"米杉、ラワンなどの木材粉じんは、ぜんそくを起こすことがある。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問13・枝2",b:"じん肺の自覚症状は、初期にはあまりみられないが、進行すると咳、痰、呼吸困難などがみられる。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問13・枝3",b:"じん肺は、続発性気管支炎、肺結核などを合併することがある。",a:true,e:"（1）（2）（3）（4）正しい。（5）誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問13・枝4",b:"石綿肺では、胸膜の肥厚(プラーク)、胸膜の石灰化などがみられる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問13・枝5",b:"けい肺は、鉄、アルミニウムなどの金属粉じんを吸入することによって発症するじん肺である。",a:false,e:"誤り：「鉄、アルミニウムなどの金属粉じん」⇒「鉱物性粉じんに含まれる遊離けい酸」。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問14・枝1",b:"騒音性難聴の初期に認められる4,000Hz付近の音から始まる聴力低下の型をc5dipという。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：人が聴くことができる音の周波数は、およそ20～20,000Hzであり、人の会話域は、通常 500Hz～2,000Hz程度である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問14・枝2",b:"音圧レベルは、通常、人間が聴くことができる最も小さな音圧に対する比の常用対数を20倍して求められる。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：人が聴くことができる音の周波数は、およそ20～20,000Hzであり、人の会話域は、通常 500Hz～2,000Hz程度である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問14・枝3",b:"騒音は、自律神経系や内分泌系へも影響を与えるため、騒音ばく露により、交感神経の活動の亢進や副腎皮質ホルモンの分泌の増加が認められることがある。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：人が聴くことができる音の周波数は、およそ20～20,000Hzであり、人の会話域は、通常 500Hz～2,000Hz程度である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問14・枝4",b:"人が聴くことのできる音の周波数は、10Hz から 30,000Hz 程度までであり、このうち会話音域は2,000Hzから4,000Hz程度までである。",a:false,e:"誤り：人が聴くことができる音の周波数は、およそ20～20,000Hzであり、人の会話域は、通常 500Hz～2,000Hz程度である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問14・枝5",b:"等価騒音レベルは、時間的に変動する騒音レベルのエネルギー的な平均値を表す量で、変動する騒音に対する人間の生理・心理的反応とよく対応している。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問15・枝1",b:"リスクアセスメントの基本的手順のうち最初に実施するのは、労働者の就業に係るリスクアセスメント対象物による危険性又は有害性を特定することである。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：選択肢の内容はリスク。ハザードは、労働者の就業に係る危険性又は有害性をいう。建設物、設備、原材料、ガス、蒸気、粉じん等により、作業行動その他業務に起因する。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問15・枝2",b:"ハザードは、労働災害発生の可能性と負傷又は疾病の重大性(重篤度)の組合せであると定義される。",a:false,e:"誤り：選択肢の内容はリスク。ハザードは、労働者の就業に係る危険性又は有害性をいう。建設物、設備、原材料、ガス、蒸気、粉じん等により、作業行動その他業務に起因する。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問15・枝3",b:"リスクアセスメント対象物による疾病のリスク低減措置の検討では、リスクアセスメント対象物の有害性に応じた有効な保護具の使用よりも作業手順の改善、立入禁止等の管理的対策を優先する。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：選択肢の内容はリスク。ハザードは、労働者の就業に係る危険性又は有害性をいう。建設物、設備、原材料、ガス、蒸気、粉じん等により、作業行動その他業務に起因する。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問15・枝4",b:"リスクアセスメント対象物による疾病のリスク低減措置の検討では、法令に定められた事項を除けば、危険性又は有害性のより低い物質への代替等を最優先する。",a:true,e:"（1）（3）（4）（5）正しい。（2）誤り：選択肢の内容はリスク。ハザードは、労働者の就業に係る危険性又は有害性をいう。建設物、設備、原材料、ガス、蒸気、粉じん等により、作業行動その他業務に起因する。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問15・枝5",b:"リスクアセスメント対象物による疾病のリスク低減措置の検討に当たっては、より優先順位の高い措置を実施することにした場合であって、当該措置により十分にリスクが低減される場合には、当該措置よりも優先順位の低い措置の検討は必要ない。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問16・枝1",b:"脂溶性があり、脂肪の多い脳などに入りやすい。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「黒皮症、鼻中隔穿孔」⇒「皮膚の角化、結膜炎」。黒皮症、鼻中隔穿孔などがみられるのは、砒素による中毒症状。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問16・枝2",b:"呼吸器の症状には、咳、上気道の炎症などがある。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「黒皮症、鼻中隔穿孔」⇒「皮膚の角化、結膜炎」。黒皮症、鼻中隔穿孔などがみられるのは、砒素による中毒症状。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問16・枝3",b:"低濃度の繰り返しばく露による慢性中毒では、めまい、不眠などの不定愁訴がみられる。",a:true,e:"（1）（2）（3）（5）正しい。（4）誤り：「黒皮症、鼻中隔穿孔」⇒「皮膚の角化、結膜炎」。黒皮症、鼻中隔穿孔などがみられるのは、砒素による中毒症状。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問16・枝4",b:"皮膚や粘膜に対する症状には、黒皮症、鼻中隔穿孔などがある。",a:false,e:"誤り：「黒皮症、鼻中隔穿孔」⇒「皮膚の角化、結膜炎」。黒皮症、鼻中隔穿孔などがみられるのは、砒素による中毒症状。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問16・枝5",b:"肝機能障害や腎機能障害を起こすものがある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問17・枝1",b:"有害業務への配置替えの際に行う特殊健康診断には、業務適性の判断と、その後の業務による影響を調べるための基礎資料を得るという目的がある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問17・枝2",b:"特殊健康診断が法定労働時間外に行われた場合には、割増賃金を支払う必要がある。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問17・枝3",b:"眼底検査は、電離放射線健康診断で実施され、動脈硬化の進展の有無を検査する。",a:false,e:"誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問17・枝4",b:"振動工具取扱い作業者に対する特殊健康診断を1年に2回実施する場合、そのうち1回は冬季に行うとよい。",a:true,e:"（1）（2）（4）（5）正しい。（3）誤り：眼底検査は、二硫化炭素の有機溶剤健康診断の項目。電離放射線健康診断では、白血球数や白内障に関する眼の検査をする。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問17・枝5",b:"特殊健康診断において適切な健診デザインを行うためには、作業内容と有害要因へのばく露状況を把握する必要がある。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問18・枝1",b:"A測定の第二評価値が管理濃度を超えている単位作業場所は、B測定の結果に関係なく第三管理区分になる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問18・枝2",b:"A測定における測定点の高さの範囲は、床上100㎝以上150㎝以下である。",a:false,e:"誤り：「床上100㎝以上150㎝以下」⇒「床上50㎝以上150㎝以下」"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問18・枝3",b:"A測定は、原材料を反応槽へ投入する場合など、間欠的に大量の有害物質の発散を伴う作業における最高濃度を知るために行う測定である。",a:false,e:"誤り：選択肢の内容はB測定。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問18・枝4",b:"評価の指標として用いられる管理濃度は、個々の労働者の有害物質へのばく露限界を示すものである。",a:false,e:"誤り：管理濃度は、有害物質に関する作業環境の状態を単位作業場所の作業環境測定結果から評価するための指標として設定されたものである。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問18・枝5",b:"B測定の測定値が管理濃度を超えている単位作業場所は、A測定の結果に関係なく第三管理区分になる。",a:false,e:"誤り：B測定の測定値が、管理濃度の1.5倍を超えている単位作業場所は、A測定の結果に関係なく第三管理区分になる。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問19・枝1",b:"防毒マスクの吸収缶の色は、アンモニア用は緑色で、有機ガス用は黒色である。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問19・枝2",b:"2種類以上の有害ガスが混在している場合には、そのうち最も毒性の強いガス用の防毒マスクを使用する。",a:false,e:"誤り：2種類以上の有害ガスが混在している場合や、対象ガスの種類や濃度が不明な場合は送気マスクや自給式呼吸器を使用し、防毒マスクを使用してはならない。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問19・枝3",b:"型式検定合格標章のある防じんマスクでも、ヒュームのような微細な粒子に対しては効果がない。",a:false,e:"誤り：型式検定合格標章のある防じんマスクは、ヒュームなどの微粒子でも有効である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問19・枝4",b:"防じんマスクは、オイルミストが堆積しても粒子捕集効率は低下しないので、吸気抵抗が上昇しない限り使用することができる。",a:false,e:"誤り：防じんマスクは、オイルミスト等の堆積により粒子捕集効率が低下するものがあるので、吸気抵抗の上昇のみを使用限度の判断基準にしないこと。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問19・枝5",b:"エアラインマスクは、自給式呼吸器の一種である。",a:false,e:"誤り：エアラインマスクは、圧縮空気を空気源とする送気マスクの一種である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問20・枝1",b:"電離放射線の被ばくによる白内障は、晩発障害に分類され、被ばく後、半年～30年後に現れる。",a:true,e:"正しい。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問20・枝2",b:"マイクロ波は、赤外線より波長が短い電磁波で、照射部位の組織を加熱する作用がある。",a:false,e:"誤り：マイクロ波は、赤外線より波長が長い電磁波である。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問20・枝3",b:"金属熱は、金属の溶融作業において、高温環境により体温調節中枢が麻痺することにより発生し、長期間にわたる発熱、関節痛などの症状がみられる。",a:false,e:"誤り：金属熱は、亜鉛などの金属溶融作業の際に発生するヒュームを吸入することにより発生し、悪寒、発熱、関節痛などの症状がみられる。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問20・枝4",b:"凍瘡は、皮膚組織の凍結壊死を伴うしもやけのことで、0℃以下の寒冷にばく露することによって発生する。",a:false,e:"誤り：選択肢の症状は凍傷。凍瘡は0℃以上の寒冷による炎症で、しもやけのこと。"},
{c:"労働衛生（有害業務）",y:"R7-10",s:"問20・枝5",b:"潜水業務における減圧症は、浮上による減圧に伴い、血液中に溶け込んでいた酸素が気泡となり、血管を閉塞したり組織を圧迫することにより発生する。",a:false,e:"誤り：「血液中に溶け込んでいた酸素」⇒「血液中や組織中に溶け込んでいた窒素」。【関係法令（有害業務に係るもの以外のもの）】"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問21・枝1",b:"常時500人を超え1,000人以下の労働者を使用し、そのうち、深夜業を含む業務に常時30人以上の労働者を従事させる事業場では、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。",a:false,e:"誤り：衛生管理者を専任しなければならない深夜業は該当しない。安衛則第7条（衛生管理者の選任）第1項45。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問21・枝2",b:"常時1,000人を超え2,000人以下の労働者を使用する事業場では、4人以上の衛生管理者を選任しなければならない。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問21・枝3",b:"常時50人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問21・枝4",b:"常時1,000人以上の労働者を使用する事業場では、その事業場に専属の産業医を選任しなければならない。",a:true,e:"正しい：安衛則第13条（産業医の選任等）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問21・枝5",b:"衛生管理者を選任したときは、遅滞なく、その氏名等を所轄労働基準監督署長に報告しなければならない。",a:true,e:"正しい：安衛則第7条（衛生管理者の選任）第3項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問22・枝1",b:"労働災害の原因の調査及び再発防止対策に関すること。",a:true,e:"定められている：安衛法第10条（総括安全衛生管理者）第1項4。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問22・枝2",b:"安全衛生に関する方針の表明に関すること。",a:true,e:"定められている：安衛則第3条の2（総括安全衛生管理者が統括管理する業務）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問22・枝3",b:"少なくとも毎日1回作業場等を巡視し、衛生状態に有害のおそれがあるときは、直ちに、労働者の健康障害を防止するため必要な措置を講ずること。",a:false,e:"定められていない：「毎日1回」⇒「毎週1回」。安衛則第11条（衛生管理者の定期巡視及び権限の付与）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問22・枝4",b:"化学物質等による危険性又は有害性等の調査及びその結果に基づき講ずる措置に関すること。",a:true,e:"定められている：安衛則第3条の2（総括安全衛生管理者が統括管理する業務）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問22・枝5",b:"健康診断の実施その他健康の保持増進のための措置に関すること。",a:true,e:"定められている：安衛法第10条第3項."},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問23・枝1",b:"衛生委員会の議長を除く委員の半数については、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者の推薦に基づき指名しなければならない。",a:true,e:"正しい：安衛法第18条（衛生委員会）第4項、第17条第4項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問23・枝2",b:"衛生委員会の議長は、原則として、総括安全衛生管理者又は総括安全衛生管理者以外の者で事業場においてその事業の実施を統括管理するもの若しくはこれに準ずる者のうちから事業者が指名した委員がなるものとする。",a:true,e:"正しい：安衛法第18条（衛生委員会）第2項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問23・枝3",b:"事業場に専属ではないが、衛生管理者として選任している労働衛生コンサルタントを、衛生委員会の委員として指名することができる。",a:true,e:"正しい：安衛法第18条（衛生委員会）第2項2。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問23・枝4",b:"作業環境測定を外部の作業環境測定機関に委託して実施している場合、当該作業環境測定を実施している作業環境測定士を、衛生委員会の委員として指名することができる。",a:false,e:"誤り：作業環境測定士は、事業場に専属の労働者である必要がある。安衛法第18条（衛生委員会）第3項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問23・枝5",b:"衛生委員会の付議事項には、長時間にわたる労働による労働者の健康障害の防止を図るための対策の樹立に関することが含まれる。",a:true,e:"正しい：安衛則第22条（衛生委員会の付議事項）9。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問24・枝1",b:"医療業",a:false,e:"（1）（2）（3）（4）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項23。（5）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問24・枝2",b:"熱供給業",a:false,e:"（1）（2）（3）（4）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項23。（5）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問24・枝3",b:"通信業",a:false,e:"（1）（2）（3）（4）義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項23。（5）義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問24・枝4",b:"水道業",a:false,e:"義務付けられていない：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項23。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問24・枝5",b:"清掃業",a:true,e:"義務付けられている：安衛令第2条（総括安全衛生管理者を選任すべき事業場）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問25・枝1",b:"常時50人以上の労働者を使用する事業者は、1年以内ごとに1回、定期に、心理的な負担の程度を把握するための検査及び面接指導の結果を所轄労働基準監督署長に報告しなければならない。",a:true,e:"正しい：安衛則第52条の21（検査及び面接指導結果の報告）。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問25・枝2",b:"事業者は、面接指導の対象となる労働者の要件に該当する労働者から申出があったときは、申出の日から3か月以内に、面接指導を行わなければならない。",a:false,e:"誤り：該当する労働者から申し出があったときは、遅滞なく、面接指導を行わなければならない。安衛則第52条の16（面接指導の実施方法等）第2項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問25・枝3",b:"事業者は、面接指導を行った場合は、当該面接指導の結果を当該事業場の当該部署に所属する労働者の集団その他の一定規模の集団ごとに集計し、その結果について分析しなければならない。",a:false,e:"誤り：事業者ではなく、検査を行った医師等が分析する。安衛則第52条の14（検査結果の集団ごとの分析等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問25・枝4",b:"面接指導の結果は、健康診断個人票に記載しなければならない。",a:false,e:"誤り：健康診断個人票に記入することとはされておらず、面接指導の結果の記録を作成しなけならない。安衛則第52条の18（面接指導結果の記録の作成）。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問25・枝5",b:"面接指導を行う医師として事業者が指名できる医師は、法定の研修を修了した医師に限られる。",a:false,e:"誤り：医師の指名要件はない。安衛則第52条の10（検査の実施者等）。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問26・枝1",b:"事業場に雇い入れる日の6か月前に医師による健康診断を受けた労働者に対しても、法定の全ての項目について雇入時の健康診断を行わなければならない。",a:false,e:"正しい：安衛則第43条（雇入時の健康診断）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問26・枝2",b:"雇入時の健康診断における聴力の検査は、1,000Hz及び4,000HHzの音に係る聴力について行わなければならない。",a:false,e:"正しい：安衛則第43条（雇入時の健康診断）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問26・枝3",b:"50人以上の労働者に対して雇入時の健康診断を行ったときは、遅滞なく、その結果を所轄労働基準監督署長に報告しなければならない。",a:true,e:"誤り：定期の健康診断の場合は、報告しなければならないが、雇入時の健康診断の場合は報告しなくてもよい。安衛則第52条（健康診断結果報告）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問26・枝4",b:"事業場において実施した雇入時の健康診断の項目に異常の所見があると診断された労働者については、その結果に基づき、健康を保持するために必要な措置について、健康診断が行われた日から3か月以内に、医師の意見を聴かなければならない。",a:false,e:"正しい：安衛則第 51 条の2（健康診断の結果についての医師等からの意見聴取）第1項1。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問26・枝5",b:"雇入時の健康診断の結果に基づき、健康診断個人票を作成して、これを5年間保存しなければならない。",a:false,e:"正しい：安衛則第51条（健康診断結果の記録の作成）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問27・枝1",b:"常時40人の労働者を就業させている屋内作業場の気積が、設備の占める容積及び床面から3 mを超える高さにある空間を除き400㎥となっている。",a:false,e:"違反していない：400㎥／40人＝10となり、1人について10㎥以上を満たす。安衛則第600 条（気積）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問27・枝2",b:"ねずみ、昆虫等の発生場所、生息場所及び侵入経路並びにねずみ、昆虫等による被害の状況について、6か月ごとに1回、定期に、統一的に調査を実施し、その調査結果に基づき、必要な措置を講じている。",a:false,e:"違反していない：安衛則第619条（清掃等の実施）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問27・枝3",b:"男性5人を含む常時30人の労働者が就業している事業場で、女性用には臥床することのできる休養室を設けているが、男性用には、臥床することのできない休憩設備を利用させている。",a:false,e:"違反していない：設問は、男性5人、女性25人で常時30人なので、男性用と女性用に区別する要件に達していない。安衛則第618条（休養室等）。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問27・枝4",b:"事業場に附属する食堂の床面積を、食事の際の1人について、1㎡を超えるようにしている。",a:false,e:"違反していない：安衛則第630条（食堂及び炊事場）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問27・枝5",b:"事業場に附属する炊事場の入口には、洗浄剤を含浸させたマットを設置して、土足のままでも立ち入ることができるようにしている。",a:true,e:"違反している：炊事場専用の履物を備え、土足のまま立ち入らせてはならない。安衛則第630 条（食堂及び炊事場）第1項15。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問28・枝1",b:"機械による換気のための設備については、3か月以内ごとに1回、定期に、異常の有無を点検しなければならない。",a:false,e:"誤り：「3か月以内ごとに1回」⇒「2か月以内ごとに1回」。事務所則第9条（点検等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問28・枝2",b:"空気調和設備の冷却塔及び冷却水については、原則として、1か月以内ごとに1回、定期に、その汚れの状況を点検しなければならない。",a:true,e:"正しい：事務所則第9条の2第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問28・枝3",b:"空気調和設備内に設けられた排水受けについては、原則として、2か月以内ごとに1回、定期に、その汚れ及び閉塞の状況を点検しなければならない。",a:false,e:"誤り：「2か月以内ごとに1回」⇒「1か月以内ごとに1回」。事務所則第9条の2第1項4。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問28・枝4",b:"空気調和設備の加湿装置については、原則として、2か月以内ごとに1回、定期に、その汚れの状況を点検しなければならない。",a:false,e:"誤り：「2か月以内ごとに1回」⇒「1か月以内ごとに1回」。事務所則第9条の2第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問28・枝5",b:"燃焼器具を使用するときは、発熱量が著しく少ないものを除き、1か月以内ごとに1回、定期に、異常の有無を点検しなければならない。",a:false,e:"誤り：「1か月以内ごとに1回」⇒「毎日」。事務所則第6条（燃焼器具）第2項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問29・枝1",b:"監視又は断続的労働に従事する労働者であって、所轄労働基準監督署長の許可を受けたものについては、労働時間、休憩及び休日に関する規定は適用されない。",a:true,e:"正しい：労基法第41条（労働時間等に関する規定の適用除外）第1項3。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問29・枝2",b:"1日8時間を超えて労働させることができるのは、時間外労働の協定を締結し、これを所轄労働基準監督署長に届け出た場合に限られている。",a:false,e:"誤り：時間外の労使協定を締結しなくとも、災害時等で臨時の必要がある場合において使用者は行政官庁の許可を受けて、その必要の限度において労働時間を延長し、または休日に労度させることができる。労基法第33条（災害時による臨時の必要がある場合の時間外労働等）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問29・枝3",b:"フレックスタイム制の清算期間は、6か月以内の期間に限られる。",a:false,e:"誤り：「6 か月以内」⇒「3 か月以内」。労基法第 32 条の 3（フレックスタイム制）第1項2。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問29・枝4",b:"満20歳未満の者については、時間外・休日労働をさせることはできない。",a:false,e:"誤り：「満20歳未満の者」⇒「満18歳未満」。労基法第60条（労働時間及び休日）。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問29・枝5",b:"労働時間が8時間を超える場合においては少なくとも60分、12時間を超える場合においては少なくとも90分の休憩時間を労働時間の途中に与えなければならない。",a:false,e:"誤り：労働時間が12時間を超える場合の休憩時間は定められていない。労基法第34条（休憩）第1項。"},
{c:"関係法令（有害業務以外）",y:"R7-10",s:"問30・枝2",b:"10日",a:true,e:"※ 労基法第 39 条（年次有給休暇）第 3項、労基則第24 条の3（所定労働日数が少ない労働者に対する年次有給休暇の比例付与）第3項。設問の要件の年次有給休暇日数は以下の通り。 14×4÷5.2＝10.7… 小数点以下切り捨て 10日【労働衛生（有害業務に係るもの以外のもの）】"},
