<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="衛生管理者">
<meta name="theme-color" content="#1a1a1a">
<title>第1種衛生管理者 ○×チェック</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f2f2f7;color:#1a1a1a;min-height:100vh;}
.app{max-width:430px;margin:0 auto;padding:0 0 40px;}
.home-hero{background:#1a1a1a;padding:22px 20px 20px;color:#fff;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.hero-label{font-size:10px;color:#666;letter-spacing:.08em;margin-bottom:4px;}
.hero-title{font-size:19px;font-weight:700;line-height:1.3;}
.countdown-box{text-align:right;}
.countdown-days{font-size:28px;font-weight:700;color:#fff;line-height:1;}
.countdown-label{font-size:10px;color:#666;margin-top:2px;}
.countdown-set{font-size:11px;color:#555;text-decoration:underline;cursor:pointer;margin-top:3px;display:block;}
.exam-date-input{background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#fff;font-size:12px;padding:4px 8px;margin-top:4px;width:130px;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.hero-stat{text-align:center;}
.hero-stat-val{font-size:18px;font-weight:700;color:#fff;}
.hero-stat-label{font-size:10px;color:#666;margin-top:1px;}
.graph-section{background:#fff;margin:10px 0;padding:14px 16px;}
.graph-title{font-size:13px;font-weight:600;margin-bottom:12px;color:#1a1a1a;}
.graph-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.graph-row:last-child{margin-bottom:0;}
.graph-cat{font-size:10px;color:#666;width:58px;flex-shrink:0;line-height:1.3;}
.graph-bar-wrap{flex:1;background:#f0f0f0;border-radius:99px;height:8px;overflow:hidden;}
.graph-bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}
.graph-pct{font-size:11px;font-weight:600;width:34px;text-align:right;flex-shrink:0;}
.graph-count{font-size:10px;color:#bbb;width:36px;text-align:right;flex-shrink:0;}
.home-body{padding:10px 12px;}
.mode-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;margin-bottom:8px;}
.mode-cards{display:flex;flex-direction:column;gap:7px;}
.mode-card{background:#fff;border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .12s;border:1.5px solid transparent;}
.mode-card:active{transform:scale(.97);}
.mode-card.disabled{opacity:.35;cursor:default;}
.mode-card.disabled:active{transform:none;}
.mode-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mode-info{flex:1;}
.mode-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:1px;}
.mode-desc{font-size:11px;color:#888;}
.mode-count{font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0;}
.mode-arrow{font-size:16px;color:#ccc;flex-shrink:0;}
.cat-panel{display:none;flex-direction:column;gap:5px;margin-top:7px;padding:10px;background:#f9f9f9;border-radius:11px;}
.cat-panel.open{display:flex;}
.cat-item{background:#fff;border-radius:9px;padding:10px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:transform .1s;}
.cat-item:active{transform:scale(.97);}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cat-item-name{flex:1;font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.4;}
.cat-item-pct{font-size:11px;font-weight:600;flex-shrink:0;}
.cat-wrong-badge{font-size:10px;background:#fff0f0;color:#c0392b;padding:2px 6px;border-radius:99px;font-weight:600;flex-shrink:0;}
.cat-item-count{font-size:10px;color:#bbb;flex-shrink:0;}
.quiz-screen{display:none;}
.quiz-header{background:#1a1a1a;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.quiz-back{color:#fff;background:none;border:none;font-size:14px;cursor:pointer;padding:4px 0;}
.quiz-header-title{font-size:13px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quiz-header-num{font-size:12px;color:#666;flex-shrink:0;}
.quiz-body{padding:10px 12px;}
.q-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.q-stat{background:#fff;border-radius:9px;padding:7px 4px;text-align:center;}
.q-stat-label{font-size:10px;color:#999;margin-bottom:1px;}
.q-stat-val{font-size:17px;font-weight:700;color:#1a1a1a;}
.prog{background:#e5e5ea;border-radius:99px;height:4px;margin-bottom:10px;overflow:hidden;}
.prog-fill{height:100%;background:#1a1a1a;border-radius:99px;transition:width .4s;}
.q-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;}
.q-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;align-items:center;}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:500;}
.badge-year{background:#e8f5ee;color:#0a6b47;}
.badge-cat{background:#e8f0fb;color:#1a56c4;}
.badge-review{background:#fff0f0;color:#c0392b;}
.bm-btn{margin-left:auto;background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1;}
.q-stem{font-size:12px;color:#888;line-height:1.7;padding-bottom:9px;border-bottom:1px solid #f0f0f0;margin-bottom:11px;}
.q-stem strong{color:#555;font-weight:600;}
.q-branch{font-size:15px;line-height:1.8;color:#1a1a1a;min-height:58px;}
.ox-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:13px;}
.ox-btn{padding:16px 0;border-radius:13px;border:1.5px solid #e5e5ea;background:#fff;font-size:32px;cursor:pointer;transition:transform .1s;line-height:1;}
.ox-btn:active{transform:scale(.94);}
.ox-btn:disabled{cursor:default;opacity:.4;}
.ox-btn.correct{background:#e8f5ee;border-color:#16a07a;}
.ox-btn.wrong{background:#fff0f0;border-color:#e24b4a;}
.result-badge{display:none;margin-top:9px;text-align:center;font-size:13px;font-weight:600;padding:8px;border-radius:9px;}
.result-badge.ok{background:#e8f5ee;color:#0a6b47;}
.result-badge.ng{background:#fff0f0;color:#c0392b;}
.explanation{background:#f9f9f9;border-radius:9px;padding:10px;margin-top:7px;font-size:12px;line-height:1.8;color:#666;display:none;}
.explanation strong{color:#333;font-weight:600;}
.btn-next{width:100%;padding:12px;border:1.5px solid #e5e5ea;border-radius:11px;background:#fff;font-size:14px;font-weight:600;color:#1a1a1a;cursor:pointer;display:none;margin-top:7px;}
.btn-next:active{background:#f5f5f5;}
.bm-screen{padding:12px;}
.bm-title{font-size:15px;font-weight:600;margin-bottom:12px;}
.bm-item{background:#fff;border-radius:11px;padding:12px 14px;margin-bottom:7px;cursor:pointer;}
.bm-item:active{opacity:.7;}
.bm-item-cat{font-size:10px;color:#888;margin-bottom:3px;}
.bm-item-text{font-size:13px;color:#1a1a1a;line-height:1.6;}
.bm-empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px;}
.result-screen{display:none;padding:20px 16px;text-align:center;}
.result-circle{width:110px;height:110px;border-radius:50%;background:#1a1a1a;margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-score{font-size:28px;font-weight:700;color:#fff;}
.result-score-sub{font-size:10px;color:#888;}
.result-msg{font-size:15px;font-weight:600;margin-bottom:4px;}
.result-sub{font-size:13px;color:#888;margin-bottom:20px;}
.result-actions{display:flex;flex-direction:column;gap:7px;}
.r-btn{padding:12px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e5e5ea;background:#fff;color:#1a1a1a;}
.r-btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.r-btn.danger{border-color:#e24b4a;background:#fff5f5;color:#c0392b;}
</style>
</head>
<body>
<div class="app">

<!-- ホーム画面 -->
<div id="screen-home">
  <div class="home-hero">
    <div class="hero-top">
      <div>
        <div class="hero-label">EISEI KANRISHA</div>
        <div class="hero-title">第1種衛生管理者<br>○×チェック</div>
      </div>
      <div class="countdown-box">
        <div class="countdown-days" id="countdown-days">―</div>
        <div class="countdown-label">日後に試験</div>
        <span class="countdown-set" onclick="showDatePicker()" id="set-date-btn">試験日を設定</span>
        <input type="date" class="exam-date-input" id="exam-date-input" style="display:none;" onchange="setExamDate(this.value)">
      </div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="hero-stat-val" id="h-total">100</div><div class="hero-stat-label">総問題数</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="h-wrong">0</div><div class="hero-stat-label">要復習</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="h-acc">―</div><div class="hero-stat-label">累計正答率</div></div>
    </div>
  </div>

  <!-- 科目別正答率グラフ -->
  <div class="graph-section">
    <div class="graph-title">科目別正答率</div>
    <div id="graph-body"></div>
  </div>

  <div class="home-body">
    <div class="mode-label">モードを選択</div>
    <div class="mode-cards">
      <div class="mode-card" onclick="startRandom()">
        <div class="mode-icon" style="background:#f0f0f0;">🎲</div>
        <div class="mode-info"><div class="mode-name">ランダム</div><div class="mode-desc">全科目からシャッフル出題</div></div>
        <span class="mode-count" style="background:#f0f0f0;color:#555;">100問</span>
        <div class="mode-arrow">›</div>
      </div>
      <div class="mode-card" onclick="toggleCat()">
        <div class="mode-icon" style="background:#e8f0fb;">📂</div>
        <div class="mode-info"><div class="mode-name">カテゴリ別</div><div class="mode-desc">科目を選んで集中学習</div></div>
        <span class="mode-count" style="background:#e8f0fb;color:#1a56c4;">5科目</span>
        <div class="mode-arrow" id="cat-arrow">›</div>
      </div>
      <div class="cat-panel" id="cat-panel"></div>
      <div class="mode-card" id="review-card" onclick="startReview()">
        <div class="mode-icon" style="background:#fff0f0;">❌</div>
        <div class="mode-info"><div class="mode-name">復習モード</div><div class="mode-desc">間違えた問題だけを出題</div></div>
        <span class="mode-count" id="review-count" style="background:#fff0f0;color:#c0392b;">0問</span>
        <div class="mode-arrow">›</div>
      </div>
      <div class="mode-card" id="bm-card" onclick="showBookmarks()">
        <div class="mode-icon" style="background:#faeeda;">🔖</div>
        <div class="mode-info"><div class="mode-name">ブックマーク</div><div class="mode-desc">後で確認したい問題を管理</div></div>
        <span class="mode-count" id="bm-count" style="background:#faeeda;color:#854F0B;">0問</span>
        <div class="mode-arrow">›</div>
      </div>
    </div>
  </div>
</div>

<!-- ブックマーク画面 -->
<div id="screen-bookmark" style="display:none;">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← 戻る</button>
    <div class="quiz-header-title">ブックマーク</div>
  </div>
  <div class="bm-screen" id="bm-list"></div>
</div>

<!-- 問題画面 -->
<div class="quiz-screen" id="screen-quiz">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← 戻る</button>
    <div class="quiz-header-title" id="quiz-title"></div>
    <div class="quiz-header-num" id="quiz-num"></div>
  </div>
  <div class="quiz-body">
    <div class="q-stats">
      <div class="q-stat"><div class="q-stat-label">正解</div><div class="q-stat-val" id="sc">0</div></div>
      <div class="q-stat"><div class="q-stat-label">不正解</div><div class="q-stat-val" id="sw">0</div></div>
      <div class="q-stat"><div class="q-stat-label">正答率</div><div class="q-stat-val" id="sa">―</div></div>
    </div>
    <div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div id="quiz-area">
      <div class="q-card">
        <div class="q-meta">
          <span class="badge badge-year" id="q-year"></span>
          <span class="badge badge-cat" id="q-cat"></span>
          <span class="badge badge-review" id="q-rev" style="display:none;">復習</span>
          <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖</button>
        </div>
        <div class="q-stem" id="q-stem"></div>
        <div class="q-branch" id="q-branch"></div>
        <div class="ox-btns">
          <button class="ox-btn" id="btn-o" onclick="answer(true)">○</button>
          <button class="ox-btn" id="btn-x" onclick="answer(false)">×</button>
        </div>
        <div class="result-badge" id="result-badge"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">次へ →</button>
    </div>
    <div class="result-screen" id="result-screen">
      <div class="result-circle">
        <div class="result-score" id="rs-score"></div>
        <div class="result-score-sub">正解</div>
      </div>
      <div class="result-msg" id="rs-msg"></div>
      <div class="result-sub" id="rs-sub"></div>
      <div class="result-actions">
        <button class="r-btn primary" onclick="goHome()">ホームへ戻る</button>
        <button class="r-btn danger" id="rs-retry" onclick="retryWrong()" style="display:none;">間違えた問題を復習</button>
      </div>
    </div>
  </div>
</div>

</div>
<script>
const CATS={
  "労働衛生（有害業務）":{short:"衛生①有害",color:"#D4537E",bar:"#D4537E"},
  "労働衛生（有害業務以外）":{short:"衛生②以外",color:"#EF9F27",bar:"#EF9F27"},
  "関係法令（有害業務）":{short:"法令①有害",color:"#378ADD",bar:"#378ADD"},
  "関係法令（有害業務以外）":{short:"法令②以外",color:"#1D9E75",bar:"#1D9E75"},
  "労働生理":{short:"労働生理",color:"#7F77DD",bar:"#7F77DD"}
};

const Q=[
// ── 関係法令（有害業務）100問 ──
{c:"関係法令（有害業務）",y:"R5",s:"有害業務に係る衛生管理者の選任について",b:"有害業務を行う事業場で常時500人以上の労働者を使用する場合、衛生管理者のうち少なくとも1人を専任としなければならない。",a:true,e:"正しい。労働安全衛生規則第7条により、坑内労働・有害業務に常時500人以上従事する事業場では衛生管理者の専任が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"特定化学物質障害予防規則について",b:"特定化学物質を製造する事業者は、作業主任者を選任する必要はない。",a:false,e:"誤り。特定化学物質作業主任者の選任は義務です（特化則第27条）。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤中毒予防規則について",b:"有機溶剤業務を行う屋内作業場では、6か月以内ごとに1回、定期に作業環境測定を行わなければならない。",a:true,e:"正しい。有機溶剤中毒予防規則第28条により、6か月以内ごとに1回の作業環境測定が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"鉛中毒予防規則について",b:"鉛業務に常時従事する労働者に対する健康診断は、1年以内ごとに1回実施しなければならない。",a:false,e:"誤り。鉛健康診断は6か月以内ごとに1回実施しなければなりません（鉛則第53条）。"},
{c:"関係法令（有害業務）",y:"R4",s:"電離放射線障害防止規則について",b:"放射線業務従事者の実効線量限度は、5年間で100ミリシーベルトである。",a:true,e:"正しい。電離則第4条により、実効線量限度は5年間で100mSvです。"},
{c:"関係法令（有害業務）",y:"R5",s:"石綿障害予防規則について",b:"石綿等の取扱いに係る業務は、作業主任者を選任しなくてもよい。",a:false,e:"誤り。石綿作業主任者の選任が義務付けられています（石綿則第19条）。"},
{c:"関係法令（有害業務）",y:"R3",s:"特定化学物質健康診断について",b:"特定化学物質健康診断の結果は、5年間保存しなければならない。",a:true,e:"正しい。特化則第40条により、特定化学物質健康診断個人票は5年間保存が必要です（一部30年）。"},
{c:"関係法令（有害業務）",y:"R4",s:"騒音障害防止について",b:"強烈な騒音を発する屋内作業場では、6か月以内ごとに1回、作業環境測定を行わなければならない。",a:true,e:"正しい。強烈な騒音を発する屋内作業場は作業環境測定の対象であり、6か月以内ごとに1回実施します。"},
{c:"関係法令（有害業務）",y:"R5",s:"酸素欠乏症等防止規則について",b:"酸素欠乏危険作業に係る業務には、特別の教育を行わなければならない。",a:true,e:"正しい。酸欠則第12条により、酸素欠乏危険作業に就かせる労働者に対して特別教育が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"高気圧作業安全衛生規則について",b:"高圧室内業務に従事する労働者に対する健康診断は、2年以内ごとに1回実施すれば足りる。",a:false,e:"誤り。高気圧業務健康診断は6か月以内ごとに1回実施しなければなりません（高圧則第38条）。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤業務について",b:"第2種有機溶剤等を用いて行う作業では、送気マスクを使用させなければならない。",a:false,e:"誤り。第2種有機溶剤等については、有効な呼吸用保護具または全体換気装置等の設置が必要ですが、必ずしも送気マスクである必要はありません。"},
{c:"関係法令（有害業務）",y:"R5",s:"特別有機溶剤等について",b:"特別有機溶剤業務は、特定化学物質障害予防規則の適用を受ける。",a:true,e:"正しい。特別有機溶剤等はその性質から、有機則ではなく特化則の規制を受けます。"},
{c:"関係法令（有害業務）",y:"R3",s:"じん肺法について",b:"じん肺管理区分が管理2または管理3と決定された労働者は、一定の業務に就かせることができない。",a:true,e:"正しい。じん肺法第21条により、管理区分に応じて就業禁止または転換の措置が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"粉じん障害防止規則について",b:"粉じん作業に従事する労働者に対する健康診断は、3年以内ごとに1回実施すれば足りる。",a:false,e:"誤り。粉じん作業従事者の健康診断は、就業時および1年以内ごとに1回実施が必要です。"},
{c:"関係法令（有害業務）",y:"R5",s:"VDT作業の規制について",b:"労働安全衛生法では、VDT作業者に対する健康診断の実施が義務付けられている。",a:false,e:"誤り。VDT作業に関する特定の健康診断義務は労働安全衛生法には定められておらず、厚生労働省のガイドラインによる推奨です。"},
{c:"関係法令（有害業務）",y:"R3",s:"作業環境測定について",b:"作業環境測定の結果は、一定の記録を作成し3年間保存しなければならない。",a:true,e:"正しい。作業環境測定結果の記録は3年間（特定化学物質等は30年）保存が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"局所排気装置について",b:"局所排気装置は、1年以内ごとに1回、定期自主検査を行わなければならない。",a:true,e:"正しい。局所排気装置の定期自主検査は1年以内ごとに1回実施が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"特別教育について",b:"有機溶剤業務に労働者を就かせるときは、特別の教育を行わなければならない。",a:false,e:"誤り。有機溶剤業務自体には特別教育の義務はありませんが、作業主任者の選任は必要です。"},
{c:"関係法令（有害業務）",y:"R3",s:"ずい道等建設工事における作業環境測定について",b:"ずい道等の内部で行われる作業では、粉じんの作業環境測定が義務付けられている。",a:true,e:"正しい。ずい道等建設工事での粉じん作業は作業環境測定の対象です。"},
{c:"関係法令（有害業務）",y:"R4",s:"熱中症予防について",b:"WBGT値（暑さ指数）は、気温・湿度・輻射熱を考慮した指標である。",a:true,e:"正しい。WBGTは、湿球温度・黒球温度・乾球温度の3つを組み合わせた熱中症予防の指標です。"},
{c:"関係法令（有害業務）",y:"R5",s:"有害物質の製造禁止について",b:"黄りんマッチの製造は、労働安全衛生法により禁止されている。",a:true,e:"正しい。労働安全衛生法第55条により、黄りんマッチの製造・輸入・使用は禁止されています。"},
{c:"関係法令（有害業務）",y:"R4",s:"作業主任者の職務について",b:"有機溶剤作業主任者の職務には、局所排気装置の点検が含まれる。",a:true,e:"正しい。有機溶剤作業主任者は局所排気装置等の設備点検が職務に含まれます（有機則第19条の2）。"},
{c:"関係法令（有害業務）",y:"R3",s:"有害物質の管理について",b:"第1種有機溶剤等を使用する屋内作業場では、密閉設備または局所排気装置の設置が義務付けられている。",a:true,e:"正しい。有機則第5条により、第1種有機溶剤等の屋内使用では密閉設備または局所排気装置の設置が必要です。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質の管理について",b:"特定化学物質第1類物質の製造には、厚生労働大臣の許可が必要である。",a:true,e:"正しい。労働安全衛生法第56条により、第1類物質の製造には厚生労働大臣の許可が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"鉛作業について",b:"鉛作業を行う屋内作業場では、6か月以内ごとに1回、定期に作業環境測定を行わなければならない。",a:true,e:"正しい。鉛則第52条により、鉛業務を行う屋内作業場での作業環境測定は6か月以内ごとに1回が義務です。"},
{c:"関係法令（有害業務）",y:"R3",s:"電離放射線業務について",b:"管理区域に立ち入る労働者には、放射線測定器の装着が義務付けられている。",a:true,e:"正しい。電離則第8条により、管理区域内で放射線業務に従事する者は放射線測定器を装着しなければなりません。"},
{c:"関係法令（有害業務）",y:"R5",s:"石綿業務について",b:"石綿等の解体・封じ込め・囲い込み作業を行うときは、作業計画を作成しなければならない。",a:true,e:"正しい。石綿則第4条により、石綿等の解体等作業を行うときは作業計画の作成が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R4",s:"酸素欠乏危険作業について",b:"酸素欠乏危険作業に労働者を従事させるときは、作業を開始する前に空気中の酸素濃度を測定しなければならない。",a:true,e:"正しい。酸欠則第3条により、作業開始前に酸素濃度の測定が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"高気圧業務について",b:"高圧室内業務に就かせる労働者には、業務開始前に特別の教育を行わなければならない。",a:true,e:"正しい。高圧則第11条により、高圧室内業務に係る特別教育の実施が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"有害業務の就業制限について",b:"エックス線装置を使用する業務は、第1種放射線取扱主任者免状を受けた者でなければ就業させてはならない。",a:false,e:"誤り。エックス線装置取扱業務に就くためには、エックス線作業主任者の選任が必要ですが、全労働者に免状が必要なわけではありません。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤の表示について",b:"事業者は、有機溶剤等を容器に入れて保管する場合、容器に有機溶剤等の名称等を表示しなければならない。",a:true,e:"正しい。労働安全衛生法第57条および有機則第25条により、容器への表示が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"特化則の健康診断について",b:"特定化学物質健康診断は、雇入れ時および配置換え時ならびに6か月以内ごとに実施しなければならない。",a:true,e:"正しい。特化則第39条により、雇入れ時・配置換え時および6か月以内ごとの定期健康診断が義務です。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤業務の掲示について",b:"有機溶剤業務を行う屋内作業場には、有機溶剤等の人体に対する影響等を掲示しなければならない。",a:true,e:"正しい。有機則第24条により、有機溶剤業務を行う屋内作業場への掲示が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R4",s:"作業環境測定の評価について",b:"作業環境測定の結果の評価は、第1管理区分から第3管理区分に区分される。",a:true,e:"正しい。作業環境評価基準により、測定結果は第1（良好）・第2・第3（要改善）管理区分に分類されます。"},
{c:"関係法令（有害業務）",y:"R3",s:"局所排気装置の性能について",b:"プッシュプル型換気装置とは、プッシュ側から空気を吹き出し、プル側から空気を吸い込む装置をいう。",a:true,e:"正しい。プッシュプル型換気装置は吹き出しと吸い込みを組み合わせた換気装置です。"},
{c:"関係法令（有害業務）",y:"R5",s:"特別管理物質について",b:"特別管理物質を製造し、または取り扱う作業場の記録は、30年間保存しなければならない。",a:true,e:"正しい。特化則第38条の4により、特別管理物質に係る作業記録は30年間保存が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤の健康診断について",b:"有機溶剤業務に常時従事する労働者に対する健康診断は、雇入れ時および6か月以内ごとに実施しなければならない。",a:true,e:"正しい。有機則第29条により、雇入れ時・配置換え時および6か月以内ごとの健康診断が義務です。"},
{c:"関係法令（有害業務）",y:"R3",s:"放射線業務について",b:"放射線業務従事者の女性に対する実効線量限度は、3か月間につき5ミリシーベルトである。",a:true,e:"正しい。電離則第4条第2項により、放射線業務従事者の女性の線量限度は3か月間で5mSvです。"},
{c:"関係法令（有害業務）",y:"R5",s:"石綿の作業記録について",b:"石綿等を取り扱う作業に従事した労働者の作業記録は、40年間保存しなければならない。",a:true,e:"正しい。石綿則第35条により、石綿作業従事者の記録は40年間保存が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R4",s:"酸素欠乏症等の防止について",b:"酸素欠乏危険作業主任者は、作業に従事する労働者が酸素欠乏症等にかかったときに救出のための措置を講じなければならない。",a:true,e:"正しい。酸欠則第26条の2により、酸素欠乏危険作業主任者の職務として救出措置が規定されています。"},
{c:"関係法令（有害業務）",y:"R3",s:"有機溶剤の貯蔵について",b:"有機溶剤等を入れたことのある空容器であって有機溶剤の蒸気が発散するおそれのあるものは、屋外の一定の場所に集積しなければならない。",a:true,e:"正しい。有機則第36条により、空容器の適切な保管が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質作業主任者について",b:"特定化学物質作業主任者は、特定化学物質作業主任者技能講習を修了した者のうちから選任しなければならない。",a:true,e:"正しい。特化則第27条により、特定化学物質作業主任者技能講習の修了者から選任が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"じん肺健康診断について",b:"じん肺健康診断には、エックス線写真による検査が含まれる。",a:true,e:"正しい。じん肺法第3条により、じん肺健康診断にはエックス線写真による検査が必須項目として含まれています。"},
{c:"関係法令（有害業務）",y:"R3",s:"有害業務の作業環境管理について",b:"第3管理区分と評価された作業場の事業者は、直ちに施設・設備の設置または改善等の措置を講じなければならない。",a:true,e:"正しい。作業環境評価基準第5条により、第3管理区分では施設・設備の改善等の措置が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤中毒予防規則の適用について",b:"有機則は、試験研究のために有機溶剤を取り扱う業務には適用されない。",a:false,e:"誤り。有機則は試験研究業務にも適用されます。一部の業務で適用が除外される場合がありますが、原則として適用されます。"},
{c:"関係法令（有害業務）",y:"R4",s:"鉛中毒予防規則の健康診断について",b:"鉛健康診断の結果に基づく個人票は、5年間保存しなければならない。",a:true,e:"正しい。鉛則第53条により、鉛健康診断個人票は5年間保存が必要です。"},
{c:"関係法令（有害業務）",y:"R3",s:"特定化学物質の製造許可について",b:"ジクロルベンジジン及びその塩は、製造禁止物質である。",a:true,e:"正しい。労働安全衛生法施行令第16条により、ジクロルベンジジン等は製造が禁止されています。"},
{c:"関係法令（有害業務）",y:"R5",s:"作業環境測定について",b:"作業環境測定を行った場合は、測定日から3か月以内に評価を行わなければならない。",a:false,e:"誤り。作業環境評価基準第3条では、測定結果が得られたときに速やかに評価を行うとされており、3か月以内という規定はありません。"},
{c:"関係法令（有害業務）",y:"R4",s:"高圧則の就業制限について",b:"潜水業務に就くことができるのは、潜水士免許を受けた者に限られる。",a:true,e:"正しい。労働安全衛生法第61条により、潜水業務は潜水士免許を持つ者でなければ就業できません。"},
{c:"関係法令（有害業務）",y:"R3",s:"有害物質の名称等の表示について",b:"事業者は、有害物を含む製品を譲渡・提供する場合、SDS（安全データシート）を交付しなければならない。",a:true,e:"正しい。労働安全衛生法第57条の2により、化学物質等を譲渡・提供する際のSDS交付が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"電離放射線健康診断について",b:"電離放射線健康診断は、雇入れ時または放射線業務に配置する際、および6か月以内ごとに実施しなければならない。",a:true,e:"正しい。電離則第56条により、雇入れ時・配置換え時および6か月以内ごとの健康診断が義務です。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤の保護具について",b:"有機溶剤業務に就く者に使用させる呼吸用保護具は、防じんマスクでよい。",a:false,e:"誤り。有機溶剤のガス・蒸気を防ぐには防毒マスクまたは送気マスクが必要です。防じんマスクは粉じん用であり、有機溶剤蒸気には効果がありません。"},
{c:"関係法令（有害業務）",y:"R3",s:"特定化学物質の排気・排液について",b:"特定化学物質の製造・取扱作業で生じた廃液は、労働者に危険・健康障害が生ずるおそれがないよう処理しなければならない。",a:true,e:"正しい。特化則第13条により、廃液の適切な処理が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"作業主任者の掲示について",b:"事業者は、作業主任者を選任したときは、当該作業主任者の氏名および職務を作業場の見やすい箇所に掲示しなければならない。",a:true,e:"正しい。労働安全衛生規則第18条により、作業主任者の氏名・職務の掲示が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R4",s:"有害物質の許容濃度について",b:"作業環境測定における管理濃度は、日本産業衛生学会が勧告する許容濃度と同一である。",a:false,e:"誤り。管理濃度は厚生労働省が告示するもので、日本産業衛生学会の許容濃度とは別に設定されており、同一とは限りません。"},
{c:"関係法令（有害業務）",y:"R3",s:"酸素欠乏危険場所について",b:"第2種酸素欠乏危険作業とは、酸素欠乏および硫化水素中毒の危険がある場所での作業をいう。",a:true,e:"正しい。酸欠則第2条により、第2種酸素欠乏危険作業は酸素欠乏および硫化水素中毒の危険がある場所での作業です。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質の局所排気装置について",b:"特定化学物質の局所排気装置の制御風速は、フードの形式ごとに規定されている。",a:true,e:"正しい。特化則第15条により、フードの形式（囲い式・外付け式等）ごとに制御風速が定められています。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤の取扱業務について",b:"事業者は、有機溶剤業務に常時従事する労働者が作業している間は、1時間以内ごとに作業場所の有機溶剤濃度を測定しなければならない。",a:false,e:"誤り。有機溶剤濃度の個別測定ではなく、定期的な作業環境測定（6か月以内ごとに1回）が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"じん肺管理区分について",b:"じん肺管理区分が管理4と決定された労働者は、療養を要するとされる。",a:true,e:"正しい。じん肺法第4条により、管理4は療養が必要な状態とされています。"},
{c:"関係法令（有害業務）",y:"R5",s:"鉛作業主任者について",b:"鉛作業主任者は、鉛作業主任者技能講習を修了した者のうちから選任しなければならない。",a:true,e:"正しい。鉛則第33条により、鉛作業主任者技能講習修了者から選任が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"電離放射線業務の管理区域について",b:"管理区域とは、外部放射線の線量当量率が1週間につき1ミリシーベルトを超えるおそれのある区域等をいう。",a:true,e:"正しい。電離則第3条により、管理区域の基準として外部放射線の線量当量率等が規定されています。"},
{c:"関係法令（有害業務）",y:"R3",s:"有機溶剤中毒予防規則の適用除外について",b:"有機溶剤を用いる作業であっても、屋外での作業には有機則は適用されない。",a:false,e:"誤り。有機則は屋外作業にも適用される場合があります。ただし、屋外で作業環境が良好な場合など一部の適用除外規定があります。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質の貯蔵・取扱いについて",b:"特定化学物質等を取り扱う設備の修理等を行うときは、原則として作業指揮者を定めなければならない。",a:true,e:"正しい。特化則第22条により、設備の修理等を行う場合の作業指揮者選任が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R4",s:"有害業務従事者の保護具について",b:"チェーンソーを使用する業務には、防振手袋の使用が義務付けられている。",a:false,e:"誤り。防振手袋の使用は推奨されていますが、法令上の義務ではなく指導事項にとどまっています。"},
{c:"関係法令（有害業務）",y:"R3",s:"石綿障害予防規則の建築物等の解体等について",b:"石綿等が使用されているおそれのある建築物の解体等の作業を行う前に、石綿の使用状況の事前調査を行わなければならない。",a:true,e:"正しい。石綿則第3条により、解体等作業前の事前調査が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤業務の換気について",b:"全体換気装置は、局所排気装置が設置できない場合の代替措置として認められている。",a:true,e:"正しい。有機則第9条により、局所排気装置等の代わりに全体換気装置の設置が認められる場合があります。"},
{c:"関係法令（有害業務）",y:"R4",s:"特定化学物質等作業主任者技能講習について",b:"特定化学物質及び四アルキル鉛等作業主任者技能講習の修了者は、有機溶剤作業主任者として選任することができる。",a:false,e:"誤り。有機溶剤作業主任者は有機溶剤作業主任者技能講習の修了者から選任する必要があり、特化則の技能講習では代替できません。"},
{c:"関係法令（有害業務）",y:"R3",s:"高気圧作業での減圧について",b:"高圧室内業務において、労働者を高圧室内から大気圧下に戻す際は、減圧基準に従って段階的に減圧しなければならない。",a:true,e:"正しい。高圧則第27条により、高圧室内業務からの退出時は減圧基準に従った減圧が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤等の区分について",b:"有機溶剤は、その毒性の強さ等に基づき、第1種・第2種・第3種の3種類に分類されている。",a:true,e:"正しい。有機溶剤は毒性等に基づき第1種（最も毒性が強い）・第2種・第3種に分類されています。"},
{c:"関係法令（有害業務）",y:"R4",s:"ずい道等建設工事の換気について",b:"ずい道等の建設工事においては、ずい道等の内部の粉じん等の濃度を低下させるため、必要な換気を行わなければならない。",a:true,e:"正しい。ずい道等建設工事における粉じん障害防止のための換気が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"酸素欠乏症等の防止に関する教育について",b:"酸素欠乏危険作業に就かせる労働者に対しては、特別の教育を行わなければならない。",a:true,e:"正しい。酸欠則第12条により、酸素欠乏危険作業従事者への特別教育が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質等の漏えい等の緊急措置について",b:"特定化学物質等が大量に漏えいした場合は、関係者以外の者の立入りを禁止する措置を講じなければならない。",a:true,e:"正しい。特化則第42条により、漏えい時の立入禁止措置が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤業務の就業禁止について",b:"妊娠中の女性は、有機溶剤業務に就かせてはならない。",a:false,e:"誤り。妊娠中の女性に対する有機溶剤業務の就業禁止規定はありませんが、女性労働基準規則により一部の有害業務への就業制限があります。"},
{c:"関係法令（有害業務）",y:"R3",s:"特定化学物質の作業環境測定について",b:"特定化学物質の作業環境測定は、第1類物質および第2類物質を製造・取扱う屋内作業場で実施が義務付けられている。",a:true,e:"正しい。特化則第36条により、第1類・第2類物質を製造・取扱う屋内作業場での作業環境測定が義務です。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤業務における掲示の内容について",b:"有機溶剤業務の屋内作業場への掲示事項には、作業場における有機溶剤等の人体に及ぼす作用が含まれる。",a:true,e:"正しい。有機則第24条により、有機溶剤等の人体への作用等の掲示が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"じん肺の合併症について",b:"じん肺の合併症として認められているものには、肺結核、結核性胸膜炎、続発性気管支炎などが含まれる。",a:true,e:"正しい。じん肺法第2条の2により、肺結核・結核性胸膜炎・続発性気管支炎等がじん肺の合併症として認められています。"},
{c:"関係法令（有害業務）",y:"R3",s:"特定化学物質作業主任者の職務について",b:"特定化学物質作業主任者は、作業に従事する労働者が特定化学物質により汚染されないよう保護具の使用状況を監視しなければならない。",a:true,e:"正しい。特化則第28条により、保護具使用状況の監視が特定化学物質作業主任者の職務に含まれています。"},
{c:"関係法令（有害業務）",y:"R5",s:"電離放射線業務の被ばく線量の測定について",b:"外部放射線の測定には、フィルムバッジや電子式線量計が用いられる。",a:true,e:"正しい。外部被ばく線量の測定には、フィルムバッジ・電子式線量計・蛍光ガラス線量計等が使用されます。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤業務の作業時間の制限について",b:"有機溶剤業務の作業時間を制限する規定は、有機溶剤中毒予防規則に設けられている。",a:false,e:"誤り。有機溶剤中毒予防規則には、作業時間を直接制限する規定は設けられていません。"},
{c:"関係法令（有害業務）",y:"R3",s:"酸素欠乏危険作業の退避について",b:"酸素欠乏等の事態が生じた場合は、直ちに労働者を当該場所から退避させなければならない。",a:true,e:"正しい。酸欠則第14条により、酸素欠乏等の事態が生じた際の労働者退避が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質等の不浸透性の床等について",b:"特定化学物質を取り扱う屋内作業場の床は、不浸透性の材料で造らなければならない。",a:true,e:"正しい。特化則第21条により、特定化学物質を取り扱う屋内作業場の床は不浸透性材料が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"高圧作業の作業時間について",b:"高圧室内業務においては、気圧の程度に応じて作業時間の制限が設けられている。",a:true,e:"正しい。高圧則第25条により、気圧に応じた作業時間の制限が規定されています。"},
{c:"関係法令（有害業務）",y:"R3",s:"石綿健康診断について",b:"石綿等の取扱いに係る業務に常時従事する労働者に対する健康診断は、6か月以内ごとに実施しなければならない。",a:true,e:"正しい。石綿則第40条により、石綿業務従事者への健康診断は6か月以内ごとに実施が義務です。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤等の廃液の処理について",b:"有機溶剤等の廃液は、廃棄物の処理及び清掃に関する法律に従って処理しなければならない。",a:true,e:"正しい。有機溶剤の廃液は廃棄物処理法に従った適正処理が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"特定化学物質等の立入禁止について",b:"特定化学物質等を製造し、または取り扱う作業場には、関係者以外の者が立ち入ることを禁止し、その旨を表示しなければならない。",a:true,e:"正しい。特化則第24条により、関係者以外の立入禁止と表示が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R3",s:"有機溶剤業務の掃除について",b:"有機溶剤業務の屋内作業場では、1か月以内ごとに1回、定期に作業場内の清掃を行わなければならない。",a:false,e:"誤り。有機則には作業場内清掃の具体的な頻度規定はありません。ただし、労働安全衛生規則により一般的な清掃の義務はあります。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質の定期自主検査について",b:"特定化学物質の局所排気装置は、1年以内ごとに1回、定期自主検査を行わなければならない。",a:true,e:"正しい。特化則第30条により、局所排気装置の定期自主検査は1年以内ごとに1回が義務です。"},
{c:"関係法令（有害業務）",y:"R4",s:"じん肺健康診断の実施時期について",b:"粉じん業務に従事する労働者に対するじん肺健康診断は、じん肺管理区分に応じた間隔で実施する。",a:true,e:"正しい。じん肺法第8条等により、管理区分に応じた健康診断間隔（管理1で3年以内ごと等）が規定されています。"},
{c:"関係法令（有害業務）",y:"R3",s:"高圧則の健康診断について",b:"高圧室内業務に係る健康診断には、四肢の運動機能の検査が含まれる。",a:true,e:"正しい。高圧則第38条により、高圧業務健康診断には四肢の運動機能検査が含まれています。"},
{c:"関係法令（有害業務）",y:"R5",s:"有機溶剤等の蒸気の発散を抑制する措置について",b:"有機溶剤等の蒸気の発散源を密閉する設備を設けることは、有機溶剤業務の換気措置の一つである。",a:true,e:"正しい。有機溶剤の蒸気発散を防ぐための密閉設備の設置は有効な措置です。"},
{c:"関係法令（有害業務）",y:"R4",s:"電離放射線の線量限度について",b:"眼の水晶体の等価線量限度は、5年間で100ミリシーベルト、かつ1年間に50ミリシーベルトである。",a:true,e:"正しい。電離則第4条により、眼の水晶体の等価線量限度は5年間で100mSv、かつ1年間に50mSvです。"},
{c:"関係法令（有害業務）",y:"R3",s:"特定化学物質業務の保護具について",b:"特定化学物質の第1類物質を取り扱う際には、送気マスクまたは空気呼吸器を使用しなければならない場合がある。",a:true,e:"正しい。高濃度の特定化学物質取扱時には、送気マスク等の適切な保護具使用が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"石綿作業主任者について",b:"石綿作業主任者は、石綿作業主任者技能講習を修了した者のうちから選任しなければならない。",a:true,e:"正しい。石綿則第19条により、石綿作業主任者技能講習の修了者から選任が必要です。"},
{c:"関係法令（有害業務）",y:"R4",s:"有機溶剤の作業環境測定記録の保存について",b:"有機溶剤業務の作業環境測定の結果の記録は、3年間保存しなければならない。",a:true,e:"正しい。有機則第28条の2により、有機溶剤業務の作業環境測定記録は3年間保存が必要です。"},
{c:"関係法令（有害業務）",y:"R3",s:"酸素欠乏危険作業の監視について",b:"酸素欠乏危険作業に労働者を従事させるときは、常時作業の状況を監視し、異常があったときに直ちに作業主任者等に通報する者を置かなければならない。",a:true,e:"正しい。酸欠則第13条により、常時監視者の設置が義務付けられています。"},
{c:"関係法令（有害業務）",y:"R5",s:"特定化学物質の代替について",b:"特定化学物質を含む物の代わりに、人体への影響がより少ない物を使用するよう努めなければならない。",a:true,e:"正しい。労働安全衛生法第22条および特化則の趣旨として、有害性の低い代替物への転換が求められています。"},

// ── 関係法令（有害業務以外）100問 ──
{c:"関係法令（有害業務以外）",y:"R5",s:"衛生管理者の選任について",b:"常時50人以上の労働者を使用する事業場では、衛生管理者を選任しなければならない。",a:true,e:"正しい。労働安全衛生法第12条により、常時50人以上の事業場で衛生管理者の選任が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"産業医の職務について",b:"産業医は、医学に関する知識を有していれば、医師以外でも就任できる。",a:false,e:"誤り。産業医は医師でなければなりません（労働安全衛生法第13条）。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"健康診断について",b:"雇入れ時の健康診断は、医師が適当と認めるときは、一部の項目を省略することができる。",a:false,e:"誤り。雇入れ時健康診断は省略できません。定期健康診断は35歳未満等の条件で一部省略可能です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"ストレスチェック制度について",b:"常時50人以上の労働者を使用する事業者は、ストレスチェックを実施しなければならない。",a:true,e:"正しい。労働安全衛生法第66条の10により、常時50人以上の事業場ではストレスチェックの実施が義務です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生委員会について",b:"衛生委員会は、常時50人以上の労働者を使用する事業場に設置しなければならない。",a:true,e:"正しい。労働安全衛生法第18条により、常時50人以上の事業場での衛生委員会設置が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"面接指導について",b:"時間外・休日労働時間が1か月に80時間を超えた労働者から申出があった場合、事業者は医師による面接指導を実施しなければならない。",a:true,e:"正しい。労働安全衛生法第66条の8により、月80時間超の時間外・休日労働者への面接指導が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"健康診断結果に基づく措置について",b:"健康診断の結果、異常の所見があると診断された場合、必要に応じ就業場所の変更等の措置を講じるよう努めなければならない。",a:true,e:"正しい。労働安全衛生法第66条の5により、事業者は医師の意見を踏まえ必要な措置を講ずる義務があります。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"年次有給休暇について",b:"年次有給休暇は、雇入れの日から6か月継続勤務し、全労働日の8割以上出勤した労働者に付与される。",a:true,e:"正しい。労働基準法第39条の規定です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"女性労働者の就業制限について",b:"妊娠中の女性は、本人が希望すれば時間外労働・休日労働・深夜業に就かせることができる。",a:false,e:"誤り。妊娠中の女性は本人が希望しても、事業者は時間外・休日・深夜業に就かせることができません。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"労働災害の記録・報告について",b:"休業4日以上の労働災害が発生したときは、遅滞なく労働者死傷病報告を所轄労働基準監督署長に提出しなければならない。",a:true,e:"正しい。休業4日以上の場合は遅滞なく提出が必要です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生管理者の職務について",b:"衛生管理者は、少なくとも毎週1回、作業場等を巡視しなければならない。",a:true,e:"正しい。労働安全衛生規則第11条により、衛生管理者は少なくとも毎週1回の作業場巡視が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"産業医の選任について",b:"常時3,000人を超える労働者を使用する事業場では、産業医を2人以上選任しなければならない。",a:true,e:"正しい。常時3,000人を超える事業場では産業医2人以上の選任が必要です（労働安全衛生規則第13条）。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"THP（トータル・ヘルスプロモーション）について",b:"THPの実施は、事業者の努力義務である。",a:true,e:"正しい。労働安全衛生法第69条により、THPの実施は事業者の努力義務とされています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生委員会の構成について",b:"衛生委員会の議長は、総括安全衛生管理者または事業の実施を統括管理する者でなければならない。",a:true,e:"正しい。労働安全衛生法第18条第2項による規定です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"定期健康診断について",b:"定期健康診断は、1年以内ごとに1回、定期に実施しなければならない。",a:true,e:"正しい。労働安全衛生規則第44条により、一般健康診断は1年以内ごとに1回実施が義務です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"休憩について",b:"労働時間が8時間を超える場合、少なくとも60分の休憩を与えなければならない。",a:true,e:"正しい。労働基準法第34条により、8時間超の労働には60分以上の休憩が必要です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"深夜業従事者の健康診断について",b:"深夜業に従事する労働者に対する健康診断は、6か月以内ごとに1回実施しなければならない。",a:true,e:"正しい。深夜業従事者は特定業務従事者として、6か月以内ごとに1回の健康診断が必要です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"安全衛生管理体制について",b:"総括安全衛生管理者は、衛生管理者の指揮を受けて衛生に関する業務を統括管理する。",a:false,e:"誤り。総括安全衛生管理者は衛生管理者を指揮する立場にあります（労働安全衛生法第10条）。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"健康診断結果の保存について",b:"定期健康診断の個人票は、5年間保存しなければならない。",a:true,e:"正しい。労働安全衛生規則第51条により、健康診断個人票は5年間保存が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"リスクアセスメントについて",b:"化学物質等の危険性または有害性の調査（リスクアセスメント）の実施は、事業者の義務である。",a:true,e:"正しい。労働安全衛生法第28条の2により、化学物質等や機械等の危険性・有害性調査は事業者の義務です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"産業医の権限について",b:"産業医は、労働者の健康を確保するために必要と認めるときは、事業者に対し、労働者の健康管理等について必要な勧告をすることができる。",a:true,e:"正しい。労働安全衛生法第13条第5項により、産業医の勧告権が規定されています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生管理者の資格について",b:"第1種衛生管理者免許を有する者は、すべての業種において衛生管理者に選任することができる。",a:true,e:"正しい。第1種衛生管理者免許はすべての業種で衛生管理者として選任できます。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"安全衛生教育について",b:"雇入れ時の安全衛生教育は、労働者を雇い入れた後、遅滞なく実施しなければならない。",a:true,e:"正しい。労働安全衛生法第59条により、雇入れ後遅滞なく安全衛生教育の実施が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"労働基準法の労働時間について",b:"使用者は、原則として労働者に1日8時間、1週間に40時間を超えて労働させてはならない。",a:true,e:"正しい。労働基準法第32条により、法定労働時間は1日8時間・1週40時間とされています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"安全衛生委員会について",b:"安全衛生委員会は、安全委員会と衛生委員会の両方を設けなければならない事業場において、両委員会の設置に代えて設置することができる。",a:true,e:"正しい。労働安全衛生法第19条により、安全委員会と衛生委員会が必要な事業場では安全衛生委員会を設置できます。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"ストレスチェックの結果の保存について",b:"ストレスチェックの結果は、5年間保存しなければならない。",a:true,e:"正しい。労働安全衛生規則第52条の13により、ストレスチェック結果の保存期間は5年間です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"産業医の職務について",b:"産業医は、少なくとも毎月1回（一定の要件を満たす場合は2か月に1回）、作業場等を巡視しなければならない。",a:true,e:"正しい。労働安全衛生規則第15条により、産業医の月1回以上（要件を満たす場合は2か月に1回）の職場巡視が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"健康保持増進措置について",b:"事業者は、労働者の健康保持増進を図るため、体育活動等の援助を行うよう努めなければならない。",a:true,e:"正しい。労働安全衛生法第69条により、事業者の健康保持増進措置の努力義務が規定されています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"衛生管理者の専任について",b:"常時1,000人を超える労働者を使用する事業場では、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。",a:true,e:"正しい。労働安全衛生規則第7条により、常時1,000人超の事業場では専任衛生管理者が必要です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"産業医の情報提供について",b:"事業者は、産業医に対し、労働者の労働時間に関する情報その他の産業医が労働者の健康管理等を適切に行うために必要な情報を提供しなければならない。",a:true,e:"正しい。労働安全衛生法第13条第4項により、産業医への情報提供が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生委員会の調査審議事項について",b:"衛生委員会は、労働者の健康障害を防止するための基本となるべき対策に関することを調査審議しなければならない。",a:true,e:"正しい。労働安全衛生法第18条第1項により、健康障害防止対策が衛生委員会の調査審議事項として定められています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"定期健康診断の項目について",b:"定期健康診断の検査項目には、血圧の測定が含まれる。",a:true,e:"正しい。労働安全衛生規則第44条により、血圧測定は定期健康診断の必須項目です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"健康診断の費用について",b:"法令に基づいて行う健康診断の費用は、事業者が負担しなければならない。",a:true,e:"正しい。法定の健康診断費用は事業者が負担すべきものとされています（通達により確認）。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"面接指導の対象者について",b:"長時間労働者以外にも、高度プロフェッショナル制度の適用労働者は、面接指導の対象となる。",a:true,e:"正しい。労働安全衛生法第66条の8の4により、高度プロフェッショナル制度の適用労働者も面接指導の対象です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"就業制限業務について",b:"クレーンの運転業務には、技能講習の修了または免許の取得が必要である。",a:true,e:"正しい。労働安全衛生法第61条により、クレーン運転はつり上げ荷重に応じた資格が必要です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"健康診断結果の通知について",b:"事業者は、定期健康診断の結果を労働者に通知しなければならない。",a:true,e:"正しい。労働安全衛生法第66条の6により、健康診断結果の労働者への通知が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生管理者の選任報告について",b:"衛生管理者を選任したときは、遅滞なく、所轄労働基準監督署長に報告しなければならない。",a:true,e:"正しい。労働安全衛生規則第7条により、衛生管理者の選任報告が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"産業医の専属について",b:"常時1,000人以上の労働者を使用する事業場では、専属の産業医を選任しなければならない。",a:true,e:"正しい。労働安全衛生規則第13条により、常時1,000人以上の事業場では専属産業医の選任が必要です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"安全衛生推進者について",b:"常時10人以上50人未満の労働者を使用する事業場では、安全衛生推進者を選任しなければならない。",a:true,e:"正しい。労働安全衛生法第12条の2により、10人以上50人未満の事業場での安全衛生推進者選任が義務です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生管理者の選任数について",b:"常時200人を超え500人以下の労働者を使用する事業場では、衛生管理者を2人以上選任しなければならない。",a:true,e:"正しい。労働安全衛生規則第7条により、200人超500人以下では衛生管理者2人以上が必要です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"健康診断の種類について",b:"特殊健康診断は、特定の有害業務に従事する労働者に対して行う健康診断をいう。",a:true,e:"正しい。特殊健康診断は有機溶剤・鉛・放射線業務等の特定有害業務従事者を対象としています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"衛生委員会の開催について",b:"衛生委員会は、毎月1回以上開催しなければならない。",a:true,e:"正しい。労働安全衛生規則第23条により、衛生委員会は毎月1回以上の開催が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"就業禁止について",b:"感染症法上の1類感染症の患者は、就業禁止となる場合がある。",a:true,e:"正しい。労働安全衛生法第68条および感染症法により、一定の感染症患者への就業禁止措置が規定されています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"定期健康診断の省略について",b:"35歳以上の者には、定期健康診断の一部の項目を省略することはできない。",a:true,e:"正しい。労働安全衛生規則第44条では、35歳・40歳以上の者への省略が制限されています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"労働災害の報告について",b:"休業1日以上3日未満の労働災害は、4半期ごとにまとめて所轄労働基準監督署長に報告すればよい。",a:true,e:"正しい。休業4日以上は遅滞なく報告、休業1〜3日は四半期毎にまとめて報告となっています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生委員会の記録について",b:"衛生委員会の開催の都度、議事の概要を労働者に周知しなければならない。",a:true,e:"正しい。労働安全衛生規則第23条により、衛生委員会の議事概要の周知が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"産業医の解任について",b:"産業医がその職務を行わない場合には、事業者は産業医を解任することができる。",a:true,e:"正しい。職務の不履行は産業医解任の正当事由となりますが、手続きが必要です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"就業規則について",b:"常時10人以上の労働者を使用する事業場では、就業規則を作成し、所轄労働基準監督署長に届け出なければならない。",a:true,e:"正しい。労働基準法第89条・90条により、常時10人以上の事業場での就業規則作成・届出が義務です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"メンタルヘルス対策について",b:"ストレスチェックの結果は、検査を実施した医師等から事業者に提供することは禁止されている。",a:false,e:"誤り。ストレスチェック結果は原則として労働者本人に通知されますが、労働者の同意がある場合等に事業者に提供されることがあります。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"健康診断の受診について",b:"労働者は、事業者が行う健康診断を受けなければならない。",a:true,e:"正しい。労働安全衛生法第66条第5項により、労働者は法定健康診断の受診義務があります（自費受診の例外あり）。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"安全衛生計画について",b:"事業者は、安全衛生に関する目標を設定した安全衛生計画を作成し、実施するよう努めなければならない。",a:true,e:"正しい。労働安全衛生法第28条の2の趣旨として、安全衛生計画の策定・実施が求められています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生管理者の権限について",b:"衛生管理者は、衛生に関し、作業場等を巡視し、設備、作業方法または衛生状態に有害のおそれがあるときは、直ちに、その危険を防止するため必要な措置を講じなければならない。",a:true,e:"正しい。労働安全衛生規則第11条により、衛生管理者の巡視権限と措置義務が規定されています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"パートタイム労働者の健康診断について",b:"1週間の所定労働時間が通常の労働者の4分の3以上のパートタイム労働者には、定期健康診断を実施しなければならない。",a:true,e:"正しい。所定労働時間が通常の労働者の4分の3以上のパートタイム労働者は定期健康診断の対象です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"過重労働対策について",b:"事業者は、時間外・休日労働時間が月45時間を超える労働者の申出により、医師による面接指導を実施しなければならない。",a:false,e:"誤り。面接指導義務の基準は月80時間超です。月45時間超は努力義務レベルの対応が求められます。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"健康診断の費用負担について",b:"特殊健康診断の費用は、事業者が負担しなければならない。",a:true,e:"正しい。法令に基づく健康診断の費用は事業者が負担すべきとされており、特殊健康診断も同様です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"衛生管理者の業種による資格について",b:"農林畜水産業等の業種では、第2種衛生管理者免許を有する者を衛生管理者に選任することができる。",a:true,e:"正しい。農林畜水産業・鉱業・建設業等一部の業種では第2種衛生管理者も選任可能です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"安全管理者について",b:"安全管理者は、一定の資格を有する者を選任しなければならない。",a:true,e:"正しい。労働安全衛生規則第5条により、安全管理者は一定の学歴・経験等の要件を満たす者から選任が必要です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"労働基準法の休日について",b:"使用者は、労働者に毎週少なくとも1回の休日を与えなければならない。",a:true,e:"正しい。労働基準法第35条により、毎週少なくとも1回の法定休日が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"産業医の選任要件について",b:"産業医の選任要件として、労働者50人以上の事業場では、産業医学に関する知識を有する医師であることが必要である。",a:true,e:"正しい。労働安全衛生規則第14条により、産業医は所定の研修等を修了した医師であることが必要です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"衛生委員会の委員について",b:"衛生委員会の委員の半数は、労働者の過半数を代表する者の推薦に基づき指名しなければならない。",a:true,e:"正しい。労働安全衛生法第18条第4項により、衛生委員会委員の半数は労働者代表の推薦に基づき指名が必要です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"健康診断実施後の措置について",b:"事業者は、健康診断の結果、特に健康の保持に努める必要があると認める労働者に対し、医師または保健師による保健指導を行うよう努めなければならない。",a:true,e:"正しい。労働安全衛生法第66条の7により、保健指導の実施が努力義務として規定されています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"一般健康診断の種類について",b:"一般健康診断には、定期健康診断のほか、雇入れ時健康診断、海外派遣労働者健康診断等がある。",a:true,e:"正しい。一般健康診断には定期・雇入れ時・海外派遣・給食従事者の健康診断等が含まれます。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"作業環境の維持管理について",b:"事業者は、作業場において、労働者が常時就業する室の気温を17度以上28度以下に保つように努めなければならない。",a:true,e:"正しい。労働安全衛生規則第606条により、室温は17〜28℃を保つよう努めることとされています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生推進者について",b:"衛生推進者は、衛生に係る業務を担当する者として、所定の資格を有する者の中から選任しなければならない。",a:false,e:"誤り。衛生推進者に法令上の資格要件は特定されておらず、事業者が適切な者を選任します。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"特定業務従事者の健康診断について",b:"著しく暑熱または寒冷な場所における業務に従事する労働者は、特定業務従事者として6か月以内ごとに健康診断を実施しなければならない。",a:true,e:"正しい。労働安全衛生規則第45条により、著しい暑熱・寒冷業務従事者は6か月以内ごとの健康診断が義務です。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"安全衛生改善計画について",b:"都道府県労働局長は、労働災害防止のために必要があると認めるときは、事業者に対し、安全衛生改善計画の作成を指示することができる。",a:true,e:"正しい。労働安全衛生法第78条により、安全衛生改善計画作成の指示権限が規定されています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"健康診断の項目の追加について",b:"労働安全衛生規則で定める健康診断の項目に加え、事業者が独自に項目を追加することは差し支えない。",a:true,e:"正しい。法定の健康診断項目に加えて、事業者が独自に項目を追加することは可能です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"衛生委員会の議事録について",b:"衛生委員会の議事の概要の記録は、3年間保存しなければならない。",a:true,e:"正しい。労働安全衛生規則第23条により、衛生委員会の記録は3年間保存が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"健康診断結果の報告について",b:"常時50人以上の労働者を使用する事業場では、定期健康診断結果を所轄労働基準監督署長に報告しなければならない。",a:true,e:"正しい。労働安全衛生規則第52条により、50人以上の事業場での定期健康診断結果報告が義務です。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"就業制限業務について",b:"フォークリフトの運転業務は、一定の技能講習の修了または特別教育の実施を要する業務である。",a:true,e:"正しい。フォークリフトの運転は、最大荷重1t以上は技能講習、1t未満は特別教育が必要です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"病者の就業禁止について",b:"伝染性の疾病にかかった労働者については、事業者は就業を禁止しなければならない。",a:true,e:"正しい。労働安全衛生法第68条により、伝染性疾病にかかった労働者への就業禁止が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"緊急時の措置について",b:"労働者が、労働安全衛生法の規定に違反した事業者の指示を拒否したことを理由として、解雇その他不利益な取扱いをしてはならない。",a:true,e:"正しい。労働安全衛生法第97条により、法令違反を申告した労働者への不利益取扱いが禁止されています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"定期健康診断の既往歴等の検査について",b:"定期健康診断の既往歴および業務歴の調査は、医師以外の者が行うことができる。",a:true,e:"正しい。既往歴・業務歴の調査は問診で行われ、医師以外の者（保健師等）が実施することも可能です。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"安全衛生教育の内容について",b:"雇入れ時安全衛生教育の内容には、作業開始時の点検に関することが含まれる。",a:true,e:"正しい。労働安全衛生規則第35条により、作業開始時の点検は雇入れ時教育の内容の一つです。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"産業医の权限について",b:"産業医は、事業者が産業医の勧告を踏まえて講じた措置の内容等について、衛生委員会等へ報告を求めることができる。",a:true,e:"正しい。労働安全衛生法第13条第6項により、産業医の報告要求権が規定されています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"化学物質の自律的管理について",b:"化学物質による労働者の健康障害を防止するため、ラベル表示やリスクアセスメントが義務化されている。",a:true,e:"正しい。労働安全衛生法第57条・57条の2により、化学物質のラベル表示・リスクアセスメントが義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"快適職場形成について",b:"事業者は、事業場における安全衛生の水準の向上を図るため、危険性又は有害性等の調査の結果等に基づき、快適な職場環境の実現と労働条件の改善を通じた労働者の安全と健康を確保するようにしなければならない。",a:true,e:"正しい。労働安全衛生法第71条の2により、快適な職場環境形成のための措置が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"労働安全衛生マネジメントシステムについて",b:"労働安全衛生マネジメントシステム（OSHMS）の導入は、事業者の努力義務である。",a:true,e:"正しい。OSHMSの導入は努力義務とされており、強制義務ではありません。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"特定元方事業者の措置について",b:"特定元方事業者は、関係請負人と合同で安全衛生に関する協議組織を設置・運営しなければならない。",a:true,e:"正しい。労働安全衛生法第30条により、特定元方事業者の協議組織設置・運営が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"労働基準法の時間外労働について",b:"三六協定を締結・届出しても、時間外労働には限度基準が設けられており、原則として月45時間・年360時間を超えてはならない。",a:true,e:"正しい。労働基準法第36条により、時間外労働の上限は原則として月45時間・年360時間とされています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"快適職場の措置について",b:"快適な職場環境の形成のための措置として、作業設備の整備、作業環境の整備改善、疲労回復支援施設の設置等が含まれる。",a:true,e:"正しい。快適職場指針により、これらの措置が示されています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"衛生管理者の選任業種について",b:"金融業では、第2種衛生管理者免許を有する者を衛生管理者として選任できる。",a:true,e:"正しい。金融業は有害業務と関連の少ない業種として、第2種衛生管理者での選任が認められています。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"健康づくりのための睡眠について",b:"「健康づくりのための睡眠ガイド」（令和5年）では、成人は6時間以上を目安として睡眠を確保することが推奨されている。",a:true,e:"正しい。厚生労働省の睡眠ガイドでは、成人の睡眠目安として6時間以上が示されています。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"自営業者等の安全衛生について",b:"労働安全衛生法は、労働者以外の自営業者や個人事業主に対しても、原則として適用される。",a:false,e:"誤り。労働安全衛生法は「労働者」を使用する事業者に適用されるものであり、自営業者や個人事業主には原則として適用されません。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"健康診断後の措置について",b:"健康診断の結果、就業禁止の必要があると医師が判断した場合、事業者は必ずしも従う義務はない。",a:false,e:"誤り。医師の意見を聴いた上で、必要な就業禁止等の措置を講じることが事業者の義務です（労働安全衛生法第68条等）。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"衛生委員会の委員長について",b:"衛生委員会の委員長は、委員の互選により選出される。",a:false,e:"誤り。衛生委員会の議長（委員長）は、総括安全衛生管理者または事業実施の統括管理者が充てられます。互選ではありません。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"長時間労働者の面接指導の結果について",b:"面接指導の結果の記録は、5年間保存しなければならない。",a:true,e:"正しい。労働安全衛生規則第52条の6により、面接指導結果の記録は5年間保存が義務付けられています。"},
{c:"関係法令（有害業務以外）",y:"R4",s:"事業者の安全衛生管理体制について",b:"安全管理者は、総括安全衛生管理者の指揮のもとに安全に関する業務を管理する。",a:true,e:"正しい。労働安全衛生法第10条により、安全管理者等は総括安全衛生管理者の指揮のもとで業務を行います。"},
{c:"関係法令（有害業務以外）",y:"R3",s:"健康診断の記録の活用について",b:"健康診断個人票は、健康管理のために産業医も閲覧できる。",a:true,e:"正しい。産業医は健康診断個人票を閲覧し、労働者の健康管理に活用することができます。"},
{c:"関係法令（有害業務以外）",y:"R5",s:"健康保険法等との関係について",b:"法定の健康診断は、健康保険の保険給付（療養の給付等）として行われるものではない。",a:true,e:"正しい。法定健康診断は予防目的のものであり、健康保険の療養給付とは別個のものです。"},

// ── 労働衛生（有害業務）100問 ──
{c:"労働衛生（有害業務）",y:"R5",s:"職業性疾病について",b:"振動工具の使用による手腕振動障害は、レイノー現象（白指）を引き起こすことがある。",a:true,e:"正しい。手腕振動障害の代表的症状がレイノー現象（白ろう病）です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"化学物質による健康障害について",b:"ベンゼンは再生不良性貧血や白血病の原因となることがある。",a:true,e:"正しい。ベンゼンは造血障害を引き起こし、再生不良性貧血や白血病のリスクがあります。"},
{c:"労働衛生（有害業務）",y:"R5",s:"粉じんによる健康障害について",b:"じん肺は可逆的な疾患であり、粉じん作業から離れれば改善する。",a:false,e:"誤り。じん肺は不可逆的な疾患であり、粉じん作業を離れても症状は進行することがあります。"},
{c:"労働衛生（有害業務）",y:"R3",s:"有機溶剤による健康障害について",b:"トルエンは主に神経系に作用し、頭痛・めまい・中枢神経抑制を引き起こす。",a:true,e:"正しい。トルエンは中枢神経抑制作用があり、慢性ばく露で神経障害を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R4",s:"騒音による健康障害について",b:"騒音性難聴は4,000Hz付近の高音域から始まることが多い。",a:true,e:"正しい。騒音性難聴はC5dipと呼ばれる4,000Hz付近の聴力低下が特徴的です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"電離放射線による健康障害について",b:"放射線による確率的影響には閾値がなく、線量に比例してリスクが増加する。",a:true,e:"正しい。がんや遺伝的影響などの確率的影響は、理論上閾値なく線量に比例してリスクが高まります。"},
{c:"労働衛生（有害業務）",y:"R3",s:"熱中症について",b:"熱射病は体温調節機能が破綻した状態であり、意識障害を伴うことがある。",a:true,e:"正しい。熱射病（重症熱中症）は体温調節中枢の機能障害で、意識消失・多臓器不全のリスクがあります。"},
{c:"労働衛生（有害業務）",y:"R4",s:"金属による健康障害について",b:"鉛中毒の主な症状には、貧血・腹部疝痛・末梢神経障害がある。",a:true,e:"正しい。鉛は造血障害・消化器症状・神経障害を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R5",s:"酸素欠乏症について",b:"酸素濃度が18%未満の環境を酸素欠乏状態という。",a:true,e:"正しい。酸素欠乏症等防止規則では、酸素濃度18%未満を酸素欠乏と定義しています。"},
{c:"労働衛生（有害業務）",y:"R3",s:"作業環境管理について",b:"作業環境測定の第1管理区分は、作業環境が最も良好な状態を示す。",a:true,e:"正しい。第1管理区分は管理濃度を大幅に下回る良好な状態です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"保護具について",b:"防じんマスクは有害ガスの吸入を防ぐことができる。",a:false,e:"誤り。防じんマスクは粉じんのフィルタリングに用いるものであり、有害ガスの吸入防止には防毒マスクが必要です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"有害物質の体内取り込みについて",b:"化学物質の体内への主な取り込み経路は、呼吸器・皮膚・消化器の3経路である。",a:true,e:"正しい。職業性疾病における有害物質の取り込み経路は経気道・経皮・経口の3つです。"},
{c:"労働衛生（有害業務）",y:"R3",s:"石綿（アスベスト）について",b:"石綿ばく露から中皮腫の発症まで、潜伏期間は一般に5〜10年程度である。",a:false,e:"誤り。中皮腫の潜伏期間は一般に20〜40年と非常に長いことが特徴です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"局所排気装置について",b:"局所排気装置のフードは、発生源にできる限り近い位置に設けることが効果的である。",a:true,e:"正しい。フードは発生源に近いほど少ない排気量で有害物質を捕捉できます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"腰痛予防対策について",b:"重量物取扱い作業での腰痛予防では、できるだけ身体を対象物に近づけて持ち上げることが重要である。",a:true,e:"正しい。重心を体幹に近づけることで腰椎への負担を減らせます。"},
{c:"労働衛生（有害業務）",y:"R3",s:"一酸化炭素中毒について",b:"一酸化炭素はヘモグロビンとの結合力が、酸素よりも低い。",a:false,e:"誤り。一酸化炭素のヘモグロビンとの親和性は酸素の約200〜250倍であり、非常に強い結合力があります。"},
{c:"労働衛生（有害業務）",y:"R4",s:"VDT作業の健康障害について",b:"VDT作業による健康障害には、眼精疲労・頸肩腕障害・腰痛などがある。",a:true,e:"正しい。VDT作業の主要な健康障害です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"高温環境下の作業について",b:"WBGT値が高いほど、熱中症のリスクは高まる。",a:true,e:"正しい。WBGTは暑さ指数であり、値が高いほど熱中症リスクが増加します。"},
{c:"労働衛生（有害業務）",y:"R3",s:"低温環境下の作業について",b:"低体温症は深部体温が35℃以下に低下した状態をいう。",a:true,e:"正しい。核心温度（深部体温）が35℃未満に低下した状態を低体温症といいます。"},
{c:"労働衛生（有害業務）",y:"R4",s:"マンガンによる健康障害について",b:"マンガン中毒では、パーキンソン病に類似した症状（筋固縮・振戦など）が現れることがある。",a:true,e:"正しい。慢性マンガン中毒は中枢神経系に影響し、パーキンソン症状を呈します。"},
{c:"労働衛生（有害業務）",y:"R5",s:"クロムによる健康障害について",b:"6価クロム化合物は、肺がんや鼻中隔穿孔の原因となることがある。",a:true,e:"正しい。6価クロムは発がん性があり、肺がんや鼻中隔穿孔の原因となります。"},
{c:"労働衛生（有害業務）",y:"R4",s:"ノルマルヘキサンによる健康障害について",b:"ノルマルヘキサンは、主に多発性末梢神経障害（多発神経炎）を引き起こす。",a:true,e:"正しい。ノルマルヘキサンは代謝産物（2,5-ヘキサンジオン）により多発性末梢神経障害を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R3",s:"塩化ビニルによる健康障害について",b:"塩化ビニルモノマーへの長期ばく露は、肝血管肉腫の原因となることがある。",a:true,e:"正しい。塩化ビニルモノマーは肝血管肉腫（アンジオサルコーマ）の職業性発がん物質として知られています。"},
{c:"労働衛生（有害業務）",y:"R5",s:"二硫化炭素による健康障害について",b:"二硫化炭素は、動脈硬化の促進や精神神経障害を引き起こすことがある。",a:true,e:"正しい。二硫化炭素は動脈硬化の促進、精神神経障害、網膜症などを引き起こします。"},
{c:"労働衛生（有害業務）",y:"R4",s:"硫化水素による健康障害について",b:"硫化水素は特有の卵の腐ったような臭いがあるため、高濃度でも臭いで気づくことができる。",a:false,e:"誤り。高濃度の硫化水素は嗅覚麻痺を引き起こすため、臭いで危険を察知できなくなります。"},
{c:"労働衛生（有害業務）",y:"R3",s:"フッ化水素による健康障害について",b:"フッ化水素（フッ酸）は強い腐食性を持ち、皮膚に接触すると組織深部まで障害を起こすことがある。",a:true,e:"正しい。フッ酸は深部組織まで浸透する腐食性があり、見た目より深い障害を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R5",s:"シアン化水素による健康障害について",b:"シアン化水素は、細胞内の酸素利用を阻害することで窒息を引き起こす。",a:true,e:"正しい。シアン化水素はミトコンドリアのチトクロム酸化酵素を阻害し、細胞レベルでの窒息（ヒストトキシック低酸素症）を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R4",s:"塩素による健康障害について",b:"塩素ガスは、主に上気道を刺激し、高濃度では肺水腫を引き起こすことがある。",a:true,e:"正しい。塩素は気道刺激性が強く、高濃度ばく露では肺水腫が生じます。"},
{c:"労働衛生（有害業務）",y:"R3",s:"アクリルアミドによる健康障害について",b:"アクリルアミドは、経皮吸収されやすく、末梢神経障害を引き起こすことがある。",a:true,e:"正しい。アクリルアミドは経皮吸収されやすく、末梢神経障害（多発性神経炎）の原因となります。"},
{c:"労働衛生（有害業務）",y:"R5",s:"砒素による健康障害について",b:"無機砒素化合物への長期ばく露は、肺がんや皮膚がんのリスクを高める。",a:true,e:"正しい。無機砒素は発がん性が確認されており、肺がん・皮膚がん・膀胱がん等のリスクが高まります。"},
{c:"労働衛生（有害業務）",y:"R4",s:"有機リン系農薬による健康障害について",b:"有機リン系農薬はアセチルコリンエステラーゼを阻害し、コリン作動性症状を引き起こす。",a:true,e:"正しい。有機リン剤はコリンエステラーゼ阻害により、縮瞳・過剰分泌・筋痙攣等のコリン作動性症状を生じます。"},
{c:"労働衛生（有害業務）",y:"R3",s:"カドミウムによる健康障害について",b:"カドミウムへの長期ばく露は、腎尿細管障害や骨軟化症（イタイイタイ病）の原因となる。",a:true,e:"正しい。カドミウムは腎尿細管に蓄積し、尿細管機能障害・骨軟化症を引き起こします（イタイイタイ病）。"},
{c:"労働衛生（有害業務）",y:"R5",s:"紫外線による健康障害について",b:"紫外線（UV）による職業性眼障害として、電気性眼炎（電光性眼炎）がある。",a:true,e:"正しい。溶接作業等による紫外線ばく露で電気性眼炎（角膜・結膜の炎症）が発生します。"},
{c:"労働衛生（有害業務）",y:"R4",s:"赤外線による健康障害について",b:"強い赤外線への長期ばく露は、白内障の原因となることがある。",a:true,e:"正しい。溶融金属・ガラス製造等での赤外線長期ばく露は、熱性白内障（ガラス工白内障）の原因となります。"},
{c:"労働衛生（有害業務）",y:"R3",s:"レーザー光線による健康障害について",b:"レーザー光線は、眼や皮膚に対して深刻な障害を与える可能性がある。",a:true,e:"正しい。レーザー光線は網膜損傷・皮膚熱傷等の深刻な障害を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R5",s:"全身振動による健康障害について",b:"全身振動への長期ばく露は、腰痛や消化器障害を引き起こすことがある。",a:true,e:"正しい。全身振動は腰椎への負担増加による腰痛、消化器障害等を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R4",s:"高圧環境による健康障害について",b:"潜水病（減圧症）は、急速に減圧した際に体内の窒素が気泡化することで生じる。",a:true,e:"正しい。急速な減圧により溶存窒素が気泡化し、関節痛・神経障害等の減圧症が発生します。"},
{c:"労働衛生（有害業務）",y:"R3",s:"低圧環境による健康障害について",b:"高所作業では、気圧の低下に伴い酸素分圧が低下するため、高山病が発生することがある。",a:true,e:"正しい。高所では大気圧が低下し酸素分圧も低下するため、頭痛・倦怠感等の高山病症状が発生します。"},
{c:"労働衛生（有害業務）",y:"R5",s:"職業がんについて",b:"β-ナフチルアミンへのばく露は、膀胱がんのリスクを高める。",a:true,e:"正しい。β-ナフチルアミンは膀胱がんの職業性発がん物質として確認されています（現在製造禁止）。"},
{c:"労働衛生（有害業務）",y:"R4",s:"溶接ヒュームによる健康障害について",b:"溶接ヒュームへのばく露は、肺がんのリスクを高めることが知られている。",a:true,e:"正しい。溶接ヒュームはIARC（国際がん研究機関）によりグループ1（発がん性あり）に分類されています。"},
{c:"労働衛生（有害業務）",y:"R3",s:"有機溶剤中毒の症状について",b:"有機溶剤中毒の急性症状として、頭痛・めまい・吐き気・意識障害などがある。",a:true,e:"正しい。有機溶剤の急性中毒症状として中枢神経抑制症状（頭痛・めまい・意識障害等）が現れます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"生物学的モニタリングについて",b:"生物学的モニタリングとは、労働者の尿や血液等を採取して、有害物質またはその代謝産物の量を測定することをいう。",a:true,e:"正しい。生物学的モニタリングは体内ばく露量を評価するための手法です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"リスクアセスメントの方法について",b:"化学物質のリスクアセスメントでは、有害性の程度と労働者のばく露の程度の双方を考慮する。",a:true,e:"正しい。リスク（risk）＝有害性（hazard）×ばく露（exposure）の考え方でリスクアセスメントを行います。"},
{c:"労働衛生（有害業務）",y:"R3",s:"作業環境管理の進め方について",b:"作業環境管理の基本的な優先順位は、①発生源対策、②作業環境対策、③保護具の順である。",a:true,e:"正しい。有害物質対策は発生源での制御（密閉・換気）が最優先で、保護具は最後の手段です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"換気に関する用語について",b:"排気量を室の容積で除した値を換気回数という。",a:true,e:"正しい。換気回数（回/時）は単位時間当たりの換気量÷室の容積で求められます。"},
{c:"労働衛生（有害業務）",y:"R4",s:"電離放射線の種類について",b:"α（アルファ）線は紙1枚程度で遮蔽できるが、体内に取り込まれると内部被ばくによる影響が大きい。",a:true,e:"正しい。α線は透過力は弱いが電離密度が高く、内部被ばくでの影響が大きいです。"},
{c:"労働衛生（有害業務）",y:"R3",s:"放射線の単位について",b:"吸収線量の単位はグレイ（Gy）であり、等価線量の単位はシーベルト（Sv）である。",a:true,e:"正しい。吸収線量の単位はGy（グレイ）、生物学的影響を考慮した等価線量・実効線量の単位はSv（シーベルト）です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"防じんマスクについて",b:"防じんマスクのろ過材の種類は、RS・RL（液体粒子含む）とDS・DL（固体粒子用）に分けられる。",a:true,e:"正しい。防じんマスクはろ過材の性能によりRS（防じん・液体粒子）・DS（防じん・固体粒子）等に分類されます。"},
{c:"労働衛生（有害業務）",y:"R4",s:"防毒マスクについて",b:"防毒マスクは、使用する有害ガスの種類に対応した吸収缶を選択しなければならない。",a:true,e:"正しい。防毒マスクの吸収缶はガスの種類ごとに設計されており、適切な種類を選択する必要があります。"},
{c:"労働衛生（有害業務）",y:"R3",s:"保護手袋の選択について",b:"有機溶剤からの皮膚保護には、ゴム製の保護手袋が有効である場合が多い。",a:true,e:"正しい。有機溶剤に対しては、溶剤の種類に応じたニトリルゴム・ブチルゴム等の保護手袋が有効です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"騒音の測定について",b:"騒音測定は、原則として等価騒音レベル（LAeq）で評価する。",a:true,e:"正しい。騒音の評価には等価騒音レベル（LAeq）が用いられます。"},
{c:"労働衛生（有害業務）",y:"R4",s:"振動障害の予防について",b:"振動工具使用時間の管理として、1日の使用時間の制限が重要である。",a:true,e:"正しい。振動ばく露時間の管理は手腕振動障害の予防に重要であり、使用時間制限が推奨されています。"},
{c:"労働衛生（有害業務）",y:"R3",s:"熱中症の種類について",b:"熱疲労（熱疲弊）は、高温環境下での大量発汗による水分・塩分の喪失が主な原因である。",a:true,e:"正しい。熱疲労は大量発汗による脱水・塩分喪失により、倦怠感・頭痛・吐き気等が生じます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"熱中症の予防について",b:"熱中症予防のために、作業場所の気温や湿度を定期的に測定・管理することが重要である。",a:true,e:"正しい。WBGT等による職場の温熱環境管理が熱中症予防の基本です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"有機溶剤の代謝について",b:"トルエンは体内で代謝されて馬尿酸となり、尿中に排泄される。",a:true,e:"正しい。トルエンの主要代謝産物は馬尿酸（ヒッピュル酸）であり、尿中排泄が生物学的モニタリングに利用されます。"},
{c:"労働衛生（有害業務）",y:"R3",s:"鉛の代謝について",b:"鉛は体内に吸収された後、主に骨に蓄積される。",a:true,e:"正しい。吸収された鉛の多くは骨に蓄積され、長期にわたって体内にとどまります。"},
{c:"労働衛生（有害業務）",y:"R5",s:"水銀による健康障害について",b:"メチル水銀（有機水銀）は無機水銀より毒性が高く、中枢神経障害を引き起こす。",a:true,e:"正しい。メチル水銀は水俣病の原因物質であり、無機水銀より毒性が高く中枢神経障害を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R4",s:"アスベストによる疾患について",b:"石綿による疾患には、石綿肺、肺がん、中皮腫、胸膜プラーク（胸膜肥厚斑）などがある。",a:true,e:"正しい。石綿ばく露による疾患には石綿肺・肺がん・悪性中皮腫・胸膜プラーク等があります。"},
{c:"労働衛生（有害業務）",y:"R3",s:"ニッケルによる健康障害について",b:"ニッケルへの長期ばく露は、肺がんや鼻腔がんのリスクを高める。",a:true,e:"正しい。ニッケル化合物は発がん性があり、肺がん・鼻腔がんのリスクを高めます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"ホルムアルデヒドによる健康障害について",b:"ホルムアルデヒドは気道・眼を刺激し、高濃度ばく露では肺水腫を引き起こすことがある。",a:true,e:"正しい。ホルムアルデヒドは強い粘膜刺激性があり、発がん性（鼻腔がん等）も指摘されています。"},
{c:"労働衛生（有害業務）",y:"R4",s:"イソシアネートによる健康障害について",b:"ジイソシアナートへのばく露は、職業性喘息の原因となることがある。",a:true,e:"正しい。トルエンジイソシアナート（TDI）等は職業性喘息の代表的な原因物質です。"},
{c:"労働衛生（有害業務）",y:"R3",s:"じん肺の種類について",b:"珪肺は、遊離けい酸（シリカ）の粉じんを吸入することによって発症するじん肺の一種である。",a:true,e:"正しい。珪肺は遊離けい酸粉じんの吸入で発症する代表的なじん肺で、結節性線維化が特徴です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"難聴の種類について",b:"騒音性難聴は感音性難聴に分類される。",a:true,e:"正しい。騒音性難聴は内耳（蝸牛）の有毛細胞が障害されることで生じる感音性難聴です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"職業性疾病の一次予防について",b:"有害因子のばく露を根本的になくす（代替物質の使用等）ことが、職業性疾病の最も効果的な一次予防対策である。",a:true,e:"正しい。有害物質の代替・消去は職業性疾病一次予防の最も根本的な対策です。"},
{c:"労働衛生（有害業務）",y:"R3",s:"局所排気装置のフードの形式について",b:"囲い式フードは外付け式フードよりも一般的に制御風速が低くても効果的である。",a:true,e:"正しい。囲い式フードは有害物質を閉じ込める構造のため、外付け式より少ない排気量・低い制御風速で有効です。"},
{c:"労働衛生（有害業務）",y:"R5",s:"有機溶剤の経皮吸収について",b:"ジメチルホルムアミドは、経皮吸収されやすい有機溶剤の一つである。",a:true,e:"正しい。ジメチルホルムアミド（DMF）は経皮吸収が大きく、肝障害等を引き起こします。"},
{c:"労働衛生（有害業務）",y:"R4",s:"酸素欠乏症の応急処置について",b:"酸素欠乏症の患者に対しては、必要に応じて人工呼吸を行い、速やかに医師に引き渡さなければならない。",a:true,e:"正しい。酸欠則第16条により、酸素欠乏症等の患者への応急措置（人工呼吸等）と医師への引き渡しが義務付けられています。"},
{c:"労働衛生（有害業務）",y:"R3",s:"産業中毒の治療について",b:"鉛中毒の治療には、キレート剤が用いられることがある。",a:true,e:"正しい。鉛中毒の治療にはエデト酸カルシウム二ナトリウム（Ca-EDTA）等のキレート剤が用いられます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"作業管理の方法について",b:"作業管理とは、有害物質のばく露を減らすために作業方法や手順を改善することをいう。",a:true,e:"正しい。作業管理は労働衛生の3管理の一つで、作業方法・手順の改善によりばく露低減を図ります。"},
{c:"労働衛生（有害業務）",y:"R4",s:"呼吸用保護具の密着性について",b:"呼吸用保護具のフィットテストは、保護具の顔面への密着性を確認するために行う。",a:true,e:"正しい。フィットテストにより呼吸用保護具のフィット状況を確認し、適切な保護効果を確保します。"},
{c:"労働衛生（有害業務）",y:"R3",s:"有害物質の管理基準について",b:"許容濃度とは、労働者がその物質に週5日、1日8時間ばく露されても健康障害が生じないとされる濃度をいう。",a:true,e:"正しい。日本産業衛生学会の許容濃度は、週5日・1日8時間（週40時間）の条件で健康障害が生じないとされる濃度として定義されています。"},
{c:"労働衛生（有害業務）",y:"R5",s:"石綿の代替材料について",b:"石綿の代替材料として、ロックウール（岩綿）が広く使用されている。",a:true,e:"正しい。ロックウールは石綿の代替断熱・防音材として広く用いられています。"},
{c:"労働衛生（有害業務）",y:"R4",s:"化学物質のリスク評価について",b:"SDSに記載されているGHS分類は、化学物質の危険有害性を分類・表示するための国際規格である。",a:true,e:"正しい。GHS（化学品の分類および表示に関する世界調和システム）に基づくSDSの記載が国際的に用いられています。"},
{c:"労働衛生（有害業務）",y:"R3",s:"職業性皮膚障害について",b:"接触性皮膚炎は、アレルギー性接触皮膚炎と刺激性接触皮膚炎に分類される。",a:true,e:"正しい。接触性皮膚炎はアレルギー機序によるものと刺激性物質による直接障害に分類されます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"温熱環境の指標について",b:"WBGT（湿球黒球温度）は屋外では自然湿球温度・黒球温度・乾球温度の3つを用いて算出する。",a:true,e:"正しい。WBGT（屋外）＝0.7×自然湿球温度＋0.2×黒球温度＋0.1×乾球温度の式で計算します。"},
{c:"労働衛生（有害業務）",y:"R4",s:"換気の評価指標について",b:"室内の二酸化炭素濃度は換気の目安として用いられ、0.1%（1,000ppm）以下が推奨される。",a:true,e:"正しい。建築物衛生法等により室内CO2濃度は0.1%（1,000ppm）以下が基準とされています。"},
{c:"労働衛生（有害業務）",y:"R3",s:"粉じん作業と防じんマスクについて",b:"じん肺を引き起こす粉じん粒子として特に問題となるのは、粒径が0.5〜5μm程度の粒子である。",a:true,e:"正しい。肺胞まで到達する呼吸性粉じんとして、0.5〜5μm程度の粒径が肺組織障害に最も問題とされます。"},
{c:"労働衛生（有害業務）",y:"R5",s:"有機溶剤ばく露の評価について",b:"作業環境測定のA測定は作業場全体の平均的な汚染状況を把握するために行う。",a:true,e:"正しい。A測定は単位作業場所全体の平均的な有害物質濃度を測定する方法です。"},
{c:"労働衛生（有害業務）",y:"R4",s:"化学物質の急性毒性について",b:"LD50（半数致死量）は、試験動物の半数が死亡する用量であり、値が小さいほど毒性が強い。",a:true,e:"正しい。LD50の値が小さいほど少量で半数が死亡することを意味し、毒性が強いことを示します。"},
{c:"労働衛生（有害業務）",y:"R3",s:"シックビルディング症候群について",b:"シックビルディング症候群は、ホルムアルデヒドや揮発性有機化合物（VOC）等が原因の一つとして考えられている。",a:true,e:"正しい。シックビルディング症候群はVOC・ホルムアルデヒド・カビ等が室内空気汚染の原因として挙げられています。"},
{c:"労働衛生（有害業務）",y:"R5",s:"熱放散の方法について",b:"人体の熱放散方法には、放射・対流・伝導・蒸発（発汗）の4つがある。",a:true,e:"正しい。人体は放射・対流・伝導・蒸発の4つの経路で熱を放散しています。"},
{c:"労働衛生（有害業務）",y:"R4",s:"電離放射線の種類と透過力について",b:"γ（ガンマ）線は透過力が強く、厚い鉛板やコンクリートで遮蔽する必要がある。",a:true,e:"正しい。γ線は電磁波の一種で透過力が非常に強く、鉛・コンクリート等による遮蔽が必要です。"},
{c:"労働衛生（有害業務）",y:"R3",s:"有機溶剤の蒸気圧について",b:"蒸気圧が高い有機溶剤ほど揮発しやすく、作業環境中の濃度が高くなりやすい。",a:true,e:"正しい。蒸気圧が高いほど揮発性が高く、空気中の濃度が高まりやすいため、ばく露リスクが大きくなります。"},
{c:"労働衛生（有害業務）",y:"R5",s:"作業環境測定のB測定について",b:"B測定は、有害物質の発散源に近い作業者の位置（最も濃度が高いと考えられる場所）の濃度を測定するために行う。",a:true,e:"正しい。B測定は特定の作業者が集中的にばく露されていると考えられる箇所（発散源近傍等）の測定です。"},

// ── 労働衛生（有害業務以外）100問 ──
{c:"労働衛生（有害業務以外）",y:"R5",s:"労働衛生の3管理について",b:"労働衛生の3管理とは、作業環境管理・作業管理・健康管理をいう。",a:true,e:"正しい。労働衛生の3管理は作業環境管理・作業管理・健康管理であり、これに安全衛生教育と労働衛生管理体制を加えて5つの柱ともいわれます。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"食中毒について",b:"サルモネラ菌による食中毒は、加熱調理した食品からは発生しない。",a:false,e:"誤り。加熱が不十分な場合にはサルモネラ菌が生き残る可能性があります。十分な加熱（75℃・1分以上）が重要です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"労働衛生教育について",b:"雇入れ時の安全衛生教育は、全業種で実施しなければならない。",a:true,e:"正しい。労働安全衛生法第59条により、業種に関わらず雇入れ時の安全衛生教育が義務付けられています。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"受動喫煙防止対策について",b:"健康増進法の改正により、多くの施設での屋内喫煙が原則禁止となった。",a:true,e:"正しい。2020年の健康増進法改正により、飲食店等も含め多くの施設での屋内喫煙が原則禁止されています。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"メンタルヘルス対策について",b:"4つのケアとは、セルフケア・ラインによるケア・事業場内産業保健スタッフ等によるケア・事業場外資源によるケアをいう。",a:true,e:"正しい。厚生労働省のメンタルヘルス指針に定める4つのケアです。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"健康増進活動について",b:"BMI（体格指数）は体重（kg）を身長（m）で除した値である。",a:false,e:"誤り。BMIは体重（kg）を身長（m）の2乗で除した値です（体重÷身長²）。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"救急処置について",b:"AED（自動体外式除細動器）は、心室細動に対して有効である。",a:true,e:"正しい。AEDは心室細動・無脈性心室頻拍に対して電気ショックを行う装置です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"感染症の予防について",b:"インフルエンザウイルスは主に飛沫感染・接触感染によって伝播する。",a:true,e:"正しい。インフルエンザの主な感染経路は飛沫感染と接触感染です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"脳・心臓疾患の予防について",b:"過重労働による健康障害防止のため、時間外・休日労働は月45時間以内が望ましいとされている。",a:true,e:"正しい。時間外労働が月45時間を超えると脳・心臓疾患のリスクが高まるとされています。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"熱中症の救急処置について",b:"熱中症が疑われる場合、意識がある患者にはスポーツドリンクなどで水分・塩分を補給させる。",a:true,e:"正しい。軽症〜中等症の場合は経口補水が有効です。意識障害がある場合は医療機関への搬送が優先されます。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"疾病予防の区分について",b:"定期健康診断は、第2次予防（早期発見・早期治療）に当たる。",a:true,e:"正しい。健康診断による早期発見は第2次予防です。第1次予防は発症予防、第3次予防はリハビリテーションです。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"骨粗しょう症について",b:"骨粗しょう症は女性に多く、閉経後にリスクが高まる。",a:true,e:"正しい。閉経後のエストロゲン減少により骨密度が低下し、骨粗しょう症のリスクが高まります。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"情報機器作業のガイドラインについて",b:"一連続作業時間が1時間を超えないようにし、次の連続作業までの間に10〜15分の作業休止時間を設けることが推奨される。",a:true,e:"正しい。厚生労働省の情報機器作業における労働衛生管理のためのガイドラインの内容です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"労働衛生統計について",b:"業務上疾病で最も多いのは、負傷に起因する疾病（災害性腰痛等）である。",a:true,e:"正しい。業務上疾病の中では負傷に起因する疾病が最多を占めています。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"禁煙支援について",b:"ニコチン依存度の評価には、TDS（タバコ依存スクリーニングテスト）が用いられる。",a:true,e:"正しい。TDSは10項目のニコチン依存症評価ツールで、禁煙治療の保険適用判断にも使われます。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"糖尿病の予防について",b:"HbA1cは過去1〜2か月間の平均血糖値を反映する指標である。",a:true,e:"正しい。HbA1c（グリコヘモグロビン）は赤血球の寿命に対応した約1〜2か月の平均血糖値を反映します。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"腰痛予防対策について",b:"非特異的腰痛は原因が明確でない腰痛であり、全腰痛の約85%を占めるとされる。",a:true,e:"正しい。多くの腰痛は画像等で原因特定できない非特異的腰痛です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"過重労働の健康影響について",b:"長時間労働は、うつ病などのメンタルヘルス不調のリスク要因となる。",a:true,e:"正しい。長時間労働は疲労の蓄積・睡眠不足をもたらし、メンタルヘルス不調のリスクを高めます。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"睡眠と健康について",b:"交代制勤務（シフト勤務）は、睡眠障害・消化器疾患のリスクを高めることがある。",a:true,e:"正しい。概日リズムの乱れにより様々な健康障害リスクが高まります。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"特定保健指導について",b:"メタボリックシンドロームの腹囲基準は、男性85cm以上、女性90cm以上である。",a:true,e:"正しい。特定健診・特定保健指導で用いられるメタボ診断の腹囲基準値です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"心肺蘇生法について",b:"成人に対する心肺蘇生法での胸骨圧迫の深さは、約5cmが推奨されている。",a:true,e:"正しい。日本蘇生協議会のガイドラインでは、成人の胸骨圧迫深さは5〜6cmとされています。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"止血法について",b:"四肢の外傷による大量出血に対しては、止血帯（ターニケット）を使用することがある。",a:true,e:"正しい。直接圧迫止血で対応できない大量出血では、止血帯の使用が救命処置として選択されます。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"骨折の応急処置について",b:"骨折が疑われる場合は、骨折部位の上下の関節を含めて固定する。",a:true,e:"正しい。骨折の副木固定では、骨折部位を含む上下の関節を固定することが原則です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"熱傷（やけど）の応急処置について",b:"熱傷の応急処置では、まず流水で患部を冷やすことが重要である。",a:true,e:"正しい。熱傷の初期対応は流水（15〜20分程度）で冷却することが基本です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"食中毒の原因菌について",b:"ボツリヌス菌による食中毒は、食品中で産生された毒素の摂取によって発症する。",a:true,e:"正しい。ボツリヌス食中毒は食品中で増殖した菌が産生した神経毒素の摂取によって発症します（食品内毒素型）。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"腸管出血性大腸菌について",b:"O157などの腸管出血性大腸菌は、溶血性尿毒症症候群（HUS）を引き起こすことがある。",a:true,e:"正しい。腸管出血性大腸菌はベロ毒素を産生し、HUSや出血性大腸炎を引き起こします。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"カンピロバクターによる食中毒について",b:"カンピロバクターによる食中毒は、主に鶏肉等の加熱不十分な食品の摂取によって発症する。",a:true,e:"正しい。カンピロバクターは鶏肉に多く存在し、十分な加熱（75℃以上・1分以上）が予防に重要です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"黄色ブドウ球菌による食中毒について",b:"黄色ブドウ球菌による食中毒では、エンテロトキシン（毒素）が原因であり、毒素は加熱しても分解されにくい。",a:true,e:"正しい。エンテロトキシンは耐熱性があり、100℃・30分の加熱でも分解されないことがあります。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"ノロウイルスについて",b:"ノロウイルスによる食中毒の予防には、手洗いと食品の十分な加熱（85〜90℃・90秒以上）が重要である。",a:true,e:"正しい。ノロウイルスの不活化には85〜90℃・90秒以上の加熱が推奨されています。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"職場における感染症対策について",b:"職場での感染症対策として、手洗い・手指消毒、咳エチケット、換気などが基本的対策として重要である。",a:true,e:"正しい。標準予防策として手洗い・換気・咳エチケット等が基本的感染症対策です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"職業性疾病の予防について",b:"産業疲労の蓄積を防ぐために、適切な休憩時間の確保や作業方法の改善が重要である。",a:true,e:"正しい。産業疲労の予防には休憩確保・作業方法改善・睡眠確保等が重要です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"作業疲労の評価について",b:"フリッカー値（CFF値）は、眼の疲労や中枢神経系の疲労を評価する指標として用いられる。",a:true,e:"正しい。フリッカー値（融合頻度）は中枢神経系の機能状態を反映し、疲労評価に用いられます。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"作業姿勢と健康について",b:"長時間の立位作業は、下肢静脈瘤の発生リスクを高めることがある。",a:true,e:"正しい。長時間立位では下肢への静脈血のうっ滞が生じ、静脈瘤のリスクが高まります。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"職業性腰痛の予防について",b:"腰痛予防の観点から、重量物の持ち上げ時には膝を曲げた状態で腰への負担を分散させることが重要である。",a:true,e:"正しい。膝を曲げて重心を下げた持ち上げ方（スクワット型）が腰椎への負担を軽減します。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"過労死と労働時間について",b:"労働時間が月100時間を超える場合、脳・心臓疾患の業務起因性が認められやすいとされている。",a:true,e:"正しい。過労死認定基準では、発症前1か月間に100時間を超える時間外労働が認められた場合、業務起因性が認められやすいとされます。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"職場における健康づくりについて",b:"健康経営とは、従業員の健康管理を経営的視点で捉え、戦略的に実践することをいう。",a:true,e:"正しい。健康経営は従業員の健康投資を企業価値向上の観点から推進する考え方です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"喫煙と健康について",b:"喫煙は、肺がん・口腔がん・食道がん・胃がん等の様々ながんのリスクを高める。",a:true,e:"正しい。喫煙は多くの部位のがんリスクを高める重大な危険因子です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"飲酒と健康について",b:"過度の飲酒は、肝臓疾患（脂肪肝・肝硬変・肝がん）のリスクを高める。",a:true,e:"正しい。過度の飲酒は肝障害（脂肪肝・肝炎・肝硬変・肝がん）の主要な原因の一つです。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"運動と健康について",b:"適度な有酸素運動は、高血圧・糖尿病・脂質異常症等の生活習慣病の予防・改善に効果がある。",a:true,e:"正しい。有酸素運動は心肺機能向上・インスリン感受性改善・脂質代謝改善等の効果があります。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"生活習慣病の予防について",b:"メタボリックシンドロームは、腹部肥満・高血圧・高血糖・脂質異常症のうち複数が重複した状態をいう。",a:true,e:"正しい。メタボリックシンドロームは内臓脂肪型肥満を基本として、高血圧・高血糖・脂質異常症のうち2つ以上が重複した状態です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"高血圧について",b:"血圧140/90mmHg以上を高血圧と定義している（日本高血圧学会の基準）。",a:true,e:"正しい。日本高血圧学会のガイドラインでは140/90mmHg以上を高血圧と定義しています。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"脂質異常症について",b:"LDLコレステロールは「悪玉コレステロール」とも呼ばれ、高値が動脈硬化のリスクを高める。",a:true,e:"正しい。LDLコレステロールが高値になると血管壁に蓄積し動脈硬化が進行します。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"尿酸と痛風について",b:"高尿酸血症は痛風発作のリスク因子であり、腎結石の原因ともなる。",a:true,e:"正しい。高尿酸血症は痛風（関節への尿酸結晶沈着）・腎結石・腎障害のリスクを高めます。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"がんの予防について",b:"日本人の死因の中で、悪性新生物（がん）は最も多い死因の一つである。",a:true,e:"正しい。悪性新生物（がん）は日本人の死因の第1位であり、全死亡の約4分の1を占めます。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"アルコールと脳への影響について",b:"過度の飲酒は、ウェルニッケ脳症やコルサコフ症候群等の脳神経障害を引き起こすことがある。",a:true,e:"正しい。慢性アルコール依存ではビタミンB1（チアミン）欠乏によりウェルニッケ脳症・コルサコフ症候群が生じます。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"生理的疲労と病的疲労について",b:"生理的疲労は適切な休息により回復するが、病的疲労は基礎疾患の治療なしには回復しない。",a:true,e:"正しい。生理的疲労（正常な疲れ）は休息で回復しますが、病的疲労は疾患に伴うものであり治療が必要です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"ストレス反応について",b:"ハンス・セリエが提唱した汎適応症候群（GAS）では、ストレス反応は警告反応期・抵抗期・疲弊期の3段階をたどる。",a:true,e:"正しい。セリエのGASはアラーム反応（警告反応期）・抵抗期・疲弊期の3段階で構成されています。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"うつ病の症状について",b:"うつ病の主要症状として、抑うつ気分、興味・喜びの喪失（無快感症）、睡眠障害などがある。",a:true,e:"正しい。DSMのうつ病診断基準には抑うつ気分・興味喪失・睡眠障害等が含まれます。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"パワーハラスメントについて",b:"厚生労働省のガイドラインでは、職場のパワーハラスメントを6類型に整理している。",a:true,e:"正しい。厚生労働省のパワハラ防止指針では、身体的攻撃・精神的攻撃・人間関係からの切り離し・過大な要求・過小な要求・個の侵害の6類型が示されています。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"職場復帰支援について",b:"メンタルヘルス不調で休業した労働者の職場復帰には、段階的な職場復帰（リワーク）が有効である。",a:true,e:"正しい。厚生労働省の職場復帰支援マニュアルでは、段階的な職場復帰プログラムの実施が推奨されています。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"心臓発作の応急処置について",b:"心停止が疑われる場合は、直ちに胸骨圧迫（心臓マッサージ）を開始し、AEDを使用することが重要である。",a:true,e:"正しい。心停止への対応として一次救命処置（BLS）：胸骨圧迫とAEDの早期使用が救命率向上に重要です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"脳卒中の症状について",b:"脳卒中（脳梗塞・脳出血）の症状として、突然の片麻痺・言語障害・意識障害などが現れることがある。",a:true,e:"正しい。脳卒中の代表的症状は片側の麻痺・しびれ・言語障害・激しい頭痛・意識障害等で、突然に発症します。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"糖尿病の合併症について",b:"糖尿病の三大合併症として、糖尿病性網膜症・糖尿病性腎症・糖尿病性神経障害がある。",a:true,e:"正しい。糖尿病の慢性合併症として、網膜症・腎症・神経障害の三大合併症が重要です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"アレルギー疾患について",b:"職業性喘息は、職場での特定物質へのばく露によって発症する気管支喘息である。",a:true,e:"正しい。職業性喘息は特定の職業性アレルゲン（イソシアネート・ラテックス等）ばく露で発症します。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"健康管理の実施者について",b:"産業医は、衛生管理者と連携して健康管理活動を行う。",a:true,e:"正しい。産業医と衛生管理者は連携して職場の健康管理を推進することが求められます。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"労働衛生における疫学について",b:"コホート研究は、一定期間追跡調査を行い、疾病の発生率をばく露の有無で比較する研究手法である。",a:true,e:"正しい。コホート研究は前向き研究の一種で、ばく露群と非ばく露群を追跡し発症率を比較します。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"統計と健康指標について",b:"有病率とは、ある時点における人口中の患者数の割合をいう。",a:true,e:"正しい。有病率（prevalence rate）は特定時点における疾病保有者の割合です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"疾病発生の要因について",b:"疾病の発生モデルにおいて、宿主・環境・病因（エージェント）の三要素のバランスが崩れることで疾病が発生するとされる。",a:true,e:"正しい。疫学の基本的な疾病発生モデルでは、宿主・病因・環境の三角形のバランスが崩れると疾病が発生します。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"保健行動の理論について",b:"健康信念モデル（ヘルスビリーフモデル）は、人が健康行動をとるかどうかを説明するための理論である。",a:true,e:"正しい。健康信念モデルは知覚された脅威・利益・障壁・自己効力感を基に健康行動を説明します。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"がん検診について",b:"職域でのがん検診として、胃がん・肺がん・大腸がん・乳がん・子宮頸がん検診等が行われている。",a:true,e:"正しい。職域がん検診として国が推奨する検診（胃・肺・大腸・乳・子宮頸がん）が実施されています。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"健康増進法について",b:"健康増進法は、国民の健康増進を総合的に推進するための基本事項を定めた法律である。",a:true,e:"正しい。健康増進法は健康診断・栄養・受動喫煙防止等に関する基本的事項を定めています。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"労働衛生管理の評価について",b:"労働衛生管理活動の効果を評価するために、業務上疾病の発生率や健康診断結果の推移を分析することが重要である。",a:true,e:"正しい。業務上疾病率・健康診断結果等の統計指標を活用した評価・改善（PDCAサイクル）が重要です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"妊産婦の健康管理について",b:"妊娠中の労働者は、法令に基づき軽易な業務への転換を請求することができる。",a:true,e:"正しい。労働基準法第65条第3項により、妊産婦は軽易な業務への転換を請求できます。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"高齢労働者の健康管理について",b:"高齢労働者の健康管理においては、加齢による心身の機能低下に対応した配慮が重要である。",a:true,e:"正しい。高齢労働者は身体機能・認知機能の変化があり、健康状態に応じた配慮が必要です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"夜間・交代勤務の健康管理について",b:"夜間勤務者は概日リズム（サーカディアンリズム）の乱れにより、睡眠障害や消化器疾患のリスクが高まる。",a:true,e:"正しい。交代勤務・夜間勤務は体内時計のリズムを乱し、様々な健康障害リスクを高めます。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"作業環境の快適化について",b:"労働衛生上の観点から、事務室内の相対湿度は40%以上70%以下であることが望ましい。",a:true,e:"正しい。事務所衛生基準規則等により、室内湿度は40〜70%が基準とされています。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"照明について",b:"精密機械組立等の精密作業では、照度は750ルクス以上が推奨されている。",a:true,e:"正しい。労働安全衛生規則等により、精密作業では750ルクス以上の照度が求められています。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"飲料水の管理について",b:"事業場において労働者が常時使用する飲料水は、水道法の水質基準を満たさなければならない。",a:true,e:"正しい。労働安全衛生規則第619条により、飲料水は水道法の水質基準を満たすものを使用しなければなりません。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"廃棄物の管理について",b:"事業場内における廃棄物の適切な処理は、感染症予防の観点からも重要である。",a:true,e:"正しい。感染性廃棄物の適切な分別・処理は感染症予防のための労働衛生管理の一つです。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"健康診断の問診について",b:"健康診断の問診では、業務歴・既往歴・生活習慣等の情報収集が行われる。",a:true,e:"正しい。問診は職業歴・既往歴・喫煙・飲酒・運動習慣等を把握するための重要な健診項目です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"産業保健活動について",b:"産業保健活動は、産業医・衛生管理者・産業保健師等が連携して実施することが効果的である。",a:true,e:"正しい。産業医・衛生管理者・産業保健師・心理士等の専門職チームによる連携が効果的な産業保健活動を支えます。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"労働安全衛生マネジメントシステムと健康管理について",b:"PDCAサイクルに基づく継続的な改善活動は、労働衛生管理の効果的な推進に有効である。",a:true,e:"正しい。Plan（計画）-Do（実施）-Check（評価）-Act（改善）のPDCAサイクルが労働衛生管理の基本手法です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"コミュニケーションと健康管理について",b:"管理監督者によるラインケアは、部下の早期のストレスサインの察知と適切な対応を目的としている。",a:true,e:"正しい。ラインケアは上司・管理者が部下の心身の状態変化に気付き、適切な支援を行うためのケアです。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"健康診断の事後措置について",b:"産業医は健康診断の結果に基づき、労働者の健康管理について事業者に対し意見を述べることができる。",a:true,e:"正しい。産業医は健康診断結果を踏まえ、就業上の措置等について事業者に意見を述べる権限があります。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"歯と口腔の健康について",b:"歯周病は糖尿病や心臓病等の全身疾患と関連があることが知られている。",a:true,e:"正しい。歯周病は全身性炎症と関連し、糖尿病・心疾患・早産等との関連が報告されています。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"アルコール依存症について",b:"CAGE質問票は、アルコール依存症のスクリーニングに用いられる。",a:true,e:"正しい。CAGE（Control, Annoyed, Guilty, Eye-opener）は4項目のアルコール依存スクリーニングツールです。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"慢性閉塞性肺疾患（COPD）について",b:"COPDは主に喫煙が原因であり、気流閉塞を特徴とする。",a:true,e:"正しい。COPDは喫煙による慢性的な肺の炎症・気流閉塞を特徴とし、息切れ・咳・痰が主症状です。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"循環器疾患の予防について",b:"心臓病の予防には、禁煙・血圧管理・コレステロール管理・適度な運動・適正体重の維持が重要である。",a:true,e:"正しい。虚血性心疾患の主要危険因子（喫煙・高血圧・脂質異常・肥満）を管理することが予防の基本です。"},
{c:"労働衛生（有害業務以外）",y:"R4",s:"メンタルヘルス不調の早期発見について",b:"抑うつ状態の初期サインとして、遅刻・欠勤の増加、作業ミスの増加、コミュニケーションの減少等がある。",a:true,e:"正しい。これらの行動変化はメンタルヘルス不調の早期サインとして注目すべき変化です。"},
{c:"労働衛生（有害業務以外）",y:"R3",s:"がんと就労について",b:"がんの治療を受けながら就労する労働者への支援は、産業保健活動の重要な課題の一つとなっている。",a:true,e:"正しい。治療と就労の両立支援（がん・難病等）は現代の産業保健における重要テーマです。"},
{c:"労働衛生（有害業務以外）",y:"R5",s:"腎臓病と生活習慣について",b:"慢性腎臓病（CKD）は、高血圧・糖尿病・脂質異常症等の生活習慣病と深く関連している。",a:true,e:"正しい。CKDの主要な原因は糖尿病性腎症・腎硬化症（高血圧性）・慢性糸球体腎炎で、生活習慣病との関連が深いです。"},

// ── 労働生理 100問 ──
{c:"労働生理",y:"R5",s:"神経系について",b:"自律神経系は、交感神経と副交感神経からなる。",a:true,e:"正しい。自律神経は交感神経（緊張・興奮時）と副交感神経（安静・休息時）の二重支配が基本です。"},
{c:"労働生理",y:"R4",s:"血液について",b:"血液の成分のうち、酸素を運搬する役割を担うのは赤血球である。",a:true,e:"正しい。赤血球内のヘモグロビンが酸素と結合して全身に運搬します。"},
{c:"労働生理",y:"R5",s:"呼吸について",b:"成人の安静時の呼吸数は、通常1分間に15〜20回である。",a:true,e:"正しい。成人安静時の正常呼吸数は15〜20回/分です。"},
{c:"労働生理",y:"R3",s:"心臓について",b:"心臓の拍動は、洞房結節（洞結節）で発生した電気信号によって調節されている。",a:true,e:"正しい。洞房結節はペースメーカーとも呼ばれ、心臓の正常リズムを作り出します。"},
{c:"労働生理",y:"R4",s:"消化と吸収について",b:"小腸は消化・吸収の主な場であり、食物の栄養素の大部分はここで吸収される。",a:true,e:"正しい。小腸（特に空腸・回腸）は消化・吸収の中心的な場所です。"},
{c:"労働生理",y:"R5",s:"肝臓の機能について",b:"肝臓はグリコーゲンを合成・貯蔵し、必要に応じてグルコースとして放出する。",a:true,e:"正しい。肝臓は血糖調節の重要な臓器であり、グリコーゲンの合成・貯蔵・分解を行います。"},
{c:"労働生理",y:"R3",s:"腎臓と尿の生成について",b:"腎臓では原尿が生成され、そのほぼ全量が再吸収されて尿となる。",a:false,e:"誤り。1日に約150Lの原尿が生成されますが、最終的な尿量は約1.5Lです。再吸収されるのは約99%です。"},
{c:"労働生理",y:"R4",s:"体温調節について",b:"体温が上昇すると、皮膚血管が拡張して熱放散が増加する。",a:true,e:"正しい。高体温時は皮膚血管拡張・発汗により熱を放散して体温を下げます。"},
{c:"労働生理",y:"R5",s:"感覚器について",b:"眼の水晶体は毛様体筋の収縮・弛緩によって厚さが変わり、焦点調節を行う。",a:true,e:"正しい。近くを見るとき毛様体筋が収縮し水晶体が厚くなります。"},
{c:"労働生理",y:"R3",s:"筋肉について",b:"筋収縮のエネルギー源として、最初に利用されるのはATP（アデノシン三リン酸）である。",a:true,e:"正しい。筋収縮の直接エネルギー源はATPです。"},
{c:"労働生理",y:"R4",s:"疲労について",b:"精神的疲労（中枢性疲労）は、主に大脳皮質の機能低下として現れる。",a:true,e:"正しい。精神疲労は中枢神経系、特に大脳皮質の機能低下が主因です。"},
{c:"労働生理",y:"R5",s:"ストレス反応について",b:"ストレスがかかるとコルチゾールなどのストレスホルモンが分泌される。",a:true,e:"正しい。副腎皮質から分泌されるコルチゾールは代表的なストレスホルモンです。"},
{c:"労働生理",y:"R3",s:"免疫について",b:"白血球のうちリンパ球は、B細胞とT細胞に分けられる。",a:true,e:"正しい。B細胞（液性免疫）とT細胞（細胞性免疫）はリンパ球の主要なサブセットです。"},
{c:"労働生理",y:"R4",s:"睡眠について",b:"レム睡眠中は夢を見ることが多く、筋肉の緊張が高まった状態である。",a:false,e:"誤り。レム睡眠中は骨格筋の緊張が低下（弛緩）しています。これは夢の内容に合わせた動作を防ぐためです。"},
{c:"労働生理",y:"R5",s:"血圧について",b:"血圧は心臓の収縮力・血液量・末梢血管抵抗によって決まる。",a:true,e:"正しい。血圧＝心拍出量×末梢血管抵抗で表され、心臓・血液・血管の三要素が関与します。"},
{c:"労働生理",y:"R3",s:"呼吸器系について",b:"肺胞は肺の最小単位で、ここでガス交換（酸素と二酸化炭素の交換）が行われる。",a:true,e:"正しい。肺胞は薄い壁を通じて毛細血管との間でガス交換を行います。"},
{c:"労働生理",y:"R4",s:"体液について",b:"体液は体重の約60%を占め、細胞内液と細胞外液に分けられる。",a:true,e:"正しい。成人男性の体液量は体重の約60%で、細胞内液40%・細胞外液20%です。"},
{c:"労働生理",y:"R5",s:"内分泌系について",b:"インスリンは膵臓のランゲルハンス島α細胞から分泌される。",a:false,e:"誤り。インスリンは膵臓のランゲルハンス島β（ベータ）細胞から分泌されます。α細胞はグルカゴンを分泌します。"},
{c:"労働生理",y:"R3",s:"聴覚について",b:"高音（高周波数）域の聴力低下は加齢性難聴でみられる一般的な変化である。",a:true,e:"正しい。加齢性難聴では高音域から聴力が低下する傾向があります。"},
{c:"労働生理",y:"R4",s:"皮膚の機能について",b:"皮膚は体温調節・知覚・保護・ビタミンD合成などの機能を持つ。",a:true,e:"正しい。皮膚は多様な機能を持つ重要な器官です。"},
{c:"労働生理",y:"R5",s:"循環器系について",b:"心臓の右心室から肺動脈を通じて肺へ血液を送り出す循環を肺循環という。",a:true,e:"正しい。肺循環（小循環）は右心室→肺動脈→肺→肺静脈→左心房の経路です。"},
{c:"労働生理",y:"R4",s:"消化器系について",b:"胃では、ペプシンと塩酸（胃酸）によってタンパク質の消化が始まる。",a:true,e:"正しい。胃酸はペプシノーゲンをペプシンに活性化し、タンパク質消化を促進します。"},
{c:"労働生理",y:"R3",s:"筋肉の種類について",b:"心筋は随意筋であり、自分の意志で収縮を制御できる。",a:false,e:"誤り。心筋は不随意筋であり、自律神経系によって制御され、自分の意志では動かせません。"},
{c:"労働生理",y:"R5",s:"骨について",b:"成人の骨格は約206個の骨から構成されている。",a:true,e:"正しい。成人の骨格は一般に206個の骨で構成されています。"},
{c:"労働生理",y:"R4",s:"関節について",b:"関節の可動域は、関節の形状・靭帯・周囲の筋肉によって制限される。",a:true,e:"正しい。関節の可動域（ROM）は関節の形状・靭帯の緊張・周囲筋肉の柔軟性等により決まります。"},
{c:"労働生理",y:"R3",s:"神経系の構成について",b:"末梢神経系は、体性神経系と自律神経系に分けられる。",a:true,e:"正しい。末梢神経系は体性神経系（運動・感覚）と自律神経系（内臓・血管等の調節）に分類されます。"},
{c:"労働生理",y:"R5",s:"ニューロンについて",b:"ニューロン（神経細胞）は、細胞体・軸索・樹状突起から構成される。",a:true,e:"正しい。ニューロンは細胞体（核を含む）・軸索（信号を伝える）・樹状突起（信号を受け取る）から構成されます。"},
{c:"労働生理",y:"R4",s:"内分泌系の機能について",b:"甲状腺ホルモンは、基礎代謝を促進する働きがある。",a:true,e:"正しい。甲状腺ホルモン（T3・T4）は全身の代謝を亢進し、基礎代謝率を高めます。"},
{c:"労働生理",y:"R3",s:"副腎について",b:"副腎髄質からはアドレナリンとノルアドレナリンが分泌される。",a:true,e:"正しい。副腎髄質はカテコールアミン（アドレナリン・ノルアドレナリン）を分泌し、闘争・逃走反応に関与します。"},
{c:"労働生理",y:"R5",s:"血液の凝固について",b:"血液凝固の最終過程でフィブリノーゲンがフィブリンに変換されて血液が固まる。",a:true,e:"正しい。トロンビンの働きによりフィブリノーゲンがフィブリンに変換され、血栓が形成されます。"},
{c:"労働生理",y:"R4",s:"赤血球について",b:"赤血球の寿命は約120日であり、主に脾臓で破壊される。",a:true,e:"正しい。赤血球の寿命は約120日で、老化した赤血球は脾臓・肝臓で処理されます。"},
{c:"労働生理",y:"R3",s:"白血球の種類について",b:"好中球は、白血球の中で最も多く、細菌感染への防御に重要な役割を果たす。",a:true,e:"正しい。好中球は白血球の50〜70%を占め、貪食作用により細菌感染防御の最前線を担います。"},
{c:"労働生理",y:"R5",s:"ヘモグロビンについて",b:"ヘモグロビンに含まれる鉄（Fe2+）が酸素と結合することで酸素運搬が行われる。",a:true,e:"正しい。ヘモグロビンのヘム基に含まれる鉄イオン（Fe2+）が酸素分子と可逆的に結合します。"},
{c:"労働生理",y:"R4",s:"毛細血管について",b:"毛細血管の壁は1層の内皮細胞で構成されており、物質の交換が行われる。",a:true,e:"正しい。毛細血管は内皮細胞1層の薄い壁を持ち、酸素・栄養・老廃物の交換が行われます。"},
{c:"労働生理",y:"R3",s:"リンパ系について",b:"リンパ節は、リンパ液中の細菌・異物を除去する免疫機能を持つ。",a:true,e:"正しい。リンパ節内のリンパ球・マクロファージがリンパ液をフィルタリングして免疫応答を行います。"},
{c:"労働生理",y:"R5",s:"呼吸のメカニズムについて",b:"吸息時には横隔膜が下降し、胸腔の容積が増大することで肺が膨らむ。",a:true,e:"正しい。吸息では横隔膜収縮（下降）・肋間筋収縮により胸腔容積が増大し、肺への空気流入が生じます。"},
{c:"労働生理",y:"R4",s:"酸塩基平衡について",b:"血液の正常なpHは約7.4であり、酸性に傾くとアシドーシス、アルカリ性に傾くとアルカローシスという。",a:true,e:"正しい。正常血液pH7.4からの逸脱がアシドーシス（pH低下）・アルカローシス（pH上昇）です。"},
{c:"労働生理",y:"R3",s:"腎臓の機能について",b:"腎臓は血液から老廃物を除去するとともに、血圧調節・赤血球産生促進（エリスロポエチン分泌）等の機能を持つ。",a:true,e:"正しい。腎臓は排泄・血圧調節・水電解質バランス調節・エリスロポエチン産生等の多様な機能を持ちます。"},
{c:"労働生理",y:"R5",s:"電解質について",b:"カリウム（K+）は細胞内液の主要な陽イオンであり、細胞の膜電位維持に重要である。",a:true,e:"正しい。K+は細胞内の主要な陽イオンで、神経・筋肉の興奮伝達に重要な役割を果たします。"},
{c:"労働生理",y:"R4",s:"エネルギー代謝について",b:"基礎代謝量は、安静覚醒状態で測定されるエネルギー消費量をいう。",a:true,e:"正しい。基礎代謝量（BMR）は早朝空腹・安静仰臥位・快適温度環境での最低限のエネルギー消費量です。"},
{c:"労働生理",y:"R3",s:"体温について",b:"体温は直腸・口腔・腋窩で測定される場合があるが、直腸温が最も深部体温に近い。",a:true,e:"正しい。測定部位による体温差があり、直腸温>口腔温>腋窩温の順で、直腸温が深部体温に最も近いです。"},
{c:"労働生理",y:"R5",s:"視覚について",b:"眼の網膜には、明暗を感知する杆体（かんたい）と色を感知する錐体（すいたい）がある。",a:true,e:"正しい。網膜には光の強弱を感知する杆体細胞と色覚を担う錐体細胞の2種類の光受容体があります。"},
{c:"労働生理",y:"R4",s:"聴覚のメカニズムについて",b:"音は外耳→鼓膜→耳小骨→蝸牛→聴神経→聴覚野の経路で処理される。",a:true,e:"正しい。音波の経路は外耳道→鼓膜（振動）→耳小骨（増幅）→蝸牛（電気信号変換）→聴神経→大脳聴覚野です。"},
{c:"労働生理",y:"R3",s:"平衡感覚について",b:"平衡感覚（前庭感覚）は、内耳の半規管と前庭器（耳石器）によって調節される。",a:true,e:"正しい。半規管は回転運動を、前庭器（卵形嚢・球形嚢）は直線加速度・重力を感知します。"},
{c:"労働生理",y:"R5",s:"皮膚感覚について",b:"皮膚の感覚受容器には、触覚・圧覚・痛覚・温覚・冷覚をそれぞれ担う受容器がある。",a:true,e:"正しい。皮膚の受容器には各感覚に特化した受容器（マイスネル小体・パチニ小体・自由神経終末等）があります。"},
{c:"労働生理",y:"R4",s:"嗅覚について",b:"嗅覚は、他の感覚に比べて順応が速く、同じにおいを長時間嗅いでいると感じにくくなる。",a:true,e:"正しい。嗅覚は順応（慣れ）が起こりやすく、継続的ばく露で感度が低下します。これが有害ガス感知が困難になる原因の一つです。"},
{c:"労働生理",y:"R3",s:"筋肉の収縮について",b:"骨格筋の収縮は、アクチンとミオシンのフィラメントの滑り合いによって起こる（スライディング説）。",a:true,e:"正しい。骨格筋収縮はアクチンフィラメントがミオシンフィラメントの間に滑り込む「スライディングフィラメント機構」で説明されます。"},
{c:"労働生理",y:"R5",s:"筋疲労について",b:"激しい運動時には解糖系が優位となり、乳酸が産生されて筋疲労の一因となる。",a:true,e:"正しい。高強度運動では嫌気的解糖が促進されて乳酸が蓄積し、筋の酸性化・疲労に関与します。"},
{c:"労働生理",y:"R4",s:"有酸素運動と無酸素運動について",b:"有酸素運動では主に酸化的リン酸化によりATPを産生し、脂肪も主要なエネルギー源となる。",a:true,e:"正しい。有酸素運動（低〜中強度）ではミトコンドリアでの酸化的リン酸化が主なATP産生経路で、脂肪酸も重要な燃料です。"},
{c:"労働生理",y:"R3",s:"脳の機能局在について",b:"大脳皮質の前頭葉は、思考・判断・計画等の高次機能を担う。",a:true,e:"正しい。前頭前野は実行機能（思考・判断・計画・注意制御等）の中枢です。"},
{c:"労働生理",y:"R5",s:"自律神経の働きについて",b:"交感神経が活発になると、心拍数が増加し、瞳孔が散大する。",a:true,e:"正しい。交感神経（緊張・ストレス時）の活性化で心拍数増加・瞳孔散大・血圧上昇等が生じます。"},
{c:"労働生理",y:"R4",s:"副交感神経の働きについて",b:"副交感神経が活発になると、消化活動が促進され、心拍数は低下する。",a:true,e:"正しい。副交感神経（安静・休息時）の活性化で消化促進・心拍数低下・平滑筋弛緩等が生じます。"},
{c:"労働生理",y:"R3",s:"神経伝達物質について",b:"アドレナリンとノルアドレナリンは、交感神経の働きに関連する主要な神経伝達物質（カテコールアミン）である。",a:true,e:"正しい。カテコールアミン（アドレナリン・ノルアドレナリン）は交感神経系の主要な神経伝達物質です。"},
{c:"労働生理",y:"R5",s:"概日リズム（サーカディアンリズム）について",b:"概日リズムは約24時間周期の生体リズムであり、睡眠・体温・ホルモン分泌等に影響する。",a:true,e:"正しい。概日リズムは視床下部の視交叉上核（SCN）が中心的な「体内時計」として機能しています。"},
{c:"労働生理",y:"R4",s:"睡眠の構造について",b:"正常な睡眠は、ノンレム睡眠とレム睡眠が交互に繰り返されるサイクルで構成される。",a:true,e:"正しい。一晩の睡眠は約90分のノンレム+レム睡眠サイクルが4〜5回繰り返されます。"},
{c:"労働生理",y:"R3",s:"ホルモンの種類について",b:"成長ホルモンは下垂体前葉から分泌され、骨・筋肉の成長を促進する。",a:true,e:"正しい。成長ホルモン（GH）は下垂体前葉から分泌され、タンパク質合成促進・骨格筋・骨の成長に関与します。"},
{c:"労働生理",y:"R5",s:"血糖調節について",b:"血糖値が低下すると、膵臓のα細胞からグルカゴンが分泌されて血糖値を上昇させる。",a:true,e:"正しい。低血糖時はグルカゴン分泌により肝グリコーゲン分解・糖新生が促進され血糖値が上昇します。"},
{c:"労働生理",y:"R4",s:"脂質代謝について",b:"中性脂肪（トリグリセリド）は、脂肪組織に蓄積されたエネルギー貯蔵物質である。",a:true,e:"正しい。中性脂肪は最も重要なエネルギー貯蔵形態で、脂肪組織に蓄積されます。"},
{c:"労働生理",y:"R3",s:"タンパク質代謝について",b:"アミノ酸の代謝産物として生じたアンモニアは、肝臓で尿素に変換されて腎臓から排泄される。",a:true,e:"正しい。尿素サイクル（オルニチンサイクル）により肝臓でアンモニアが尿素に変換され、腎臓から排泄されます。"},
{c:"労働生理",y:"R5",s:"ビタミンの役割について",b:"ビタミンCは水溶性ビタミンであり、コラーゲン合成や抗酸化作用に関与する。",a:true,e:"正しい。ビタミンC（アスコルビン酸）はコラーゲン合成に必要な補酵素的役割と強力な抗酸化作用を持ちます。"},
{c:"労働生理",y:"R4",s:"ミネラルの役割について",b:"カルシウムは骨の主要な構成成分であるとともに、筋肉の収縮・神経伝達にも関与する。",a:true,e:"正しい。カルシウムは骨格の構成成分として重要なほか、筋収縮・神経伝達・血液凝固等にも関与します。"},
{c:"労働生理",y:"R3",s:"水の役割について",b:"体内の水は細胞内液・細胞外液（組織液・血漿）として存在し、物質の輸送・体温調節・化学反応の場として機能する。",a:true,e:"正しい。水は生命活動の基盤として多様な役割を担っています。"},
{c:"労働生理",y:"R5",s:"免疫系の種類について",b:"免疫には、自然免疫（先天性免疫）と獲得免疫（適応免疫）の2種類がある。",a:true,e:"正しい。自然免疫（非特異的・即座）と獲得免疫（特異的・記憶あり）が免疫系の2大分類です。"},
{c:"労働生理",y:"R4",s:"抗体について",b:"抗体（免疫グロブリン）はB細胞（形質細胞）によって産生される。",a:true,e:"正しい。抗体はB細胞が分化した形質細胞（プラズマ細胞）により産生される免疫タンパク質です。"},
{c:"労働生理",y:"R3",s:"炎症反応について",b:"炎症の四主徴は、発赤・腫脹・熱感・疼痛である。",a:true,e:"正しい。炎症の4大徴候（ケルスス四徴）は発赤（rubor）・腫脹（tumor）・熱感（calor）・疼痛（dolor）です。"},
{c:"労働生理",y:"R5",s:"老化と身体機能の変化について",b:"加齢に伴い、一般的に最大酸素摂取量（VO2max）は低下する。",a:true,e:"正しい。最大酸素摂取量は20歳代をピークに加齢とともに低下します。"},
{c:"労働生理",y:"R4",s:"体重と体組成について",b:"体脂肪率の評価に用いられる指標として、BMI（体格指数）のほかに腹囲の測定が行われる。",a:true,e:"正しい。BMIに加え、内臓脂肪蓄積の指標として腹囲（男性85cm・女性90cm以上がメタボ基準）が用いられます。"},
{c:"労働生理",y:"R3",s:"行動体力と防衛体力について",b:"行動体力とは、運動・労働を行う能力（筋力・持久力・柔軟性等）をいい、防衛体力とは疾病・ストレスへの抵抗力をいう。",a:true,e:"正しい。体力は行動体力（積極的体力）と防衛体力（消極的体力）に分類されます。"},
{c:"労働生理",y:"R5",s:"呼吸商（RQ）について",b:"糖質のみを燃焼した場合の呼吸商は1.0であり、脂質のみを燃焼した場合は約0.7である。",a:true,e:"正しい。呼吸商（CO2産生量÷O2消費量）は糖質≒1.0、脂質≒0.7、タンパク質≒0.8です。"},
{c:"労働生理",y:"R4",s:"肺活量について",b:"肺活量とは、最大吸気後に最大限呼出できる空気量をいう。",a:true,e:"正しい。肺活量（VC）は最大吸気位から最大努力で呼出できる空気量です。"},
{c:"労働生理",y:"R3",s:"1秒量（FEV1）について",b:"努力肺活量に対する1秒量の比（FEV1%、1秒率）が70%未満の場合、閉塞性換気障害が疑われる。",a:true,e:"正しい。FEV1/FVC比（1秒率）70%未満は気流閉塞（COPDや喘息等の閉塞性換気障害）の指標です。"},
{c:"労働生理",y:"R5",s:"静脈について",b:"静脈は動脈に比べて壁が薄く、血液は心臓に向かって流れる。",a:true,e:"正しい。静脈は動脈より壁が薄く・弾力性が低く、全身から心臓（右心房）へ血液を戻す血管です。"},
{c:"労働生理",y:"R4",s:"動脈と血圧について",b:"収縮期血圧（最高血圧）は心室収縮時の血圧であり、拡張期血圧（最低血圧）は心室拡張時の血圧である。",a:true,e:"正しい。収縮期（最高）血圧は心室収縮時のピーク圧、拡張期（最低）血圧は心室拡張時の圧です。"},
{c:"労働生理",y:"R3",s:"心電図について",b:"心電図のP波は心房の興奮（脱分極）を示す。",a:true,e:"正しい。心電図のP波（P wave）は洞房結節から心房への電気的興奮の伝播を示します。"},
{c:"労働生理",y:"R5",s:"消化酵素について",b:"膵臓から分泌されるアミラーゼはデンプン（多糖類）を分解し、リパーゼは脂肪を分解する。",a:true,e:"正しい。膵液にはアミラーゼ（デンプン分解）・リパーゼ（脂肪分解）・トリプシン（タンパク質分解）等の消化酵素が含まれます。"},
{c:"労働生理",y:"R4",s:"胆汁について",b:"胆汁は肝臓で産生され、胆嚢に貯蔵された後、食後に十二指腸に分泌されて脂肪の消化を助ける。",a:true,e:"正しい。胆汁は肝臓で産生・胆嚢に貯蔵され、脂肪の乳化（消化・吸収促進）に重要です。"},
{c:"労働生理",y:"R3",s:"大腸の機能について",b:"大腸の主な機能は、水分の吸収と便の形成である。",a:true,e:"正しい。大腸は小腸で消化・吸収されなかった食物残渣から水分を吸収し、便を形成します。"},
{c:"労働生理",y:"R5",s:"体温調節中枢について",b:"体温調節中枢は視床下部に存在し、体温のセットポイントを維持する。",a:true,e:"正しい。視床下部には体温調節中枢があり、体温のセットポイント（約37℃）を維持するよう調節します。"},
{c:"労働生理",y:"R4",s:"発汗について",b:"エクリン汗腺は全身に分布し、体温調節のための発汗（温熱性発汗）を担う。",a:true,e:"正しい。エクリン汗腺は全身に広く分布し、体温上昇時の温熱性発汗を担います（精神性発汗も含む）。"},
{c:"労働生理",y:"R3",s:"肝臓のアルコール代謝について",b:"アルコール（エタノール）は肝臓でアルデヒド脱水素酵素によって酢酸へと代謝される。",a:true,e:"正しい。エタノール→（アルコール脱水素酵素）→アセトアルデヒド→（アルデヒド脱水素酵素）→酢酸の経路で代謝されます。"},
{c:"労働生理",y:"R5",s:"男女の身体的差異について",b:"女性は一般的に男性に比べ、筋肉量が少なく体脂肪率が高い傾向がある。",a:true,e:"正しい。性別による体組成の違いとして、女性は筋肉量が少なく・体脂肪率が高い傾向があります。"},
{c:"労働生理",y:"R4",s:"妊娠と身体変化について",b:"妊娠中は血液量が増加し、心拍出量も増加する。",a:true,e:"正しい。妊娠中は血漿量の増加（約40〜50%）に伴い循環血液量・心拍出量が増加します。"},
{c:"労働生理",y:"R3",s:"更年期と身体変化について",b:"女性の更年期では、エストロゲンの減少に伴い、ほてり（ホットフラッシュ）・発汗・骨密度低下等の変化が生じる。",a:true,e:"正しい。閉経前後のエストロゲン低下により、更年期症状（血管運動症状・骨粗しょう症・気分変調等）が出現します。"},
{c:"労働生理",y:"R5",s:"作業能力と健康について",b:"身体的・精神的健康状態は、労働者の作業効率や生産性に影響を与える。",a:true,e:"正しい。健康状態と作業能力・生産性には密接な関連があり、健康管理が生産性維持に重要です。"},
{c:"労働生理",y:"R4",s:"二酸化炭素の運搬について",b:"血液中の二酸化炭素は、主に炭酸水素イオン（HCO3-）の形で運搬される。",a:true,e:"正しい。CO2の約70%は赤血球内で炭酸脱水酵素の働きにより炭酸水素イオンとして血漿中に溶解して運搬されます。"},
{c:"労働生理",y:"R3",s:"酸素解離曲線について",b:"体温の上昇やpHの低下（アシドーシス）により、酸素解離曲線は右方移動する。",a:true,e:"正しい。体温上昇・CO2増加・pH低下・2,3-DPG増加により酸素解離曲線は右方移動し、組織への酸素放出が促進されます（ボーア効果）。"},
{c:"労働生理",y:"R5",s:"血漿タンパク質について",b:"血漿に含まれるアルブミンは、浸透圧の維持や薬物・ホルモン等の運搬に関与する。",a:true,e:"正しい。アルブミンは血漿の膠質浸透圧維持の主役であり、各種物質の運搬タンパク質としても機能します。"},
{c:"労働生理",y:"R4",s:"プロスタグランジンについて",b:"プロスタグランジンは局所ホルモンの一種であり、炎症・発熱・痛覚過敏等に関与する。",a:true,e:"正しい。プロスタグランジンはアラキドン酸から合成される局所作用性の脂質メディエーターで、炎症・発熱・痛みに関与します。"},
{c:"労働生理",y:"R3",s:"ホメオスタシスについて",b:"ホメオスタシス（生体恒常性）とは、生体が内部環境を一定に保とうとする機能のことをいう。",a:true,e:"正しい。ホメオスタシスは体温・血糖・pH等の内部環境を一定範囲に保つための恒常性維持機構です。"},
{c:"労働生理",y:"R5",s:"細胞分裂について",b:"体細胞分裂（有糸分裂）では、染色体が複製されて娘細胞に均等に分配される。",a:true,e:"正しい。体細胞分裂ではDNA複製後、染色体が均等に2つの娘細胞に分配され、もとの細胞と同じゲノムを持つ細胞が生成されます。"},
{c:"労働生理",y:"R4",s:"遺伝子と疾患について",b:"職業性がんは、遺伝的素因と環境因子（有害物質）の両方が関与することがある。",a:true,e:"正しい。がんの発生は遺伝的な素因と発がん物質ばく露等の環境因子が複合的に関与します。"},
{c:"労働生理",y:"R3",s:"老化の生理的変化について",b:"加齢に伴い、神経伝導速度は一般に低下する。",a:true,e:"正しい。加齢により神経伝導速度・反応時間・筋力等の神経筋機能が低下します。"},
{c:"労働生理",y:"R5",s:"リハビリテーションと生理学について",b:"廃用症候群（生活不活発病）は、長期臥床や不動状態が続くことで生じる身体機能の低下をいう。",a:true,e:"正しい。廃用症候群は長期安静・不動により生じる筋萎縮・骨密度低下・心肺機能低下等の二次的障害です。"},
{c:"労働生理",y:"R4",s:"適応と馴化について",b:"高所環境に長期間滞在すると、赤血球数が増加するなどの高所馴化が起こる。",a:true,e:"正しい。高所低酸素環境への馴化では赤血球産生増加（エリスロポエチン増加）・肺活量増加等が生じます。"},
{c:"労働生理",y:"R3",s:"生体リズムと労働について",b:"午後2〜4時頃は生体リズム上、注意力や作業能率が低下しやすい時間帯である。",a:true,e:"正しい。概日リズムの影響で、午後2〜4時頃には眠気増加・集中力低下が生じやすい時間帯です。"},
{c:"労働生理",y:"R5",s:"作業強度の評価について",b:"作業強度の評価指標として、最大酸素摂取量に対する酸素消費量の比（%VO2max）が用いられる。",a:true,e:"正しい。%VO2max（相対的作業強度）は個人の最大能力に対する運動強度の割合を示す重要な評価指標です。"},
];

let wrongIds=new Set(JSON.parse(localStorage.getItem('wrongIds')||'[]'));
let bookmarkIds=new Set(JSON.parse(localStorage.getItem('bookmarkIds')||'[]'));
let catStats=JSON.parse(localStorage.getItem('catStats')||'{}');
let totalAnswered=parseInt(localStorage.getItem('totalAnswered')||'0');
let totalCorrect=parseInt(localStorage.getItem('totalCorrect')||'0');
let examDate=localStorage.getItem('examDate')||'';
let sessionOrder=[],sessionIdx=0,sessionCorrect=0,sessionWrong=0,sessionAnswered=false,isReviewMode=false,catOpen=false;

function save(){
  localStorage.setItem('wrongIds',JSON.stringify([...wrongIds]));
  localStorage.setItem('bookmarkIds',JSON.stringify([...bookmarkIds]));
  localStorage.setItem('catStats',JSON.stringify(catStats));
  localStorage.setItem('totalAnswered',totalAnswered);
  localStorage.setItem('totalCorrect',totalCorrect);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function showDatePicker(){
  const inp=document.getElementById('exam-date-input');
  inp.style.display=inp.style.display==='none'?'block':'none';
  if(examDate)inp.value=examDate;
}
function setExamDate(val){
  examDate=val;localStorage.setItem('examDate',val);
  document.getElementById('exam-date-input').style.display='none';
  updateCountdown();
}
function updateCountdown(){
  const el=document.getElementById('countdown-days');
  const btn=document.getElementById('set-date-btn');
  if(!examDate){el.textContent='―';btn.textContent='試験日を設定';return;}
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);
  const diff=Math.ceil((exam-today)/(1000*60*60*24));
  el.textContent=diff>=0?diff:'終了';
